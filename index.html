Permissão de Trabalho específica para atividades em área classificada (Permissão para Trabalho a Quente/Frio, conforme aplicável) e o certificado de teste de atmosfera (gas-free) emitido pelo Cliente, com validade vigente durante toda a operação;</p></li>\n</ul><ul>\n<li><p>Manter monitoramento contínuo de atmosfera durante toda a operação, mediante detector de gases fornecido pelo Cliente ou pela XD4Solutions, interrompendo imediatamente a missão em caso de detecção de gás inflamável ou tóxico acima dos limites de alarme estabelecidos;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de líquidos inflamáveis residuais em vasos, tanques ou tubulações, mesmo após esvaziamento, mantendo a postura conservadora prevista no seção 4;</p></li>\n</ul><ul>\n<li><p>Coordenar a operação com a equipe de segurança de processo da instalação, respeitando procedimentos de parada, isolamento e permissão específicos de cada unidade;</p></li>\n</ul><ul>\n<li><p>Considerar, em unidades offshore, fatores adicionais de planejamento logístico (transporte de equipamento, espaço de armazenamento, condições de embarcação/plataforma), sem prejuízo da integral observância das limitações ambientais do seção 4.</p></li>\n</ul>"}]}, {"num": "10", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "sections": [{"num": "10.0", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "html": ""}, {"num": "10.1", "title": "Objetivo", "html": "<p>Estabelecer procedimentos padronizados para prevenção, mitigação, resposta e recuperação de incidentes, anormalidades e emergências ocorridas durante operações com o drone Elios 3, incluindo missões de inspeção visual, levantamento lidar, termografia infravermelha e medição de espessura ultrassônica (UT).</p>"}, {"num": "10.2", "title": "Escopo", "html": "<p>Este plano aplica-se a todas as atividades realizadas com o Elios 3 em:</p><table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th colspan=\"2\">ATIVOS</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Espaços confinados;</td>\n<td>Galpões Industriais</td>\n</tr>\n<tr>\n<td>Galerias subterrâneas;</td>\n<td>Estruturas metálicas</td>\n</tr>\n<tr>\n<td>Chaminés;</td>\n<td>Barragens</td>\n</tr>\n<tr>\n<td>Dutos</td>\n<td>Ambientes potencialmente contaminados</td>\n</tr>\n<tr>\n<td>Silos</td>\n<td>Áreas classificadas (quando autorizadas e avaliadas previamente)</td>\n</tr>\n<tr>\n<td>Tanques</td>\n<td>Tubulações e Galerias</td>\n</tr>\n</tbody>\n</table>"}, {"num": "10.3", "title": "Classificação de Ocorrências", "html": "<p><strong>Nível 1 – Anormalidade Menor</strong></p><p>Missão pode prosseguir em casos de:</p><ul>\n<li><p>Perda momentânea de vídeo (&lt;5 s);</p></li>\n<li><p>Pequena instabilidade de iluminação;</p></li>\n<li><p>Pequena variação de estabilidade de voo;</p></li>\n</ul><p><strong>Nível 2 – Incidente Operacional</strong></p><p>Necessita interrupção temporária em caso de:</p><ul>\n<li><p>Colisão leve com estrutura;</p></li>\n<li><p>Saturação do sensor térmico</p></li>\n<li><p>Erro ou incompatibilidade com o LiDAR</p></li>\n<li><p>Baixa qualidade de acoplamento UT</p></li>\n</ul><p><strong>Nível 3 – Emergência</strong></p><p>Interrupção imediata da missão em caso de:</p><ul>\n<li><p>Queda da aeronave;</p></li>\n<li><p>Bateria com defeito;</p></li>\n<li><p>Perda total de comunicação;</p></li>\n<li><p>Aprisionamento do drone;</p></li>\n<li><p>Vazamento de gás detectado;</p></li>\n<li><p>Ativo com grande concentração de particulado;</p></li>\n<li><p>Perda total da estabilidade;</p></li>\n</ul>"}, {"num": "10.4", "title": "Outras Ocorrências", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Condição Anormal</th>\n<th>Ação Corretiva</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Degradação momentânea da qualidade de imagem/vídeo</td>\n<td>Reduzir velocidade, reposicionar a aeronave e avaliar continuidade; se persistente, considerar retorno</td>\n</tr>\n<tr>\n<td>Vibração ou ruído incomum dos motores</td>\n<td>Pousar em local seguro mais próximo possível para inspeção visual; não prosseguir a missão sem avaliação</td>\n</tr>\n<tr>\n<td>Contato leve da gaiola de proteção com superfície (esperado pelo projeto da aeronave)</td>\n<td>Avaliar estabilidade após o contato; prosseguir somente se o comportamento de voo permanecer normal</td>\n</tr>\n<tr>\n<td>Alerta de calibração de sensor (IMU/magnetômetro) durante o voo</td>\n<td>Pousar em local seguro; recalibrar conforme procedimento do fabricante antes de retomar a missão</td>\n</tr>\n<tr>\n<td>Aumento anômalo de temperatura indicado pelo sistema</td>\n<td>Reduzir esforço de voo, pousar e permitir resfriamento; não recarregar bateria sem inspeção</td>\n</tr>\n<tr>\n<td>Comportamento inesperado do sistema de localização/mapeamento (FlyAware)</td>\n<td>Assumir maior margem de controle manual; reduzir velocidade; considerar abortamento se a degradação comprometer a segurança</td>\n</tr>\n</tbody>\n</table><p>Em qualquer condição anormal cuja evolução não seja satisfatoriamente controlada pela ação corretiva, o Operador 1 deve reclassificar a situação como emergência e aplicar os procedimentos da seção 10.5.3.</p>"}, {"num": "10.5", "title": "Procedimentos de Emergência", "html": "<p>Procedimentos de Emergência aplicam-se a condições que representam risco iminente à integridade da aeronave, da equipe ou de terceiros, exigindo ação imediata e priorização absoluta da segurança sobre a continuidade da missão ou a preservação do equipamento.</p>"}, {"num": "10.5.1", "title": "Filosofia de Resposta a Emergências", "html": "<p>A resposta a emergências segue a hierarquia de prioridades adotada pela XD4Solutions, inspirada em práticas consagradas de gestão de emergências em operações de voo: (1) preservar a segurança das pessoas presentes no local; (2) preservar a integridade da estrutura/ativo do Cliente; (3) preservar a aeronave e os dados coletados. Ações de memória (memory items) devem ser executadas sem consulta prévia a checklist, dada a criticidade temporal.</p>"}, {"num": "10.5.2", "title": "Memory Items – Ações Imediatas", "html": "<ul>\n<li><p>Declarar a emergência em voz alta (\"EMERGÊNCIA\" ou \"ABORTAR, ABORTAR, ABORTAR\"), assegurando que toda a equipe tome conhecimento;</p></li>\n</ul><ul>\n<li><p>Avaliar a viabilidade de pouso controlado imediato em superfície segura mais próxima;</p></li>\n</ul><ul>\n<li><p>Caso o pouso controlado não seja viável, priorizar o afastamento da aeronave de pessoas e de equipamentos críticos do Cliente, mesmo que isso resulte em dano à aeronave;</p></li>\n</ul><ul>\n<li><p>Comunicar imediatamente ao Operador 2 e, quando aplicável, à supervisão do Cliente, a natureza da emergência;</p></li>\n</ul><ul>\n<li><p>Após estabilização da situação, proceder à avaliação detalhada e ao registro da ocorrência (MGO – Registro de Ocorrências).</p></li>\n</ul>"}, {"num": "10.5.3", "title": "Critérios de Abortamento de Missão (Abort Criteria)", "html": "<p>A missão deve ser imediatamente abortada sempre que ocorrer qualquer uma das seguintes condições:</p><ul>\n<li><p>Perda de enlace de comando/vídeo não recuperada dentro do tempo esperado da função de retorno automático (seção 10.6);</p></li>\n</ul><ul>\n<li><p>Nível de bateria atingir o limiar mínimo de reserva sem possibilidade de retorno seguro confirmado (seção 10.8);</p></li>\n</ul><ul>\n<li><p>Identificação de falha de sensor crítico que comprometa a estabilidade ou a navegação segura (seção 10.9);</p></li>\n</ul><ul>\n<li><p>Colisão com dano estrutural aparente à aeronave (seção 10.10);</p></li>\n</ul><ul>\n<li><p>Ingresso não autorizado de pessoas na área de risco (MGO – Isolamento da Área e Controle de Acesso);</p></li>\n</ul><ul>\n<li><p>Identificação de condição ambiental não prevista na avaliação de risco (ex.: presença inesperada de gases, líquidos ou energização do ativo);</p></li>\n</ul><ul>\n<li><p>Qualquer outra condição que, no julgamento do Operador 1 ou do Operador 2, comprometa a segurança da operação.</p></li>\n</ul>"}, {"num": "10.6", "title": "Perda de Comunicação", "html": "<p>A perda de comunicação (enlace de comando e/ou vídeo) é um dos perigos mais relevantes em operações dentro de estruturas metálicas e ambientes confinados, devendo ser tratada conforme a sequência abaixo.</p>"}, {"num": "10.6.1", "title": "Resposta Imediata", "html": "<ul>\n<li><p>Comunicar \"PERDA DE SINAL\" ao Operador 2 imediatamente ao identificar a interrupção;</p></li>\n</ul><ul>\n<li><p>Permitir que a função automática de retorno por perda de sinal (Return to Signal) atue, conduzindo a aeronave pela trajetória original até o reestabelecimento do enlace, quando esta função estiver disponível e habilitada;</p></li>\n</ul><ul>\n<li><p>Caso o enlace seja reestabelecido, avaliar a integridade do sistema antes de decidir pela continuidade ou pelo retorno definitivo da missão;</p></li>\n</ul><ul>\n<li><p>Caso o enlace não seja reestabelecido dentro do tempo de referência estabelecido no plano de missão, considerar a aeronave em situação de perda e iniciar o procedimento de localização e recuperação (seção 10.14).</p></li>\n</ul>"}, {"num": "10.6.2", "title": "Medidas Preventivas", "html": "<ul>\n<li><p>Avaliação prévia, na fase de planejamento, das características de atenuação de sinal do ambiente (espessura de paredes metálicas, geometria, presença de múltiplos compartimentos);</p></li>\n</ul><ul>\n<li><p>Uso de módulo de extensão de alcance (range extender) em ambientes de grande extensão linear, quando disponível e tecnicamente indicado;</p></li>\n</ul><ul>\n<li><p>Definição, no briefing, de pontos de referência ao longo da rota que sirvam de marco de segurança quanto ao alcance do sinal.</p></li>\n</ul>"}, {"num": "10.7", "title": "Falha de Iluminação", "html": "<p>O veículo Elios 3 é equipado com sistema de iluminação LED de alta eficiência, posicionado externamente à gaiola de proteção, projetado para fornecer iluminação homogênea e reduzir reflexos durante a inspeção em ambientes sem luz natural.</p>"}, {"num": "10.7.1", "title": "Resposta à Falha Parcial ou Total de Iluminação", "html": "<ul>\n<li><p>Identificar a falha mediante degradação da qualidade de imagem reportada pelo Operador 1 ou pelo Operador 2;</p></li>\n</ul><ul>\n<li><p>Avaliar se a iluminação remanescente é suficiente para a navegação segura de retorno;</p></li>\n</ul><ul>\n<li><p>Caso a iluminação remanescente seja insuficiente para a navegação segura, reduzir a velocidade de voo, ativar fontes de luz auxiliares de apoio em solo (quando aplicável e tecnicamente compatível com o ambiente) e iniciar o retorno imediato pela rota mais curta já mapeada;</p></li>\n</ul><ul>\n<li><p>Não prosseguir a inspeção com iluminação degradada; registrar a falha e submeter a aeronave à manutenção corretiva antes da próxima missão (seção 12).</p></li>\n</ul>"}, {"num": "10.8", "title": "Baixa Bateria", "html": "<p>A gestão da autonomia de bateria é um dos fatores mais críticos para a segurança da missão em ambientes confinados, onde a impossibilidade de pouso/recuperação manual imediata pode transformar a exaustão de bateria em perda da aeronave.</p>"}, {"num": "10.8.1", "title": "Limiares de Gestão de Bateria", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Limiar</th>\n<th>Nível de Carga (referência)</th>\n<th>Ação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Alerta de Planejamento</td>\n<td>50%</td>\n<td>Operador 2 comunica o status; Operador 1 avalia o tempo restante de inspeção útil</td>\n</tr>\n<tr>\n<td>Alerta de Retorno</td>\n<td>30%</td>\n<td>Iniciar o retorno ao ponto de lançamento, salvo inspeção pontual de curtíssima duração já em andamento</td>\n</tr>\n<tr>\n<td>Reserva Mínima Crítica</td>\n<td>Conforme limiar mínimo do fabricante / sistema de alerta embarcado</td>\n<td>Acionamento obrigatório do retorno automático (Smart RTH) ou pouso imediato em local seguro; vedada qualquer continuidade de inspeção</td>\n</tr>\n</tbody>\n</table><p>Os valores percentuais acima são referenciais e devem ser ajustados, no plano de missão, em função da distância e do tempo de retorno estimado para o ponto de lançamento, da carga útil instalada e da temperatura ambiente, fatores que influenciam o consumo energético da aeronave.</p>"}, {"num": "10.8.2", "title": "Resposta à Condição de Bateria Crítica", "html": "<ul>\n<li><p>Comunicar imediatamente \"BATERIA CRÍTICA\" ao Operador 2;</p></li>\n</ul><ul>\n<li><p>Interromper qualquer atividade de inspeção em curso e priorizar o retorno ou o pouso seguro imediato;</p></li>\n</ul><ul>\n<li><p>Caso o sistema de retorno automático (Smart RTH) esteja disponível e habilitado, autorizar seu acionamento e monitorar a execução, mantendo a possibilidade de retomada do controle manual a qualquer momento;</p></li>\n</ul><ul>\n<li><p>Caso o retorno ao ponto de lançamento não seja possível, pousar a aeronave no local mais seguro disponível e proceder à recuperação física, conforme seção 10.14.</p></li>\n</ul>"}, {"num": "10.9", "title": "Falha de Sensores", "html": "<p>A falha ou degradação de sensores de bordo (IMU, magnetômetro, barômetro, câmeras de visão computacional, sensor de distância ou LiDAR) pode comprometer a estabilização, a navegação e/ou a qualidade dos dados coletados.</p>"}, {"num": "10.9.1", "title": "Classificação e Resposta", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Sensor Afetado</th>\n<th>Impacto Potencial</th>\n<th>Ação Recomendada</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>IMU / Magnetômetro</td>\n<td>Instabilidade de voo, deriva de atitude</td>\n<td>Pousar imediatamente; não prosseguir a missão; submeter a aeronave à recalibração/manutenção</td>\n</tr>\n<tr>\n<td>Câmeras de visão computacional (FlyAware/SLAM)</td>\n<td>Degradação da referência posicional e do mapeamento 3D</td>\n<td>Assumir controle manual com maior margem de segurança; reduzir velocidade; considerar abortamento</td>\n</tr>\n<tr>\n<td>Câmera principal/térmica</td>\n<td>Perda de dados de inspeção</td>\n<td>Avaliar se a missão deve continuar apenas para fins de navegação segura de retorno, sem valor de inspeção adicional</td>\n</tr>\n<tr>\n<td>Sensor de distância (ToF) / LiDAR</td>\n<td>Perda de capacidade de mapeamento dimensional</td>\n<td>Continuar apenas inspeção visual, se demais sistemas estiverem nominais; reagendar mapeamento</td>\n</tr>\n<tr>\n<td>Sensor de bateria (gauge)</td>\n<td>Incerteza sobre autonomia real</td>\n<td>Adotar postura conservadora de retorno antecipado, tratando a leitura como não confiável</td>\n</tr>\n</tbody>\n</table><p>Qualquer falha de sensor identificada deve ser registrada no relatório de missão e comunicada à manutenção antes da liberação da aeronave para nova missão (seção 12).</p>"}, {"num": "10.10", "title": "Colisão", "html": "<p>O veículo Elios 3 foi projetado para tolerar contato físico com superfícies e estruturas, dispondo de gaiola de proteção e mecanismo de motores reversíveis capazes de recuperar a aeronave de uma inversão (flip) sem queda. Não obstante, toda colisão deve ser tratada como evento a ser avaliado, e não como ocorrência trivial.</p>"}, {"num": "10.10.1", "title": "Resposta Imediata à Colisão", "html": "<ul>\n<li><p>Avaliar, pela telemetria e pelo comportamento de voo, se a aeronave permanece estável e controlável após o contato;</p></li>\n</ul><ul>\n<li><p>Caso a aeronave permaneça estável, interromper a inspeção em curso e avaliar visualmente, pelas câmeras, eventuais danos aparentes antes de decidir pela continuidade;</p></li>\n</ul><ul>\n<li><p>Caso a aeronave apresente perda de estabilidade, ativar a função de recuperação de inversão (quando aplicável) e priorizar o pouso controlado imediato;</p></li>\n</ul><ul>\n<li><p>Caso não seja possível restabelecer o controle, permitir que a aeronave pouse/caia da forma mais segura possível, priorizando o afastamento de pessoas e de ativos críticos do Cliente;</p></li>\n</ul><ul>\n<li><p>Registrar o evento, com horário, local aproximado e circunstâncias, para fins de investigação (MGO – Investigação de Incidentes).</p></li>\n</ul>"}, {"num": "10.10.2", "title": "Avaliação Pós-Colisão", "html": "<p>Após qualquer colisão, ainda que sem perda de controle, a aeronave deve ser submetida a inspeção técnica detalhada antes de nova missão, verificando-se integridade estrutural da gaiola, hélices, motores e fixações, conforme a seção 12, sendo vedada a continuidade operacional sem essa verificação.</p>"}, {"num": "10.11", "title": "Falha do Sistema LiDAR", "html": "<p><strong>Sintomas</strong>: Nuvem de pontos incompleta ou com lacunas, desalinhamento entre as varreduras, perda de sincronização entre o LiDAR e os demais sensores, baixa densidade de pontos, distorções na reconstrução 3D, mensagens de erro ou interrupções no funcionamento do sistema durante a aquisição dos dados e, em alguns casos, instabilidade no comportamento do drone durante o voo, podendo afetar a precisão da coleta.</p><p><strong>Ações corretivas:</strong> Verificar o funcionamento da IMU e a conexão do cabo entre o módulo LiDAR e o drone, certificando-se de que não há folgas ou danos nos conectores. Em seguida, reiniciar o payload e validar novamente a operação do sistema. Caso a falha persista, interromper a aquisição de dados LiDAR e prosseguir apenas com a inspeção visual, desde que as condições operacionais e de segurança permitam a continuidade da missão.</p>"}, {"num": "10.12", "title": "Saturação da Câmera Termográfica", "html": "<p><strong>Possíveis causas:</strong> A ocorrência de anomalias na imagem térmica pode estar relacionada à presença de equipamentos operando acima da faixa de medição do sensor, reflexos intensos provenientes de superfícies metálicas ou fontes de calor, bem como superfícies com alta emissividade ou condições que prejudiquem a interpretação correta da imagem térmica.</p><p><strong>Contenção:</strong> Alterar a paleta térmica e ajustar a faixa de temperatura (span e level) para melhorar a visualização das diferenças térmicas. Se necessário, aumentar a distância em relação ao alvo para reduzir a saturação da imagem. Caso as anomalias persistam e comprometam a confiabilidade dos dados, suspender o levantamento térmico e prosseguir apenas com a inspeção visual, quando operacionalmente seguro e aplicável.</p>"}, {"num": "10.13", "title": "Falha na Medição com Ultrassom (UT)", "html": "<p><strong>Possíveis causas</strong>: A falha na medição ultrassônica (UT) pode ocorrer devido à quantidade insuficiente de acoplante, presença de oxidação, sujeira ou irregularidades na superfície de medição, desalinhamento da sonda em relação ao ponto inspecionado ou perda da calibração do sistema, comprometendo a qualidade e a confiabilidade das leituras.</p><p><strong>Procedimento:</strong> Limpar adequadamente o ponto de medição, remover impurezas e aplicar uma nova camada de acoplante. Em seguida, reposicionar corretamente a sonda, garantindo o alinhamento adequado com a superfície, e executar uma nova calibração do sistema. Caso a falha persista após essas verificações, cancelar a inspeção ultrassônica, registrar o motivo da interrupção e informar a equipe responsável para avaliação e definição das ações necessárias.</p>"}, {"num": "10.14", "title": "Recuperação da Aeronave", "html": "<p>A recuperação da aeronave refere-se ao conjunto de ações para retirada física do equipamento de dentro do ambiente confinado, seja ao final de missão normal, seja em situação de pouso forçado, perda de sinal não recuperada ou queda.</p>"}, {"num": "10.14.1", "title": "Recuperação ao Final de Missão Normal", "html": "<p>Ao final da missão, com a aeronave pousada em local acessível, o Operador 2 procede à retirada manual do equipamento, com desenergização imediata dos motores, antes de qualquer manuseio.</p>"}, {"num": "10.14.2", "title": "Recuperação em Situação de Contingência", "html": "<ul>\n<li><p>Caso a aeronave permaneça dentro do ambiente confinado sem possibilidade de retorno por seus próprios meios, avaliar a viabilidade de recuperação por ferramenta de extensão (vara telescópica, gancho) a partir de abertura de acesso existente, sem necessidade de entrada humana no espaço confinado;</p></li>\n</ul><ul>\n<li><p>Caso a recuperação não seja possível sem entrada humana no espaço confinado, a operação de resgate do equipamento deve seguir, à risca, os procedimentos de entrada em espaço confinado do Cliente (NR-33 e PEC), sendo vedada qualquer entrada não planejada e não autorizada exclusivamente para a retirada do equipamento;</p></li>\n</ul><ul>\n<li><p>Em hipótese alguma a recuperação do equipamento deve ser priorizada sobre a segurança da equipe; a aeronave pode ser deixada no local até que existam condições seguras de retirada, mediante comunicação formal ao Cliente.</p></li>\n</ul>"}, {"num": "10.14.3", "title": "Registro", "html": "<p>Toda situação de recuperação em contingência deve ser registrada como ocorrência (MGO – Registro de Ocorrências), com descrição das circunstâncias, do método de recuperação empregado e do tempo decorrido até a retirada do equipamento.</p>"}]}, {"num": "11", "title": "PÓS-OPERAÇÃO", "sections": [{"num": "11.0", "title": "PÓS-OPERAÇÃO", "html": "<p>Os Procedimentos Pós-Voo abrangem as ações realizadas imediatamente após o pouso final da aeronave e o encerramento da fase de voo da missão, sendo etapa obrigatória antes da desmobilização da equipe.</p>"}, {"num": "11.1", "title": "Sequência Pós-Voo", "html": "<ul>\n<li><p>Desenergização da aeronave e remoção segura da bateria, observando-se o procedimento de manuseio do seção 12.3;</p></li>\n</ul><ul>\n<li><p>Inspeção visual pós-voo da aeronave, hélices, gaiola e sensores, identificando eventuais danos ou desgastes ocorridos durante a missão;</p></li>\n</ul><ul>\n<li><p>Limpeza de componentes ópticos e remoção de particulados (poeira, fuligem, resíduos) acumulados durante a operação;</p></li>\n</ul><ul>\n<li><p>Acondicionamento da aeronave, baterias e acessórios na maleta de transporte;</p></li>\n</ul><ul>\n<li><p>Restituição da área operacional às condições originais, incluindo remoção de sinalização e isolamento temporário, salvo quando a permanência for solicitada pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Comunicação formal de encerramento da missão à supervisão do Cliente, incluindo eventual entrega preliminar de status da inspeção.</p></li>\n</ul>"}, {"num": "11.2", "title": "Download dos Dados", "html": "<p>O download dos dados coletados durante a missão (vídeo, imagens, telemetria, nuvem de pontos, dados de payload específico) deve seguir procedimento padronizado, garantindo a rastreabilidade e a integridade da informação desde a origem.</p><ul>\n<li><p>O download deve ser realizado, preferencialmente, ainda no local da missão ou no mesmo dia, evitando-se a permanência de dados exclusivamente na memória de bordo da aeronave por período prolongado;</p></li>\n</ul><ul>\n<li><p>A transferência deve ser realizada para dispositivo de armazenamento ou plataforma de gestão de dados homologada pela XD4Solutions, vedando-se o uso de dispositivos pessoais não autorizados;</p></li>\n</ul><ul>\n<li><p>Cada conjunto de dados deve ser identificado com, no mínimo, código da missão, data, local, ativo inspecionado e operador responsável, de forma a permitir correlação inequívoca com o Diário de Bordo (seção 13.1);</p></li>\n</ul><ul>\n<li><p>O Operador 1 é responsável pela confirmação do download completo antes da formatação ou reutilização do cartão de memória/armazenamento de bordo da aeronave.</p></li>\n</ul>"}]}, {"num": "12", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "sections": [{"num": "12.0", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "html": ""}, {"num": "12.1", "title": "Programa de Manutenção", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Periodicidade / Critério</th>\n<th>Ação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Hélices</td>\n<td>A cada 10 horas de voo acumuladas ou conforme dano identificado</td>\n<td>Substituição preventiva</td>\n</tr>\n<tr>\n<td>Inspeção estrutural da gaiola de proteção</td>\n<td>A cada missão (inspeção pré-voo) e revisão detalhada mensal</td>\n<td>Verificação de fissuras, deformações e fixações</td>\n</tr>\n<tr>\n<td>Calibração de IMU/magnetômetro</td>\n<td>Conforme indicação do sistema ou após transporte/impacto relevante</td>\n<td>Recalibração conforme procedimento do fabricante</td>\n</tr>\n<tr>\n<td>Atualização de firmware</td>\n<td>Conforme publicação de versão estável homologada pelo fabricante</td>\n<td>Atualização e voo de checagem em ambiente controlado</td>\n</tr>\n<tr>\n<td>Limpeza de sensores ópticos</td>\n<td>A cada missão</td>\n<td>Limpeza conforme procedimento do fabricante, com produtos não abrasivos</td>\n</tr>\n<tr>\n<td>Revisão geral programada</td>\n<td>Conforme recomendação do fabricante / horas totais de voo</td>\n<td>Encaminhamento ao centro de manutenção autorizado, quando aplicável</td>\n</tr>\n</tbody>\n</table>"}, {"num": "12.2", "title": "Manutenção Corretiva", "html": "<p>Qualquer não conformidade identificada em inspeção pré-voo, pós-voo ou durante a missão (seções 7.2, 11.1 e 10) deve gerar registro de manutenção corretiva, sendo vedada a liberação da aeronave para nova missão sem a devida resolução, registro da ação tomada e aprovação do Responsável Técnico de Manutenção (MGO – Responsabilidades). Reparos de nível avançado (depot-level) são restritos ao fabricante ou a centro de manutenção por ele autorizado, conforme exclusão estabelecida na seção 1.1.2.</p>"}, {"num": "12.3", "title": "Baterias – Especificações e Cuidados do Elios 3", "html": "<ul>\n<li><p>Utilizar exclusivamente carregadores balanceados homologados pelo fabricante, nunca excedendo os parâmetros de tensão e corrente especificados;</p></li>\n</ul><ul>\n<li><p>Respeitar a vida útil de referência de até 50 ciclos de carga (bateria padrão), monitorando a degradação de capacidade ao longo do tempo mediante o sistema inteligente de monitoramento de estado de carga (SOC) integrado à bateria.</p></li>\n</ul>"}]}, {"num": "13", "title": "REGISTROS OPERACIONAIS", "sections": [{"num": "13.0", "title": "REGISTROS OPERACIONAIS", "html": ""}, {"num": "13.1", "title": "Registro das Horas de Operação", "html": "<p>O registro sistemático das horas de operação da aeronave constitui base para a gestão de manutenção preventiva (seção 12), para o controle de vida útil de componentes e para a rastreabilidade exigida por auditorias de clientes industriais.</p><ul>\n<li><p>Cada missão deve ser registrada em Diário de Bordo eletrônico ou físico, contendo, no mínimo: data, local, ativo inspecionado, equipe envolvida, configuração de carga útil utilizada, horário de início e término do voo, tempo total de voo acumulado e principais observações do debriefing operacional (MGO);</p></li>\n</ul><ul>\n<li><p>O registro deve permitir o cálculo cumulativo de horas de voo por aeronave, por bateria e por hélice, de forma a alimentar automaticamente os critérios de manutenção preventiva do seção 12;</p></li>\n</ul><ul>\n<li><p>Discrepâncias entre o tempo de voo registrado pelo Diário de Bordo e o tempo registrado pela telemetria da aeronave devem ser investigadas e justificadas.</p></li>\n</ul>"}]}, {"num": "14", "title": "SUPLEMENTOS", "sections": [{"num": "14.0", "title": "SUPLEMENTOS", "html": "<p>Constituem suplementos técnicos deste POP a documentação do fabricante aplicável ao veículo Elios 3 e os guias operacionais específicos por tipologia de ativo inspecionado. Os formulários corporativos de uso transversal a todos os veículos (avaliação de risco, briefing, diário de bordo, registro e investigação de ocorrências, permissão de trabalho, termo de adesão e indicadores operacionais) constam do Manual Geral de Operações (MGO).</p>"}, {"num": "14.1", "title": "Documentação do Fabricante Flyability", "html": "<ul>\n<li><p><strong>Flyability Elios 3 - User Manual</strong> (versão vigente);</p></li>\n</ul><ul>\n<li><p><strong>Flyability Elios 3 - Technical Specifications</strong> (versão vigente);</p></li>\n</ul><ul>\n<li><p><strong>Flyability Inspector – User Manual</strong> (versão vigente)</p></li>\n</ul><ul>\n<li><p><strong>Flyability Elios 3 – Battery Best Practices</strong>, boletins de serviço, boletins de segurança e atualizações de firmware emitidos pelo fabricante;</p></li>\n</ul><ul>\n<li><p><strong>Ficha de Informações de Segurança (FISPQ/MSDS)</strong> das baterias utilizadas no veículo, quando disponibilizada pelo fabricante.</p></li>\n</ul><p>Em caso de divergência entre este Manual e a documentação técnica vigente do fabricante Flyability, prevalecerão as orientações do fabricante quanto à segurança operacional, utilização, manutenção e integridade do equipamento. A divergência deverá ser registrada como necessidade de atualização documental e tratada prioritariamente pelo Gestor de Operações para revisão deste Manual.</p>"}, {"num": "14.2", "title": "Formulários Específicos do Elios 3", "html": "<ul>\n<li><p>Suplemento C – Checklist Pré-Missão e Pré-Voo (ver seção 7.1);</p></li>\n<li><p>Suplemento G – Ficha de Controle de Manutenção da Aeronave;</p></li>\n<li><p>Suplemento H – Ficha de Controle de Baterias.</p></li>\n</ul><p><strong>FIM DO DOCUMENTO</strong></p><p><em>Este Manual de Procedimentos Operacionais Padrão é um documento vivo da XD4Solutions, sujeito a revisão contínua à luz da experiência operacional, de alterações regulatórias e de atualizações tecnológicas do veículo Flyability Elios 3.</em></p>"}]}];</script>
<script>const POP_G1_CONTENT = [{"num": "1", "title": "OBJETIVO", "sections": [{"num": "1.0", "title": "OBJETIVO", "html": ""}, {"num": "1.1", "title": "Escopo e Aplicabilidade", "html": "<p>O presente Manual tem por objetivo estabelecer, de forma padronizada, disciplinada e auditável, os Procedimentos Operacionais Padrão (POP) da <strong>XD4Solutions</strong> aplicáveis às operações realizadas com o <strong>Robô Humanoide Unitree G1</strong>, utilizado para inspeção, mapeamento, apoio operacional e demonstração de tarefas em ambientes industriais estruturados, reduzindo a necessidade de exposição de pessoas a atividades repetitivas, ergonomicamente desfavoráveis ou de menor valor agregado.</p><p>Constituem objetivos específicos deste Manual:</p><ul>\n<li><p>Padronizar o planejamento, a execução e o encerramento das operações realizadas com o robô Unitree G1, reduzindo a variabilidade operacional entre equipes e missões;</p></li>\n<li><p>Estabelecer os requisitos mínimos de segurança para a operação de um robô humanoide bípede em ambientes compartilhados com pessoas, consolidando as práticas de segurança de máquinas (NR-12) com os princípios de disciplina operacional da aviação adotados pela XD4Solutions;</p></li>\n<li><p>Fornecer uma base documental consistente e auditável para clientes dos setores industrial, logístico, de pesquisa e de eventos institucionais;</p></li>\n<li><p>Definir os procedimentos de emergência e de contenção aplicáveis a falhas de equilíbrio, perda de comunicação, falhas de bateria e demais ocorrências típicas da operação de robôs humanoides.</p></li>\n</ul><p>Este Manual complementa o Manual Geral de Operações (MGO – IT-OPE-003) da XD4Solutions, prevalecendo sobre este exclusivamente quanto aos aspectos técnicos específicos do robô Unitree G1.</p><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Abrangência de Modelos:</b><em>Este Manual aplica-se a todas as variantes e configurações do robô humanoide Unitree G1 comercializadas ou operadas pela XD4Solutions, incluindo, sem caráter exaustivo, as configurações G1 (Básica), G1 EDU Standard, G1 EDU Plus, G1 EDU Pro e G1 EDU Ultimate, independentemente do número de graus de liberdade (23 a 43), do tipo de efetuador terminal (garra padrão ou mãos dexterosas Dex3-1/Revo 2) ou do módulo de computação embarcada instalado. Especificações técnicas que variem entre configurações — graus de liberdade, capacidade de manipulação, autonomia de bateria — devem ser verificadas na ficha técnica específica da unidade efetivamente operada, prevalecendo, em caso de dúvida, os valores mais conservadores entre as configurações homologadas pela XD4Solutions.</em></div></div><p>As disposições deste Manual são de cumprimento obrigatório por:</p><ul>\n<li><p>Coordenador de Operações, Líder de Operações e Diretor de Operações envolvidos no planejamento, autorização, supervisão e encerramento das operações;</p></li>\n<li><p>Todo o pessoal operacional habilitado a atuar como Operador 1 (Piloto em Comando) ou Operador 2 (Observador/Apoio) nas operações com o Unitree G1;</p></li>\n<li><p>Responsáveis pela inspeção, manutenção e liberação operacional do equipamento;</p></li>\n<li><p>Prestadores de serviço e empresas subcontratadas que atuem sob a responsabilidade técnica e contratual da XD4Solutions, mediante ciência e adesão aos procedimentos estabelecidos neste Manual.</p></li>\n</ul><p>Este Manual não se aplica a:</p><ul>\n<li><p>Operações realizadas com outros modelos de robôs ou plataformas que não o Unitree G1, as quais deverão seguir seus respectivos procedimentos operacionais;</p></li>\n<li><p>Operações que envolvam desenvolvimento autônomo de novos comportamentos ou algoritmos de controle não homologados pela XD4Solutions (pesquisa e desenvolvimento de SDK), que seguem procedimento técnico próprio, apartado deste POP;</p></li>\n<li><p>Operações que utilizem acessórios, ferramentas de efetuador terminal ou modificações mecânicas não homologadas pelo fabricante ou pela XD4Solutions;</p></li>\n<li><p>Atividades de manutenção corretiva de nível de fábrica (Depot Level Maintenance), restritas ao fabricante ou a centros de manutenção por ele autorizados.</p></li>\n</ul>"}]}, {"num": "2", "title": "CARACTERÍSTICAS DO ROBÔ", "sections": [{"num": "2.0", "title": "CARACTERÍSTICAS DO ROBÔ", "html": "<p>Este capítulo apresenta as características técnicas do robô humanoide Unitree G1 e dos acessórios homologados para sua operação pela XD4Solutions.</p>"}, {"num": "2.1", "title": "Robô Humanoide", "html": "<p>As especificações a seguir referem-se aos valores de referência do robô Unitree G1 em suas principais configurações (G1, G1 EDU Standard, G1 EDU Plus, G1 EDU Pro e G1 EDU Ultimate). Parâmetros como graus de liberdade, tipo de efetuador terminal e capacidade de computação embarcada variam conforme o modelo especificamente homologado para a missão, devendo ser sempre confirmados na ficha técnica da unidade operada.</p><ul>\n<li><p>Configuração: robô humanoide bípede de arquitetura antropomórfica, com cabeça, tronco, dois braços e duas pernas, projetado para locomoção bípede e manipulação leve de objetos;</p></li>\n<li><p>Altura em pé: aproximadamente 1,32 m; altura dobrado (transporte): aproximadamente 0,69 m;</p></li>\n<li><p>Massa aproximada: 35 kg, incluindo bateria em configuração padrão. Os valores exatos devem ser confirmados na ficha técnica vigente do fabricante;</p></li>\n<li><p>Graus de liberdade: 23 (configuração padrão), podendo alcançar até 43 em configurações EDU Ultimate com mãos multiarticuladas, conforme o modelo homologado pela XD4Solutions;</p></li>\n<li><p>Atuadores: motores elétricos síncronos de ímã permanente (PMSM) de baixa inércia e resposta rápida, instalados nas articulações de pernas, braços, cintura e pescoço;</p></li>\n<li><p>Sensores de bordo: unidade de medição inercial (IMU), LiDAR 3D, câmera de profundidade, câmeras de visão computacional e sensores de força/torque nas articulações e nos pés, empregados para equilíbrio, navegação e percepção do ambiente;</p></li>\n<li><p>Capacidade de manipulação: mãos de três dedos (Dex3-1) ou efetuador padrão, com carga útil de manipulação de até 2 kg por braço, conforme a configuração homologada;</p></li>\n<li><p>Velocidade de deslocamento: até 2 m/s em piso plano e estruturado, reduzida conforme as condições do terreno e o modo de operação selecionado;</p></li>\n<li><p>Grau de proteção: equivalente a IP54 (não certificado, conforme especificação do fabricante); o robô não é impermeável, sendo vedada a operação sob chuva, respingos intensos ou ambientes encharcados;</p></li>\n<li><p>Bateria: bateria de lítio recarregável de 48V, aproximadamente 9000 mAh, com sistema inteligente de monitoramento de estado de carga (SOC) e proteções integradas contra sobrecarga, sobrecorrente, sobretensão e temperatura inadequada; mecanismo de troca rápida, quando aplicável ao modelo homologado;</p></li>\n<li><p>Autonomia de operação de referência: até aproximadamente 2 horas em uso misto (locomoção e manipulação leve), em condições ideais; valores sempre confirmados conforme ficha técnica vigente do fabricante e condições reais de missão;</p></li>\n<li><p>Conectividade: Wi-Fi 6 e Bluetooth 5.2 para configuração, telemetria e controle remoto assistido;</p></li>\n<li><p>Computação embarcada: unidade de processamento de 8 núcleos para controle em tempo real, com módulo de coprocessamento de IA (NVIDIA Jetson Orin, quando aplicável ao modelo homologado) para percepção, navegação autônoma e inferência de modelos de ação;</p></li>\n<li><p>Funções de segurança de fábrica: recuperação automática de queda (self-righting) e parada de emergência (E-Stop) físico e remoto, quando disponíveis e habilitados na configuração homologada.</p></li>\n</ul>"}, {"num": "2.2", "title": "Acessórios e Módulos Homologados", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Finalidade</th>\n<th>Observações</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Câmera de profundidade + LiDAR 3D (integrados)</td>\n<td>Navegação autônoma, mapeamento do ambiente e inspeção visual</td>\n<td>Configuração padrão; sensores fixos, não modulares</td>\n</tr>\n<tr>\n<td>Mãos dexterosas Dex3-1 (ou equivalente)</td>\n<td>Manipulação leve de objetos, válvulas e botoeiras</td>\n<td>Homologação específica; carga máxima conforme Seção 4.2</td>\n</tr>\n<tr>\n<td>Controle remoto dedicado</td>\n<td>Acionamento, teleoperação assistida e parada de emergência</td>\n<td>Deve permanecer com o Operador 1 durante toda a missão</td>\n</tr>\n<tr>\n<td>Módulo de extensão de alcance de sinal</td>\n<td>Ampliação da cobertura de comunicação</td>\n<td>Uso conforme necessidade do ambiente de operação</td>\n</tr>\n</tbody>\n</table><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b><em>Nota: o Unitree G1 não é homologado, nesta versão do POP, para operação em atmosferas potencialmente explosivas (Ex/ATEX), para manipulação de cargas superiores às especificadas pelo fabricante, nem para uso como dispositivo de suporte de carga estrutural ou de resgate de pessoas.</em></div></div>"}]}, {"num": "3", "title": "CONFIGURAÇÃO PERMITIDA", "sections": [{"num": "3.0", "title": "CONFIGURAÇÃO PERMITIDA", "html": ""}, {"num": "3.1", "title": "Seleção de Configuração", "html": "<p>A configuração do robô a ser empregada — número de graus de liberdade, tipo de efetuador terminal (mão dexterosa ou garra padrão) e módulos de computação embarcada — deve ser definida na fase de planejamento da missão (MGO – Planejamento da Missão), em função do objetivo operacional contratado, sendo registrada no dossiê da missão.</p>"}, {"num": "3.2", "title": "Controle de Versão de Firmware e Software", "html": "<ul>\n<li><p>O firmware do robô e o software da estação de controle devem estar na versão estável mais recente homologada pela XD4Solutions, sendo vedado o uso de versões beta ou de desenvolvimento em missões comerciais;</p></li>\n<li><p>Toda atualização de firmware deve ser registrada no Diário de Operação e Manutenção do equipamento, com data, versão anterior, versão instalada e responsável pela atualização;</p></li>\n<li><p>Alterações no comportamento do robô decorrentes de atualização devem ser validadas em ambiente controlado antes do emprego em missão comercial.</p></li>\n</ul>"}, {"num": "3.3", "title": "Modos de Operação Permitidos", "html": "<ul>\n<li><p><strong>Modo Assistido/Teleoperado</strong>: o robô é conduzido em tempo real pelo Operador 1 por meio do controle remoto dedicado, sendo o modo padrão recomendado para a generalidade das missões de inspeção e demonstração;</p></li>\n<li><p><strong>Modo Autônomo Supervisionado</strong>: o robô executa rotinas de locomoção e/ou manipulação pré-programadas ou baseadas em modelos de IA, permanecendo o Operador 1 em condições de assumir o controle manual a qualquer momento e de acionar a parada de emergência;</p></li>\n<li><p><strong>Modo Autônomo Não Supervisionado</strong>: não é autorizado em operações comerciais da XD4Solutions, sendo restrito a atividades de pesquisa e desenvolvimento em ambiente controlado e isolado de pessoas, conforme procedimento técnico apartado.</p></li>\n</ul>"}]}, {"num": "4", "title": "LIMITAÇÕES OPERACIONAIS", "sections": [{"num": "4.0", "title": "LIMITAÇÕES OPERACIONAIS", "html": ""}, {"num": "4.1", "title": "Limites Ambientais", "html": "<ul>\n<li><p>Faixa de temperatura de operação: 0°C a 40°C, conforme especificação do fabricante;</p></li>\n<li><p>Piso: superfícies planas, niveladas e com aderência adequada; degraus e pequenos desníveis (soleiras de porta) são tolerados de forma limitada, conforme homologação do controlador de locomoção; escadas industriais íngremes exigem ajuste fino do controlador e autorização específica;</p></li>\n<li><p>Vedada a operação em piso molhado, escorregadio, irregular, instável ou coberto por detritos que comprometam o equilíbrio do robô;</p></li>\n<li><p>Vedada a operação sob chuva, neve ou em ambientes com poeira/névoa densa que comprometam a percepção dos sensores de navegação.</p></li>\n</ul>"}, {"num": "4.2", "title": "Limites de Desempenho do Robô", "html": "<ul>\n<li><p>Velocidade máxima de deslocamento: 2 m/s em piso estruturado, devendo ser reduzida em ambientes com pessoas próximas ou em terrenos irregulares;</p></li>\n<li><p>Carga máxima de manipulação: conforme especificação do fabricante para o efetuador instalado (referência: até 2 kg por braço), não devendo ser excedida sob qualquer circunstância;</p></li>\n<li><p>Autonomia de bateria: conforme Seção 2.1, devendo ser considerada reserva operacional mínima de 20% de carga para retorno seguro e desligamento controlado;</p></li>\n<li><p>Inclinação máxima de piso tolerada: conforme especificação do fabricante e validação do controlador de locomoção homologado pela XD4Solutions.</p></li>\n</ul>"}, {"num": "4.3", "title": "Limites de Enlace de Comunicação", "html": "<ul>\n<li><p>A operação em modo assistido/teleoperado exige enlace de comunicação estável entre o controle remoto e o robô (Wi-Fi 6 ou Bluetooth 5.2, conforme configuração);</p></li>\n<li><p>Perda do enlace de comunicação por período superior ao definido no procedimento de emergência (Seção 10.6) deve acionar o comportamento seguro programado (parada controlada em pé, sentado ou pouso controlado, conforme configuração homologada).</p></li>\n</ul>"}, {"num": "4.4", "title": "Restrições Operacionais Adicionais", "html": "<ul>\n<li><p>Vedada a operação do robô a menos de 30 m de pessoas não envolvidas e não anuentes com a operação, salvo quando houver barreira mecânica suficientemente forte para isolá-las e protegê-las, ou zona de exclusão específica definida na Avaliação de Risco da missão;</p></li>\n<li><p>Vedada a operação em áreas classificadas como potencialmente explosivas (Ex/ATEX);</p></li>\n<li><p>Vedado o transporte ou a manipulação de pessoas, animais ou cargas não homologadas pelo fabricante;</p></li>\n<li><p>Vedada a operação sem a presença constante do Operador 1 em condições de intervir, mesmo em modo autônomo supervisionado.</p></li>\n</ul>"}, {"num": "4.5", "title": "Perigos Típicos das Operações com Robôs Humanoides", "html": "<ul>\n<li><p>Perda de equilíbrio e queda do robô, com risco de dano ao equipamento, ao ambiente e a terceiros;</p></li>\n<li><p>Pontos de esmagamento e aprisionamento (pinch points) nas articulações móveis, especialmente durante a inicialização, a calibração e os movimentos de braços e pernas;</p></li>\n<li><p>Contato indesejado com pessoas durante a locomoção ou a manipulação, especialmente em espaços compartilhados e de circulação;</p></li>\n<li><p>Riscos elétricos e térmicos associados à bateria de lítio, incluindo risco de incêndio em caso de dano físico, sobrecarga ou curto-circuito;</p></li>\n<li><p>Comportamento inesperado decorrente de falhas de percepção (sensores) ou de modelos de controle baseados em IA, especialmente em ambientes não estruturados ou com iluminação deficiente.</p></li>\n</ul>"}]}, {"num": "5", "title": "EQUIPAMENTOS NECESSÁRIOS", "sections": [{"num": "5.0", "title": "EQUIPAMENTOS NECESSÁRIOS", "html": ""}, {"num": "5.1", "title": "Estação de Controle e Software", "html": "<ul>\n<li><p>Controle remoto dedicado, com botão físico de parada de emergência (E-Stop) sempre acessível ao Operador 1;</p></li>\n<li><p>Tablet/estação com aplicativo de controle do fabricante, exibindo telemetria de estado (bateria, temperatura das articulações, status de equilíbrio) e vídeo das câmeras embarcadas, quando aplicável;</p></li>\n<li><p>Software de planejamento e revisão de rotinas autônomas, quando a missão empregar o modo autônomo supervisionado;</p></li>\n<li><p>Software de processamento e relatório de dados, para consolidação dos registros e imagens coletados durante a missão.</p></li>\n</ul>"}, {"num": "5.2", "title": "Equipamentos de Apoio", "html": "<ul>\n<li><p>Maleta de transporte rígida, dimensionada para o robô na configuração dobrada;</p></li>\n<li><p>Baterias reserva, carregador(es) homologado(s) e maleta de transporte de baterias com proteção contra curto-circuito;</p></li>\n<li><p>Fita de demarcação, cones ou barreiras físicas para sinalização da zona de exclusão ao redor da área de operação;</p></li>\n<li><p>Kit de primeiros socorros e extintor de incêndio classe D ou específico para baterias de lítio, disponível no local da operação;</p></li>\n<li><p>Equipamentos de Proteção Individual (EPI) conforme a Avaliação de Risco da missão, incluindo calçado de segurança e, quando aplicável, luvas de proteção contra pontos de esmagamento.</p></li>\n</ul>"}]}, {"num": "6", "title": "REQUISITOS DA EQUIPE", "sections": [{"num": "6.0", "title": "REQUISITOS DA EQUIPE", "html": ""}, {"num": "6.1", "title": "Composição Mínima da Equipe", "html": "<p>A tripulação mínima para a operação do robô Unitree G1 é composta por 1 (um) Operador 1 habilitado. A presença de um Operador 2 é recomendada em missões que envolvam manipulação de objetos, ambientes com maior fluxo de pessoas ou necessidade de monitoramento adicional da zona de exclusão.</p>"}, {"num": "6.2", "title": "Qualificação do Operador 1 (Responsável pela Operação)", "html": "<ul>\n<li><p>Certificado de habilitação técnica específica no robô Unitree G1, emitido pela XD4Solutions ou por instrutor por ela credenciado;</p></li>\n<li><p>Conhecimento comprovado deste Manual, do manual do fabricante e dos procedimentos de emergência da Seção 10;</p></li>\n<li><p>Treinamento prático de recuperação de queda, parada de emergência e desligamento controlado do equipamento;</p></li>\n<li><p>Atestado de Saúde Ocupacional (ASO) válido e, quando aplicável ao ambiente de operação, cursos de NR-12, NR-33, NR-35 ou NR-20.</p></li>\n</ul>"}, {"num": "6.3", "title": "Qualificação do Operador 2", "html": "<p>O profissional designado como Operador 2 deve possuir conhecimento básico do equipamento e dos procedimentos de segurança deste Manual, sendo responsável por auxiliar o Operador 1 na manutenção da zona de exclusão, no monitoramento de pessoas próximas e no registro de dados da missão.</p>"}]}, {"num": "7", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "sections": [{"num": "7.0", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "html": ""}, {"num": "7.1", "title": "Checklist Pré-Missão", "html": "<ul>\n<li><p>Verificação da Avaliação de Risco da missão e das condições ambientais do local, incluindo piso, iluminação e presença de pessoas não envolvidas;</p></li>\n<li><p>Verificação da carga da bateria principal e das baterias reserva;</p></li>\n<li><p>Verificação da vigência do seguro do equipamento e da documentação exigida pelo cliente;</p></li>\n<li><p>Definição da zona de exclusão e do posicionamento do Operador 1 e do Operador 2 durante a missão.</p></li>\n</ul>"}, {"num": "7.2", "title": "Inspeção Pré-Operação", "html": "<ul>\n<li><p>Verificação visual da integridade estrutural do chassi, das articulações, das coberturas de proteção e dos pés de apoio;</p></li>\n<li><p>Verificação de folgas anormais, ruídos ou resistência incomum nas articulações ao movimentá-las manualmente com o robô desenergizado;</p></li>\n<li><p>Limpeza das lentes das câmeras e do sensor LiDAR;</p></li>\n<li><p>Verificação do encaixe correto da bateria e da ausência de danos físicos, inchaço ou vazamento.</p></li>\n</ul><ul>\n<li><p>Inicialização do robô e verificação do autoteste de sistema (IMU, articulações, sensores de força/torque, câmeras e LiDAR);</p></li>\n<li><p>Teste de amplitude de movimento das articulações em área livre de pessoas e obstáculos;</p></li>\n<li><p>Teste da função de parada de emergência (E-Stop físico e remoto) antes do início de cada missão;</p></li>\n<li><p>Verificação da qualidade do enlace de comunicação entre o controle remoto e o robô.</p></li>\n</ul>"}]}, {"num": "8", "title": "CONFIGURAÇÃO DO ROBÔ", "sections": [{"num": "8.0", "title": "CONFIGURAÇÃO DO ROBÔ", "html": ""}, {"num": "8.1", "title": "Inicialização", "html": "<ul>\n<li><p>A inicialização do robô deve ocorrer em área livre, com raio mínimo de segurança conforme a Avaliação de Risco, e com o robô apoiado em superfície plana e estável;</p></li>\n<li><p>Durante a sequência de inicialização e calibração, é vedada a aproximação de qualquer pessoa não envolvida na operação, em razão dos movimentos automáticos de calibração das articulações.</p></li>\n</ul>"}, {"num": "8.2", "title": "Configuração de Gravação e Telemetria", "html": "<ul>\n<li><p>Antes do início da missão, deve ser confirmada a configuração de gravação de vídeo, imagens e telemetria de acordo com o objetivo da missão;</p></li>\n<li><p>Os parâmetros de navegação autônoma (quando aplicável) devem ser revisados e ajustados conforme as características do ambiente de operação.</p></li>\n</ul>"}]}, {"num": "9", "title": "PROCEDIMENTO OPERACIONAL", "sections": [{"num": "9.0", "title": "PROCEDIMENTO OPERACIONAL", "html": ""}, {"num": "9.1", "title": "Planejamento (Realizado no Escritório)", "html": "<p>Realizado em conjunto pelo Coordenador de Operações e pelos responsáveis técnicos pela missão, incluindo a definição do modo de operação (assistido ou autônomo supervisionado), da configuração de efetuador terminal e das rotinas a serem executadas.</p>"}, {"num": "9.2", "title": "Planejamento da Missão (Conferido e Atualizado no Local da Operação)", "html": "<ul>\n<li><p>Ao chegar ao local, o Operador 1 e o Operador 2 devem conferir in loco as condições de piso, iluminação, presença de pessoas não anuentes e obstáculos não previstos no planejamento;</p></li>\n<li><p>Em nenhuma hipótese o robô pode operar a menos de 30 m horizontais de pessoas não envolvidas e não anuentes, salvo barreira mecânica suficiente ou zona de exclusão fisicamente demarcada e sinalizada;</p></li>\n<li><p>A operação somente pode ser iniciada quando houver autonomia de bateria suficiente para realizar a missão e retornar com a reserva mínima estabelecida na Seção 4.2.</p></li>\n</ul>"}, {"num": "9.3", "title": "Ativação e Locomoção", "html": "<ul>\n<li><p>A ativação do robô e a transição para a posição em pé devem ocorrer com a zona de exclusão já demarcada e livre de pessoas não envolvidas;</p></li>\n<li><p>O Operador 1 deve manter, a todo momento, consciência situacional do entorno do robô, priorizando o afastamento de pessoas e obstáculos antes do início da locomoção;</p></li>\n<li><p>Em modo autônomo supervisionado, o Operador 1 deve manter-se em condições de assumir o controle manual ou acionar a parada de emergência a qualquer instante.</p></li>\n</ul>"}, {"num": "9.4", "title": "Captura de Dados e Manipulação", "html": "<ul>\n<li><p>As tarefas de manipulação de objetos, válvulas ou botoeiras devem respeitar os limites de carga estabelecidos na Seção 4.2;</p></li>\n<li><p>Movimentos de manipulação próximos a pessoas autorizadas (colaborativas) devem observar velocidade reduzida, conforme os princípios de segurança colaborativa (ISO/TS 15066), quando aplicável à configuração do robô.</p></li>\n</ul>"}, {"num": "9.5", "title": "Avaliação em Diversos Cenários", "html": "<p>Galpões, linhas de produção e áreas de armazenagem com piso nivelado constituem o cenário ideal de operação do Unitree G1, devendo ainda assim ser respeitada a zona de exclusão em relação a colaboradores em atividade.</p><p>Aplicável a demonstrações técnicas e coleta de dados para desenvolvimento, respeitando as restrições da Seção 1.1.2 quanto a operações de pesquisa e desenvolvimento não homologadas.</p><p>Exige atenção redobrada à presença de público não familiarizado com o equipamento, recomendando-se zona de exclusão física (barreiras) mais conservadora do que a mínima regulamentar.</p><p>Restrita a controladores de locomoção homologados para essa finalidade, mediante autorização específica do Coordenador de Operações e treinamento adicional do Operador 1.</p>"}, {"num": "9.6", "title": "Após o Término da Missão", "html": "<ul>\n<li><p>Avaliar se os objetivos da missão foram atingidos e se todos os registros correspondentes foram realizados;</p></li>\n<li><p>Retornar o robô à posição sentada ou deitada de forma controlada, seguida de desenergização;</p></li>\n<li><p>Os dados armazenados na memória do robô não devem ser apagados pelos operadores antes do download para o local de arquivo definitivo, a ser realizado no mesmo dia.</p></li>\n</ul>"}]}, {"num": "10", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "sections": [{"num": "10.0", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "html": ""}, {"num": "10.1", "title": "Objetivo", "html": "<p>Estabelecer procedimentos padronizados para prevenção, mitigação, resposta e recuperação de incidentes, anormalidades e emergências ocorridas durante operações com o robô Unitree G1.</p>"}, {"num": "10.2", "title": "Escopo", "html": "<p>Aplica-se a todas as operações realizadas com o robô Unitree G1 pela XD4Solutions, complementando o Capítulo 11 do MGO (IT-OPE-003) quanto aos procedimentos específicos desta plataforma.</p>"}, {"num": "10.3", "title": "Classificação de Ocorrências", "html": "<ul>\n<li><p><strong>Nível 1 (Rotina)</strong>: pequenas oscilações de equilíbrio corrigidas automaticamente pelo controlador; variações momentâneas de sinal sem perda de controle;</p></li>\n<li><p><strong>Nível 2 (Atenção)</strong>: alerta de temperatura elevada em articulação; degradação da qualidade de imagem por poeira ou iluminação insuficiente; recuperação automática de tropeço (stumble recovery) acionada;</p></li>\n<li><p><strong>Nível 3 (Emergência)</strong>: queda do robô sem controle; perda de comunicação além do limiar definido; contato indesejado com pessoa; princípio de incêndio na bateria.</p></li>\n</ul>"}, {"num": "10.4", "title": "Outras Ocorrências", "html": "<p>Ocorrências não enquadradas nos níveis acima, mas que se afastem da normalidade operacional, devem ser reportadas ao Coordenador de Operações e registradas no Diário de Operação e Manutenção, servindo de base para aprendizado organizacional.</p>"}, {"num": "10.5", "title": "Procedimentos de Emergência", "html": "<p>A segurança das pessoas prevalece sobre a integridade do equipamento em toda e qualquer situação de emergência. O Operador 1 deve priorizar o afastamento de pessoas da área de risco antes de qualquer tentativa de recuperação do robô.</p><ul>\n<li><p>Acionar a parada de emergência (E-Stop) ao primeiro sinal de comportamento não controlado do robô;</p></li>\n<li><p>Alertar verbalmente todas as pessoas próximas para afastamento imediato;</p></li>\n<li><p>Não se aproximar do robô em queda ou em movimento não controlado até a completa desenergização.</p></li>\n</ul><p>A missão deve ser abortada de imediato sempre que: houver perda de equilíbrio não recuperada automaticamente; a bateria atingir o limiar crítico (Seção 10.8); houver perda de comunicação além do limiar definido; ou houver qualquer indício de dano estrutural, térmico ou elétrico ao equipamento.</p>"}, {"num": "10.6", "title": "Perda de Comunicação", "html": "<p>Permitir que a função automática de comportamento seguro por perda de sinal atue (parada controlada em pé ou posição sentada, conforme configuração homologada), monitorando visualmente o robô até o reestabelecimento do enlace ou a intervenção segura da equipe.</p><p>Posicionar a estação de controle em local com boa cobertura de sinal e, quando necessário, utilizar módulo de extensão de alcance homologado pela XD4Solutions.</p>"}, {"num": "10.7", "title": "Perda de Equilíbrio e Queda", "html": "<p>Ao primeiro sinal de perda de equilíbrio, o Operador 1 deve acionar a função de recuperação automática, quando disponível, ou a parada de emergência, mantendo todas as pessoas afastadas até a estabilização ou a completa desenergização do robô.</p><p>Após qualquer queda, ainda que recuperada automaticamente, o robô deve ser submetido a inspeção técnica detalhada antes de nova missão, verificando-se integridade estrutural, das articulações e dos sensores, conforme o Capítulo 12, sendo vedada a continuidade operacional sem essa verificação.</p>"}, {"num": "10.8", "title": "Baixa Bateria", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Nível de Bateria</th>\n<th>Ação Requerida</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>40%</td>\n<td>Alerta de atenção; planejar o encerramento da tarefa em andamento</td>\n</tr>\n<tr>\n<td>20%</td>\n<td>Iniciar retorno à base ou local de pouso seguro</td>\n</tr>\n<tr>\n<td>10% (crítico)</td>\n<td>Acionamento obrigatório da parada controlada; vedada qualquer continuidade da missão</td>\n</tr>\n</tbody>\n</table><p>Interromper imediatamente a tarefa em andamento e conduzir o robô à posição sentada ou deitada de forma controlada, seguida de desenergização, evitando a queda por exaustão total da bateria.</p>"}, {"num": "10.9", "title": "Falha de Sensores", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Sensor Afetado</th>\n<th>Impacto</th>\n<th>Ação Recomendada</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>IMU / Sensores de força-torque</td>\n<td>Degradação do equilíbrio e da estabilização</td>\n<td>Acionar parada controlada; não prosseguir a missão</td>\n</tr>\n<tr>\n<td>LiDAR / Câmera de profundidade</td>\n<td>Perda de percepção do ambiente</td>\n<td>Assumir controle manual com maior margem de segurança; reduzir velocidade</td>\n</tr>\n<tr>\n<td>Câmeras de imagem</td>\n<td>Perda de qualidade dos dados coletados</td>\n<td>Continuar apenas locomoção básica, se demais sistemas nominais; reagendar coleta de imagem</td>\n</tr>\n</tbody>\n</table>"}, {"num": "10.10", "title": "Contato Indesejado com Pessoas ou Objetos", "html": "<p>Interromper de imediato a locomoção ou a manipulação, acionar a parada de emergência quando necessário e verificar a condição da pessoa ou do objeto envolvido antes de qualquer continuidade da missão.</p><p>Todo contato indesejado, ainda que sem lesão aparente, deve ser registrado como ocorrência (MGO – Registro de Ocorrências) e investigado conforme os procedimentos corporativos de investigação de incidentes.</p>"}, {"num": "10.11", "title": "Falha Térmica ou Elétrica da Bateria", "html": "<p>Em caso de superaquecimento, deformação, odor anormal ou fumaça proveniente da bateria, desenergizar o robô imediatamente quando seguro fazê-lo, afastar todas as pessoas da área, isolar a bateria em local seguro e ventilado, e acionar o extintor apropriado (classe D ou específico para lítio) caso haja princípio de incêndio, comunicando de imediato o Coordenador de Operações.</p>"}, {"num": "10.12", "title": "Recuperação do Robô", "html": "<p>Ao final da missão, com o robô na posição sentada ou deitada e devidamente desenergizado, o Operador 2 procede à conferência visual e ao acondicionamento do equipamento na maleta de transporte.</p><p>Caso o robô permaneça caído ou em posição de difícil acesso, avaliar a viabilidade de reaproximação segura somente após a confirmação de desenergização completa (visual e por telemetria, quando disponível), sendo vedada a manipulação do equipamento em movimento não controlado.</p><p>Toda situação de recuperação em contingência deve ser registrada como ocorrência (MGO – Registro de Ocorrências), com descrição das circunstâncias, do método de recuperação empregado e do tempo decorrido até a normalização.</p>"}]}, {"num": "11", "title": "PÓS-OPERAÇÃO", "sections": [{"num": "11.0", "title": "PÓS-OPERAÇÃO", "html": ""}, {"num": "11.1", "title": "Sequência Pós-Operação", "html": "<ul>\n<li><p>Desenergização do robô e remoção segura da bateria, observando-se o procedimento de manuseio da Seção 12.3;</p></li>\n<li><p>Inspeção visual pós-operação do robô, das articulações e dos sensores, identificando eventuais danos ou desgastes ocorridos durante a missão;</p></li>\n<li><p>Limpeza de componentes ópticos e remoção de particulados (poeira, resíduos) acumulados durante a operação;</p></li>\n<li><p>Acondicionamento do robô, das baterias e dos acessórios na maleta de transporte;</p></li>\n<li><p>Restituição da área operacional às condições originais, incluindo remoção de sinalização e isolamento temporário;</p></li>\n<li><p>Comunicação formal de encerramento da missão à supervisão do cliente, incluindo eventual entrega preliminar de status.</p></li>\n</ul>"}, {"num": "11.2", "title": "Download dos Dados", "html": "<p>O download dos dados coletados durante a missão (vídeo, imagens e telemetria) deve seguir procedimento padronizado, garantindo a rastreabilidade e a integridade da informação desde a origem, sendo realizado preferencialmente ainda no local da missão ou no mesmo dia.</p>"}]}, {"num": "12", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "sections": [{"num": "12.0", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "html": ""}, {"num": "12.1", "title": "Programa de Manutenção", "html": "<p>A manutenção do robô Unitree G1 segue o programa estabelecido pelo fabricante, complementado pelas rotinas de verificação da XD4Solutions, sendo de responsabilidade do Técnico de Manutenção o acompanhamento dos intervalos de revisão e da vida útil de componentes críticos (baterias, atuadores das articulações).</p>"}, {"num": "12.2", "title": "Manutenção Corretiva", "html": "<p>Discrepâncias identificadas em campo devem ser registradas no Diário de Operação e Manutenção. Serviços de pequena monta, como limpeza de sensores e ajustes externos, podem ser realizados em campo; serviços que exijam desmontagem de articulações ou acesso a componentes internos devem ser conduzidos exclusivamente por profissional habilitado, em oficina apropriada.</p>"}, {"num": "12.3", "title": "Baterias – Especificações e Cuidados", "html": "<ul>\n<li><p>As baterias devem ser armazenadas em local seco, ventilado e distante de fontes de calor, entre 0°C e 30°C;</p></li>\n<li><p>Não deixar a bateria descarregada por período prolongado; recarregar periodicamente mesmo quando o robô não estiver em uso, conforme especificação do fabricante;</p></li>\n<li><p>Baterias com sinais de dano físico, inchaço ou vazamento devem ser isoladas e descartadas conforme a legislação aplicável a resíduos de baterias de lítio, sendo vedado o uso continuado.</p></li>\n</ul>"}, {"num": "12.4", "title": "Controle de Versão de Firmware e Software", "html": "<p>Toda atualização de firmware ou software deve ser registrada, testada em ambiente controlado antes do emprego comercial e comunicada ao Coordenador de Operações, conforme a Seção 3.2.</p>"}]}, {"num": "13", "title": "REGISTROS OPERACIONAIS", "sections": [{"num": "13.0", "title": "REGISTROS OPERACIONAIS", "html": ""}, {"num": "13.1", "title": "Diário de Bordo", "html": "<p>Toda missão realizada com o robô Unitree G1 deve ser registrada no Diário de Operação e Manutenção do equipamento, conforme o Capítulo 8 do MGO (IT-OPE-003), adaptado aos campos de identificação técnica do robô (modelo, número de série, fabricante).</p>"}, {"num": "13.2", "title": "Registro das Horas de Operação", "html": "<p>Devem ser registradas, para cada missão, as horas de operação, os ciclos de bateria utilizados e quaisquer ocorrências identificadas, servindo de base para o controle de vida útil de componentes críticos e para o planejamento da manutenção preventiva.</p>"}]}, {"num": "14", "title": "SUPLEMENTOS", "sections": [{"num": "14.0", "title": "SUPLEMENTOS", "html": "<p>Constituem suplementos técnicos deste POP a documentação do fabricante aplicável ao robô Unitree G1 e os guias operacionais específicos por tipologia de ambiente. Os formulários corporativos de uso transversal a todos os equipamentos (avaliação de risco, briefing, diário de bordo, registro e investigação de ocorrências, permissão de trabalho, termo de adesão e indicadores operacionais) constam do Capítulo 12.2 do MGO.</p>"}, {"num": "14.1", "title": "Documentação do Fabricante Unitree", "html": "<ul>\n<li><p><strong>Unitree G1 - User Manual</strong> (versão vigente);</p></li>\n<li><p><strong>Unitree G1 - Technical Specifications</strong> (versão vigente);</p></li>\n<li><p><strong>Unitree G1 SDK/ROS 2 - Developer Guide</strong> (versão vigente, quando aplicável à configuração homologada);</p></li>\n<li><p><strong>Unitree G1 – Battery Best Practices</strong>, boletins de serviço e alertas de segurança emitidos pelo fabricante.</p></li>\n</ul>"}, {"num": "14.2", "title": "Formulários Específicos do Unitree G1", "html": "<ul>\n<li><p>Suplemento C – Checklist Pré-Missão e Pré-Operação (ver Seção 7.1);</p></li>\n<li><p>Suplemento G – Ficha de Controle de Manutenção do Robô;</p></li>\n<li><p>Suplemento H – Ficha de Controle de Baterias.</p></li>\n</ul><p><strong>FIM DO DOCUMENTO</strong></p><p><em>Este Manual de Procedimentos Operacionais Padrão é um documento vivo da XD4Solutions, sujeito a revisão contínua à luz da experiência operacional acumulada e das atualizações tecnológicas do robô Unitree G1.</em></p>"}]}];</script>
<script>const POP_GO2_CONTENT = [{"num": "1", "title": "OBJETIVO", "sections": [{"num": "1.0", "title": "OBJETIVO", "html": ""}, {"num": "1.1", "title": "Escopo e Aplicabilidade", "html": "<p>O presente Manual tem por objetivo estabelecer, de forma padronizada, disciplinada e auditável, os Procedimentos Operacionais Padrão (POP) da <strong>XD4Solutions</strong> aplicáveis às operações realizadas com o <strong>Robô Quadrúpede Unitree GO2</strong>, utilizado para inspeção, mapeamento 3D, patrulhamento, coleta de dados e apoio operacional em ambientes industriais e institucionais, reduzindo a necessidade de exposição de pessoas a atividades repetitivas ou a terrenos de acesso difícil.</p><p>Constituem objetivos específicos deste Manual:</p><ul>\n<li><p>Padronizar o planejamento, a execução e o encerramento das operações realizadas com o robô Unitree GO2, reduzindo a variabilidade operacional entre equipes e missões;</p></li>\n<li><p>Estabelecer os requisitos mínimos de segurança para a operação de um robô quadrúpede em ambientes compartilhados com pessoas, consolidando as práticas de segurança de máquinas (NR-12) com os princípios de disciplina operacional da aviação adotados pela XD4Solutions;</p></li>\n<li><p>Fornecer uma base documental consistente e auditável para clientes dos setores industrial, logístico, de segurança patrimonial e de pesquisa;</p></li>\n<li><p>Definir os procedimentos de emergência e de contenção aplicáveis a falhas de locomoção, perda de comunicação, falhas de bateria e demais ocorrências típicas da operação de robôs quadrúpedes.</p></li>\n</ul><p>Este Manual complementa o Manual Geral de Operações (MGO – IT-OPE-003) da XD4Solutions, prevalecendo sobre este exclusivamente quanto aos aspectos técnicos específicos do robô Unitree GO2.</p><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Abrangência de Modelos</b><em>Este Manual aplica-se a todas as variantes do robô Unitree GO2 comercializadas ou operadas pela XD4Solutions, incluindo, sem caráter exaustivo, as configurações GO2 Air, GO2 Pro, GO2 X, GO2 EDU, GO2 EDU Plus e a variante rodo-articulada GO2-W, independentemente do nível de computação embarcada (8 núcleos padrão, ou módulos NVIDIA Jetson Orin de 40/100 TOPS), do tipo de LiDAR instalado (L1, Mid-360 ou XT16) ou da presença de braço robótico opcional (configurações EDU Plus). Especificações técnicas que variem entre configurações — velocidade máxima, capacidade de carga, autonomia de bateria — devem ser verificadas na ficha técnica específica da unidade efetivamente operada, prevalecendo, em caso de dúvida, os valores mais conservadores entre as configurações homologadas pela XD4Solutions.</em></div></div><p>As disposições deste Manual são de cumprimento obrigatório por:</p><ul>\n<li><p>Coordenador de Operações, Líder de Operações e Diretor de Operações envolvidos no planejamento, autorização, supervisão e encerramento das operações;</p></li>\n<li><p>Todo o pessoal operacional habilitado a atuar como Operador 1 (Piloto em Comando) ou Operador 2 (Observador/Apoio) nas operações com o Unitree GO2;</p></li>\n<li><p>Responsáveis pela inspeção, manutenção e liberação operacional do equipamento;</p></li>\n<li><p>Prestadores de serviço e empresas subcontratadas que atuem sob a responsabilidade técnica e contratual da XD4Solutions, mediante ciência e adesão aos procedimentos estabelecidos neste Manual.</p></li>\n</ul><p>Este Manual não se aplica a:</p><ul>\n<li><p>Operações realizadas com outros modelos de robôs ou plataformas que não o Unitree GO2, as quais deverão seguir seus respectivos procedimentos operacionais;</p></li>\n<li><p>Operações que envolvam desenvolvimento autônomo de novos comportamentos ou algoritmos de controle não homologados pela XD4Solutions (pesquisa e desenvolvimento de SDK), que seguem procedimento técnico próprio, apartado deste POP;</p></li>\n<li><p>Operações que utilizem acessórios, braços robóticos ou modificações mecânicas não homologados pelo fabricante ou pela XD4Solutions;</p></li>\n<li><p>Atividades de manutenção corretiva de nível de fábrica (Depot Level Maintenance), restritas ao fabricante ou a centros de manutenção por ele autorizados.</p></li>\n</ul>"}]}, {"num": "2", "title": "CARACTERÍSTICAS DO ROBÔ", "sections": [{"num": "2.0", "title": "CARACTERÍSTICAS DO ROBÔ", "html": "<p>Este capítulo apresenta as características técnicas do robô quadrúpede Unitree GO2 e dos acessórios homologados para sua operação pela XD4Solutions.</p>"}, {"num": "2.1", "title": "Robô Quadrúpede", "html": "<p>As especificações a seguir referem-se aos valores de referência do robô Unitree GO2 em suas principais configurações (Air, Pro, X, EDU e EDU Plus). Parâmetros como velocidade máxima, capacidade de carga e computação embarcada variam conforme o modelo especificamente homologado para a missão, devendo ser sempre confirmados na ficha técnica da unidade operada.</p><ul>\n<li><p>Configuração: robô quadrúpede de locomoção articulada (12 motores, 3 por perna), construído em liga de alumínio e plástico de engenharia de alta resistência;</p></li>\n<li><p>Dimensões aproximadas (em pé): 70 cm de comprimento x 31 cm de largura x 40 cm de altura;</p></li>\n<li><p>Massa aproximada: 15 kg, incluindo bateria em configuração padrão (até 18 kg na variante rodo-articulada GO2-W). Os valores exatos devem ser confirmados na ficha técnica vigente do fabricante;</p></li>\n<li><p>Capacidade de carga útil: até 8 kg em regime de trabalho contínuo (limite pontual de até 12 kg, conforme configuração e distribuição de carga);</p></li>\n<li><p>Velocidade de deslocamento: até 5 m/s (18 km/h) em configurações EDU, com variação conforme o modelo e as condições do terreno; velocidade deve ser reduzida em ambientes compartilhados com pessoas;</p></li>\n<li><p>Capacidade de transposição de obstáculos: degraus/desníveis de até aproximadamente 16 cm e inclinação máxima de piso de até 40°, conforme homologação do controlador de locomoção;</p></li>\n<li><p>Atuadores: 12 motores elétricos de alto torque (torque articular máximo de referência de 45 N·m), com sensores de força nos pés para adaptação dinâmica a diferentes tipos de piso;</p></li>\n<li><p>Sensores de bordo: LiDAR 4D de campo hemisférico (360° x 90°), câmera grande angular de alta definição, sensores de força nos quatro pés, unidade de medição inercial (IMU), microfone e alto-falante embarcados, farol frontal de 3W;</p></li>\n<li><p>Grau de proteção: equivalente a IP44 (não certificado, conforme especificação do fabricante); o robô não é impermeável, sendo vedada a operação sob chuva forte ou em ambientes encharcados;</p></li>\n<li><p>Bateria: bateria de lítio recarregável de 28,8V a 33,6V, 8.000 mAh na configuração padrão (opção de bateria de longa duração de 15.000 mAh); sistema inteligente de monitoramento de estado de carga (SOC) e proteções integradas contra sobrecarga, sobrecorrente, sobretensão e temperatura inadequada;</p></li>\n<li><p>Autonomia de operação de referência: aproximadamente 1 a 2 horas com a bateria padrão, podendo alcançar de 2 a 4 horas com a bateria de longa duração, em condições ideais e uso misto (locomoção e coleta de dados); valores sempre confirmados conforme ficha técnica vigente do fabricante e condições reais de missão;</p></li>\n<li><p>Conectividade: Wi-Fi 6 e Bluetooth 5.2 para configuração, telemetria e controle remoto assistido; alcance de controle remoto de referência superior a 30 m em linha de visada;</p></li>\n<li><p>Computação embarcada: unidade de processamento de 8 núcleos para controle em tempo real, com módulo de coprocessamento de IA opcional (NVIDIA Jetson Orin Nano/NX, 40 ou 100 TOPS, conforme configuração EDU) para navegação autônoma, mapeamento e inferência de modelos de percepção;</p></li>\n<li><p>Funções de segurança de fábrica: recuperação automática de tropeço e de queda lateral (quando aplicável ao controlador de locomoção), parada de emergência (E-Stop) físico e remoto, e modo de contenção conservador em caso de instabilidade detectada.</p></li>\n</ul>"}, {"num": "2.2", "title": "Acessórios e Módulos Homologados", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Finalidade</th>\n<th>Observações</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>LiDAR 4D integrado (L1, Mid-360 ou XT16, conforme configuração)</td>\n<td>Navegação autônoma, mapeamento 3D do ambiente e desvio de obstáculos</td>\n<td>Configuração padrão a partir da linha EDU/EDU Plus; permite construção de mapa de nuvem de pontos e definição de rotas autônomas</td>\n</tr>\n<tr>\n<td>Câmera grande angular integrada</td>\n<td>Inspeção visual e transmissão de vídeo em tempo real</td>\n<td>Resolução e campo de visão conforme ficha técnica do modelo homologado</td>\n</tr>\n<tr>\n<td>Braço robótico (configuração EDU Plus)</td>\n<td>Manipulação leve de objetos, válvulas e botoeiras</td>\n<td>Homologação específica; carga máxima conforme Seção 4.2; não disponível nas configurações Air/Pro/X</td>\n</tr>\n<tr>\n<td>Controle remoto dedicado + aplicativo móvel</td>\n<td>Acionamento, teleoperação assistida e parada de emergência</td>\n<td>O controle remoto deve permanecer com o Operador 1 durante toda a missão</td>\n</tr>\n<tr>\n<td>Módulo de rodas (variante GO2-W)</td>\n<td>Locomoção híbrida (rodante/articulada) para deslocamento eficiente em piso plano</td>\n<td>Mantém capacidade de transposição de obstáculos por articulação das pernas quando necessário</td>\n</tr>\n</tbody>\n</table><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b><em>Nota: o Unitree GO2 não é homologado, nesta versão do POP, para operação em atmosferas potencialmente explosivas (Ex/ATEX), para manipulação de cargas superiores às especificadas pelo fabricante, para transporte de pessoas ou animais, nem para uso como dispositivo de resgate.</em></div></div>"}]}, {"num": "3", "title": "CONFIGURAÇÃO PERMITIDA", "sections": [{"num": "3.0", "title": "CONFIGURAÇÃO PERMITIDA", "html": ""}, {"num": "3.1", "title": "Seleção de Configuração", "html": "<p>A configuração do robô a ser empregada — modelo (Air, Pro, X, EDU, EDU Plus ou GO2-W), tipo de LiDAR instalado e presença ou não de braço robótico — deve ser definida na fase de planejamento da missão (MGO – Planejamento da Missão), em função do objetivo operacional contratado, sendo registrada no dossiê da missão.</p>"}, {"num": "3.2", "title": "Controle de Versão de Firmware e Software", "html": "<ul>\n<li><p>O firmware do robô e o software da estação de controle (aplicativo do fabricante) devem estar na versão estável mais recente homologada pela XD4Solutions, sendo vedado o uso de versões beta ou de desenvolvimento em missões comerciais;</p></li>\n<li><p>Toda atualização de firmware (OTA) deve ser registrada no Diário de Operação e Manutenção do equipamento, com data, versão anterior, versão instalada e responsável pela atualização;</p></li>\n<li><p>Alterações no comportamento do robô decorrentes de atualização devem ser validadas em ambiente controlado antes do emprego em missão comercial.</p></li>\n</ul>"}, {"num": "3.3", "title": "Modos de Operação Permitidos", "html": "<ul>\n<li><p><strong>Modo Assistido/Teleoperado</strong>: o robô é conduzido em tempo real pelo Operador 1 por meio do controle remoto dedicado ou aplicativo móvel, sendo o modo padrão recomendado para a generalidade das missões de inspeção e patrulhamento;</p></li>\n<li><p><strong>Modo Autônomo Supervisionado</strong>: o robô executa rotas de patrulhamento ou inspeção pré-mapeadas (point cloud/waypoints), com apoio de LiDAR e câmeras, permanecendo o Operador 1 em condições de assumir o controle manual a qualquer momento e de acionar a parada de emergência;</p></li>\n<li><p><strong>Modo Autônomo Não Supervisionado</strong>: não é autorizado em operações comerciais da XD4Solutions, sendo restrito a atividades de pesquisa e desenvolvimento em ambiente controlado e isolado de pessoas, conforme procedimento técnico apartado.</p></li>\n</ul>"}]}, {"num": "
