<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XD4 Blue Book — Sistema de Gestão Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B2545;--blue:#134074;--accent:#3A6EA5;--xd4:#2BA9E0;
  --sky:#EEF3F9;--sky-line:#DCE6F1;--paper:#FFFFFF;
  --ink:#1A2432;--ink-2:#5A6B7F;--ink-3:#8A99AB;--line:#E4EAF1;
  --ok:#1E7B4F;--ok-bg:#E7F4EC;--warn:#B5820A;--warn-bg:#FBF3DE;
  --crit:#B42318;--crit-bg:#FBEAE8;--draft:#8A99AB;--draft-bg:#F0F2F5;
  --shadow:0 4px 14px rgba(11,37,69,.06);--shadow-lg:0 14px 34px rgba(11,37,69,.1);
}
[data-theme="dark"]{
  --navy:#0A1A30;--blue:#3A6EA5;--accent:#5B9BD5;--xd4:#2BA9E0;
  --sky:#0E1622;--sky-line:#1C2838;--paper:#131C2A;
  --ink:#E6EDF5;--ink-2:#9FB0C4;--ink-3:#6B7C90;--line:#22303F;
  --ok:#3FB98A;--ok-bg:#12291F;--warn:#E3B341;--warn-bg:#2A230E;
  --crit:#F27C6E;--crit-bg:#2A1512;--draft:#6B7C90;--draft-bg:#1A222E;
  --shadow:0 4px 14px rgba(0,0,0,.4);--shadow-lg:0 14px 34px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--sky);color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--sky-line);border-radius:99px}
svg{display:block}

/* ===== BANNER ===== */
.banner{background:var(--navy);color:#fff;padding:0 20px;height:62px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;border-bottom:3px solid var(--xd4)}
.logo-chip{background:#fff;border-radius:10px;height:42px;width:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:5px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.logo-chip img{width:100%;height:100%;object-fit:contain;display:block}
.home-logo{width:auto;height:96px;object-fit:contain;margin:8px auto 18px;display:block}
.brand{display:flex;flex-direction:column;line-height:1.1;cursor:pointer;min-width:0;overflow:hidden}
.brand .t1{font-weight:700;font-size:16px;letter-spacing:.2px}
.brand .t2{font-weight:400;font-size:10px;color:#9FB4CE;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.banner-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9FB4CE;text-align:right;line-height:1.3;flex-shrink:0}
.clock b{color:#fff;display:block;font-weight:600}
.icon-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9FB4CE;transition:.15s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.icon-btn svg{width:18px;height:18px}
.kbd{font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:2px 6px;color:#cfe0f2}

/* ===== LAYOUT ===== */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 62px)}

/* ===== TREE ===== */
.tree{background:var(--paper);border-right:1px solid var(--line);overflow-y:auto;padding:8px 0 40px;transition:background .3s}
.tree-search{margin:14px;display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;background:var(--sky);border:1px solid var(--sky-line);border-radius:8px;color:var(--ink-3)}
.tree-search input{background:none;border:none;outline:none;flex:1;font-size:13px;color:var(--ink)}
.tree-search svg{width:15px;height:15px;flex-shrink:0}
.tree-title{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);padding:12px 18px 6px;display:flex;align-items:center;gap:7px}
.node-row{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;font-size:13.5px}
.node-row:hover{background:var(--sky)}
.node-row.active{background:var(--sky);border-left-color:var(--xd4)}
.caret{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s;color:var(--ink-3)}
.node.open>.node-row>.caret{transform:rotate(90deg)}
.caret.leaf{visibility:hidden}
.node-ic{width:25px;height:25px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sky);color:var(--accent);border:1px solid var(--sky-line)}
.node-ic svg{width:13px;height:13px}
.node-lbl{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-lbl b{font-weight:600}
.node-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);flex-shrink:0}
.node-st{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.st-ok{background:var(--ok)}.st-warn{background:var(--warn)}.st-draft{background:var(--draft)}.st-crit{background:var(--crit)}
.children{display:none;padding-left:18px;border-left:1px dashed var(--sky-line);margin-left:27px}
.node.open>.children{display:block}
.node.root>.node-row{font-weight:600}
.node.root>.node-row .node-ic{background:var(--navy);color:#fff;border-color:var(--navy)}
.node.pinned>.node-row .node-lbl::after{content:"★";color:var(--xd4);font-size:10px;margin-left:6px}

/* ===== READER / CONTENT ===== */
.content{overflow-y:auto;scroll-behavior:smooth;position:relative}
.progress-bar{position:sticky;top:0;height:3px;background:transparent;z-index:20}
.progress-bar .fill{height:100%;width:0;background:var(--xd4);transition:width .1s}
.view{display:none}.view.active{display:block}

/* HOME */
.home{max-width:1060px;margin:0 auto;padding:24px 28px 80px}
.home-hero{text-align:center;padding:26px 0 22px}
.home-hero .badge-top{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--paper);border:1px solid var(--sky-line);padding:5px 13px;border-radius:99px;margin-bottom:16px}
.home-hero .badge-top svg{width:14px;height:14px;flex-shrink:0}
.home-hero h1{font-size:29px;color:var(--ink);font-weight:600;letter-spacing:-.01em}
.home-hero .navy-txt{color:var(--xd4)}
.home-hero p{color:var(--ink-2);margin-top:8px;font-size:15px;max-width:580px;margin-inline:auto}
.home-search{max-width:540px;margin:22px auto 0;display:flex;align-items:center;gap:10px;height:48px;padding:0 16px;background:var(--paper);border:1px solid var(--sky-line);border-radius:12px;box-shadow:var(--shadow)}
.home-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(58,110,165,.12)}
.home-search input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--ink);background:none}
.home-search svg{width:18px;height:18px;color:var(--ink-3)}

.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0}
.hstat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.hstat .num{font-size:30px;font-weight:600;color:var(--ink);line-height:1;font-family:'IBM Plex Mono',monospace}
.hstat .lbl{font-size:11.5px;color:var(--ink-3);margin-top:7px;text-transform:uppercase;letter-spacing:.05em}
.hstat .num.ok{color:var(--ok)}.hstat .num.warn{color:var(--warn)}

.dash-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;margin-bottom:32px}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel h3::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.health{display:flex;align-items:center;gap:24px}
.donut{width:130px;height:130px;flex-shrink:0}
.health-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.hl-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
.hl-row .d{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.hl-row .v{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink)}
.hl-row .lbl{color:var(--ink-2)}

.feed{display:flex;flex-direction:column;gap:2px}
.feed-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.feed-row:first-child{border-top:none}
.feed-ic{width:30px;height:30px;border-radius:8px;background:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:13px}
.feed-tx{flex:1;font-size:13.5px}
.feed-tx small{display:block;color:var(--ink-3);font-size:11.5px;margin-top:1px;font-family:'IBM Plex Mono',monospace}

.home-sec-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:6px 4px 16px;display:flex;align-items:center;gap:9px}
.home-sec-label::before{content:"";width:16px;height:2px;background:var(--accent);border-radius:2px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:32px}
.cat-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:24px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.cat-card::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:var(--accent);opacity:.05;transition:transform .3s}
.cat-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.cat-card:hover::after{transform:scale(1.4)}
.cat-ic{width:54px;height:54px;border-radius:13px;background:linear-gradient(135deg,var(--xd4),var(--blue));color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
.cat-ic svg{width:28px;height:28px}
.cat-card h2{font-size:18px;color:var(--ink);font-weight:600}
.cat-card .desc{color:var(--ink-2);font-size:13.5px;margin-top:5px}
.cat-card .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;padding:4px 11px;color:var(--ink-2)}
.chip .d{width:6px;height:6px;border-radius:99px}

/* GROUP LISTING (Veículos Aéreos/Terrestres, Diários) */
.grp{max-width:980px;margin:0 auto;padding:32px 40px 100px}
.grp-head{display:flex;align-items:center;gap:16px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px 26px;box-shadow:var(--shadow);margin-bottom:24px;flex-wrap:wrap}
.grp-head .gh-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.grp-head .gh-ic svg{width:26px;height:26px}
.grp-head h1{font-size:21px;color:var(--ink);font-weight:600}
.grp-head .gh-sub{color:var(--ink-2);font-size:13.5px;margin-top:2px}
.grp-head .gh-count{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--ink-2);background:var(--sky);border:1px solid var(--sky-line);padding:7px 14px;border-radius:99px;white-space:nowrap}
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
.grp-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:.18s;box-shadow:var(--shadow);display:flex;flex-direction:column}
.grp-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.grp-card .thumb{width:100%;height:132px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;overflow:hidden}
.grp-card .thumb svg{width:44px;height:44px}
.grp-card .thumb img{width:100%;height:100%;object-fit:cover}
.grp-card .body{padding:16px 17px 17px;display:flex;flex-direction:column;gap:6px;flex:1}
.grp-card .cat{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--xd4);font-weight:700}
.grp-card h4{font-size:15.5px;color:var(--ink);font-weight:600;line-height:1.3}
.grp-card .meta{font-size:12.5px;color:var(--ink-2)}
.grp-card .foot{margin-top:auto;padding-top:10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.grp-card .foot .st{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink-2)}
.grp-card .foot .st .d{width:7px;height:7px;border-radius:50%}
.grp-card .foot .badge2{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--sky);color:var(--ink-2);border:1px solid var(--sky-line)}
@media(max-width:680px){ .grp{padding:24px 18px 80px} .grp-grid{grid-template-columns:1fr 1fr} }
@media(max-width:420px){ .grp-grid{grid-template-columns:1fr} }

/* DOC READER */
.doc{max-width:840px;margin:0 auto;padding:32px 56px 140px;position:relative}
.crumbs{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-3);margin-bottom:20px;flex-wrap:wrap}
.crumbs a{cursor:pointer}.crumbs a:hover{color:var(--accent)}
.crumbs .sep{opacity:.5}
.cover{text-align:center;padding:14px 0 26px;border-bottom:2px solid var(--sky-line);margin-bottom:26px}
.cover .doc-ic{width:64px;height:64px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff}
.cover .doc-ic svg{width:32px;height:32px}
.cover h1{font-size:24px;color:var(--ink);font-weight:600}
.cover .sub{color:var(--xd4);font-weight:600;margin-top:5px;letter-spacing:.4px;font-size:14px}
.cover .tag{color:var(--ink-3);font-size:13px;margin-top:12px;font-style:italic;max-width:600px;margin-inline:auto}
.ctrl{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:28px}
.ctrl .c{padding:12px 15px;border-right:1px solid var(--line);border-top:1px solid var(--line)}
.ctrl .c:nth-child(-n+4){border-top:none}.ctrl .c:nth-child(4n){border-right:none}
.ctrl .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600}
.ctrl .v{font-size:13.5px;font-weight:500;margin-top:3px}
.ctrl .v.mono{font-family:'IBM Plex Mono',monospace;font-size:12.5px}
.copy-code{cursor:pointer;border-bottom:1px dashed var(--ink-3)}
.copy-code:hover{color:var(--accent);border-color:var(--accent)}

.chapindex{background:linear-gradient(180deg,var(--sky),var(--paper));border:1px solid var(--sky-line);border-radius:12px;padding:20px 22px 14px;margin-bottom:30px}
.chapindex h4{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chapindex h4::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.chapindex .cols{display:grid;grid-template-columns:1fr 1fr;gap:1px 34px;min-width:0}
.chapindex a{display:flex;align-items:baseline;text-decoration:none;color:var(--ink-2);font-size:13px;padding:6px 4px;border-radius:6px;transition:.12s;cursor:pointer;min-width:0}
.chapindex a:hover{background:var(--sky);color:var(--ink)}
.chapindex a .n{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-weight:600;font-size:12px;min-width:32px;margin-right:8px;flex-shrink:0}
.chapindex a .tt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1}
.chapindex a .dots{flex:1;min-width:8px;border-bottom:1px dotted var(--sky-line);margin:0 8px;transform:translateY(-3px)}

h2.sec{font-size:19px;font-weight:600;color:var(--ink);margin:34px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--sky-line);display:flex;gap:12px;align-items:baseline;scroll-margin-top:20px}
h2.sec .sn{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:16px}
h3.sub{font-size:15.5px;font-weight:600;color:var(--blue);margin:22px 0 8px;display:flex;gap:10px;scroll-margin-top:20px}
h3.sub .sn{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-size:14px}
.doc p{margin:9px 0;color:var(--ink)}
.doc ul{margin:10px 0 10px 4px;list-style:none}
.doc li{padding:5px 0 5px 22px;position:relative;color:var(--ink)}
.doc li::before{content:"•";position:absolute;left:5px;color:var(--accent);font-weight:700}
.callout{border-radius:8px;padding:14px 16px;margin:18px 0;display:flex;gap:12px;font-size:14px;line-height:1.55}
.callout .ci{flex-shrink:0;margin-top:1px;font-size:16px}
.callout b{display:block;text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;margin-bottom:3px}
.callout.crit{background:var(--crit-bg);border:1px solid rgba(180,35,24,.25);color:var(--ink)}.callout.crit b{color:var(--crit)}
.callout.warn{background:var(--warn-bg);border:1px solid rgba(181,130,10,.25);color:var(--ink)}.callout.warn b{color:var(--warn)}
.callout.note{background:var(--sky);border:1px solid var(--sky-line);color:var(--ink-2)}.callout.note b{color:var(--blue)}
.doc table{width:100%;border-collapse:collapse;margin:18px 0;font-size:13.5px;border:1px solid var(--sky-line);border-radius:8px;overflow:hidden}
.doc table thead th{background:var(--navy);color:#fff;text-align:left;padding:10px 12px;font-weight:600;font-size:12.5px}
.doc table tbody td{padding:9px 12px;border-top:1px solid var(--sky-line);color:var(--ink);vertical-align:top}
.doc table tbody tr:nth-child(even){background:var(--sky)}
.doc table th[colspan]{text-align:center}
.doc-foot{margin-top:46px;padding-top:20px;border-top:2px solid var(--sky-line);text-align:center;color:var(--ink-3);font-size:13px;font-style:italic}

/* scrollspy TOC */
.spy{position:fixed;top:100px;right:24px;width:200px;max-height:70vh;overflow-y:auto;font-size:12px;display:none;padding-left:14px;border-left:1px solid var(--line)}
.spy.show{display:block}
.spy a{display:block;padding:4px 0;color:var(--ink-3);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.1s}
.spy a:hover{color:var(--accent)}
.spy a.active{color:var(--xd4);font-weight:600}
@media(max-width:1400px){.spy{display:none!important}}

/* PLACEHOLDER DOC */
.ph{max-width:760px;margin:0 auto;padding:48px 40px}
.ph-head{text-align:center;margin-bottom:32px}
.ph-ic{width:76px;height:76px;border-radius:18px;margin:0 auto 18px;background:var(--sky);border:1px solid var(--sky-line);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.ph-ic svg{width:36px;height:36px}
.ph-head h1{font-size:23px;color:var(--ink);font-weight:600}
.ph-head .code{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-size:13px;margin-top:6px}
.ph-status{display:inline-flex;align-items:center;gap:7px;margin-top:14px;height:28px;padding:0 14px;border-radius:99px;font-size:12.5px;font-weight:500;background:var(--sky);color:var(--accent);border:1px solid var(--sky-line)}
.ph-status .d{width:7px;height:7px;border-radius:99px;background:var(--accent)}
.ph-note{background:var(--sky);border:1px dashed var(--sky-line);border-radius:12px;padding:20px 24px;color:var(--ink-2);font-size:14px;text-align:center;margin-bottom:28px}
.ph-skel h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:600;margin-bottom:14px}
.ph-skel-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;color:var(--ink-3);background:var(--paper)}
.ph-skel-row .n{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-weight:600;font-size:12.5px;flex-shrink:0}
.ph-skel-row .bar{flex:1;height:8px;border-radius:99px;background:var(--sky-line);opacity:.6}

/* MANUAIS (PDF do repositório GitHub) — lista em linhas, estilo screenshot */
.manual-panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
.manual-tab{display:inline-flex;align-items:center;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--sky);border-bottom:1px solid var(--line);padding:10px 18px;border-right:1px solid var(--line)}
.manual-list{display:flex;flex-direction:column}
.manual-row{display:flex;align-items:center;gap:16px;padding:16px 20px;border-top:1px solid var(--line);text-decoration:none;color:inherit;transition:background .12s;cursor:pointer}
.manual-row:first-child{border-top:none}
.manual-row:hover{background:var(--sky)}
.manual-row.missing{cursor:default}
.manual-row.missing:hover{background:none}
.mr-ic{display:flex;flex-direction:column;align-items:center;gap:3px;width:44px;flex-shrink:0;color:var(--accent)}
.mr-ic svg{width:22px;height:22px}
.mr-ic.warn{color:var(--warn)}
.mr-size{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3)}
.mr-info{flex:1;min-width:0;padding-left:16px;border-left:1px solid var(--sky-line)}
.mr-name{font-size:14px;color:var(--ink);font-weight:500}
.mr-type{font-size:12px;color:var(--ink-3);margin-top:2px}
.mr-type code{font-size:11px}
.mr-open{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap;flex-shrink:0}
.mr-open.warn{color:var(--warn)}

/* VEHICLE PROFILE */
.vp{max-width:860px;margin:0 auto;padding:32px 44px 100px}
.vp-hero{display:flex;gap:24px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:var(--shadow);margin-bottom:24px}
.vp-img{width:140px;height:140px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;overflow:hidden}
.vp-img svg{width:60px;height:60px}
.vp-img img{width:100%;height:100%;object-fit:cover;border-radius:16px}
.vp-info{flex:1}
.vp-info .cls{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.vp-info h1{font-size:26px;color:var(--ink);font-weight:600;margin:4px 0 6px}
.vp-info .maker{color:var(--ink-2);font-size:14px}
.vp-ready{display:inline-flex;align-items:center;gap:7px;margin-top:12px;height:28px;padding:0 14px;border-radius:99px;font-size:12.5px;font-weight:500}
.vp-ready .d{width:7px;height:7px;border-radius:99px}
.vp-ready.ok{background:var(--ok-bg);color:var(--ok)}.vp-ready.ok .d{background:var(--ok)}
.vp-ready.warn{background:var(--warn-bg);color:var(--warn)}.vp-ready.warn .d{background:var(--warn)}
.vp-specs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.spec{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow)}
.spec .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600}
.spec .v{font-size:17px;font-weight:600;color:var(--ink);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.spec .v small{font-size:11px;color:var(--ink-3);font-weight:400}
.vp-docs{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.vp-doc{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow)}
.vp-doc:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.vp-doc .di{width:40px;height:40px;border-radius:10px;background:var(--sky);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:12px}
.vp-doc .di svg{width:20px;height:20px}
.vp-doc h4{font-size:14px;color:var(--ink);font-weight:600}
.vp-doc .st{font-size:12px;color:var(--ink-3);margin-top:3px;display:flex;align-items:center;gap:6px}
.vp-doc .st .d{width:7px;height:7px;border-radius:99px}
.vp-maint h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.vp-maint h3::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.maint-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--paper);font-size:13.5px}
.maint-row .date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-3);flex-shrink:0;width:80px}
.maint-row .desc{flex:1;color:var(--ink)}
.maint-row .badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.maint-row .badge.ok{background:var(--ok-bg);color:var(--ok)}
.maint-row .badge.warn{background:var(--warn-bg);color:var(--warn)}

.backbtn{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:18px}
.backbtn:hover{text-decoration:underline}

/* COMMAND PALETTE */
.cmdk-overlay{position:fixed;inset:0;background:rgba(11,37,69,.4);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:14vh}
.cmdk-overlay.show{display:flex}
.cmdk{width:min(600px,92vw);background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
.cmdk-input{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.cmdk-input svg{width:18px;height:18px;color:var(--ink-3)}
.cmdk-input input{flex:1;border:none;outline:none;background:none;font-size:16px;font-family:inherit;color:var(--ink)}
.cmdk-results{max-height:52vh;overflow-y:auto;padding:8px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;cursor:pointer}
.cmdk-item.sel,.cmdk-item:hover{background:var(--sky)}
.cmdk-item .ci{width:30px;height:30px;border-radius:7px;background:var(--sky);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.cmdk-item.sel .ci{background:var(--paper)}
.cmdk-item .ci svg{width:15px;height:15px}
.cmdk-item .cl{flex:1;font-size:14px;color:var(--ink)}
.cmdk-item .cl small{display:block;font-size:11.5px;color:var(--ink-3)}
.cmdk-item .ck{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3)}
.cmdk-empty{padding:30px;text-align:center;color:var(--ink-3);font-size:14px}

/* ===== ORGANOGRAMA ===== */
.org{max-width:1080px;margin:0 auto;padding:30px 40px 100px}
.org-head{margin-bottom:26px}
.org-head h1{font-size:24px;color:var(--ink);font-weight:600;display:flex;align-items:center;gap:12px}
.org-head h1 svg{width:26px;height:26px;flex-shrink:0}
.org-tab svg{width:15px;height:15px;flex-shrink:0}
.oc-count svg,.od-link svg{width:14px;height:14px}
.org-head p{color:var(--ink-2);font-size:14px;margin-top:6px;max-width:680px}
.org-tabs{display:flex;gap:8px;margin:22px 0 30px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:6px;width:fit-content;box-shadow:var(--shadow)}
.org-tab{padding:9px 18px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.org-tab.active{background:var(--navy);color:#fff}
.org-tab:not(.active):hover{background:var(--sky)}
.org-panel{display:none}
.org-panel.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes blueBookSpin{to{transform:rotate(360deg)}}

/* chart: piramidal com linhas */
.chart{display:flex;flex-direction:column;align-items:center;overflow-x:auto;padding:10px 0 20px}
.tier{display:flex;justify-content:center;gap:26px;position:relative;flex-wrap:nowrap}
.tier + .tier{margin-top:44px}
/* connector vertical descendo de um tier para o próximo */
.tier::before{content:"";position:absolute;top:-44px;left:50%;width:2px;height:22px;background:var(--sky-line)}
.tier:first-child::before{display:none}
/* barra horizontal que une irmãos */
.tier.multi::after{content:"";position:absolute;top:-22px;left:var(--barL,25%);right:var(--barR,25%);height:2px;background:var(--sky-line)}
/* cada nó tem um "poste" subindo até a barra */
.onode{position:relative;display:flex;flex-direction:column;align-items:center}
.onode.hasup::before{content:"";position:absolute;top:-22px;left:50%;width:2px;height:22px;background:var(--sky-line)}

.ocard{width:190px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:16px 15px;text-align:center;cursor:pointer;transition:.16s;box-shadow:var(--shadow);position:relative}
.ocard:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.ocard.lvl0{background:linear-gradient(135deg,var(--navy),var(--blue));border-color:var(--navy)}
.ocard.lvl0 .oc-role,.ocard.lvl0 .oc-name{color:#fff}
.ocard.lvl0 .oc-ic{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25)}
.ocard.lvl0 .oc-tag{background:rgba(255,255,255,.15);color:#dbe9f7;border-color:transparent}
.oc-ic{width:46px;height:46px;border-radius:12px;background:var(--sky);border:1px solid var(--sky-line);display:flex;align-items:center;justify-content:center;margin:0 auto 11px;color:var(--accent)}
.oc-ic svg{width:22px;height:22px}
.oc-role{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.25}
.oc-name{font-size:12px;color:var(--ink-3);margin-top:3px}
.oc-tag{display:inline-block;margin-top:9px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;padding:3px 10px}
.oc-count{position:absolute;top:-8px;right:-8px;min-width:22px;height:22px;padding:0 6px;border-radius:99px;background:var(--xd4);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace}
.oc-flag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;color:var(--navy);background:var(--warn);border-radius:99px;padding:3px 10px;white-space:nowrap}

/* painel de detalhe do cargo */
.org-detail{margin-top:28px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:0;overflow:hidden;box-shadow:var(--shadow);display:none}
.org-detail.show{display:block;animation:fade .2s}
.od-head{display:flex;align-items:center;gap:16px;padding:22px 26px;background:linear-gradient(120deg,var(--sky),transparent);border-bottom:1px solid var(--line)}
.od-ic{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.od-ic svg{width:26px;height:26px}
.od-head h3{font-size:19px;color:var(--ink);font-weight:600}
.od-head .sub{font-size:13px;color:var(--ink-3);margin-top:2px}
.od-body{padding:22px 26px}
.od-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.od-body h4::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.od-body ul{list-style:none;margin:0 0 4px}
.od-body li{padding:7px 0 7px 24px;position:relative;font-size:14px;color:var(--ink);border-top:1px solid var(--line)}
.od-body li:first-child{border-top:none}
.od-body li::before{content:"";position:absolute;left:5px;top:14px;width:8px;height:8px;border-radius:99px;background:var(--accent)}
.od-close{margin-left:auto;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex-shrink:0}
.od-close:hover{background:var(--sky);color:var(--ink)}
.od-link{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:13px;font-weight:500;color:var(--accent);cursor:pointer}
.od-link:hover{text-decoration:underline}

.org-hint{text-align:center;color:var(--ink-3);font-size:13px;margin-top:8px;font-style:italic}

/* famílias documentais (modo docs) — grid responsivo, não corta lateral */
.docs-chart{align-items:stretch}
.fam-connector{width:2px;height:26px;background:var(--sky-line);margin:0 auto}
.fam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;align-items:start;width:100%;position:relative}
/* barra horizontal ligando o topo às famílias */
.fam-grid::before{content:"";position:absolute;top:-13px;left:12%;right:12%;height:2px;background:var(--sky-line)}
.fam-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);position:relative}
.fam-card::before{content:"";position:absolute;top:-13px;left:50%;width:2px;height:13px;background:var(--sky-line)}
.fam-head{display:flex;align-items:center;gap:9px;padding:13px 15px;background:linear-gradient(120deg,var(--sky),transparent);border-bottom:1px solid var(--line)}
.fam-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:var(--navy);border-radius:6px;padding:3px 9px;flex-shrink:0;min-width:30px;text-align:center}
.fam-title{font-size:13.5px;font-weight:600;color:var(--ink);flex:1;line-height:1.2}
.fam-count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0}
.fam-items{padding:6px}
.doc-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:12.5px;transition:.12s}
.doc-item + .doc-item{border-top:1px solid var(--line)}
.doc-item.link{cursor:pointer}
.doc-item.link:hover{background:var(--sky)}
.di-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;background:var(--accent)}
.di-label{flex:1;color:var(--ink);line-height:1.3}
.di-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);flex-shrink:0}
.doc-item.link .di-label::after{content:"↗";font-size:10px;color:var(--accent);margin-left:5px}
/* subgrupo (veículos aéreos / terrestres dentro de uma família) */
.doc-subgroup{margin:8px 4px 2px;border:1px solid var(--sky-line);border-radius:10px;overflow:hidden;background:var(--sky)}
.doc-subgroup + .doc-subgroup{margin-top:10px}
.dsg-head{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--blue);background:var(--paper);border-bottom:1px solid var(--sky-line)}
.dsg-head svg{width:15px;height:15px;flex-shrink:0;color:var(--accent)}
.doc-subgroup .doc-item{background:transparent}
.doc-subgroup .doc-item.link:hover{background:var(--paper)}


@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .tree{position:fixed;top:62px;bottom:0;left:0;width:300px;z-index:35;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
  .tree.open{transform:translateX(0)}
  .mob-tree-btn{display:flex}
  .doc{padding:26px 20px 100px}.ph,.vp{padding:26px 18px 80px}
  .home{padding:18px 16px 70px}
  .ctrl,.home-stats{grid-template-columns:1fr 1fr}
  .dash-grid,.cat-grid{grid-template-columns:1fr}
  .vp-docs{grid-template-columns:1fr 1fr}
  .vp-specs{grid-template-columns:1fr 1fr}
  .chapindex .cols{grid-template-columns:1fr}
  .vp-hero{flex-direction:column;text-align:center}
  .org{padding:22px 14px 70px}
  .ocard{width:150px;padding:13px 11px}
  .tier{gap:14px}.tier + .tier{margin-top:38px}
  .fam-grid{grid-template-columns:1fr;gap:14px}
  .fam-grid::before{display:none}
  .fam-card::before{display:none}
  .fam-connector{display:none}
}
@media(max-width:480px){
  .vp-docs{grid-template-columns:1fr}
}
/* ===== AUTH GATE ===== */
#authGate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:40px 20px}
.ag-bg{position:fixed;inset:0;background-image:url('https://images.unsplash.com/photo-1636887584784-954392022b75?auto=format&fit=crop&w=1920&q=80');background-position:center 30%;background-size:cover;background-repeat:no-repeat;filter:saturate(.85) brightness(.75)}
.ag-scrim{position:fixed;inset:0;background:linear-gradient(180deg,rgba(6,14,28,.88) 0%,rgba(8,20,38,.86) 40%,rgba(11,37,69,.94) 100%)}
.ag-content{position:relative;z-index:1;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;text-align:center;color:#fff;padding:20px 0 10px}
.ag-brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.ag-logo{width:34px;height:34px;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.ag-logo img{width:100%;height:100%;object-fit:contain}
.ag-brand-t{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;color:#B9C8DC;text-transform:uppercase}
.ag-brand-t b{color:#fff;font-weight:600}
.ag-title{font-size:34px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.ag-subtitle{font-size:14.5px;color:#AFC0D6;margin-bottom:34px}
.ag-card{width:100%;max-width:380px;background:rgba(19,32,54,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.35);margin-bottom:22px}
.ag-label{display:block;text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:#9FB4CE;margin-bottom:8px}
.ag-inputrow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:12px 14px;transition:.15s}
.ag-inputrow:focus-within{border-color:var(--xd4);background:rgba(255,255,255,.12)}
.ag-inputrow svg{width:18px;height:18px;color:#9FB4CE;flex-shrink:0}
.ag-inputrow input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;font-family:inherit;min-width:0}
.ag-inputrow input::placeholder{color:#7488A3}
.ag-eye{color:#9FB4CE;flex-shrink:0;display:flex;padding:2px}
.ag-eye svg{width:18px;height:18px}
.ag-eye:hover{color:#fff}
.ag-error{display:none;text-align:left;color:#F27C6E;font-size:12.5px;margin-top:9px}
.ag-error.show{display:block}
.ag-card.shake{animation:agShake .4s}
@keyframes agShake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
.ag-submit{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--xd4),var(--blue));color:#fff;border:none;border-radius:10px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;transition:.15s;box-shadow:0 8px 20px rgba(43,169,224,.3)}
.ag-submit:hover{filter:brightness(1.08);transform:translateY(-1px)}
.ag-submit:active{transform:translateY(0)}
.ag-footer{font-size:12px;color:#7C90AB;max-width:420px;margin-top:6px}
#authGate.hidden{display:none}
/* ===== DIGITAL LOGBOOK ===== */
.lb-head{display:flex;align-items:center;gap:16px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px 26px;box-shadow:var(--shadow);margin-bottom:20px;flex-wrap:wrap}
.lb-head .lb-ic{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.lb-head .lb-ic svg{width:26px;height:26px}
.lb-head h1{font-size:21px;color:var(--ink);font-weight:600}
.lb-head .lb-sub{color:var(--ink-2);font-size:13.5px;margin-top:2px}
.lb-status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:99px;background:var(--draft-bg);color:var(--draft);transition:.2s}
.lb-status .d{width:7px;height:7px;border-radius:50%;background:currentColor}
.lb-status.saved{background:var(--ok-bg);color:var(--ok)}

.lb-section{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px 26px;box-shadow:var(--shadow);margin-bottom:18px}
.lb-section h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.lb-section h3 svg{width:15px;height:15px}

.lb-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.lb-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:6px;font-weight:600}
.lb-field input,.lb-field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--sky);color:var(--ink);font-size:14px;font-family:inherit;transition:.15s}
.lb-field input:focus,.lb-field select:focus{outline:none;border-color:var(--xd4);background:var(--paper);box-shadow:0 0 0 3px rgba(43,169,224,.12)}
.lb-field input[readonly]{color:var(--ink-2);background:var(--sky);cursor:default}
.lb-field.ro .static{padding:9px 11px;background:var(--sky);border-radius:9px;font-size:14px;color:var(--ink);font-weight:600;border:1px solid var(--line)}

.lb-ops{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lb-op-card{background:var(--sky);border:1px solid var(--sky-line);border-radius:12px;padding:16px}
.lb-op-card .tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--xd4);font-weight:700;margin-bottom:10px}
.lb-op-card .lb-grid{grid-template-columns:1fr 1fr}

.lb-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
table.lb-table{width:100%;border-collapse:collapse;min-width:820px}
table.lb-table thead th{background:var(--navy);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:10px 8px;text-align:center;font-weight:600;white-space:nowrap}
table.lb-table tbody td{padding:6px;border-top:1px solid var(--line);text-align:center;background:var(--paper)}
table.lb-table tbody tr:nth-child(even) td{background:var(--sky)}
table.lb-table input,table.lb-table select{width:100%;border:1px solid transparent;background:transparent;text-align:center;padding:7px 4px;border-radius:6px;font-size:13.5px;color:var(--ink);font-family:inherit}
table.lb-table input:focus,table.lb-table select:focus{outline:none;border-color:var(--xd4);background:var(--sky)}
table.lb-table input[readonly]{color:var(--ink-2);font-variant-numeric:tabular-nums}
table.lb-table td.lb-local input{min-width:100px}
.lb-rowdel{width:26px;height:26px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-3);transition:.15s}
.lb-rowdel:hover{background:var(--crit-bg);color:var(--crit)}
.lb-rowdel svg{width:14px;height:14px}
.lb-sig{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);display:inline-flex;align-items:center;justify-content:center;color:transparent;transition:.15s;background:var(--paper)}
.lb-sig.on{background:var(--ok);border-color:var(--ok);color:#fff}
.lb-sig svg{width:13px;height:13px}
.lb-addrow{display:flex;align-items:center;gap:7px;margin-top:12px;font-size:13px;font-weight:600;color:var(--xd4);padding:8px 4px}
.lb-addrow:hover{text-decoration:underline}
.lb-addrow svg{width:15px;height:15px}
.lb-tfoot{display:flex;gap:26px;margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);flex-wrap:wrap}
.lb-tfoot .item{text-align:left}
.lb-tfoot .k{font-size:11px;text-transform:uppercase;color:var(--ink-3);letter-spacing:.05em;margin-bottom:3px}
.lb-tfoot .v{font-size:19px;font-weight:700;color:var(--navy);font-family:'IBM Plex Mono',monospace}
[data-theme="dark"] .lb-tfoot .v{color:var(--xd4)}

.lb-occ textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--sky);color:var(--ink);font-family:inherit;font-size:14px;resize:vertical}
.lb-occ textarea:focus{outline:none;border-color:var(--xd4);background:var(--paper)}

.lb-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px}
.lb-save{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--xd4),var(--blue));color:#fff;border:none;border-radius:10px;padding:12px 22px;font-size:14.5px;font-weight:600;box-shadow:0 8px 20px rgba(43,169,224,.28);transition:.15s}
.lb-save:hover{filter:brightness(1.07);transform:translateY(-1px)}
.lb-save svg{width:17px;height:17px}
.lb-print{display:inline-flex;align-items:center;gap:8px;background:var(--sky);color:var(--ink-2);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:13.5px;font-weight:600;transition:.15s}
.lb-print:hover{background:var(--paper);color:var(--ink)}
.lb-print svg{width:15px;height:15px}
.lb-hint{font-size:12px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
.lb-hint svg{width:13px;height:13px;flex-shrink:0}

.lb-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:11px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 12px 30px rgba(0,0,0,.25);z-index:500;opacity:0;pointer-events:none;transition:.25s}
.lb-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.lb-toast svg{width:17px;height:17px;color:#3FB98A;flex-shrink:0}

@media print{
  .banner,.tree-panel,.crumbs,.lb-actions,.lb-addrow,.lb-rowdel,.mob-tree-btn{display:none!important}
  .content{overflow:visible!important;padding:0!important}
  .lb-section,.lb-head{box-shadow:none!important;border:1px solid #ccc!important}
}
@media(max-width:680px){
  .lb-ops{grid-template-columns:1fr}
}
@media(max-width:560px){
  .ag-title{font-size:25px}
  .brand .t2{display:none}
  .banner{padding:0 12px;gap:10px}
  .banner-right{gap:8px}
  .node-row{padding:12px 14px!important}
  .lb-save,.lb-print{flex:1 1 100%;justify-content:center}
  .clock{font-size:11px}
}
@media(max-width:400px){
  .clock span{display:none}
}
</style>
</head>

      <button type="submit" class="ag-submit">Entrar no portal</button>

    <p class="ag-footer">Acesso restrito a colaboradores e parceiros autorizados da XD4Solutions</p>
  </div>
</div>

<div class="banner">

  <button class="icon-btn mob-tree-btn" id="mobTree" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="logo-chip" id="logoChip"><img id="logoSym" alt="XD4"></div>
  <div class="brand" id="brandHome">
    <span class="t1">Blue Book</span>
    <span class="t2">Sistema de Gestão Operacional</span>
  </div>
  <div class="banner-right">
    <button class="icon-btn" id="openCmdk" title="Buscar (Ctrl+K)" aria-label="Buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="icon-btn" id="themeToggle" title="Tema claro/escuro" aria-label="Tema">

</div>

    </div>
    <div class="tree-title">Estrutura Documental</div>
    <div id="treeRoot"></div>
  </aside>

  <main class="content" id="content">

    <div id="viewHome" class="view active"></div>
    <div id="viewDoc" class="view"></div>
  </main>
</div>

  </div>
</div>

/* index by id + parent map for breadcrumbs */
const BYID={}, PARENT={};
(function idx(nodes,parent){ nodes.forEach(n=>{ BYID[n.id]=n; PARENT[n.id]=parent; if(n.children) idx(n.children,n); }); })(TREE,null);
function crumbTrail(id){ const t=[]; let n=BYID[id]; while(n){ t.unshift(n); n=PARENT[n.id]; } return t; }
function stripHTML(s){ return s.replace(/<[^>]+>/g,''); }

/* ---------- ÁRVORE ---------- */
const treeRoot=document.getElementById('treeRoot');
function buildTree(nodes,depth=0){
  const frag=document.createDocumentFragment();
  nodes.forEach(n=>{
    if(n.hidden) return; // indexado (roteável via ref) mas fora da árvore lateral
    const el=document.createElement('div');
    el.className='node'+(n.root?' root':'')+(n.children?'':'');
    if(n.pinned) el.classList.add('pinned');
    el.dataset.id=n.id;
    const hasKids=!!(n.children&&n.children.length)&&n.type!=='vehicle';
    const row=document.createElement('div'); row.className='node-row'; row.dataset.id=n.id;
    row.innerHTML=`
      <span class="caret ${hasKids?'':'leaf'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="9 6 15 12 9 18"/></svg></span>
      <span class="node-ic">${IC[n.icon]||IC.file}</span>
      <span class="node-lbl">${n.label}</span>
      ${n.badge?`<span class="node-badge">${n.badge}</span>`:''}
      <span class="node-st st-${n.status||'draft'}"></span>`;
    row.addEventListener('click',e=>{
      e.stopPropagation();
      const onCaret = e.target.closest('.caret');
      if(onCaret && hasKids){
        // clicar no caret apenas abre/fecha, sem navegar
        el.classList.toggle('open');
        return;
      }
      if(hasKids) el.classList.add('open'); // clicar no corpo abre e navega
      selectNode(n.id, true);
    });
    el.appendChild(row);
    if(hasKids){ const c=document.createElement('div'); c.className='children'; c.appendChild(buildTree(n.children,depth+1)); el.appendChild(c); }
    frag.appendChild(el);
  });
  return frag;
}
function renderTree(){ treeRoot.innerHTML=''; treeRoot.appendChild(buildTree(TREE)); }

function selectNode(id, fromRow){
  document.querySelectorAll('.node-row.active').forEach(r=>r.classList.remove('active'));
  const row=treeRoot.querySelector(`.node-row[data-id="${id}"]`);
  if(row){
    row.classList.add('active');
    // abre apenas os ANCESTRAIS para revelar o item, sem forçar o próprio nó
    const self=row.closest('.node');
    let p=self&&self.parentElement?self.parentElement.closest('.node'):null;
    while(p){ p.classList.add('open'); p=p.parentElement.closest('.node'); }
  }
  routeTo(id);
  if(window.innerWidth<=900) document.getElementById('tree').classList.remove('open');
}

  if(n.type==='home'){ renderHome(); show(viewHome); toggleSpy(false); return; }

  if(n.type==='phr-g1'){ renderPhrG1(); show(viewDoc); return; }
  if(n.type==='phr-rover'){ renderPhrRover(); show(viewDoc); return; }
  if(n.type==='logbook'){ renderLogbook(n); show(viewDoc); return; }
  if(n.type==='maintlog'){ renderMaintLog(n); show(viewDoc); return; }
  if(n.type==='group'){ renderGroup(n); show(viewDoc); toggleSpy(false); return; }

  if(n.type==='manual'){ renderManual(n); show(viewDoc); toggleSpy(false); return; }
  renderPlaceholder(n); show(viewDoc); toggleSpy(false);
}

/* Fonte única de verdade para contagem de documentos: cada documento
   (ref) só é contado uma vez, mesmo se aparecer em mais de um lugar da
   Estrutura Documental (ex: MGO aparece no topo E dentro da família IT;
   a Fraseologia do Elios 3 aparece dentro do grupo de veículos E como
   item avulso). O card "Documentos" da home e o gráfico de rosca usam
   exatamente este mesmo cálculo, então nunca podem divergir. */
const FAM_COLORS=['var(--xd4)','var(--blue)','var(--accent)','var(--ok)'];
function docStats(){
  const seen=new Set();
  const overall={ok:0,warn:0,draft:0,crit:0,total:0};
  const claim=ref=>{
    if(!ref||seen.has(ref))return null;
    const n=BYID[ref]; if(!n)return null;
    seen.add(ref);
    overall.total++; overall[n.status]=(overall[n.status]||0)+1;
    return n;
  };
  let topN=0;
  ORG_DOCS.top.forEach(t=>{ if(claim(t.ref))topN++; });
  const perFamily=ORG_DOCS.families.map(f=>{
    let n=0;
    f.items.forEach(it=>{ if(claim(it.ref))n++; });
    (f.groups||[]).forEach(g=>g.items.forEach(it=>{ if(claim(it.ref))n++; }));
    return {code:f.code,title:f.title,n};
  });
  const slices=[{code:'GER',title:'Manuais Gerais',n:topN}, ...perFamily].filter(s=>s.n>0);
  overall.vehicles=Object.values(BYID).filter(n=>n.type==='vehicle').length;
  overall.families=ORG_DOCS.families.length;
  return {overall, slices};
}
function countStatus(){ return docStats().overall; }
function famCounts(){ return docStats().slices; }
function donutFamilies(){
  const {overall,slices}=docStats(); const total=overall.total||1;
  const R=54,C=2*Math.PI*R; let off=0,arcs='';
  slices.forEach((f,i)=>{ const len=C*f.n/total; arcs+=`<circle cx="65" cy="65" r="${R}" fill="none" stroke="${FAM_COLORS[i%FAM_COLORS.length]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 65 65)"/>`; off+=len; });
  return `<svg class="donut" viewBox="0 0 130 130"><circle cx="65" cy="65" r="54" fill="none" stroke="var(--sky-line)" stroke-width="16"/>${arcs}<text x="65" y="61" text-anchor="middle" font-size="26" font-weight="600" fill="var(--ink)" font-family="IBM Plex Mono">${total}</text><text x="65" y="80" text-anchor="middle" font-size="10" fill="var(--ink-3)">documentos</text></svg>`;
}
function familyLegend(){ const fams=famCounts();
  return fams.map((f,i)=>`<div class="hl-row"><span class="d" style="background:${FAM_COLORS[i%FAM_COLORS.length]}"></span><span class="lbl">${f.title}</span><span class="v">${f.n}</span></div>`).join(''); }
function donut(c){
  const seg=[['ok',c.ok,'var(--ok)'],['warn',c.warn,'var(--warn)'],['draft',c.draft,'var(--draft)'],['crit',c.crit,'var(--crit)']].filter(s=>s[1]>0);
  const total=seg.reduce((a,s)=>a+s[1],0)||1; const R=54,C=2*Math.PI*R; let off=0; let arcs='';
  seg.forEach(s=>{ const len=C*s[1]/total; arcs+=`<circle cx="65" cy="65" r="${R}" fill="none" stroke="${s[2]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 65 65)"/>`; off+=len; });
  const pct=Math.round(100*c.ok/total);
  return `<svg class="donut" viewBox="0 0 130 130"><circle cx="65" cy="65" r="54" fill="none" stroke="var(--sky-line)" stroke-width="16"/>${arcs}<text x="65" y="61" text-anchor="middle" font-size="26" font-weight="600" fill="var(--ink)" font-family="IBM Plex Mono">${pct}%</text><text x="65" y="80" text-anchor="middle" font-size="10" fill="var(--ink-3)">vigente</text></svg>`;
}

/* ---------- LEITOR: MGO ---------- */
/* ============================================================
   CARREGADOR DE CONTEÚDO EXTERNO (content/*.json)
   Cada POP/TOP/MGO vive em um arquivo JSON separado, gerado
   automaticamente a partir do .docx correspondente (ver
   /scripts/docx_to_json.py e o GitHub Action de conversão).
   Isso permite atualizar o conteúdo sem tocar neste HTML.
   ============================================================ */
const CONTENT_CACHE = {};

async function loadContent(key){
  if(CONTENT_CACHE[key]) return CONTENT_CACHE[key];
  // cache:'no-store' + parâmetro de versão evitam que o navegador ou a rede do
  // GitHub Pages sirvam uma cópia antiga do JSON depois de uma atualização.
  const res = await fetch(`content/${key}.json?v=${Date.now()}`, { cache: 'no-store' });
  if(!res.ok) throw new Error(`Não foi possível carregar content/${key}.json (HTTP ${res.status})`);
  const data = await res.json();
  CONTENT_CACHE[key] = data;
  return data;
}

async function renderDocFromKey(key, meta){
  renderLoading(meta.title);
  let content;
  try{

  }catch(err){
    renderLoadError(key, meta.title, err);
    console.error(err);
    return;
  }

  const idPrefix = meta.idPrefix || key;
  const chIndex = content.map(ch=>`<a onclick="scrollToSec('${idPrefix}-ch-${ch.num}')"><span class="n">${ch.num}.0</span><span class="tt">${titleCase(ch.title)}</span><span class="dots"></span></a>`).join('');

    body += `<h2 class="sec" id="${idPrefix}-ch-${ch.num}"><span class="sn">${ch.num}.0</span>${titleCase(ch.title)}</h2>`;
    ch.sections.forEach(s=>{

        body += `<h3 class="sub" id="${idPrefix}-sec-${s.num}"><span class="sn">${s.num}</span>${titleCase(s.title)}</h3>${s.html}`;
      } else if(s.html){ body += s.html; }
    });

  viewDoc.innerHTML = `
  <div class="doc">
    ${crumbsHTML(meta.crumbId)}
    <div class="cover">
      <div class="doc-ic">${IC[meta.icon]||IC.file}</div>

/* ============================================================
   INTEGRAÇÃO COM GOOGLE DRIVE / GOOGLE SHEETS
   Cole aqui a URL do seu Web App do Google Apps Script
   (veja instruções de configuração enviadas pela XD4Solutions).
   Enquanto estiver vazia ("" ), os diários salvam apenas
   localmente nesta sessão do navegador.
   ============================================================ */
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbymY63xOk2kcp0e2Ci51oGmsEe8G-TsqFu-zp7XaMTSOpBo4U_-P_XC1-Ry13zHCXmxjw/exec";

async function sendToDrive(kind, payload){
  if(!GAS_ENDPOINT){ return {ok:false, reason:'not_configured'}; }
  const fetchPromise = (async () => {
    const res = await fetch(GAS_ENDPOINT, {
      method:'POST',
      redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // evita preflight OPTIONS, que o Apps Script não trata
      body: JSON.stringify({ kind, savedAt: new Date().toISOString(), payload })
    });
    const text = await res.text();
    let json = null;
    try{ json = JSON.parse(text); }catch(_e){ /* resposta não era JSON */ }
    if(!res.ok){
      console.error('Google Drive respondeu com erro HTTP', res.status, text);
      return {ok:false, reason:'http_error', status:res.status, raw:text};
    }
    if(json && json.ok === false){
      console.error('Google Apps Script retornou erro:', json);
      return {ok:false, reason:'script_error', raw:json};
    }
    return {ok:true, data:json};
  })();

  // Mesmo se o timeout "vencer" a corrida abaixo, quando a resposta real do Google
  // chegar (em segundo plano) capturamos o link do PDF pra o botão de exportar funcionar.
  fetchPromise.then(realResult => {
    if(realResult && realResult.ok && realResult.data && realResult.data.pdfUrl){
      if(kind === 'diario_bordo') LAST_PDF_URL.diarios = realResult.data.pdfUrl;
      if(kind === 'diario_manutencao') LAST_PDF_URL['diarios-manut'] = realResult.data.pdfUrl;
    }
  }).catch(()=>{ /* já tratado no caminho principal; aqui é só best-effort */ });

  // Timeout de segurança: a resposta do Apps Script às vezes fica "pendurada" no navegador
  // (redirecionamento do Google) mesmo já tendo sido processada do lado do servidor.
  // Sem isso, o painel nunca avisa nada — com isso, ele sempre responde em até 6s.
  const timeoutPromise = new Promise(resolve => {
    setTimeout(() => resolve({ok:true, reason:'timeout_assumed_ok', data:null}), 6000);
  });

  try{
    return await Promise.race([fetchPromise, timeoutPromise]);
  }catch(e){
    console.error('Falha de rede ao enviar para o Google Drive:', e);
    return {ok:false, reason:'network_error', error:String(e)};
  }
}

function lbMinDiff(a,b){
  if(!a||!b) return null;
  const [ah,am]=a.split(':').map(Number), [bh,bm]=b.split(':').map(Number);
  if(isNaN(ah)||isNaN(bh)) return null;
  let d=(bh*60+bm)-(ah*60+am);
  if(d<0) d+=24*60;
  return d;
}

function lbRenderVoos(){
  const body = document.getElementById('lbVoosBody');
  if(!body) return;
  let acum = 0;
  body.innerHTML = LB_STATE.voos.map((v,i)=>{
    const tempo = lbMinDiff(v.partida, v.corte);
    acum += (tempo||0);
    const opts = CODIGO_VOO_OPTS.map(([c,l])=>`<option value="${c}" ${v.codigo===c?'selected':''}>${c}</option>`).join('');
    return `<tr>
      <td><input value="${v.etapa}" onchange="lbSet(${i},'etapa',this.value)"></td>
      <td class="lb-local"><input value="${v.local}" onchange="lbSet(${i},'local',this.value)"></td>
      <td><input type="time" value="${v.partida}" onchange="lbSet(${i},'partida',this.value)"></td>
      <td><input type="time" value="${v.corte}" onchange="lbSet(${i},'corte',this.value)"></td>
      <td><input readonly value="${lbFmt(tempo)}"></td>
      <td><input readonly value="${lbFmt(acum)}"></td>
      <td><input value="${v.bateria}" onchange="lbSet(${i},'bateria',this.value)"></td>
      <td><input value="${v.ciclo}" onchange="lbSet(${i},'ciclo',this.value)" style="text-align:center"></td>
      <td><select onchange="lbSet(${i},'codigo',this.value)">${opts}</select></td>
      <td><div class="lb-sig ${v.rubrica?'on':''}" onclick="lbToggleRubrica(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg></div></td>
      <td><div class="lb-rowdel" onclick="lbDelVoo(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg></div></td>
    </tr>`;
  }).join('');
  document.getElementById('lbTotVoos').textContent = LB_STATE.voos.length;
  document.getElementById('lbTotTempo').textContent = lbFmt(acum);
  document.getElementById('lbTotCiclos').textContent = LB_STATE.voos.reduce((s,v)=>s+(Number(v.ciclo)||0),0);
  const hd = document.getElementById('lbHorasDia'); if(hd) hd.value = lbFmt(acum);
  lbMarkDirty();
}
function lbSet(i,field,val){ LB_STATE.voos[i][field]=val; lbRenderVoos(); }
function lbToggleRubrica(i){ LB_STATE.voos[i].rubrica = !LB_STATE.voos[i].rubrica; lbRenderVoos(); }
function lbDelVoo(i){ LB_STATE.voos.splice(i,1); lbRenderVoos(); }
function lbAddVoo(){
  const n = LB_STATE.voos.length+1;
  LB_STATE.voos.push({etapa:'VOO '+n, local:'', partida:'', corte:'', bateria:'', ciclo:'', codigo:'INS', rubrica:false});
  lbRenderVoos();
}
function lbMarkDirty(){
  const s = document.getElementById('lbStatus');
  if(s && s.classList.contains('saved')){ s.classList.remove('saved'); document.getElementById('lbStatusText').textContent='Rascunho não salvo'; }
}
function lbToast(msg){
  const t = document.getElementById('lbToast');
  document.getElementById('lbToastText').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), msg.length>60 ? 7000 : 3200);
}
async function lbSave(){
  ['lbCliente','lbData','lbHorasAnterior','lbOp1Nome','lbOp1Sisant','lbOp2Nome','lbOp2Sisant','lbOcorrencias'].forEach(id=>{
    const el = document.getElementById(id); if(!el) return;
    if(id==='lbCliente') LB_STATE.cliente = el.value;
    if(id==='lbData') LB_STATE.data = el.value;
    if(id==='lbHorasAnterior') LB_STATE.horasAnterior = el.value;
    if(id==='lbOp1Nome') LB_STATE.op1.nome = el.value;
    if(id==='lbOp1Sisant') LB_STATE.op1.sisant = el.value;
    if(id==='lbOp2Nome') LB_STATE.op2.nome = el.value;
    if(id==='lbOp2Sisant') LB_STATE.op2.sisant = el.value;
    if(id==='lbOcorrencias') LB_STATE.ocorrencias = el.value;
  });
  const s = document.getElementById('lbStatus');
  s.classList.add('saved');
  document.getElementById('lbStatusText').textContent = 'Salvo às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const r = await sendToDrive('diario_bordo', LB_STATE);
  if(r.reason==='timeout_assumed_ok'){
    lbToast('Diário enviado ao Google Drive (envio confirmado; aguardando resposta de detalhes)');
  } else if(r.ok){
    lbToast('Diário salvo e enviado ao Google Drive');
    if(r.data && r.data.pdfUrl){ LAST_PDF_URL.diarios = r.data.pdfUrl; }
  }
  else if(r.reason==='not_configured'){ lbToast('Diário salvo localmente (Google Drive não configurado)'); }
  else { console.error('Detalhe do erro de envio:', r); lbToast('Falha ao enviar ao Drive: '+(r.reason||'erro desconhecido')+'. Veja o console (F12) para detalhes.'); }
}

  if(s && s.classList.contains('saved')){ s.classList.remove('saved'); document.getElementById('mtStatusText').textContent='Rascunho não salvo'; }
}
function mtToast(msg){
  const t = document.getElementById('mtToast');
  document.getElementById('mtToastText').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), msg.length>60 ? 7000 : 3200);
}
async function mtSave(){
  ['mtNumSerie','mtOperador','mtNumDoc','mtRevisao','mtHoras','mtRespNome','mtRespData','mtInspecao'].forEach(id=>{
    const el = document.getElementById(id); if(!el) return;
    if(id==='mtNumSerie') MT_STATE.numSerie = el.value;
    if(id==='mtOperador') MT_STATE.operador = el.value;
    if(id==='mtNumDoc') MT_STATE.numDoc = el.value;
    if(id==='mtRevisao') MT_STATE.revisao = el.value;
    if(id==='mtHoras') MT_STATE.horasManutencao = el.value;
    if(id==='mtRespNome') MT_STATE.respNome = el.value;
    if(id==='mtRespData') MT_STATE.respData = el.value;
    if(id==='mtInspecao') MT_STATE.inspecao = el.value;
  });
  const s = document.getElementById('mtStatus');
  s.classList.add('saved');
  document.getElementById('mtStatusText').textContent = 'Salvo às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const r = await sendToDrive('diario_manutencao', MT_STATE);
  if(r.reason==='timeout_assumed_ok'){
    mtToast('Diário enviado ao Google Drive (envio confirmado; aguardando resposta de detalhes)');
  } else if(r.ok){
    mtToast('Diário salvo e enviado ao Google Drive');
    if(r.data && r.data.pdfUrl){ LAST_PDF_URL['diarios-manut'] = r.data.pdfUrl; }
  }
  else if(r.reason==='not_configured'){ mtToast('Diário salvo localmente (Google Drive não configurado)'); }
  else { console.error('Detalhe do erro de envio:', r); mtToast('Falha ao enviar ao Drive: '+(r.reason||'erro desconhecido')+'. Veja o console (F12) para detalhes.'); }
}

function titleCase(s){
  if(s===s.toUpperCase()){ s=s.toLowerCase(); }
  // Capitaliza a 1a letra de cada palavra (respeita / e -), mantém siglas conhecidas
  const KEEP={mgo:'MGO',mgm:'MGM',pop:'POP',top:'TOP',ceo:'CEO',coo:'COO',cco:'CCO',epi:'EPI',anac:'ANAC',decea:'DECEA',anatel:'ANATEL',rpa:'RPA',rpas:'RPAS',uas:'UAS',nr:'NR',sgq:'SGQ',xd4solutions:'XD4Solutions',ica:'ICA',cenipa:'CENIPA',ppra:'PPRA',pcmso:'PCMSO'};
  return s.replace(/[\p{L}][\p{L}0-9]*/gu, w=>{
    const low=w.toLowerCase();
    if(KEEP[low]) return KEEP[low];
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  });
}

function grpCard(k){
  let thumb, cat, meta;
  if(k.type==='vehicle'){
    const v=k.vehicle||{};
    thumb = v.img ? `<img src="${v.img}" alt="${stripHTML(k.label)}" onerror="this.parentElement.innerHTML=IC['${k.icon}']">` : IC[k.icon]||IC.drone;
    cat = v.cls || 'Veículo';
    meta = v.maker ? `Fabricante: ${v.maker}` : '';
  } else if(k.type==='group'){
    thumb = IC[k.icon]||IC.folder;
    cat = 'Categoria';
    meta = (k.children?k.children.length:0)+' item(s)';
  } else if(k.type==='pdf'||k.type==='manual'){
    thumb = IC.pdf||IC.file;
    cat = 'Manual do Fabricante';
    meta = 'Documento PDF';
  } else if(k.type==='logbook'){
    thumb = IC[k.icon]||IC.file;
    cat = 'Registro de Missão';
    meta = 'Diário de bordo digital';
  } else {
    thumb = IC[k.icon]||IC.file;
    cat = k.code || 'Documento';
    meta = k.rev || '';
  }
  const badge2 = k.badge ? `<span class="badge2">${k.badge}</span>` : (k.code?`<span class="badge2 mono">${k.code}</span>`:'');
  return `<div class="grp-card" onclick="selectNode('${k.id}')">
    <div class="thumb">${thumb}</div>
    <div class="body">
      <div class="cat">${cat}</div>
      <h4>${stripHTML(k.label)}</h4>
      ${meta?`<div class="meta">${meta}</div>`:''}
      <div class="foot">
        <span class="st"><span class="d st-${k.status||'draft'}"></span>${stName[k.status]||'—'}</span>
        ${badge2}
      </div>
    </div>
  </div>`;
}
function renderGroup(n){

/* ---------- MANUAIS (content/manuals/*.pdf vindos do repositório GitHub) ----------
   Mesma lógica do content/*.json: os PDFs ficam versionados na pasta manuals/
   deste mesmo repositório/GitHub Pages. Basta subir o arquivo com o nome indicado
   no campo "file" de cada nó (ver TREE) que ele passa a abrir aqui automaticamente
   — nada precisa ser alterado neste HTML. */
async function fileExists(url){
  try{
    const res = await fetch(`${url}?v=${Date.now()}`, { method:'HEAD', cache:'no-store' });
    return res.ok;
  }catch(_e){ return false; }
}
async function renderManual(n){
  if(n.external) return renderManualExternal(n);
  const files = n.files||[];
  viewDoc.innerHTML=`
  <div class="ph">
    ${crumbsHTML(n.id)}
    <div class="ph-head">
      <div class="ph-ic">${IC.pdf}</div>
      <h1>${stripHTML(n.label)}</h1>
      <div class="code">Manual do Fabricante · PDF</div>
      <div class="ph-status" id="manualStatus"><span class="d"></span>Verificando arquivo(s)…</div>
    </div>
    <div class="ph-note">Manuais técnicos originais do fabricante, versionados junto com este site no repositório GitHub (pasta <code>manuals/</code>).</div>
    <div class="manual-panel">
      <div class="manual-tab">Standard</div>
      <div class="manual-list" id="manualList"></div>
    </div>
  </div>`;

  const listEl = document.getElementById('manualList');
  const statusEl = document.getElementById('manualStatus');
  if(!files.length){
    statusEl.innerHTML = '<span class="d"></span>Nenhum arquivo cadastrado';
    listEl.innerHTML = '<div style="padding:24px;color:var(--ink-3);font-size:13.5px">Nenhum manual cadastrado ainda.</div>';
    return;
  }

  const results = await Promise.all(files.map(async f=>({ ...f, ok: await fileExists(f.file) })));
  const okCount = results.filter(r=>r.ok).length;

  if(okCount===results.length){
    statusEl.style.background='var(--ok-bg)'; statusEl.style.color='var(--ok)';
    statusEl.innerHTML='<span class="d" style="background:var(--ok)"></span>Disponível';
  } else if(okCount===0){
    statusEl.style.background='var(--crit-bg)'; statusEl.style.color='var(--crit)';
    statusEl.innerHTML='<span class="d" style="background:var(--crit)"></span>Arquivo não encontrado';
  } else {
    statusEl.style.background='var(--warn-bg)'; statusEl.style.color='var(--warn)';
    statusEl.innerHTML='<span class="d" style="background:var(--warn)"></span>Parcialmente disponível';
  }

  listEl.innerHTML = results.map(f=>{
    const sizeTag = f.size?`<span class="mr-size">${f.size}</span>`:'';
    if(f.ok){
      return `
      <a class="manual-row" href="${f.file}" target="_blank" rel="noopener">
        <div class="mr-ic">${IC.pdf}${sizeTag}</div>
        <div class="mr-info"><div class="mr-name">${f.label}</div><div class="mr-type">PDF</div></div>
        <div class="mr-open">Abrir ↗</div>
      </a>`;
    }
    return `
      <div class="manual-row missing" title="Suba o arquivo em ${f.file} no repositório GitHub">
        <div class="mr-ic warn">${IC.pdf}</div>
        <div class="mr-info"><div class="mr-name">${f.label}</div><div class="mr-type">Ainda não enviado · <code>${f.file}</code></div></div>
        <div class="mr-open warn">Pendente</div>
      </div>`;
  }).join('');
}

content.addEventListener('scroll',()=>{
  const max=content.scrollHeight-content.clientHeight;
  document.getElementById('progFill').style.width=(max>0?content.scrollTop/max*100:0)+'%';
  const s=spyEl(); if(!s||!s.classList.contains('show'))return;
  const secs=[...viewDoc.querySelectorAll('h2.sec')]; let cur=secs[0];
  secs.forEach(h=>{ if(h.getBoundingClientRect().top<140) cur=h; });
  s.querySelectorAll('a').forEach(a=>a.classList.toggle('active',cur&&a.dataset.t===cur.id));
});

/* ---------- BUSCA NA ÁRVORE ---------- */
document.getElementById('treeSearch').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('#treeRoot .node').forEach(el=>{
    const n=BYID[el.dataset.id]; if(!n)return;
    const hay=(stripHTML(n.label)+' '+(n.code||'')+' '+(n.badge||'')).toLowerCase();
    const match=!q||hay.includes(q);
    el.style.display=match||hasMatchingChild(n,q)?'':'none';
    if(q&&(match||hasMatchingChild(n,q)))el.classList.add('open');
  });
});
function hasMatchingChild(n,q){ if(!q||!n.children)return false;
  return n.children.some(c=>{ const hay=(stripHTML(c.label)+' '+(c.code||'')+' '+(c.badge||'')).toLowerCase(); return hay.includes(q)||hasMatchingChild(c,q); }); }

/* ---------- COMMAND PALETTE (Ctrl+K) ---------- */
const cmdkOverlay=document.getElementById('cmdkOverlay');
const cmdkInput=document.getElementById('cmdkInput');
const cmdkResults=document.getElementById('cmdkResults');
let cmdkSel=0, cmdkList=[];
function searchable(){ return Object.values(BYID).filter(n=>n.type!=='group'); }
function openCmdk(){ cmdkOverlay.classList.add('show'); cmdkInput.value=''; renderCmdk(''); cmdkInput.focus(); }
function closeCmdk(){ cmdkOverlay.classList.remove('show'); }
window.openCmdk=openCmdk;
function renderCmdk(q){
  q=q.toLowerCase();
  cmdkList=searchable().filter(n=>{ const hay=(stripHTML(n.label)+' '+(n.code||'')+' '+(n.badge||'')).toLowerCase(); return !q||hay.includes(q); }).slice(0,8);
  cmdkSel=0;
  if(!cmdkList.length){ cmdkResults.innerHTML='<div class="cmdk-empty">Nada encontrado.</div>'; return; }
  cmdkResults.innerHTML=cmdkList.map((n,i)=>`<div class="cmdk-item ${i===0?'sel':''}" data-i="${i}" onclick="cmdkGo(${i})"><div class="ci">${IC[n.icon]||IC.file}</div><div class="cl">${stripHTML(n.label)}<small>${n.code||stName[n.status]||''}</small></div>${n.code?`<span class="ck">${n.code}</span>`:''}</div>`).join('');
}
function cmdkGo(i){ const n=cmdkList[i]; if(n){ closeCmdk(); selectNode(n.id); } }
window.cmdkGo=cmdkGo;
cmdkInput.addEventListener('input',e=>renderCmdk(e.target.value));
cmdkInput.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();cmdkSel=Math.min(cmdkSel+1,cmdkList.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();cmdkSel=Math.max(cmdkSel-1,0);}
  else if(e.key==='Enter'){e.preventDefault();cmdkGo(cmdkSel);return;}
  else return;
  cmdkResults.querySelectorAll('.cmdk-item').forEach((el,i)=>el.classList.toggle('sel',i===cmdkSel));
});
cmdkOverlay.addEventListener('click',e=>{ if(e.target===cmdkOverlay) closeCmdk(); });
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openCmdk(); }
  else if(e.key==='/'&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){ e.preventDefault(); openCmdk(); }
  else if(e.key==='Escape'){ closeCmdk(); }
});
