ado habilidade para a instrução na plataforma correspondente;</p><p>Conhecer e ser capaz de discutir os assuntos deste Manual, do manual do fabricante e do POP do equipamento designado;</p><p>Estar familiarizado com a doutrina de segurança operacional da empresa.</p>"}]}, {"num": "6", "title": "PROCEDIMENTOS PARA CUMPRIMENTO DA JORNADA DE TRABALHO", "sections": [{"num": "6.0", "title": "PROCEDIMENTOS PARA CUMPRIMENTO DA JORNADA DE TRABALHO", "html": ""}, {"num": "6.1", "title": "Escala para Cumprimento de Missão", "html": "<p>A escala dos times de inspeção é elaborada pelo Coordenador de Operações, considerando, entre outros, os seguintes fatores:</p><p>Habilitação na plataforma designada;</p><p>Requisitos de cursos e certificados;</p><p>Treinamentos;</p><p>Local da missão;</p><p>Período da missão;</p><p>Quantidade de missões prevista;</p><p>Composição do time de inspeção;</p><p>Férias e outros afastamentos;</p><p>Solicitações especiais dos operadores e do cliente;</p><p>Aprovação da escala pelo Coordenador de Operações.</p><p>O responsável pela elaboração da escala deve controlar todas as Ordens de Serviço em formulário próprio, utilizado para o controle de dias trabalhados em campo e de horas de operação por equipamento.</p>"}, {"num": "6.2", "title": "Limites da Jornada de Trabalho", "html": "<p>Jornada é a duração do trabalho do operador, contada entre a apresentação no local de trabalho e o seu encerramento. A jornada em atividade operacional inicia-se com a preparação do equipamento no local da missão e encerra-se 30 (trinta) minutos após a desativação do equipamento na última operação do dia.</p><p>Esses limites aplicam-se uniformemente a qualquer plataforma operada pela empresa. Fora da base contratual do operador, a XD4Solutions disponibiliza acomodação para repouso, além do transporte entre o aeroporto/rodoviária e o local de repouso e vice-versa. Quando a XD4Solutions não disponibilizar esse serviço, o operador utiliza os meios locais apropriados e é ressarcido dos gastos correspondentes.</p>"}, {"num": "6.3", "title": "Gerenciamento de Fadiga", "html": "<p>O Gerenciamento de Fadiga tem por objetivos:</p><p>Conscientizar os colaboradores sobre a necessidade de estar descansado e apto para o trabalho;</p><p>Proteger o ambiente operacional, com qualquer equipamento, reduzindo a nível aceitável os riscos associados à fadiga;</p><p>Empregar métodos de prevenção de fadiga e gerenciar o risco de fadiga e suas consequências;</p><p>Incorporar o gerenciamento de fadiga aos processos de avaliação e monitoramento contínuo de risco.</p><p>O atendimento a todos os requisitos legais e contratuais de duração de jornada e tempo de descanso não garante, por si só, que o operador não esteja fatigado no momento da operação.</p><p>Os intervalos entre missões consecutivas devem ser suficientes para que os operadores avaliem os dados obtidos na missão anterior, preparem o equipamento para nova operação, realizem os registros necessários nos documentos da empresa e discutam eventuais mudanças no planejamento da próxima missão.</p><p>A operação de equipamentos de inspeção exige dos operadores relativa imobilidade e postura corporal por vezes inadequada — seja pela cabeça baixa ao acompanhar a operação na tela da estação de controle, seja pelo pescoço estendido ao acompanhar a trajetória de um sistema aéreo no alto de estruturas, seja por posições de observação prolongadas em operações com robôs terrestres.</p><p>A cada 2 (duas) horas contínuas de atividade de operação, deve ser feito intervalo de 10 a 15 minutos, durante o qual o time de inspeção deve afastar-se do local de operação e descansar, preferencialmente sentado e em área coberta.</p><p>Independentemente do período de jornada já cumprido no dia, sempre que os operadores avaliarem que o nível de fadiga pode comprometer a segurança ou a eficiência da missão, devem adotar ações mitigadoras, inclusive a interrupção das inspeções pelo tempo necessário ao repouso e o posterior retorno às atividades.</p><p>O número máximo de ciclos operacionais (por exemplo, voos com utilização completa da bateria, no caso de sistemas aéreos) por jornada é definido no POP de cada plataforma, observado como referência o limite de 15 ciclos por jornada para equipamentos de autonomia reduzida (em torno de 15 minutos por ciclo). Na operação de equipamentos de maior autonomia ou de natureza distinta, o limite correspondente é estabelecido no POP específico, com base nos mesmos princípios de gerenciamento de fadiga aqui descritos.</p><p>Considerando que as missões ocorrem, com frequência, em áreas distantes da sede da empresa e sem supervisão direta do Coordenador de Operações ou do Oficial de Segurança, o cumprimento da jornada de trabalho e dos períodos de descanso, bem como a avaliação das condições do time para o desempenho das tarefas, são de responsabilidade dos próprios membros da equipe. A direção da empresa reforça a importância de cada operador cumprir efetivamente seu período de descanso, a fim de desempenhar as atividades operacionais nas condições ótimas de eficiência.</p>"}, {"num": "6.4", "title": "Uso de Medicamentos", "html": "<p>Os operadores devem informar ao Coordenador de Operações sempre que estiverem em uso de medicamento cujos efeitos possam interferir no desempenho de suas funções. O Coordenador de Operações consulta o Oficial de Segurança para avaliar as consequências do uso informado e, se necessário, afasta temporariamente o operador da atividade operacional.</p>"}, {"num": "6.5", "title": "Consumo de Bebidas Alcoólicas e Drogas", "html": "<p>Nenhuma pessoa pode compor um time de inspeção quando se enquadrar em qualquer das seguintes condições:</p><p>Tiver ingerido bebida alcoólica no período de 8 horas anteriores ao horário previsto de início da missão;</p><p>Estiver sob efeito de bebida alcoólica, independentemente do momento em que a ingeriu;</p><p>Estiver sob uso de qualquer droga que afete suas faculdades de forma contrária à segurança da operação;</p><p>Apresentar concentração de álcool no sangue igual ou superior a 0,10 mg/litro.</p><p>O colaborador que tiver conhecimento de que um operador infringe o disposto acima deve notificar o Coordenador de Operações. Caso um operador identifique que outro operador está infringindo essas disposições, deve impedir a continuidade da missão até a normalização da situação e reportar a ocorrência imediatamente ao Coordenador de Operações.</p><p>Os operadores não devem consumir bebidas alcoólicas em locais públicos usando uniforme da empresa. O operador que incorrer nas infrações acima está sujeito às ações disciplinares previstas no Manual do Colaborador.</p>"}]}, {"num": "7", "title": "GERENCIAMENTO DE RISCOS", "sections": [{"num": "7.0", "title": "GERENCIAMENTO DE RISCOS", "html": ""}, {"num": "7.1", "title": "Avaliação do Risco", "html": "<p>A ficha de avaliação de risco operacional da XD4Solutions, inspirada no Apêndice B da IS E94-003A da ANAC, é de uso geral para qualquer plataforma operada pela empresa, complementada, quando aplicável, pelos riscos específicos descritos no POP do equipamento utilizado. Deve ser preenchida antes de toda missão pelo Coordenador de Operações, em conjunto com o cliente, responsável por fornecer as informações pertinentes à sua instalação.</p><p>Ao chegar ao local da missão, o time de inspeção revisa o documento para certificar-se de que a avaliação é abrangente e fidedigna à condição real do ambiente. No briefing inicial da inspeção, conduzido junto ao responsável pela segurança da estrutura a ser inspecionada, todos os pontos da avaliação de risco são revisados pelos envolvidos no serviço.</p><p>Qualquer mudança na missão solicitada pelo cliente após a aceitação da avaliação de risco operacional exige nova avaliação de risco.</p>"}, {"num": "7.2", "title": "Principais Riscos das Operações com Sistemas Robóticos", "html": "<p>Os riscos descritos nesta seção são comuns à generalidade das plataformas operadas pela XD4Solutions, sejam aéreas ou terrestres. Riscos específicos de cada equipamento constam do respectivo POP.</p>"}, {"num": "7.2.1", "title": "Riscos de Explosão em Áreas Perigosas", "html": "<p>Quando a operação for proposta dentro de área perigosa, o equipamento e todos os sistemas relacionados devem estar classificados para o nível de risco pretendido, ou a área deve ser submetida a preparo prévio que a torne segura para o equipamento. O responsável pelo ativo deve fornecer o Plano de Áreas Perigosas do local, para identificação da área e cumprimento dos requisitos de operação segura aplicáveis.</p><p>Os fatores típicos a serem considerados incluem, sem se limitar a:</p><p>Vapores explosivos: a área deve ser ventilada antes da entrada do equipamento, até que a concentração de vapores deixe de representar risco de explosão;</p><p>Carga útil: motores elétricos, câmeras e demais módulos internos devem ser revisados para garantir que não constituam potenciais fontes de faíscas elétricas;</p><p>Bateria: a troca, a recarga e o armazenamento devem seguir os procedimentos do fabricante, de modo a reduzir o risco de fogo ou centelhamento;</p><p>Operações: riscos associados à condução da operação, incluindo incidentes e acidentes.</p>"}, {"num": "7.2.2", "title": "Riscos de Perda de Enlace de Controle", "html": "<p>Antenas de micro-ondas, linhas de alta tensão e estruturas metálicas de grande massa são possíveis fontes de atenuação ou interferência no enlace de comando, telemetria e vídeo entre o equipamento e a estação de controle, qualquer que seja a plataforma utilizada.</p><p>O time de inspeção deve avaliar as características construtivas do ativo inspecionado para definir o melhor posicionamento da estação de controle e a eventual necessidade de um amplificador (&quot;booster&quot;) ou extensor de alcance de sinal, conforme previsto no POP da plataforma. Quando a situação permitir, o operador deve manter-se em linha de visada ou em posição de monitoramento eficaz do equipamento durante toda a missão; em ambientes confinados ou obstruídos onde isso não for possível, deve buscar pontos de acesso adicionais que cubram toda a extensão do ativo e previnam a perda de enlace.</p><p>Para sistemas aéreos, em áreas externas, o equipamento deve permanecer sempre em linha de visada com o operador e, consequentemente, com a estação de controle; quanto ao sinal de GPS, pode ser realizada análise da disponibilidade de satélites por meio do monitoramento autônomo de integridade do receptor (RAIM Prediction).</p><p>Como regra geral, a diminuição da intensidade do sinal de telemetria, vídeo ou controle, exibida no display da estação, deve ser acompanhada continuamente. Ao primeiro indício de perturbação significativa e comprometimento do sinal, deve-se iniciar o retorno imediato do equipamento e buscar melhor posicionamento antes de prosseguir a missão.</p>"}, {"num": "7.2.3", "title": "Riscos de Queda de Objetos ou Tombamento do Equipamento", "html": "<p>Em caso de falha, o equipamento pode representar risco de queda de objeto (no caso de sistemas aéreos) ou de tombamento (no caso de robôs terrestres), configurando perigo para o pessoal presente ou para o ativo inspecionado. Devem ser consideradas, entre outras, as seguintes situações:</p><p>Proximidade dos pontos de lançamento, decolagem, pouso ou implantação do equipamento;</p><p>Operação ou inspeção de local ocupado por pessoas, equipamentos ou sistemas de segurança crítica;</p><p>Locais onde a perda do equipamento exigiria expor uma ou mais pessoas a entrada em espaço confinado, área contaminada e/ou trabalho em altura, para fins de recuperação.</p><p>Quando necessário evitar a entrada de pessoas em área confinada para recuperação de um sistema aéreo acidentado ou com bateria esgotada, pode ser utilizado robô de controle remoto com rodas, ou a técnica de recuperação por fio guia conectado à estrutura do equipamento, evitando a entrada de pessoas. No caso de robôs terrestres, o respectivo POP deve prever o procedimento de recuperação aplicável ao ambiente de operação.</p>"}, {"num": "7.2.4", "title": "Riscos Corporais (Aproximação de Equipamento em Operação)", "html": "<p>Partes móveis do equipamento — rotores, em sistemas aéreos; rodas, esteiras ou membros articulados, em robôs terrestres — associadas à possibilidade de movimentos erráticos sob determinadas condições ambientais, elevam o risco de dano corporal. Devem ser observadas as seguintes precauções:</p><p>Apenas os componentes do time de inspeção podem aproximar-se do equipamento em operação;</p><p>A área de lançamento, decolagem, pouso ou implantação do equipamento deve ser cuidadosamente escolhida, mantendo-se afastada de pessoas, obstáculos, animais e objetos que possam ser deslocados ou atingidos pelo equipamento em movimento;</p><p>O time de inspeção deve posicionar-se isolado das demais pessoas presentes, evitando a redução da consciência situacional por conversas paralelas e outras distrações;</p><p>A operação do equipamento deve ser realizada apenas com o uso correto de todos os EPI indicados na ficha de Avaliação do Risco e fornecidos pelo setor de operações.</p>"}, {"num": "7.2.5", "title": "Ruído Excessivo", "html": "<p>O nível de ruído nas proximidades de determinados equipamentos pode ser excessivamente elevado, exigindo cuidados adicionais para evitar dano à audição, conforme especificado no POP da plataforma. O uso de protetores auriculares intra-auriculares é insuficiente para mitigar esse risco quando aplicável; recomenda-se o uso de protetores tipo concha (abafadores).</p>"}, {"num": "7.2.6", "title": "Outros Riscos", "html": "<p>Devem ainda ser identificados outros riscos de saúde e segurança, incluindo:</p><p>Áreas de trabalho de alto risco, com possível presença de alta tensão, gases tóxicos, trabalho em altura ou produtos perigosos;</p><p>Risco associado a outras operações em andamento na área durante a operação do equipamento, como movimentação de cargas por guindastes ou exposição à radiação;</p><p>Situações de emergência que exijam a evacuação do ativo;</p><p>Riscos de terreno irregular, escorregadio ou instável, relevantes especialmente à operação de robôs terrestres.</p>"}, {"num": "7.3", "title": "Declaração de Anuência", "html": "<p>Sempre que possível, toda pessoa potencialmente afetada por um risco deve ser identificada e consultada durante a fase de gestão de riscos. Os processos de consulta exigem o compartilhamento de informações e devem constituir oportunidade genuína para que as pessoas afetadas decidam quanto à sua anuência. A comunicação clara com as pessoas presentes no local de operação é elemento-chave de uma gestão de riscos bem-sucedida.</p><p>Como medida de mitigação, deve ser verificada a eventual presença de pessoas no local. Pessoas não anuentes a menos de 30 m do local da operação impedem o início desta até que sejam removidas; caso uma pessoa acesse acidentalmente a área dentro desse limite durante a operação, esta deve ser suspensa o mais rapidamente possível.</p>"}]}, {"num": "8", "title": "DIÁRIO DE OPERAÇÃO E DE MANUTENÇÃO", "sections": [{"num": "8.0", "title": "DIÁRIO DE OPERAÇÃO E DE MANUTENÇÃO", "html": "<p>O Diário de Operação e de Manutenção deve ser preenchido, para qualquer equipamento da frota, de forma que todos os dados referentes a uma etapa operacional estejam completos e assinados pelo operador imediatamente após o término de cada missão. Sua estrutura é comum a todas as plataformas; os campos de identificação técnica (modelo, número de série, fabricante) são preenchidos conforme o equipamento efetivamente utilizado.</p>"}, {"num": "8.1", "title": "Preenchimento", "html": "<p>O Diário de Operação e Manutenção da XD4Solutions é padronizado em português.</p><p>Capa</p><p>A capa do Diário tem a finalidade de facilitar sua identificação e proteger seu conteúdo interno, devendo conter, no mínimo:</p><p>Diário de Operação e Manutenção;</p><p>Marcas: nome dado pelo fabricante ao equipamento (letras maiúsculas), seguido do número de série, sem espaços (ex.: ELIOS60101);</p><p>Número e ano do Diário: número sequencial/identificação do equipamento (letras maiúsculas)/número de série/ano de lavratura do Termo de Abertura (ex.: 001/ELIOS60101/2019).</p><p>Prefácio</p><p>Todo Diário deve conter prefácio destinado a alertar a equipe quanto à obrigatoriedade de seu preenchimento e, em especial, quanto à responsabilidade do operador pela integridade das anotações registradas:</p><p>Equipamento: modelo do equipamento (letras maiúsculas), seguido do número de série, sem espaços (ex.: ELIOS60101);</p><p>Diário nº: número sequencial/identificação do equipamento (letras maiúsculas)/número de série/ano do Termo de Abertura (ex.: 001/ELIOS60101/2019).</p>"}, {"num": "8.1.1", "title": "Termo de Abertura", "html": "<p>Todo Diário deve conter o respectivo Termo de Abertura, destinado a registrar os dados técnicos e informativos na data de sua lavratura, preenchido conforme as orientações a seguir:</p><p>Diário nº: número sequencial/identificação do equipamento/número de série/ano (ex.: 001/ELIOS60101/2019);</p><p>Dia: dia da abertura, em numeral (ex.: 03);</p><p>Mês: mês por extenso (ex.: JUNHO);</p><p>Ano: ano corrente (ex.: 2019);</p><p>Marcas: nome dado pelo fabricante ao equipamento (letras maiúsculas), seguido do número de série, sem espaços (ex.: ELIOS60101);</p><p>Fabricante: nome original do fabricante (ex.: Flyability S.A., DJI, Unitree, ou outro);</p><p>Modelo: modelo do equipamento (ex.: DV5-001);</p><p>N/S: número de série do equipamento (ex.: 60101);</p><p>Número de Reset: quantidade de resets já sofridos pelo equipamento, quando aplicável. Um reset ocorre quando um componente crítico é trocado e o equipamento retorna ao zero de horas/ciclos disponíveis até a próxima troca (ex.: 01, 02);</p><p>Ano de Fabricação: ano de fabricação do equipamento (ex.: 2016);</p><p>Proprietário: nome original do proprietário do equipamento (ex.: XD4Solutions);</p><p>Operador: nome original do operador do equipamento (ex.: XD4Solutions).</p>"}, {"num": "8.1.2", "title": "Parte I - Registro de Operação", "html": "<p>Todo Diário deve conter a Parte I, na qual são registradas as missões do equipamento, com as seguintes informações:</p><p>Equipamento: nome dado pelo fabricante ao equipamento (ex.: Elios, Matrice, GO2);</p><p>Modelo: modelo do equipamento (ex.: DV7-075);</p><p>Código de Missão: conforme a natureza da operação realizada — Inspeção (INS), exceto Prova de Conceito; Treinamento (TRE), para missões realizadas normalmente no Centro de Treinamento; Apresentação (APR), para visitas ou eventos com clientes; Experiência (EXP), para checagem de equipamento após troca de componente, a pedido da manutenção, ou teste de sistema; Prova de Conceito (POC), para missões solicitadas pelo cliente a título de prova de conceito, sem cobrança;</p><p>Fabricante: nome do fabricante do equipamento;</p><p>Horas/ciclos da célula anterior: horas ou ciclos disponíveis até a operação anterior, em relação à próxima inspeção de manutenção;</p><p>Horas do equipamento: início (acionamento), término (desligamento), tempo da etapa e tempo acumulado;</p><p>Bateria (quando aplicável): código da bateria utilizada e total de ciclos (recargas) efetuados até a etapa;</p><p>Código de Missão: conforme a tabela acima;</p><p>Ocorrências/Observações: todas as ocorrências do dia não contempladas nos campos anteriores, incluindo inspeções realizadas no equipamento (ex.: &quot;Realizada inspeção de 50 horas&quot;).</p>"}, {"num": "8.2", "title": "Diário de Manutenção (Parte II - Situação Técnica do Equipamento)", "html": "<p>Todo Diário deve ter sua correspondente Parte II - Diário de Manutenção, na qual são registradas a situação técnica do equipamento e as seguintes informações:</p><p>Nº: nome dado pelo fabricante ao equipamento (letras maiúsculas), seguido do número de série, sem espaços (ex.: ELIOS60101);</p><p>Data: data da operação (dd/mmm/aa);</p><p>Equipamento: nome dado pelo fabricante ao equipamento;</p><p>Modelo: modelo do equipamento (ex.: DV5-001);</p><p>Número de Série: número de série do equipamento (ex.: 60101);</p><p>Fabricante: nome original do fabricante;</p><p>Operador: empresa operadora do equipamento (ex.: XD4Solutions);</p><p>Horas/ciclos para a próxima manutenção programada: conforme intervalo definido no POP da plataforma (ex.: 05:40h restantes para inspeção de 50 horas);</p><p>Pré-operação/Discrepâncias/Pós-operação: número sequencial das missões em ordem crescente, descrição de qualquer problema ou &quot;Nada a reportar&quot;, com registro da etapa pré-operacional na primeira linha e da pós-operacional na última;</p><p>Ação Corretiva: etapa correspondente e descrição sucinta do serviço executado (ex.: &quot;Efetuada troca de hélice&quot;);</p><p>Outros Registros: demais informações relevantes não contempladas nos campos anteriores.</p>"}, {"num": "8.2.1", "title": "Termo de Encerramento", "html": "<p>Todo Diário deve conter o respectivo Termo de Encerramento, destinado a registrar os dados técnicos e informativos na data de seu encerramento, preenchido com os mesmos campos do Termo de Abertura (Diário nº, dia, mês, ano, marcas, fabricante, modelo, N/S, número de reset, ano de fabricação, proprietário e operador).</p>"}, {"num": "8.3", "title": "Método para Aceitação de Correção no Diário", "html": "<p>Eventuais erros lançados no Diário de Operação e Manutenção devem ser corrigidos mediante traço sobre a palavra ou frase incorreta, sem torná-la ilegível, seguido de rubrica ao lado e da reescrita dos dados corretos.</p><p>Não é permitida correção com corretivo de texto (tinta branca ou borracha), tampouco a aplicação de múltiplos riscos que tornem o registro original ilegível. Todo erro registrado deve permanecer legível, de modo a permitir a verificação da diferença entre a palavra ou frase original e a reescrita.</p>"}, {"num": "8.4", "title": "Procedimentos para Reporte e Lançamento de Irregularidades Técnicas", "html": "<p>As discrepâncias devem ser reportadas pelos operadores no Diário de Manutenção, em português, conforme padrão da empresa. O operador deve relatar a discrepância de forma minuciosa ao Técnico de Manutenção, facilitando o entendimento e a correção.</p><p>O operador deve manter o Diário no case do equipamento, retirando-o apenas para preenchimento, e deve consultar a Parte II - Diário de Manutenção para identificar a correção ou a postergação de irregularidades técnicas informadas em missões anteriores.</p>"}, {"num": "8.5", "title": "Serviço de Manutenção Fora da Sede", "html": ""}, {"num": "8.5.1", "title": "Geral", "html": "<p>A manutenção fora da base pode ser exigida em duas situações: quando o equipamento for obrigado, por motivo técnico, a interromper a missão de forma não prevista, ou quando, dentro da missão programada, for identificada discrepância que exija manutenção antes da continuidade da operação.</p>"}, {"num": "8.5.2", "title": "Responsabilidade do Operador", "html": "<p>O Operador 1 deve avaliar criteriosamente a gravidade da discrepância e contatar o Técnico de Manutenção, transmitindo todas as informações disponíveis para facilitar o diagnóstico e a solução do problema.</p><p>Quando a manutenção for de pequena monta — como troca de componente de fácil acesso e manuseio, conforme previsto no POP da plataforma — o procedimento fica autorizado em campo. Quando, entretanto, o serviço exigir desmontagem com ferramentas específicas, a equipe em campo fica proibida de executá-lo, devendo conduzir o equipamento à oficina da empresa, onde profissional habilitado executará o serviço.</p>"}]}, {"num": "9", "title": "PROCEDIMENTOS OPERACIONAIS GERAIS", "sections": [{"num": "9.0", "title": "PROCEDIMENTOS OPERACIONAIS GERAIS", "html": "<p>Este capítulo estabelece a sequência geral de planejamento, execução e encerramento de uma missão, aplicável a qualquer equipamento da frota da XD4Solutions. O detalhamento técnico de cada etapa — checklist específico, parâmetros de desempenho, modos de operação — consta do POP da plataforma utilizada.</p>"}, {"num": "9.1", "title": "Planejamento (Realizado no Escritório)", "html": "<p>Realizado em conjunto pelo Coordenador de Operações e pelos engenheiros responsáveis pela redação do relatório de inspeção, conforme o procedimento PR-OPE-007 do SGQ;</p><p>Solicitação das autorizações aplicáveis, quando o equipamento for um sistema aéreo (NOTAM, SARPAS) ou quando exigidas pelo cliente para outros tipos de equipamento;</p><p>Conferência da vigência do contrato de seguro do equipamento. Toda operação de sistema aéreo não tripulado de uso não recreativo com peso máximo de decolagem superior a 250 g deve possuir seguro com cobertura de danos a terceiros; para outros equipamentos, aplica-se a política de seguros vigente da empresa.</p>"}, {"num": "9.2", "title": "Planejamento da Missão (Conferido e Atualizado no Local da Operação)", "html": "<p>Ao chegar ao local da missão, o Operador 1 e o Operador 2 devem conferir in loco todas as informações apresentadas na Avaliação de Risco e nos planejamentos do Coordenador de Operações. Havendo inconsistência, o Operador 1 deve retificar o planejamento e, se necessário, contatar o Coordenador de Operações para informar as mudanças requeridas;</p><p>Deve ser dada atenção especial a obstáculos, presença de pessoas não anuentes, condições ambientais (meteorológicas, no caso de sistemas aéreos; de terreno e piso, no caso de robôs terrestres), iluminação natural ou artificial, pontos de interesse da inspeção e locais onde o enlace de controle possa ficar deficiente, entre outros aspectos;</p><p>Em nenhuma hipótese o equipamento pode operar a menos de 30 m horizontais de pessoas não envolvidas e não anuentes, salvo quando houver barreira mecânica suficientemente forte para isolá-las e protegê-las na eventualidade de um acidente, ou parâmetro distinto previsto no POP da plataforma;</p><p>A operação somente pode ser iniciada quando, considerando as condições ambientais conhecidas, houver autonomia suficiente para realizar a missão e concluí-la com segurança no local previsto;</p><p>O planejamento de missões com sistemas aéreos em área externa deve considerar as informações meteorológicas emitidas por agências especializadas para localidades próximas ao local da operação. Quando não houver informação disponível para a localidade, o Operador 1 é responsável por obtê-la da melhor forma possível;</p><p>Para operações em linha de visada e até 400 ft de altura, o Operador 1 pode utilizar informações baseadas em suas próprias observações. Para missões realizadas em Unidades Marítimas (UM), o planejamento deve considerar as condições meteorológicas informadas pela própria unidade;</p><p>O acompanhamento das condições ambientais relevantes ao equipamento deve ser constante durante todo o dia de operação;</p><p>Verificar o Diário de Operação e Manutenção do equipamento quanto à existência de condições que exijam cuidados adicionais;</p><p>Realizar a inspeção pré-missão do equipamento conforme o POP da plataforma;</p><p>Verificar se os sensores previstos para a missão foram instalados conforme planejado e funcionam corretamente;</p><p>Verificar as condições técnicas do equipamento para a missão programada, conforme o POP aplicável. O Operador 1 é responsável pela verificação dessas condições e deve descontinuar a missão, assim que possível, ao identificar problema mecânico, elétrico ou estrutural que comprometa a segurança da operação;</p><p>Quando o equipamento for um sistema aéreo (RPA Classe 3, em VLOS ou EVLOS, até 400 ft AGL), verificar a posse de todos os documentos obrigatórios perante a ANAC: comprovação de cadastro junto à ANAC e respectiva identificação no equipamento; seguro com cobertura de danos a terceiros; avaliação de risco conforme o regulamento aplicável; e manual de voo;</p><p>Quando aplicável a sistemas aéreos, verificar a posse de todos os documentos obrigatórios perante o DECEA, o Ministério da Defesa e a ANATEL;</p><p>Assegurar-se de que o responsável pela área emitiu a permissão de trabalho compatível e providenciou o isolamento da área;</p><p>Conferir o uso correto de todos os equipamentos de proteção individual;</p><p>Verificar a disponibilidade das facilidades de apoio à missão (iluminação, equipamentos de comunicação, extensão de alcance de sinal, diagramas dos planos de inspeção, entre outros).</p>"}, {"num": "9.3", "title": "Durante a Operação", "html": "<p>O Operador 1 é diretamente responsável pela condução segura do equipamento e pelas consequências dela advindas, detendo a autoridade final sobre a operação. Não pode, em consequência, delegar a responsabilidade pelo desempenho, pelo cumprimento das rotas de inspeção, pela vigilância do entorno operacional e pelo acompanhamento da autonomia e da integridade do enlace de controle;</p><p>É necessária a presença de um Operador 1 em todas as fases da missão, admitida sua substituição durante a operação, desde que exista, em todo momento, um operador habilitado em condições de atuar nos comandos do equipamento;</p><p>Cada Operador 1 pode operar apenas um equipamento por vez;</p><p>Mesmo em modo automático ou assistido, o operador deve manter-se em condições de intervir a qualquer momento, conforme previsto no POP da plataforma;</p><p>Quando o equipamento for um sistema aéreo, o operador deve cumprir as regras de tráfego aéreo do DECEA, em especial quanto às alturas previstas para o voo e às áreas a serem evitadas;</p><p>Não é autorizada a realização de missões em locais não analisados e aprovados previamente pelo Coordenador de Operações, ou que não constem do Plano de Inspeção recebido pelo Operador 1 antes do início da missão;</p><p>Em missões com sistemas aéreos realizadas em área externa, o operador deve dispor de transceptor VHF em funcionamento, para comunicação bilateral com os órgãos de controle de tráfego aéreo quando a situação exigir, mantendo escuta permanente na frequência apropriada;</p><p>O consumo de energia/autonomia do equipamento deve ser monitorado por meio das indicações da estação de controle, conforme parâmetros do POP da plataforma;</p><p>Sempre que houver mais de um equipamento na mesma área, medidas de separação operacional devem ser combinadas entre os envolvidos, evitando-se conflitos e prejuízo à segurança — situação que, sempre que possível, deve ser evitada;</p><p>Após cada missão, deve-se avaliar se os objetivos foram atingidos, conferir se todos os pontos de interesse foram corretamente identificados e os registros correspondentes realizados, e reavaliar o andamento da missão em relação ao planejado;</p><p>Os dados constantes dos cartões de memória ou sistemas de armazenamento do equipamento não devem ser apagados pelos operadores antes do download para o local de arquivo definitivo, a ser realizado no mesmo dia.</p>"}, {"num": "9.4", "title": "Após o Término da Missão", "html": "<p>Informar ao Coordenador de Operações eventuais problemas técnicos do equipamento, em especial os que exijam manutenção além da disponível no local da operação;</p><p>Informar ao Coordenador de Operações se as etapas previstas para o dia foram cumpridas ou se há necessidade de replanejamento;</p><p>Preparar o equipamento para o pernoite, conforme o POP da plataforma;</p><p>Recarregar as baterias conforme especificação do fabricante;</p><p>Conferir o lançamento de todos os detalhes no Diário de Operação e Manutenção após cada missão.</p>"}, {"num": "9.5", "title": "Requisitos de Áreas de Operação", "html": "<p>Deve ser evitada a operação em área alagada ou contaminada (lama, neve, poeira, detritos), salvo quando o POP da plataforma expressamente prever essa condição. Quando necessário, o operador deve providenciar a limpeza do equipamento antes de prosseguir a missão;</p><p>Quando empregado tapete ou outro dispositivo para delimitar a área de lançamento, decolagem, pouso ou implantação do equipamento, este deve estar bem fixado ao solo;</p><p>Em missões em espaços confinados, sempre que possível, o operador deve permanecer do lado de fora da estrutura, o mais próximo possível do ponto de acesso do equipamento, reduzindo a exposição da equipe ao espaço confinado e mantendo a integridade do enlace de controle;</p><p>Na escolha do local de operação em área externa, o operador deve considerar a condição do piso ou terreno, as trajetórias livres de obstáculos, as condições ambientais (vento, no caso de sistemas aéreos; inclinação e aderência do solo, no caso de robôs terrestres), a possibilidade de aparecimento de pessoas não anuentes e a redução de ruído, entre outros aspectos previstos no POP da plataforma;</p><p>Devem ser evitadas condições ambientais adversas que comprometam a estabilidade ou o desempenho do equipamento, conforme limites estabelecidos em seu POP.</p>"}, {"num": "9.6", "title": "Uso de Rádio Aeronáutico (Aplicável a Sistemas Aéreos)", "html": "<p>O uso de rádio aeronáutico é obrigatório para missões com sistemas aéreos acima de 120 m de altura do solo. Manter escuta de rádio é considerado o modo de segurança preferível para todas as missões aéreas; determinadas operações exigem escuta permanente e, em algumas circunstâncias, a realização de chamadas de rádio (operação offshore). Esta seção não se aplica a robôs terrestres ou a equipamentos não aéreos.</p><p>O Coordenador de Operações determina se o uso de rádio é exigido em determinada operação aérea. A pessoa designada para operar rádio aeronáutico deve possuir treinamento compatível com a tarefa. Para critérios e regras de comunicação aeronáutica, os Operadores 1 devem observar a ICA 100-12 (&quot;Regras do Ar&quot;) e a ICA 100-37 (&quot;Serviços de Tráfego Aéreo&quot;).</p>"}, {"num": "9.7", "title": "Limitações Operacionais", "html": "<p>As limitações de desempenho de cada equipamento — componente lateral máxima de vento, faixa de temperatura e altitude de operação, condições de piso ou terreno aceitáveis, entre outras — constam do POP da respectiva plataforma e das especificações do fabricante, devendo ser rigorosamente observadas.</p><p>Em condições ambientais que se aproximem dos limites especificados, os operadores devem considerar a possível redução de desempenho do equipamento (por exemplo, menor autonomia de bateria ou menor capacidade de tração) e adotar a postura mais conservadora prevista no POP da plataforma.</p>"}]}, {"num": "10", "title": "MEDIDAS DE SEGURANÇA E CONSIDERAÇÕES GERAIS", "sections": [{"num": "10.0", "title": "MEDIDAS DE SEGURANÇA E CONSIDERAÇÕES GERAIS", "html": ""}, {"num": "10.1", "title": "Colisões e Contatos Indesejados", "html": "<p>Colisões ou contatos indesejados podem ocorrer por mudanças inesperadas no ambiente de inspeção, mau funcionamento do equipamento, erro humano, interferência na comunicação, perda de monitoramento do equipamento ou interrupção inesperada da operação pelo operador.</p><p>Em razão da relevância do tema, é necessária atenção redobrada em todas as fases da missão, sendo a conscientização da equipe elemento essencial desse processo. O plano de missão deve prever trajetórias e modos de operação que reduzam as chances de colisão ou contato indesejado, sendo seu cumprimento obrigatório.</p><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b>Obstáculos, pessoas, animais, outros equipamentos e quaisquer outras fontes de risco à operação devem ser evitados com a maior brevidade e distância possível, observados os limites de tolerância a contato de cada plataforma, conforme respectivo POP (por exemplo, sistemas aéreos tolerantes a colisão, projetados para uso em ambientes confinados, ou robôs terrestres com proteções estruturais específicas).</div></div>"}, {"num": "10.2", "title": "Disciplina Operacional em Fases Críticas (\"Cabine Estéril\")", "html": "<p>O conceito de &quot;Cabine Estéril&quot;, difundido pela aviação comercial, é adotado pela XD4Solutions como princípio corporativo aplicável à operação de qualquer equipamento, devendo ser cumprido conforme segue:</p><p>Durante as fases críticas da missão, a comunicação entre os operadores e as ações por eles executadas restringem-se exclusivamente aos aspectos operacionais necessários à condução segura do equipamento;</p><p>Nenhum operador pode executar, e nenhum Operador 1 pode permitir, qualquer atividade durante as fases críticas da missão que possa desviar a atenção da equipe de suas obrigações ou interferir em seu desempenho apropriado;</p><p>Não são permitidas, durante as fases críticas da missão, conversação não essencial, comunicação com terceiros, preenchimento do Diário de Operação e Manutenção ou qualquer outra ação que desvie a atenção dos operadores;</p><p>A comunicação de terceiros com a equipe, quando necessária, deve ser realizada apenas pela pessoa responsável pela segurança do local inspecionado, respeitando-se os momentos críticos da missão, exceto em situações que afetem a segurança da operação ou das instalações;</p><p>Para os fins desta seção, as fases críticas da missão abrangem todas as operações desde o acionamento do equipamento até sua desenergização completa, independentemente de o equipamento estar parado ou pousado.</p>"}, {"num": "10.3", "title": "Operação de Equipamentos por Terceiros", "html": "<p>Nenhuma pessoa pode operar os controles dos equipamentos da empresa sem ter sido treinada e designada especificamente para o trabalho em andamento, na plataforma correspondente.</p>"}, {"num": "10.4", "title": "Operação de Frota Heterogênea", "html": "<p>A XD4Solutions opera frota heterogênea, composta por sistemas aéreos, robôs terrestres e equipamentos auxiliares. É permitido operar até dois tipos de equipamento no mesmo dia, restrição que não se aplica a giros de manutenção em solo. Diferentes modelos ou gerações de uma mesma família de equipamento (por exemplo, Elios 1 e Elios 2) são considerados tipos diferentes para efeito desta restrição.</p>"}, {"num": "10.5", "title": "Operações Internacionais", "html": "<p>As operações no exterior, com qualquer equipamento, são conduzidas de acordo com as regras vigentes no país de operação, sem prejuízo das demais regras próprias da XD4Solutions.</p>"}, {"num": "10.6", "title": "Ocorrência Anormal e Pane do Equipamento", "html": "<p>Ocorrências anormais são situações relacionadas à operação de qualquer equipamento que se afastam da normalidade e que podem servir de aprendizado para a empresa, prevenindo falhas futuras em eventos similares. São exemplos de ocorrência anormal:</p><p>Parada ou pouso brusco;</p><p>Operação em condições ambientais adversas não previstas no planejamento;</p><p>Impacto com dano ao equipamento;</p><p>Pane no equipamento não corrigível no local da operação;</p><p>Interferência na operação causada por equipamento eletromagnético;</p><p>Incidente envolvendo a saúde e a segurança de operadores ou de terceiros.</p><p>Toda ocorrência anormal deve ser reportada ao Coordenador de Operações. Quando exigir intervenção da manutenção, a discrepância deve também ser registrada no Diário de Operação e Manutenção.</p><p>A ausência de reporte de uma ocorrência anormal priva a empresa da oportunidade de aprender com o evento, comprometendo a segurança de todos; por essa razão, a falha de reporte é tratada como violação grave de conduta.</p><p>Em caso de ocorrência anormal na qual o equipamento apresente redução notória de capacidades, mau funcionamento, vibração, ruído anormal, oscilação ou outro defeito não corrigível pelo operador, a missão deve ser interrompida e o Coordenador de Operações contatado para orientação. Defeito que possa ser corrigido pelo operador no local deve ser solucionado de imediato, com teste operacional, se necessário, para confirmar a solução da pane.</p><p>A manutenção realizada em campo pelo operador, fora da oficina certificada, pode alterar significativamente alguma característica de desempenho do equipamento; por essa razão, o teste operacional subsequente exige precauções adicionais quanto à escolha da área de teste e ao afastamento de pessoas não envolvidas, antes do retorno à atividade normal.</p><p>Nenhum operador deve apagar os dados dos cartões de registro de missão antes de gravá-los em arquivo próprio. Eventos transitórios e de menor importância não configuram ocorrência anormal e podem ser desconsiderados.</p>"}, {"num": "10.7", "title": "Transporte de Artigos Perigosos", "html": "<p>Componentes de equipamentos robóticos podem ser classificados como artigos perigosos, apresentando risco significativo durante o transporte. Podem ser considerados artigos perigosos:</p><p>Baterias LiPo e células de combustível;</p><p>Motores de combustão interna;</p><p>Combustíveis, produtos químicos e seus recipientes e dispensadores;</p><p>Materiais magnetizados.</p><p>É política da empresa realizar divulgação completa ao transportador antes da remessa de artigos perigosos. O Coordenador de Operações assegura o cumprimento das instruções do transportador quanto ao transporte e aos requisitos de embalagem aplicáveis a mercadorias perigosas.</p>"}]}, {"num": "11", "title": "EMERGÊNCIAS", "sections": [{"num": "11.0", "title": "EMERGÊNCIAS", "html": "<p>Os princípios deste capítulo são comuns a qualquer equipamento da frota da XD4Solutions. Os procedimentos de emergência detalhados e específicos de cada plataforma — sequência de ações de memória, parâmetros de acionamento, meios de recuperação — constam do POP correspondente, devendo ser de domínio do Operador 1 e do Operador 2 antes do início de qualquer missão com aquele equipamento.</p>"}, {"num": "11.1", "title": "Deveres do Operador 1", "html": "<p>Em caso de emergência, são deveres e obrigações do Operador 1:</p><p>Manter o controle do equipamento e executar as tarefas necessárias para fazer frente à emergência, conforme o POP da plataforma;</p><p>Definir os desvios do plano de missão ou os procedimentos necessários à manutenção da segurança da operação;</p><p>Informar aos demais integrantes do Time de Inspeção a natureza da emergência e os procedimentos a serem por eles adotados;</p><p>Caso o equipamento esteja em local de difícil acesso e não seja mais possível retomar a operação normal, executar o plano de recuperação do equipamento previsto no POP da plataforma.</p>"}, {"num": "11.2", "title": "Deveres do Operador 2", "html": "<p>Auxiliar o Operador 1 a trazer o equipamento de volta ao local de pouso ou parada, ou orientá-lo quanto ao local alternativo de emergência;</p><p>Auxiliar na execução do plano de recuperação do equipamento quando este estiver em local de difícil acesso.</p>"}, {"num": "11.3", "title": "Incapacitação de Algum Membro do Time de Inspeção", "html": "<p>Em situações que exigem concentração absoluta na condução do equipamento, é fundamental que os operadores estejam treinados para reconhecer e enfrentar a incapacitação súbita de um membro da equipe.</p><p>A incapacitação óbvia é de fácil identificação, em razão da perda total das funções cognitivas e motoras, geralmente súbita e causada por problemas cardíacos, eventos vasculares cerebrais ou desmaios.</p><p>A incapacitação sutil exige maior atenção para ser identificada: o companheiro pode parecer bem, mas ter perdido parte significativa de suas funções, podendo chegar à completa falta de resposta a estímulos.</p><p>A &quot;Regra das Duas Comunicações&quot; constitui o melhor recurso para identificar incapacitação sutil: quando um operador não responde adequadamente, por duas vezes, a uma instrução emitida ou a um item de checklist, deve-se suspeitar de incapacitação — geralmente associada a baixo padrão de desempenho, desvio dos procedimentos padronizados, verificação cruzada deficiente, erros frequentes (mesmo pequenos), irritabilidade infundada ou cansaço persistente.</p><p>O operador que perceber sinal de provável incapacitação no companheiro não deve hesitar em questioná-lo claramente (&quot;Está se sentindo bem?&quot;), oferecendo-se para assumir os comandos, caso já não os tenha assumido, ou interrompendo a missão na ausência de reação do companheiro.</p>"}, {"num": "11.4", "title": "Parada ou Pouso de Precaução", "html": "<p>Sempre que possível, a tripulação deve seguir os procedimentos do Checklist de Emergência do POP do equipamento em operação.</p><p>Mudanças no equipamento que gerem preocupação à tripulação — como aumento de vibração ou ruído desconhecido — sem outro alerta associado, mas que elevem o nível de alerta da equipe, devem levar à consideração de parada ou pouso no ponto disponível mais próximo.</p><p>Quando a parada ou o pouso de precaução ocorrer em área não previamente analisada, devem ser consideradas medidas para minimizar os riscos da escolha do local, incluindo:</p><p>Tamanho: suficiente para a parada ou o pouso;</p><p>Comunicação: informar a localização do equipamento ao representante do cliente responsável pela área;</p><p>Condições ambientais: para sistemas aéreos, determinar a direção do vento e considerar possível turbulência; para robôs terrestres, avaliar a inclinação e a estabilidade do terreno;</p><p>Perigo aviário e fauna: estar atento aos riscos relacionados a aves e fauna local;</p><p>Dano por objeto estranho (FOD): evitar áreas com pequenos objetos soltos que possam ser deslocados ou colidir com o equipamento;</p><p>Superfície: regular, nivelada e apta à parada ou ao pouso;</p><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b>Obstruções: identificadas, a fim de serem evitadas.</div></div><p>Quando a parada ou o pouso de precaução decorrer de funcionamento irregular do equipamento, este não deve retomar a operação até que inspeção seja realizada pelo Técnico de Manutenção, ou por este orientada e executada pela tripulação.</p>"}, {"num": "11.5", "title": "Plano de Terminação de Missão", "html": "<p>Os procedimentos de emergência de qualquer equipamento devem ser estabelecidos, na medida do possível, em consonância com os definidos para a aviação tripulada, quando aplicável (falha de comunicação, falhas mecânicas, entre outras). Em razão da singularidade da operação remota, entretanto, outras emergências não aplicáveis à aviação tripulada — como a perda do enlace de controle ou a pane na estação de controle remota — podem afetar diretamente a capacidade de gerenciamento da missão, exigindo procedimentos específicos e adicionais, como a capacidade de terminar a missão e o respectivo plano de terminação.</p><p>O Plano de Terminação de Missão deve ser estabelecido conforme a necessidade do ambiente e o perfil da operação, para minimizar a possibilidade de dano a pessoas e/ou propriedades. A terminação de missão é processo intencional e deliberado de interrupção controlada da operação, em resposta a situação anormal, devendo ser conduzida conforme o POP do equipamento.</p><p>Antes de iniciar a operação do equipamento, o operador deve consultar o plano de terminação de missão (quando aplicável), garantindo estar em condições de acioná-lo conforme estabelecido e coordenado com os demais elos da operação.</p>"}, {"num": "11.6", "title": "Fatores para Ativação de um Plano de Terminação de Missão", "html": "<p>Os seguintes fatores, comuns à generalidade dos equipamentos remotamente operados, podem indicar a necessidade de ativação do plano de terminação de missão:</p><p>Degradação do sistema de propulsão ou de locomoção por mau funcionamento de sistemas associados (elétricos, de navegação, de controle e gerenciamento da operação, software);</p><p>Falha do motor ou do sistema de locomoção, sem possibilidade de recuperação em operação;</p><p>Energia insuficiente para o regresso ou para alternativa segura;</p><p>Perda de controle das superfícies de comando ou dos atuadores (falha de servo);</p><p>Perda do sistema de controle automático da operação;</p><p>Falha do sistema de navegação ou de localização;</p><p>Perda do enlace de controle;</p><p>Perda do status do enlace de controle;</p><p>Interferência no enlace de controle;</p><p>Falha eletrônica;</p><p>Perda de energia na estação de controle remoto;</p><p>Choque com obstáculo ou outro equipamento.</p><p>Fatores específicos de sistemas aéreos — como perda de altitude, formação de gelo, combustível contaminado (em equipamentos a combustão) e falha de comunicação com órgãos ATC — constam do POP da respectiva plataforma e, quando aplicável, devem ser tratados conforme a Seção 9.6.</p><p>Os pontos de terminação de missão e os pontos de contingência devem ser definidos com base na performance do equipamento, considerando, conforme aplicável, falha de propulsão ou locomoção, condições ambientais, densidade demográfica e outros fatores, e devem ser localizados em áreas de menor risco, com base em estudo prévio do operador. Para sistemas aéreos, esses pontos são tradicionalmente designados &quot;crash sites&quot; e especificados em formato lat/long, com representação gráfica que facilite seu entendimento; para outros equipamentos, aplica-se a designação equivalente prevista no POP da plataforma.</p><p>Quando aplicável a sistemas aéreos, cada ponto de terminação de missão é considerado ponto de notificação compulsória, cabendo ao Operador 1 reportar o bloqueio ao órgão ATS. Cada ponto de terminação de missão deve ter procedimento específico descrito no respectivo plano.</p>"}, {"num": "11.7", "title": "Procedimentos Pós-Acidente/Incidente", "html": "<p>Toda pessoa que trabalhe sob a autoridade deste MGO deve relatar qualquer acidente, incidente ou ocorrência anormal ao Coordenador de Operações, qualquer que seja o equipamento envolvido. Determinados incidentes e acidentes relacionados a operações com sistemas aéreos devem também ser relatados à ANAC e/ou ao CENIPA, possibilitando a prevenção de eventos futuros de mesma natureza; a notificação à ANAC, quando aplicável, é de responsabilidade do Coordenador de Operações. Acidentes e incidentes envolvendo robôs terrestres ou outros equipamentos seguem os fluxos de notificação aplicáveis à segurança do trabalho e, quando pertinente, ao cliente contratante.</p><p>Em caso de reporte, o Coordenador de Operações e o operador devem adotar as medidas cabíveis para preservar registros de planejamento da missão, dados operacionais, telemetria e componentes do equipamento que possam ajudar a elucidar a causa do acidente ou incidente.</p>"}]}, {"num": "12", "title": "DOCUMENTOS COMPLEMENTARES E POPS ESPECÍFICOS", "sections": [{"num": "12.0", "title": "DOCUMENTOS COMPLEMENTARES E POPS ESPECÍFICOS", "html": "<p>Este Manual é complementado por Procedimentos Operacionais Padrão (POP) ou Manuais Operacionais específicos de cada plataforma ou família de equipamentos, que detalham os aspectos técnicos não tratados neste documento (limites de desempenho, modos de operação, checklists específicos, procedimentos de emergência detalhados e particularidades regulatórias do equipamento, quando houver).</p>"}, {"num": "12.1", "title": "Plataformas Vigentes e Respectivos POPs", "html": "<p>Esta tabela deve ser mantida atualizada pelo Coordenador de Operações sempre que uma nova plataforma for incorporada à frota ou um POP existente for revisado, conforme o fluxo do Capítulo 3.4.</p>"}, {"num": "12.2", "title": "Anexos e Formulários", "html": "<p>Constituem documentos complementares deste Manual os seguintes formulários e modelos padronizados, disponibilizados em seu formato oficial no repositório do SGQ:</p><p>Anexo A - Ficha de Avaliação de Risco Operacional;</p><p>Anexo B - Formulário de Briefing Operacional;</p><p>Anexo C - Diário de Operação e Manutenção (modelo geral, adaptável por plataforma conforme Seção 8.1);</p><p>Anexo D - Formulário de Registro de Ocorrência;</p><p>Anexo E - Formulário de Investigação de Acidente/Incidente;</p><p>FO-OPE-006 - Modelo de Ordem de Serviço;</p><p>FO-ADM-003 - Modelo de Memorando Operacional.</p>"}]}];</script>
<script>const POP_ELIOS2_CONTENT = [{"num": "1", "title": "OBJETIVO", "sections": [{"num": "1.0", "title": "OBJETIVO", "html": "<p>O presente Manual tem por objetivo estabelecer, de forma padronizada, disciplinada e auditável, os Procedimentos Operacionais Padrão (POP) da <strong>XD4Solutions</strong> aplicáveis às operações de inspeção industrial realizadas com o <strong>Sistema de Aeronave Remotamente Pilotada (RPAS) Flyability Elios 2</strong>, utilizado para inspeções visuais e instrumentadas de ativos industriais em ambientes confinados, reduzindo a necessidade de exposição de pessoas a áreas de risco.</p><p>Constituem objetivos específicos deste Manual:</p><ul>\n<li><p>Padronizar o planejamento, a execução e o encerramento das operações de inspeção realizadas com o RPAS Flyability Elios 2, reduzindo a variabilidade operacional entre equipes e missões;</p></li>\n<li><p>Fornece uma base documental consistente e auditável para clientes dos setores de mineração, siderurgia, óleo e gás, energia, infraestrutura e demais segmentos industriais;</p></li>\n</ul>"}, {"num": "1.1", "title": "Escopo e Aplicabilidade", "html": "<p>Este Manual aplica-se a todas as operações de inspeção industrial realizadas pela <strong>XD4Solutions</strong> com o <strong>Sistema de Aeronave Remotamente Pilotada (RPAS) Flyability Elios 2</strong>, em instalações próprias ou de clientes contratantes, destinadas à inspeção de ambientes confinados, incluindo, entre outros, vasos de pressão, tanques, silos, chaminés, galerias técnicas, túneis, dutos, caldeiras e estruturas metálicas de grande porte.</p>"}, {"num": "1.1.1", "title": "Aplicabilidade", "html": "<p>As disposições deste Manual são de cumprimento obrigatório por:</p><ul>\n<li><p>Coordenador de Operações, Líder de Operações e Diretor de Operações envolvidos no planejamento, autorização, supervisão e encerramento das operações;</p></li>\n<li><p>Todo o pessoal operacional habilitado a atuar como Operador 1 (Piloto em Comando) ou Operador 2 (Observador/Apoio) nas operações com o Flyability Elios 2;</p></li>\n<li><p>Responsáveis pela inspeção, manutenção e liberação operacional dos equipamentos RPAS;</p></li>\n<li><p>Prestadores de serviço e empresas subcontratadas que atuem sob a responsabilidade técnica e contratual da XD4Solutions, mediante ciência e adesão aos procedimentos estabelecidos neste Manual.</p></li>\n</ul>"}, {"num": "1.1.2", "title": "Exclusões", "html": "<p>Este Manual não se aplica a:</p><ul>\n<li><p>Operações realizadas com outros modelos de RPAS ou aeronaves remotamente pilotadas que não o Flyability Elios 2, as quais deverão seguir seus respectivos procedimentos operacionais;</p></li>\n<li><p>Operações em atmosferas potencialmente explosivas (Ex/ATEX) sem despressurização, purga e teste de atmosfera previamente realizados e documentados, conforme as restrições estabelecidas pelo fabricante;</p></li>\n<li><p>Operações que utilizem acessórios, cargas úteis, componentes ou modificações não homologados pela Flyability;</p></li>\n<li><p>Atividades de manutenção corretiva de nível de fábrica (Depot Level Maintenance), restritas ao fabricante ou a centros de manutenção por ele autorizados.</p></li>\n</ul>"}]}, {"num": "2", "title": "CARACTERÍSTICAS DO VEÍCULO", "sections": [{"num": "2.0", "title": "CARACTERÍSTICAS DO VEÍCULO", "html": "<p>Este capítulo apresenta as características técnicas do RPAS Flyability Elios 2 e das cargas úteis homologadas para o veículo.</p>"}, {"num": "2.1", "title": "Veículo Aéreo", "html": "<ul>\n<li><p>Aeronave Flyability Elios 2, configuração quadrirrotor envolta por gaiola de proteção (cage) tolerante a colisão, com mecanismo de motores reversíveis que permite recuperação de inversão (flip) sem queda;</p></li>\n</ul><ul>\n<li><p>Massa aproximada: até 1,45 kg em configuração padrão, incluindo bateria, payload integrado e gaiola de proteção. Os valores exatos devem ser confirmados na ficha técnica vigente do fabricante;</p></li>\n</ul><ul>\n<li><p>Dimensões aproximadas: envelope esférico de operação de até 40 cm de diâmetro;</p></li>\n</ul><ul>\n<li><p>Grau de proteção: equivalente a IP44 (não certificado, conforme especificação do fabricante); aeronave não é impermeável, sendo vedado o voo sob chuva forte, neve ou em ambientes encharcados;</p></li>\n</ul><ul>\n<li><p>Sensores de bordo: unidade de medição inercial (IMU), magnetômetro, barômetro e câmera de posicionamento inferior para estabilização sem sinal de GPS;</p></li>\n</ul><ul>\n<li><p>Sistema de estabilização sem sinal de GPS (GPS-free stabilization), baseado em IMU e câmera de posicionamento inferior, que mantém a aeronave estável em ambiente fechado sem gerar mapeamento tridimensional do ambiente;</p></li>\n</ul><ul>\n<li><p>Modos de voo disponíveis, conforme especificação do fabricante: ASSIST (modo estabilizado, recomendado para a generalidade das missões de inspeção) e SPORT (modo de maior agilidade, recomendado em condições de vento acima de 3 m/s ou quando necessário para preservar a segurança da missão, restrito a pilotos com proficiência comprovada).</p></li>\n</ul>"}, {"num": "2.2", "title": "Cargas Úteis (Payloads) Homologadas", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Carga Útil</th>\n<th>Finalidade</th>\n<th>Observações Operacionais</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Payload integrado de inspeção (câmera 4K + câmera térmica), fixo e não modular</td>\n<td>Inspeção visual em alta definição e termografia complementar</td>\n<td>Configuração padrão; pod de câmera basculante integrado e iluminação LED periférica</td>\n</tr>\n<tr>\n<td>Variante Elios 2 RAD</td>\n<td>Leitura de taxa de dose de radiação em tempo real durante o voo</td>\n<td>Variante de aeronave dedicada, com sensor de radiação integrado; não compatível com troca de payload em campo</td>\n</tr>\n<tr>\n<td>Variante Elios 2 GOV</td>\n<td>Configuração para uso governamental/segurança, com restrições adicionais de exportação e uso</td>\n<td>Variante de aeronave dedicada; disponibilidade sujeita a autorização e regulamentação de exportação aplicável</td>\n</tr>\n<tr>\n<td>Payloads não disponíveis</td>\n<td>Mapeamento LiDAR/3D e medição de espessura por ultrassom (UT) — exclusivos do Elios 3</td>\n<td>Não homologados nem compatíveis com o Elios 2; missões que exijam essas capacidades devem ser conduzidas com o Elios 3</td>\n</tr>\n</tbody>\n</table>"}]}, {"num": "3", "title": "CONFIGURAÇÃO PERMITIDA", "sections": [{"num": "3.0", "title": "CONFIGURAÇÃO PERMITIDA", "html": "<p>Este capítulo define os parâmetros de payload, firmware e modo de voo permitidos para a operação do Elios 2. A verificação prática desses parâmetros antes de cada missão está descrita no Capítulo 8 (Configuração do Veículo).</p>"}, {"num": "3.1", "title": "Seleção de Carga Útil", "html": "<p>O Elios 2 opera com payload integrado e fixo (câmera 4K e câmera térmica), não havendo seleção ou substituição de carga útil em campo. A definição da aeronave a ser empregada — configuração padrão, variante RAD ou variante GOV, conforme o objetivo de inspeção contratado — deve ocorrer na fase de planejamento da missão (MGO – Planejamento da Missão), sendo registrada no dossiê da missão.</p>"}, {"num": "3.2", "title": "Controle de Versão de Firmware e Software", "html": "<ul>\n<li><p>A aeronave, o controle remoto e o aplicativo de pilotagem devem operar com a versão de firmware/software estável mais recente homologada pela XD4Solutions, sendo vedado o uso de versões beta em missões operacionais comerciais ou industriais;</p></li>\n</ul><ul>\n<li><p>Toda atualização de firmware deve ser registrada no histórico de manutenção da aeronave (seção 12) e validada por voo de checagem em ambiente controlado antes de sua liberação para missão operacional;</p></li>\n</ul><ul>\n<li><p>Boletins de serviço e alertas de segurança emitidos pelo fabricante devem ser avaliados pelo responsável técnico pela manutenção da frota — função que pode ser exercida pelo Coordenador de Operações ou por operador habilitado, conforme a estrutura da XD4Solutions (MGO – Responsabilidades) — em até 5 (cinco) dias úteis de sua publicação, com aplicação imediata quando classificados como críticos para a segurança de voo.</p></li>\n</ul>"}, {"num": "3.3", "title": "Modos de Voo Permitidos", "html": "<p>O modo ASSIST deverá ser utilizado como configuração padrão em todas as operações com o RPAS Elios 2. A utilização dos modos ATTI ou SPORT é considerada excepcional e somente será permitida quando necessária para preservar a segurança operacional da missão ou mitigar riscos decorrentes das condições do ambiente de voo. Sempre que utilizados, os motivos deverão ser registrados no Relatório de Missão, sendo sua operação restrita a pilotos com treinamento e proficiência comprovados nesses modos de voo.</p>"}]}, {"num": "4", "title": "LIMITAÇÕES OPERACIONAIS", "sections": [{"num": "4.0", "title": "LIMITAÇÕES OPERACIONAIS", "html": "<p>As limitações operacionais estabelecidas neste capítulo são de observância mandatória e não podem ser flexibilizadas por conveniência comercial, prazo contratual ou solicitação do Cliente. A violação de qualquer limitação aqui descrita constitui não conformidade grave, sujeita a registro de ocorrência (MGO – Registro de Ocorrências).</p><div class=\"callout crit\"><div class=\"ci\">⚠</div><div><b>LIMITAÇÃO CRÍTICA DE SEGURANÇA - ATMOSFERAS EXPLOSIVAS</b>O RPAS Flyability Elios 2, em sua configuração padrão, não possui certificação para operação em atmosferas classificadas como explosivas (zonas Ex / ATEX). A operação em áreas potencialmente classificadas somente é permitida após despressurização, purga, isolamento e teste de atmosfera (gas-free) documentados pelo Cliente, comprovando a ausência de classificação de risco no momento da missão. É terminantemente proibida a operação em zonas Ex ativas.</div></div>"}, {"num": "4.1", "title": "Limites Ambientais", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Parâmetro</th>\n<th>Limite Operacional</th>\n<th>Observação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Temperatura ambiente</td>\n<td>0°C a 40°C (conforme procedimento operacional estabelecido pela XD4Solutions para garantir a segurança, a integridade do equipamento e a confiabilidade das operações)</td>\n<td>Fora desta faixa, consultar o Responsável Técnico de Manutenção antes da missão</td>\n</tr>\n<tr>\n<td>Umidade / Água</td>\n<td>Resistente a respingos (equivalente a IP44 na configuração padrão)</td>\n<td>Vedada a imersão ou exposição a jatos de água; ambientes encharcados requerem avaliação específica</td>\n</tr>\n<tr>\n<td>Poeira em suspensão</td>\n<td>Tolerável conforme grau IP44 do<br/>\npayload instalado</td>\n<td>Limpeza e inspeção pós-voo obrigatórias em ambientes de alta concentração de particulados (seção 11.1)</td>\n</tr>\n<tr>\n<td>Atmosfera explosiva (ATEX/Ex)</td>\n<td>NÃO PERMITIDA sem comprovação documental de área desclassificada</td>\n<td>Ver caixa de alerta crítico acima</td>\n</tr>\n<tr>\n<td>Visibilidade / Iluminação ambiente</td>\n<td>Sem requisito mínimo - aeronave possui iluminação LED própria</td>\n<td>Avaliar reflexos e neblina/fumaça residual que prejudiquem a câmera</td>\n</tr>\n</tbody>\n</table>"}, {"num": "4.2", "title": "Limites de Desempenho da Aeronave", "html": "<ul>\n<li><p>Autonomia de voo de referência: até aproximadamente 10 minutos por bateria, em condições ideais de voo; valores sempre confirmados conforme ficha técnica vigente do fabricante e condições reais de missão;</p></li>\n</ul><ul>\n<li><p>Reserva mínima obrigatória de bateria para acionamento do procedimento de retorno (RTH): conforme definido na seção 10.8, nunca inferior ao limiar mínimo estabelecido pelo fabricante;</p></li>\n</ul><ul>\n<li><p>Vida útil de hélices: até 10 horas de operação, com substituição preventiva conforme a seção 12;</p></li>\n</ul><ul>\n<li><p>Vida útil de bateria: até 50 ciclos de carga, com descarte/substituição conforme degradação identificada em inspeção (seção 12.3).</p></li>\n</ul>"}, {"num": "4.3", "title": "Limites de Enlace de Comunicação", "html": "<p>O alcance efetivo do enlace de comando e vídeo é fortemente influenciado pela presença de estruturas metálicas, espessura de paredes e geometria do ambiente confinado, não devendo ser assumido como constante entre diferentes locais de inspeção. A operação além do alcance confiável de sinal, sem uso de repetidor homologado, é proibida, e o Operador deve respeitar a função de retorno automático por perda de sinal de vídeo descrita na seção 10.6.</p>"}, {"num": "4.4", "title": "Restrições Operacionais Adicionais", "html": "<ul>\n<li><p>Vedada a operação fora dos critérios de habilitação e proficiência vigentes da equipe;</p></li>\n</ul><ul>\n<li><p>Vedada a operação sem briefing operacional documentado (MGO – Briefing Operacional) e checklist pré-missão concluído (seção 7.1);</p></li>\n</ul><ul>\n<li><p>Vedada a operação em desacordo com a Permissão de Trabalho (PT) e, quando aplicável, a Permissão de Entrada em Espaço Confinado (PET) emitidas pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Vedada a realização de contato físico deliberado com superfícies energizadas ou em movimento</p></li>\n</ul>"}, {"num": "4.5", "title": "Perigos Típicos das Operações em Ambiente Confinado", "html": "<ul>\n<li><p>Perda de enlace de comando/vídeo em ambiente metálico ou de geometria complexa;</p></li>\n</ul><ul>\n<li><p>Colisão com estrutura, resultando em dano ao equipamento ou queda de fragmentos;</p></li>\n</ul><ul>\n<li><p>Exaustão de bateria sem retorno tempestivo;</p></li>\n</ul><ul>\n<li><p>Atmosfera deficiente em oxigênio ou presença de gases tóxicos/inflamáveis no ambiente de apoio em solo;</p></li>\n</ul><ul>\n<li><p>Acesso não autorizado de terceiros à área de operação;</p></li>\n</ul><ul>\n<li><p>Interferência eletromagnética em ambientes industriais energizados;</p></li>\n</ul><ul>\n<li><p>Perda de referência espacial (desorientação) em ambientes labirínticos ou de baixa visibilidade;</p></li>\n</ul><ul>\n<li><p>Queda de objetos ou da própria aeronave sobre pessoas, processos ou equipamentos do Cliente.</p></li>\n</ul><p>A avaliação de risco específica de cada missão é formalizada no momento da Avaliação Pré-Missão (MGO – Planejamento da Missão) e revisitada no Briefing Operacional (MGO – Briefing Operacional), constituindo registro obrigatório do dossiê da missão.</p>"}]}, {"num": "5", "title": "EQUIPAMENTOS NECESSÁRIOS", "sections": [{"num": "5.0", "title": "EQUIPAMENTOS NECESSÁRIOS", "html": ""}, {"num": "5.1", "title": "Estação de Controle e Software", "html": "<ul>\n<li><p>Controle remoto dedicado e tablet/estação com aplicativo Cockpit do fabricante, exibindo vídeo em tempo real e telemetria de voo;</p></li>\n</ul><ul>\n<li><p>Software de processamento e relatório de dados (Inspector)</p></li>\n</ul><ul>\n<li><p>Quando aplicável, módulo de extensão de alcance (range extender) para ambientes de grande extensão linear (túneis, galerias).</p></li>\n</ul>"}, {"num": "5.2", "title": "Equipamentos de Apoio", "html": "<ul>\n<li><p>Baterias LiPo Smart Battery, com sistema inteligente de monitoramento de estado de carga (SOC) e proteções integradas contra sobrecarga, sobrecorrente, sobretensão e temperatura inadequada;</p></li>\n</ul><ul>\n<li><p>Carregadores balanceados homologados pelo fabricante;</p></li>\n</ul><ul>\n<li><p>Maleta de transporte rígida, compatível com normas de transporte aéreo (IATA), para acondicionamento da aeronave, baterias e acessórios;</p></li>\n</ul><ul>\n<li><p>Equipamentos de Proteção Individual (EPI) aplicáveis à atividade de apoio em solo, conforme avaliação de risco do local (MGO – Planejamento da Missão);</p></li>\n</ul><ul>\n<li><p>Equipamentos de detecção de gases multiparâmetro (quando aplicável ao ambiente de mineração, óleo e gás ou espaço confinado classificado), fornecidos e calibrados conforme procedimento do Cliente ou da XD4Solutions;</p></li>\n</ul><ul>\n<li><p>Iluminação portátil auxiliar, fita de isolamento de área, sinalização e demais itens de apoio logístico descritos no checklist da seção 7.1;</p></li>\n</ul><ul>\n<li><p>Cabo de segurança/retenção (quando aplicável à configuração de operação tethered) e ferramenta de recuperação (vara telescópica, gancho), conforme seção 10.12.</p></li>\n</ul>"}]}, {"num": "6", "title": "REQUISITOS DA EQUIPE", "sections": [{"num": "6.0", "title": "REQUISITOS DA EQUIPE", "html": "<p>Este capítulo estabelece a composição mínima da equipe operacional e os requisitos de qualificação específicos para a operação do RPAS Elios 2. As atribuições gerais de cada função constam do Manual Geral de Operações (MGO).</p>"}, {"num": "6.1", "title": "Composição Mínima da Equipe", "html": "<p>Toda missão operacional conduzida sob este Manual deve contar, no mínimo, com a seguinte composição de equipe, vedada a operação unipessoal:</p><ul>\n<li><p>1 (um) Operador 1 - Piloto em Comando, devidamente habilitado e com proficiência atualizada no veículo Elios 2;</p></li>\n</ul><ul>\n<li><p>1 (um) Operador 2 - Observador/Apoio, responsável por funções de vigilância, logística e segunda verificação independente;</p></li>\n</ul><ul>\n<li><p>Quando exigido pela avaliação de risco específica do local (MGO – Planejamento da Missão), supervisor de segurança do trabalho e/ou vigia de espaço confinado, fornecidos pela XD4Solutions ou pelo Cliente, conforme acordado contratualmente.</p></li>\n</ul>"}, {"num": "6.2", "title": "Qualificação do Operador 1 (Piloto em Comando)", "html": "<p>O Operador 1 deverá possuir treinamento específico para operação do Elios 2, demonstrar proficiência operacional e estar formalmente autorizado pela XD4Solutions para exercer a função de Piloto em Comando.</p>"}, {"num": "6.3", "title": "Qualificação do Operador 2", "html": "<p><strong>O Operador 2 deverá possuir a mesma qualificação técnica exigida para o Operador 1, incluindo treinamento, proficiência e capacidade de operar integralmente o RPAS Elios 2. A diferença entre as funções está exclusivamente na atribuição exercida durante a missão, e não na capacidade técnica de operação da aeronave.</strong></p>"}]}, {"num": "7", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "sections": [{"num": "7.0", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "html": ""}, {"num": "7.1", "title": "Checklist Pré-Missão", "html": "<p>O Checklist Pré-Missão consolida, em sequência padronizada, a verificação de documentação, equipamentos e condições ambientais antes da liberação da equipe para a fase de inspeção pré-voo (seção 7.2). Seu uso é obrigatório e deve ser conduzido em voz alta, em verificação cruzada entre Operador 1 e Operador 2.</p><table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Verificação</th>\n<th>Responsável</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>01</td>\n<td>Permissão de Trabalho (PT) válida e disponível</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>02</td>\n<td>Permissão de Entrada em Espaço Confinado (PEC), se aplicável</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>03</td>\n<td>Risk assessment da missão revisado e assinado</td>\n<td>Operador 1 / Operador 2</td>\n</tr>\n<tr>\n<td>04</td>\n<td>Briefing operacional realizado e registrado</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>05</td>\n<td>Teste de atmosfera (gas-free) realizado, se aplicável</td>\n<td>Operador 2 / Cliente</td>\n</tr>\n<tr>\n<td>06</td>\n<td>Isolamento/bloqueio (LOTO) de sistemas energizados confirmado</td>\n<td>Operador 2 / Cliente</td>\n</tr>\n<tr>\n<td>07</td>\n<td>Equipamentos de proteção individual (EPI) disponíveis e em uso</td>\n<td>Operador 1 / Operador 2</td>\n</tr>\n<tr>\n<td>08</td>\n<td>Área de operação isolada e sinalizada</td>\n<td>Operador 2</td>\n</tr>\n<tr>\n<td>09</td>\n<td>Equipamentos de comunicação testados e operacionais</td>\n<td>Operador 2</td>\n</tr>\n<tr>\n<td>10</td>\n<td>Aeronave, baterias e cargas úteis disponíveis e identificadas</td>\n<td>Operador 1</td>\n</tr>\n</tbody>\n</table><p>A conclusão satisfatória de todos os itens é pré-requisito para o início da Inspeção Pré-Voo descrita na seção 7.2. Qualquer item não conforme resulta em decisão No-Go até sua regularização.</p>"}, {"num": "7.2", "title": "Inspeção Pré-Voo", "html": "<p>A Inspeção Pré-Voo é a verificação física e funcional detalhada da aeronave, baterias, cargas úteis e estação de controle, conduzida pelo Operador 1 com verificação cruzada do Operador 2, imediatamente antes do lançamento.</p>"}, {"num": "7.2.1", "title": "Inspeção Física da Aeronave", "html": "<ul>\n<li><p>Integridade estrutural da gaiola de proteção (cage), sem deformações, fissuras ou elementos soltos;</p></li>\n</ul><ul>\n<li><p>Integridade e fixação das quatro hélices, sem trincas, lascas ou desgaste excessivo; verificação do tempo de uso acumulado em relação ao limite do seção 12;</p></li>\n</ul><ul>\n<li><p>Fixação correta da bateria no mecanismo de encaixe rápido (insert and lock), sem folgas;</p></li>\n</ul><ul>\n<li><p>Limpeza das lentes das câmeras (principal e térmica) e da câmera de posicionamento inferior;</p></li>\n</ul><ul>\n<li><p>Integridade dos arrays de iluminação LED periférica;</p></li>\n</ul><ul>\n<li><p>Ausência de sinais de dano por impacto, umidade ou contaminação de missão anterior não tratados em manutenção.</p></li>\n</ul>"}, {"num": "7.2.2", "title": "Verificação Funcional", "html": "<ul>\n<li><p>Inicialização da aeronave e verificação de autoteste de sistema (IMU, magnetômetro, barômetro, câmeras);</p></li>\n</ul><ul>\n<li><p>Verificação do nível de carga da bateria e correspondência com o planejamento de autonomia da missão (seções 3 e 10.8);</p></li>\n</ul><ul>\n<li><p>Verificação do enlace de comando e vídeo entre a aeronave e a estação de controle, incluindo qualidade de imagem e latência;</p></li>\n</ul><ul>\n<li><p>Teste de resposta dos motores e do sistema de estabilização em ambiente controlado (quando aplicável, breve voo estacionário de checagem antes do ingresso no ambiente confinado);</p></li>\n</ul><ul>\n<li><p>Verificação da calibração de bússola/magnetômetro quando indicado pelo sistema ou após transporte/troca de ambiente eletromagnético;</p></li>\n</ul><ul>\n<li><p>Confirmação da versão de firmware instalada, conforme seção 3.2.</p></li>\n</ul>"}, {"num": "7.2.3", "title": "Critério de Aceitação", "html": "<p>A aeronave somente é liberada para voo quando todos os itens de inspeção física e funcional forem aprovados, sem exceções. A identificação de qualquer não conformidade resulta na suspensão do lançamento até resolução ou substituição do componente afetado, com registro no histórico de manutenção (seção 12).</p>"}]}, {"num": "8", "title": "CONFIGURAÇÃO DO VEÍCULO", "sections": [{"num": "8.0", "title": "CONFIGURAÇÃO DO VEÍCULO", "html": "<p>Antes de cada missão, o Operador 1 deve confirmar, com verificação cruzada do Operador 2, que a aeronave está fisicamente configurada conforme os parâmetros definidos no Capítulo 3 (Configuração Permitida): payload correto instalado, versão de firmware homologada ativa e modo de voo padrão (ASSIST) selecionado.</p>"}, {"num": "8.1", "title": "Configuração de Gravação e Telemetria", "html": "<ul>\n<li><p>Gravação de vídeo de bordo habilitada em todas as missões, em resolução máxima homologada para o objetivo de inspeção;</p></li>\n</ul><ul>\n<li><p>Registro de telemetria de voo (trajetória, autonomia, eventos de sistema) habilitado e armazenado conforme MGO – Armazenamento das Informações;</p></li>\n</ul><ul>\n<li><p>Sincronização de relógio dos dispositivos de campo (controle, tablet) para garantir a correlação cronológica entre vídeo, telemetria e registros de ocorrência.</p></li>\n</ul>"}]}, {"num": "9", "title": "PROCEDIMENTO OPERACIONAL", "sections": [{"num": "9.0", "title": "PROCEDIMENTO OPERACIONAL", "html": "<p>Este capítulo descreve a sequência padronizada de execução da missão com o Elios 2 em condições nominais de operação, do lançamento ao encerramento da fase de voo.</p>"}, {"num": "9.1", "title": "Inicialização", "html": "<ul>\n<li><p>Confirmação verbal de \"PRONTO PARA LANÇAMENTO\" entre Operador 1 e Operador 2;</p></li>\n</ul><ul>\n<li><p>Decolagem em modo ASSIST, em área livre de obstáculos imediatos, com estabilização em voo pairado (hover) antes do deslocamento para o ponto de ingresso no ambiente confinado;</p></li>\n</ul><ul>\n<li><p>Verificação de resposta normal de comandos e estabilidade antes do ingresso na estrutura.</p></li>\n</ul><ul>\n<li><p>Remoção ou sinalização de obstáculos, materiais soltos ou substâncias que possam ser projetadas pelo fluxo de ar dos rotores;</p></li>\n</ul>"}, {"num": "9.2", "title": "Operação", "html": "<p>Este capítulo estabelece os princípios gerais aplicáveis a toda operação realizada dentro de espaços confinados, na acepção da NR-33, complementando as orientações específicas por tipologia de ativo descritas na seção 9.5.</p><p>O emprego do RPAS Elios 2 pela XD4Solutions tem por finalidade primária eliminar ou reduzir substancialmente a necessidade de entrada humana em espaço confinado para fins de inspeção visual e instrumentada, mitigando os riscos inerentes à exposição humana descritos na NR-33 (deficiência de oxigênio, atmosfera tóxica ou explosiva, isolamento e dificuldade de resgate).</p><ul>\n<li><p>Deslocamento até o ponto de interesse conforme rota planejada no briefing, observando-se distância segura de superfícies e obstáculos;</p></li>\n</ul><ul>\n<li><p>Execução do padrão de inspeção definido (varredura, aproximação pontual, sobrevoo de trajeto linear), conforme objetivo contratado;</p></li>\n</ul><ul>\n<li><p>Comunicação periódica de status entre Operador 1 e Operador 2, conforme a fraseologia padronizada (MGO);</p></li>\n</ul><ul>\n<li><p>Captação de imagens, vídeos e dados de sensores conforme escopo de inspeção, com anotação de pontos de interesse relevantes em tempo real.</p></li>\n</ul>"}, {"num": "9.3", "title": "Monitoramento", "html": "<ul>\n<li><p>Monitoramento contínuo, pelo Operador 1, dos parâmetros de autonomia de bateria, qualidade de enlace e integridade de sistemas;</p></li>\n</ul>"}, {"num": "9.3.1", "title": "Particularidades de Navegação em Ambiente Fechado", "html": "<ul>\n<li><p>Ausência de sinal de GPS: a estabilização depende do sistema embarcado baseado em IMU e câmera de posicionamento inferior, sem geração de mapa tridimensional do ambiente nem referência de retorno por trajetória mapeada, cabendo integralmente ao piloto a orientação espacial e a memorização da rota percorrida;</p></li>\n</ul><ul>\n<li><p>Atenuação progressiva do enlace de comunicação à medida que a aeronave se afasta da abertura de acesso e se interpõem obstáculos metálicos;</p></li>\n</ul><ul>\n<li><p>Reverberação acústica e visual (reflexos) que podem dificultar a avaliação de distância pelo piloto, exigindo maior dependência dos sensores de distância da aeronave;</p></li>\n</ul><ul>\n<li><p>Possibilidade de turbulência induzida pelo próprio fluxo de ar dos rotores em espaços de seção reduzida (efeito de proximidade de parede).</p></li>\n</ul>"}, {"num": "9.3.2", "title": "Coordenação com o Vigia de Espaço Confinado", "html": "<p>Quando a atividade de apoio em solo exigir a presença de vigia de espaço confinado (watchperson) designado pelo Cliente, a equipe operacional do RPAS deve manter comunicação constante com este profissional, informando o andamento da missão e respeitando sua autoridade para interromper a atividade em caso de identificação de risco à integridade física de qualquer pessoa presente.</p>"}, {"num": "9.4", "title": "Encerramento", "html": "<ul>\n<li><p>Início do retorno ao ponto de lançamento com margem de bateria suficiente, conforme seção 10.8;</p></li>\n</ul><ul>\n<li><p>Comunicação \"RETORNANDO\" ao Operador 2;</p></li>\n</ul><ul>\n<li><p>Aterrissagem controlada em área livre e previamente identificada;</p></li>\n</ul><ul>\n<li><p>Comunicação \"MISSÃO CONCLUÍDA\" ao término da fase de voo, iniciando-se os procedim
