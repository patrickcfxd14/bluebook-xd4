4", "title": "LIMITAÇÕES OPERACIONAIS", "sections": [{"num": "4.0", "title": "LIMITAÇÕES OPERACIONAIS", "html": ""}, {"num": "4.1", "title": "Limites Ambientais", "html": "<ul>\n<li><p>Faixa de temperatura de operação: conforme especificação do fabricante (referência geral: 0°C a 40°C);</p></li>\n<li><p>Piso/terreno: piso plano, rampas de até 40° de inclinação e degraus/desníveis de até aproximadamente 16 cm são tolerados, conforme homologação do controlador de locomoção; terrenos irregulares, cascalho e grama são tolerados em velocidade reduzida;</p></li>\n<li><p>Vedada a operação em piso extremamente escorregadio (gelo, óleo derramado) sem avaliação prévia específica, ou em terreno com risco de afundamento;</p></li>\n<li><p>Vedada a operação sob chuva forte, neve ou em ambientes com poeira/névoa densa que comprometam a percepção dos sensores de navegação.</p></li>\n</ul>"}, {"num": "4.2", "title": "Limites de Desempenho do Robô", "html": "<ul>\n<li><p>Velocidade máxima de deslocamento: conforme especificação do modelo homologado (referência: até 5 m/s), devendo ser reduzida em ambientes com pessoas próximas ou em terrenos irregulares;</p></li>\n<li><p>Carga máxima transportada: conforme Seção 2.1, não devendo ser excedida sob qualquer circunstância, considerando-se o efeito da carga sobre a autonomia e a estabilidade do robô;</p></li>\n<li><p>Autonomia de bateria: conforme Seção 2.1, devendo ser considerada reserva operacional mínima de 20% de carga para retorno seguro e desligamento controlado;</p></li>\n<li><p>Inclinação e altura de obstáculo máximas toleradas: conforme especificação do fabricante e validação do controlador de locomoção homologado pela XD4Solutions.</p></li>\n</ul>"}, {"num": "4.3", "title": "Limites de Enlace de Comunicação", "html": "<ul>\n<li><p>A operação em modo assistido/teleoperado exige enlace de comunicação estável entre o controle remoto/aplicativo e o robô (Wi-Fi 6 ou Bluetooth 5.2, conforme configuração), com alcance de referência superior a 30 m em linha de visada;</p></li>\n<li><p>Perda do enlace de comunicação por período superior ao definido no procedimento de emergência (Seção 10.6) deve acionar o comportamento seguro programado (parada controlada, permanência em posição estável ou retorno ao último ponto de enlace confiável, conforme configuração homologada).</p></li>\n</ul>"}, {"num": "4.4", "title": "Restrições Operacionais Adicionais", "html": "<ul>\n<li><p>Vedada a operação do robô a menos de 30 m de pessoas não envolvidas e não anuentes com a operação, salvo quando houver barreira mecânica suficientemente forte para isolá-las e protegê-las, ou zona de exclusão específica definida na Avaliação de Risco da missão;</p></li>\n<li><p>Vedada a operação em áreas classificadas como potencialmente explosivas (Ex/ATEX);</p></li>\n<li><p>Vedado o transporte ou a manipulação de pessoas, animais ou cargas não homologadas pelo fabricante;</p></li>\n<li><p>Vedada a operação sem a presença constante do Operador 1 em condições de intervir, mesmo em modo autônomo supervisionado.</p></li>\n</ul>"}, {"num": "4.5", "title": "Perigos Típicos das Operações com Robôs Quadrúpedes", "html": "<ul>\n<li><p>Perda de estabilidade ou tombamento do robô em terreno irregular, escorregadio ou com desnível superior ao homologado;</p></li>\n<li><p>Pontos de esmagamento e aprisionamento (pinch points) nas articulações das pernas, especialmente durante a inicialização, a calibração e os movimentos de locomoção;</p></li>\n<li><p>Contato indesejado com pessoas durante a locomoção em espaços compartilhados e de circulação, especialmente em velocidades mais altas;</p></li>\n<li><p>Riscos elétricos e térmicos associados à bateria de lítio, incluindo risco de incêndio em caso de dano físico, sobrecarga ou curto-circuito;</p></li>\n<li><p>Comportamento inesperado decorrente de falhas de percepção (sensores) ou de modelos de navegação autônoma baseados em IA, especialmente em ambientes não estruturados ou com iluminação deficiente;</p></li>\n<li><p>Colisão com obstáculos de baixa altura ou pouco visíveis, fora do campo de percepção efetivo do LiDAR.</p></li>\n</ul>"}]}, {"num": "5", "title": "EQUIPAMENTOS NECESSÁRIOS", "sections": [{"num": "5.0", "title": "EQUIPAMENTOS NECESSÁRIOS", "html": ""}, {"num": "5.1", "title": "Estação de Controle e Software", "html": "<ul>\n<li><p>Controle remoto dedicado, com botão físico de parada de emergência (E-Stop) sempre acessível ao Operador 1;</p></li>\n<li><p>Tablet/smartphone com aplicativo de controle do fabricante, exibindo telemetria de estado (bateria, temperatura dos motores, status de estabilidade) e vídeo da câmera embarcada;</p></li>\n<li><p>Software de planejamento e revisão de rotas autônomas, quando a missão empregar o modo autônomo supervisionado;</p></li>\n<li><p>Software de processamento e relatório de dados, para consolidação dos registros, mapas de nuvem de pontos e imagens coletados durante a missão.</p></li>\n</ul>"}, {"num": "5.2", "title": "Equipamentos de Apoio", "html": "<ul>\n<li><p>Maleta de transporte rígida, dimensionada para o robô e seus acessórios;</p></li>\n<li><p>Baterias reserva, carregador(es) homologado(s) (incluindo, quando aplicável, estação de recarga automática/pier de recarga) e maleta de transporte de baterias com proteção contra curto-circuito;</p></li>\n<li><p>Fita de demarcação, cones ou barreiras físicas para sinalização da zona de exclusão ao redor da área de operação;</p></li>\n<li><p>Kit de primeiros socorros e extintor de incêndio classe D ou específico para baterias de lítio, disponível no local da operação;</p></li>\n<li><p>Equipamentos de Proteção Individual (EPI) conforme a Avaliação de Risco da missão, incluindo calçado de segurança e, quando aplicável, luvas de proteção contra pontos de esmagamento.</p></li>\n</ul>"}]}, {"num": "6", "title": "REQUISITOS DA EQUIPE", "sections": [{"num": "6.0", "title": "REQUISITOS DA EQUIPE", "html": ""}, {"num": "6.1", "title": "Composição Mínima da Equipe", "html": "<p>A tripulação mínima para a operação do robô Unitree GO2 é composta por 1 (um) Operador 1 habilitado. A presença de um Operador 2 é recomendada em missões que envolvam navegação autônoma supervisionada, ambientes com maior fluxo de pessoas ou necessidade de monitoramento adicional da zona de exclusão.</p>"}, {"num": "6.2", "title": "Qualificação do Operador 1 (Responsável pela Operação)", "html": "<ul>\n<li><p>Certificado de habilitação técnica específica no robô Unitree GO2, emitido pela XD4Solutions ou por instrutor por ela credenciado;</p></li>\n<li><p>Conhecimento comprovado deste Manual, do manual do fabricante e dos procedimentos de emergência da Seção 10;</p></li>\n<li><p>Treinamento prático de recuperação de instabilidade, parada de emergência e desligamento controlado do equipamento;</p></li>\n<li><p>Atestado de Saúde Ocupacional (ASO) válido e, quando aplicável ao ambiente de operação, cursos de NR-12, NR-33, NR-35 ou NR-20.</p></li>\n</ul>"}, {"num": "6.3", "title": "Qualificação do Operador 2", "html": "<p>O profissional designado como Operador 2 deve possuir conhecimento básico do equipamento e dos procedimentos de segurança deste Manual, sendo responsável por auxiliar o Operador 1 na manutenção da zona de exclusão, no monitoramento de pessoas próximas e no registro de dados da missão.</p>"}]}, {"num": "7", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "sections": [{"num": "7.0", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "html": ""}, {"num": "7.1", "title": "Checklist Pré-Missão", "html": "<ul>\n<li><p>Verificação da Avaliação de Risco da missão e das condições ambientais do local, incluindo piso/terreno, iluminação e presença de pessoas não envolvidas;</p></li>\n<li><p>Verificação da carga da bateria principal e das baterias reserva;</p></li>\n<li><p>Verificação da vigência do seguro do equipamento e da documentação exigida pelo cliente;</p></li>\n<li><p>Definição da zona de exclusão e do posicionamento do Operador 1 e do Operador 2 durante a missão.</p></li>\n</ul>"}, {"num": "7.2", "title": "Inspeção Pré-Operação", "html": "<ul>\n<li><p>Verificação visual da integridade estrutural do chassi, das articulações das pernas, das coberturas de proteção e dos pés de apoio;</p></li>\n<li><p>Verificação de folgas anormais, ruídos ou resistência incomum nas articulações ao movimentá-las manualmente com o robô desenergizado;</p></li>\n<li><p>Limpeza das lentes da câmera e do sensor LiDAR;</p></li>\n<li><p>Verificação do encaixe correto da bateria e da ausência de danos físicos, inchaço ou vazamento.</p></li>\n</ul><ul>\n<li><p>Inicialização do robô e verificação do autoteste de sistema (IMU, articulações, sensores de força nos pés, câmera e LiDAR);</p></li>\n<li><p>Teste de amplitude de movimento das pernas e de resposta aos comandos em área livre de pessoas e obstáculos;</p></li>\n<li><p>Teste da função de parada de emergência (E-Stop físico e remoto) antes do início de cada missão;</p></li>\n<li><p>Verificação da qualidade do enlace de comunicação entre o controle remoto/aplicativo e o robô.</p></li>\n</ul>"}]}, {"num": "8", "title": "CONFIGURAÇÃO DO ROBÔ", "sections": [{"num": "8.0", "title": "CONFIGURAÇÃO DO ROBÔ", "html": ""}, {"num": "8.1", "title": "Inicialização", "html": "<ul>\n<li><p>A inicialização do robô deve ocorrer em área livre, com raio mínimo de segurança conforme a Avaliação de Risco, e com o robô apoiado em superfície plana e estável;</p></li>\n<li><p>Durante a sequência de inicialização e calibração, é vedada a aproximação de qualquer pessoa não envolvida na operação, em razão dos movimentos automáticos de calibração das articulações e da eventual transição para a posição em pé.</p></li>\n</ul>"}, {"num": "8.2", "title": "Configuração de Gravação e Telemetria", "html": "<ul>\n<li><p>Antes do início da missão, deve ser confirmada a configuração de gravação de vídeo, imagens, nuvem de pontos e telemetria de acordo com o objetivo da missão;</p></li>\n<li><p>Os parâmetros de navegação autônoma (quando aplicável) devem ser revisados e ajustados conforme as características do ambiente de operação, incluindo o mapa previamente construído, se houver.</p></li>\n</ul>"}]}, {"num": "9", "title": "PROCEDIMENTO OPERACIONAL", "sections": [{"num": "9.0", "title": "PROCEDIMENTO OPERACIONAL", "html": ""}, {"num": "9.1", "title": "Planejamento (Realizado no Escritório)", "html": "<p>Realizado em conjunto pelo Coordenador de Operações e pelos responsáveis técnicos pela missão, incluindo a definição do modo de operação (assistido ou autônomo supervisionado), da configuração de acessórios e das rotas a serem executadas.</p>"}, {"num": "9.2", "title": "Planejamento da Missão (Conferido e Atualizado no Local da Operação)", "html": "<ul>\n<li><p>Ao chegar ao local, o Operador 1 e o Operador 2 devem conferir in loco as condições de piso/terreno, iluminação, presença de pessoas não anuentes e obstáculos não previstos no planejamento;</p></li>\n<li><p>Em nenhuma hipótese o robô pode operar a menos de 30 m horizontais de pessoas não envolvidas e não anuentes, salvo barreira mecânica suficiente ou zona de exclusão fisicamente demarcada e sinalizada;</p></li>\n<li><p>A operação somente pode ser iniciada quando houver autonomia de bateria suficiente para realizar a missão e retornar com a reserva mínima estabelecida na Seção 4.2.</p></li>\n</ul>"}, {"num": "9.3", "title": "Ativação e Locomoção", "html": "<ul>\n<li><p>A ativação do robô e a transição para a posição em pé/marcha devem ocorrer com a zona de exclusão já demarcada e livre de pessoas não envolvidas;</p></li>\n<li><p>O Operador 1 deve manter, a todo momento, consciência situacional do entorno do robô, priorizando o afastamento de pessoas e obstáculos antes do início da locomoção em velocidade;</p></li>\n<li><p>Em modo autônomo supervisionado, o Operador 1 deve manter-se em condições de assumir o controle manual ou acionar a parada de emergência a qualquer instante.</p></li>\n</ul>"}, {"num": "9.4", "title": "Captura de Dados e Mapeamento", "html": "<ul>\n<li><p>As tarefas de mapeamento 3D e patrulhamento devem seguir a rota planejada, com velocidade ajustada às condições do terreno e à presença de pessoas;</p></li>\n<li><p>Movimentos próximos a pessoas autorizadas (colaborativas) devem observar velocidade reduzida, conforme os princípios de segurança colaborativa (ISO/TS 15066), quando aplicável à configuração do robô.</p></li>\n</ul>"}, {"num": "9.5", "title": "Avaliação em Diversos Cenários", "html": "<p>Galpões, linhas de produção e áreas de armazenagem com piso nivelado constituem cenário favorável de operação do Unitree GO2, devendo ainda assim ser respeitada a zona de exclusão em relação a colaboradores em atividade.</p><p>Aplicável a patrulhamento perimetral, inspeção de pátios e áreas externas, exigindo atenção redobrada a desníveis, vegetação, superfícies escorregadias e condições climáticas, conforme os limites da Seção 4.1.</p><p>Restrita a controladores de locomoção homologados para essa finalidade, mediante autorização específica do Coordenador de Operações e treinamento adicional do Operador 1, respeitando os limites de degrau/desnível da Seção 2.1.</p><p>Exige atenção redobrada à presença de público não familiarizado com o equipamento, recomendando-se zona de exclusão física (barreiras) mais conservadora do que a mínima regulamentar.</p><p>Rotas autônomas de patrulhamento devem ser previamente mapeadas e validadas em modo assistido antes da liberação para operação autônoma supervisionada, com pontos de verificação humana periódica definidos no plano de missão.</p>"}, {"num": "9.6", "title": "Após o Término da Missão", "html": "<ul>\n<li><p>Avaliar se os objetivos da missão foram atingidos e se todos os registros correspondentes foram realizados;</p></li>\n<li><p>Retornar o robô à posição sentada ou deitada de forma controlada, seguida de desenergização;</p></li>\n<li><p>Os dados armazenados na memória do robô não devem ser apagados pelos operadores antes do download para o local de arquivo definitivo, a ser realizado no mesmo dia.</p></li>\n</ul>"}]}, {"num": "10", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "sections": [{"num": "10.0", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "html": ""}, {"num": "10.1", "title": "Objetivo", "html": "<p>Estabelecer procedimentos padronizados para prevenção, mitigação, resposta e recuperação de incidentes, anormalidades e emergências ocorridas durante operações com o robô Unitree GO2.</p>"}, {"num": "10.2", "title": "Escopo", "html": "<p>Aplica-se a todas as operações realizadas com o robô Unitree GO2 pela XD4Solutions, complementando o Capítulo 11 do MGO (IT-OPE-003) quanto aos procedimentos específicos desta plataforma.</p>"}, {"num": "10.3", "title": "Classificação de Ocorrências", "html": "<ul>\n<li><p><strong>Nível 1 (Rotina)</strong>: pequenas correções de trajetória ou de apoio de pata corrigidas automaticamente pelo controlador; variações momentâneas de sinal sem perda de controle;</p></li>\n<li><p><strong>Nível 2 (Atenção)</strong>: alerta de temperatura elevada em motor/articulação; degradação da qualidade de imagem por poeira ou iluminação insuficiente; recuperação automática de escorregão (slip recovery) acionada;</p></li>\n<li><p><strong>Nível 3 (Emergência)</strong>: tombamento do robô sem recuperação automática; perda de comunicação além do limiar definido; contato indesejado com pessoa; princípio de incêndio na bateria.</p></li>\n</ul>"}, {"num": "10.4", "title": "Outras Ocorrências", "html": "<p>Ocorrências não enquadradas nos níveis acima, mas que se afastem da normalidade operacional, devem ser reportadas ao Coordenador de Operações e registradas no Diário de Operação e Manutenção, servindo de base para aprendizado organizacional.</p>"}, {"num": "10.5", "title": "Procedimentos de Emergência", "html": "<p>A segurança das pessoas prevalece sobre a integridade do equipamento em toda e qualquer situação de emergência. O Operador 1 deve priorizar o afastamento de pessoas da área de risco antes de qualquer tentativa de recuperação do robô.</p><ul>\n<li><p>Acionar a parada de emergência (E-Stop) ao primeiro sinal de comportamento não controlado do robô;</p></li>\n<li><p>Alertar verbalmente todas as pessoas próximas para afastamento imediato;</p></li>\n<li><p>Não se aproximar do robô tombado ou em movimento não controlado até a completa desenergização.</p></li>\n</ul><p>A missão deve ser abortada de imediato sempre que: houver tombamento não recuperado automaticamente; a bateria atingir o limiar crítico (Seção 10.8); houver perda de comunicação além do limiar definido; ou houver qualquer indício de dano estrutural, térmico ou elétrico ao equipamento.</p>"}, {"num": "10.6", "title": "Perda de Comunicação", "html": "<p>Permitir que a função automática de comportamento seguro por perda de sinal atue (parada controlada ou permanência em posição estável, conforme configuração homologada), monitorando visualmente o robô até o reestabelecimento do enlace ou a intervenção segura da equipe.</p><p>Posicionar a estação de controle em local com boa cobertura de sinal e, quando necessário, avaliar previamente a distância operacional em relação ao limite de alcance homologado (Seção 4.3).</p>"}, {"num": "10.7", "title": "Tombamento e Perda de Estabilidade", "html": "<p>Ao primeiro sinal de perda de estabilidade, o Operador 1 deve acionar a função de recuperação automática, quando disponível, ou a parada de emergência, mantendo todas as pessoas afastadas até a estabilização ou a completa desenergização do robô.</p><p>Após qualquer tombamento, ainda que recuperado automaticamente, o robô deve ser submetido a inspeção técnica detalhada antes de nova missão, verificando-se integridade estrutural, das articulações e dos sensores, conforme o Capítulo 12, sendo vedada a continuidade operacional sem essa verificação.</p>"}, {"num": "10.8", "title": "Baixa Bateria", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Nível de Bateria</th>\n<th>Ação Requerida</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>40%</td>\n<td>Alerta de atenção; planejar o encerramento da tarefa em andamento</td>\n</tr>\n<tr>\n<td>20%</td>\n<td>Iniciar retorno à base ou local seguro para desligamento</td>\n</tr>\n<tr>\n<td>10% (crítico)</td>\n<td>Acionamento obrigatório da parada controlada; vedada qualquer continuidade da missão</td>\n</tr>\n</tbody>\n</table><p>Interromper imediatamente a tarefa em andamento e conduzir o robô à posição sentada ou deitada de forma controlada, seguida de desenergização, evitando a parada descontrolada por exaustão total da bateria.</p>"}, {"num": "10.9", "title": "Falha de Sensores", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Sensor Afetado</th>\n<th>Impacto</th>\n<th>Ação Recomendada</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>IMU / Sensores de força nos pés</td>\n<td>Degradação do equilíbrio e da adaptação ao terreno</td>\n<td>Acionar parada controlada; não prosseguir a missão</td>\n</tr>\n<tr>\n<td>LiDAR</td>\n<td>Perda de percepção do ambiente e de capacidade de mapeamento</td>\n<td>Assumir controle manual com maior margem de segurança; reduzir velocidade</td>\n</tr>\n<tr>\n<td>Câmera</td>\n<td>Perda de qualidade dos dados coletados</td>\n<td>Continuar apenas locomoção básica, se demais sistemas nominais; reagendar coleta de imagem</td>\n</tr>\n</tbody>\n</table>"}, {"num": "10.10", "title": "Contato Indesejado com Pessoas ou Objetos", "html": "<p>Interromper de imediato a locomoção, acionar a parada de emergência quando necessário e verificar a condição da pessoa ou do objeto envolvido antes de qualquer continuidade da missão.</p><p>Todo contato indesejado, ainda que sem lesão aparente, deve ser registrado como ocorrência (MGO – Registro de Ocorrências) e investigado conforme os procedimentos corporativos de investigação de incidentes.</p>"}, {"num": "10.11", "title": "Falha Térmica ou Elétrica da Bateria", "html": "<p>Em caso de superaquecimento, deformação, odor anormal ou fumaça proveniente da bateria, desenergizar o robô imediatamente quando seguro fazê-lo, afastar todas as pessoas da área, isolar a bateria em local seguro e ventilado, e acionar o extintor apropriado (classe D ou específico para lítio) caso haja princípio de incêndio, comunicando de imediato o Coordenador de Operações.</p>"}, {"num": "10.12", "title": "Recuperação do Robô", "html": "<p>Ao final da missão, com o robô na posição sentada ou deitada e devidamente desenergizado, o Operador 2 procede à conferência visual e ao acondicionamento do equipamento na maleta de transporte.</p><p>Caso o robô permaneça tombado ou em posição de difícil acesso, avaliar a viabilidade de reaproximação segura somente após a confirmação de desenergização completa (visual e por telemetria, quando disponível), sendo vedada a manipulação do equipamento em movimento não controlado.</p><p>Toda situação de recuperação em contingência deve ser registrada como ocorrência (MGO – Registro de Ocorrências), com descrição das circunstâncias, do método de recuperação empregado e do tempo decorrido até a normalização.</p>"}]}, {"num": "11", "title": "PÓS-OPERAÇÃO", "sections": [{"num": "11.0", "title": "PÓS-OPERAÇÃO", "html": ""}, {"num": "11.1", "title": "Sequência Pós-Operação", "html": "<ul>\n<li><p>Desenergização do robô e remoção segura da bateria, observando-se o procedimento de manuseio da Seção 12.3;</p></li>\n<li><p>Inspeção visual pós-operação do robô, das articulações e dos sensores, identificando eventuais danos ou desgastes ocorridos durante a missão;</p></li>\n<li><p>Limpeza de componentes ópticos e remoção de particulados (poeira, resíduos) acumulados durante a operação;</p></li>\n<li><p>Acondicionamento do robô, das baterias e dos acessórios na maleta de transporte;</p></li>\n<li><p>Restituição da área operacional às condições originais, incluindo remoção de sinalização e isolamento temporário;</p></li>\n<li><p>Comunicação formal de encerramento da missão à supervisão do cliente, incluindo eventual entrega preliminar de status.</p></li>\n</ul>"}, {"num": "11.2", "title": "Download dos Dados", "html": "<p>O download dos dados coletados durante a missão (vídeo, imagens, nuvem de pontos e telemetria) deve seguir procedimento padronizado, garantindo a rastreabilidade e a integridade da informação desde a origem, sendo realizado preferencialmente ainda no local da missão ou no mesmo dia.</p>"}]}, {"num": "12", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "sections": [{"num": "12.0", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "html": ""}, {"num": "12.1", "title": "Programa de Manutenção", "html": "<p>A manutenção do robô Unitree GO2 segue o programa estabelecido pelo fabricante, complementado pelas rotinas de verificação da XD4Solutions, sendo de responsabilidade do Técnico de Manutenção o acompanhamento dos intervalos de revisão e da vida útil de componentes críticos (baterias, atuadores das articulações, pés/almofadas de apoio).</p>"}, {"num": "12.2", "title": "Manutenção Corretiva", "html": "<p>Discrepâncias identificadas em campo devem ser registradas no Diário de Operação e Manutenção. Serviços de pequena monta, como limpeza de sensores, substituição de almofadas de pé e ajustes externos, podem ser realizados em campo; serviços que exijam desmontagem de articulações ou acesso a componentes internos devem ser conduzidos exclusivamente por profissional habilitado, em oficina apropriada.</p>"}, {"num": "12.3", "title": "Baterias – Especificações e Cuidados", "html": "<ul>\n<li><p>As baterias devem ser armazenadas em local seco, ventilado e distante de fontes de calor, entre 0°C e 30°C;</p></li>\n<li><p>Não deixar a bateria descarregada por período prolongado; recarregar periodicamente mesmo quando o robô não estiver em uso, conforme especificação do fabricante;</p></li>\n<li><p>Baterias com sinais de dano físico, inchaço ou vazamento devem ser isoladas e descartadas conforme a legislação aplicável a resíduos de baterias de lítio, sendo vedado o uso continuado.</p></li>\n</ul>"}, {"num": "12.4", "title": "Controle de Versão de Firmware e Software", "html": "<p>Toda atualização de firmware ou software deve ser registrada, testada em ambiente controlado antes do emprego comercial e comunicada ao Coordenador de Operações, conforme a Seção 3.2.</p>"}]}, {"num": "13", "title": "REGISTROS OPERACIONAIS", "sections": [{"num": "13.0", "title": "REGISTROS OPERACIONAIS", "html": ""}, {"num": "13.1", "title": "Diário de Bordo", "html": "<p>Toda missão realizada com o robô Unitree GO2 deve ser registrada no Diário de Operação e Manutenção do equipamento, conforme o Capítulo 8 do MGO (IT-OPE-003), adaptado aos campos de identificação técnica do robô (modelo, número de série, fabricante).</p>"}, {"num": "13.2", "title": "Registro das Horas de Operação", "html": "<p>Devem ser registradas, para cada missão, as horas de operação, os ciclos de bateria utilizados, a distância percorrida e quaisquer ocorrências identificadas, servindo de base para o controle de vida útil de componentes críticos e para o planejamento da manutenção preventiva.</p>"}]}, {"num": "14", "title": "SUPLEMENTOS", "sections": [{"num": "14.0", "title": "SUPLEMENTOS", "html": "<p>Constituem suplementos técnicos deste POP a documentação do fabricante aplicável ao robô Unitree GO2 e os guias operacionais específicos por tipologia de ambiente. Os formulários corporativos de uso transversal a todos os equipamentos (avaliação de risco, briefing, diário de bordo, registro e investigação de ocorrências, permissão de trabalho, termo de adesão e indicadores operacionais) constam do Capítulo 12.2 do MGO.</p>"}, {"num": "14.1", "title": "Documentação do Fabricante Unitree", "html": "<ul>\n<li><p><strong>Unitree GO2 - User Manual</strong> (versão vigente);</p></li>\n<li><p><strong>Unitree GO2 - Technical Specifications</strong> (versão vigente);</p></li>\n<li><p><strong>Unitree GO2 SDK/ROS 2 - Developer Guide</strong> (versão vigente, quando aplicável à configuração EDU/EDU Plus);</p></li>\n<li><p><strong>Unitree GO2 – Battery Best Practices</strong>, boletins de serviço e alertas de segurança emitidos pelo fabricante.</p></li>\n</ul>"}, {"num": "14.2", "title": "Formulários Específicos do Unitree GO2", "html": "<ul>\n<li><p>Suplemento C – Checklist Pré-Missão e Pré-Operação (ver Seção 7.1);</p></li>\n<li><p>Suplemento G – Ficha de Controle de Manutenção do Robô;</p></li>\n<li><p>Suplemento H – Ficha de Controle de Baterias.</p></li>\n</ul><p><strong>FIM DO DOCUMENTO</strong></p><p><em>Este Manual de Procedimentos Operacionais Padrão é um documento vivo da XD4Solutions, sujeito a revisão contínua à luz da experiência operacional acumulada e das atualizações tecnológicas do robô Unitree GO2.</em></p>"}]}];</script>

/* index by id + parent map for breadcrumbs */
const BYID={}, PARENT={};
(function idx(nodes,parent){ nodes.forEach(n=>{ BYID[n.id]=n; PARENT[n.id]=parent; if(n.children) idx(n.children,n); }); })(TREE,null);
function crumbTrail(id){ const t=[]; let n=BYID[id]; while(n){ t.unshift(n); n=PARENT[n.id]; } return t; }
function stripHTML(s){ return s.replace(/<[^>]+>/g,''); }

/* ---------- ÁRVORE ---------- */
const treeRoot=document.getElementById('treeRoot');
function buildTree(nodes,depth=0){
  const frag=document.createDocumentFragment();
  nodes.forEach(n=>{
    const el=document.createElement('div');
    el.className='node'+(n.root?' root':'')+(n.children?'':'');
    if(n.pinned) el.classList.add('pinned');
    el.dataset.id=n.id;
    const hasKids=!!(n.children&&n.children.length);
    const row=document.createElement('div'); row.className='node-row'; row.dataset.id=n.id;
    row.innerHTML=`
      <span class="caret ${hasKids?'':'leaf'}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="9 6 15 12 9 18"/></svg></span>
      <span class="node-ic">${IC[n.icon]||IC.file}</span>
      <span class="node-lbl">${n.label}</span>
      ${n.badge?`<span class="node-badge">${n.badge}</span>`:''}
      <span class="node-st st-${n.status||'draft'}"></span>`;
    row.addEventListener('click',e=>{
      e.stopPropagation();
      const onCaret = e.target.closest('.caret');
      if(onCaret && hasKids){
        // clicar no caret apenas abre/fecha, sem navegar
        el.classList.toggle('open');
        return;
      }
      if(hasKids) el.classList.add('open'); // clicar no corpo abre e navega
      selectNode(n.id, true);
    });
    el.appendChild(row);
    if(hasKids){ const c=document.createElement('div'); c.className='children'; c.appendChild(buildTree(n.children,depth+1)); el.appendChild(c); }
    frag.appendChild(el);
  });
  return frag;
}
function renderTree(){ treeRoot.innerHTML=''; treeRoot.appendChild(buildTree(TREE)); }

function selectNode(id, fromRow){
  document.querySelectorAll('.node-row.active').forEach(r=>r.classList.remove('active'));
  const row=treeRoot.querySelector(`.node-row[data-id="${id}"]`);
  if(row){
    row.classList.add('active');
    // abre apenas os ANCESTRAIS para revelar o item, sem forçar o próprio nó
    const self=row.closest('.node');
    let p=self&&self.parentElement?self.parentElement.closest('.node'):null;
    while(p){ p.classList.add('open'); p=p.parentElement.closest('.node'); }
  }
  routeTo(id);
  if(window.innerWidth<=900) document.getElementById('tree').classList.remove('open');
}

const viewDoc=document.getElementById('viewDoc');
const content=document.getElementById('content');
function show(view){ [viewHome,viewDoc].forEach(v=>v.classList.remove('active')); view.classList.add('active'); content.scrollTop=0; }
function routeTo(id){
  const n=BYID[id]; if(!n) return;
  if(n.type==='home'){ renderHome(); show(viewHome); toggleSpy(false); return; }
  if(n.type==='org'){ renderOrg(); show(viewDoc); toggleSpy(false); return; }
  if(n.type==='mgo'){ renderMGO(); show(viewDoc); return; }
  if(n.type==='pop-elios2'){ renderPOPElios2(); show(viewDoc); return; }
  if(n.type==='pop-elios3'){ renderPOPElios3(); show(viewDoc); return; }
  if(n.type==='pop-g1'){ renderPOPG1(); show(viewDoc); return; }
  if(n.type==='pop-go2'){ renderPOPGO2(); show(viewDoc); return; }
  if(n.type==='vehicle'){ renderVehicle(n); show(viewDoc); toggleSpy(false); return; }
  if(n.type==='pdf'){ renderPDF(n); show(viewDoc); toggleSpy(false); return; }
  renderPlaceholder(n); show(viewDoc); toggleSpy(false);
}

const FAM_COLORS=['var(--xd4)','var(--blue)','var(--accent)','var(--ok)'];
function famCounts(){ return ORG_DOCS.families.map(f=>{
  const sub=f.groups?f.groups.reduce((a,g)=>a+g.items.length,0):0;
  return {code:f.code,title:f.title,n:f.items.length+sub}; }); }
function donutFamilies(){
  const fams=famCounts(); const total=fams.reduce((a,f)=>a+f.n,0)||1;
  const R=54,C=2*Math.PI*R; let off=0,arcs='';
  fams.forEach((f,i)=>{ const len=C*f.n/total; arcs+=`<circle cx="65" cy="65" r="${R}" fill="none" stroke="${FAM_COLORS[i%FAM_COLORS.length]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 65 65)"/>`; off+=len; });
  return `<svg class="donut" viewBox="0 0 130 130"><circle cx="65" cy="65" r="54" fill="none" stroke="var(--sky-line)" stroke-width="16"/>${arcs}<text x="65" y="61" text-anchor="middle" font-size="26" font-weight="600" fill="var(--ink)" font-family="IBM Plex Mono">${total}</text><text x="65" y="80" text-anchor="middle" font-size="10" fill="var(--ink-3)">documentos</text></svg>`;
}
function familyLegend(){ const fams=famCounts();
  return fams.map((f,i)=>`<div class="hl-row"><span class="d" style="background:${FAM_COLORS[i%FAM_COLORS.length]}"></span><span class="lbl">${f.title}</span><span class="v">${f.n}</span></div>`).join(''); }
function donut(c){
  const seg=[['ok',c.ok,'var(--ok)'],['warn',c.warn,'var(--warn)'],['draft',c.draft,'var(--draft)'],['crit',c.crit,'var(--crit)']].filter(s=>s[1]>0);
  const total=seg.reduce((a,s)=>a+s[1],0)||1; const R=54,C=2*Math.PI*R; let off=0; let arcs='';
  seg.forEach(s=>{ const len=C*s[1]/total; arcs+=`<circle cx="65" cy="65" r="${R}" fill="none" stroke="${s[2]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 65 65)"/>`; off+=len; });
  const pct=Math.round(100*c.ok/total);
  return `<svg class="donut" viewBox="0 0 130 130"><circle cx="65" cy="65" r="54" fill="none" stroke="var(--sky-line)" stroke-width="16"/>${arcs}<text x="65" y="61" text-anchor="middle" font-size="26" font-weight="600" fill="var(--ink)" font-family="IBM Plex Mono">${pct}%</text><text x="65" y="80" text-anchor="middle" font-size="10" fill="var(--ink-3)">vigente</text></svg>`;
}

function drawPeople(){
  const panel=document.getElementById('orgPanel');
  panel.innerHTML='<div class="chart">'+ORG_PEOPLE.tiers.map((tier,ti)=>{
    const multi=tier.length>1;
    const cards=tier.map(nd=>{
      const up=ti>0?'hasup':'';
      return `<div class="onode ${multi?up:''}">
        <div class="ocard lvl${nd.lvl||1}" onclick="peopleDetail('${nd.id}')">
          ${nd.count?`<span class="oc-count">${nd.count}</span>`:''}
          <div class="oc-ic">${IC[nd.icon]||IC.user}</div>
          <div class="oc-role">${nd.role}</div>
          <div class="oc-name">${nd.name}</div>
          <div class="oc-tag">${nd.tag||''}</div>
        </div></div>`;
    }).join('');
    let style='';
    if(multi){ const n=tier.length; const pct=100/(n*2); style=`style="--barL:${pct}%;--barR:${pct}%"`; }
    return `<div class="tier ${multi?'multi':''}" ${style}>${cards}</div>`;

}
window.peopleDetail=function(id){
  let nd=null; ORG_PEOPLE.tiers.forEach(t=>t.forEach(x=>{ if(x.id===id) nd=x; }));
  const d=document.getElementById('orgDetail'); if(!nd){ d.classList.remove('show'); return; }
  const resp=(nd.resp||[]).map(r=>`<li>${r}</li>`).join('');
  const link=nd.ref&&BYID[nd.ref]?`<div class="od-link" onclick="selectNode('${nd.ref}')">${IC.file} Abrir documento relacionado →</div>`:'';
  d.innerHTML=`
    <div class="od-head">

const stLabel={keep:'Vigente',drop:'Será removido',new:'A incluir'};
function drawDocs(){
  const panel=document.getElementById('orgPanel');
  const tops=ORG_DOCS.top;
  // topo: MGO + MGM lado a lado
  const tn=tops.length; const tpct=100/(tn*2);
  const topCards=tops.map(t=>`
     <div class="onode ${tn>1?'hasup':''}">
       <div class="ocard lvl0" onclick="selectNode('${t.ref}')">
         <div class="oc-ic">${IC[t.icon]}</div>
         <div class="oc-role">${t.role}</div>
         <div class="oc-name">${t.name}</div>
         <div class="oc-tag">${t.tag}</div>
       </div></div>`).join('');
  const topCard=`<div class="tier ${tn>1?'multi':''}" style="--barL:${tpct}%;--barR:${tpct}%">${topCards}</div>`;

  const renderItem=it=>{
    const clickable=it.ref&&BYID[it.ref];
    const codeHtml=it.code?`<span class="di-code">${it.code}</span>`:'';
    return `<div class="doc-item ${clickable?'link':''}" ${clickable?`onclick="selectNode('${it.ref}')"`:''}>
      <span class="di-dot"></span><span class="di-label">${it.label}</span>${codeHtml}
    </div>`;
  };

  // famílias em grid responsivo (não corta nas laterais; quebra em linhas)
  const cards=ORG_DOCS.families.map(f=>{
    const total=f.items.length+(f.groups?f.groups.reduce((a,g)=>a+g.items.length,0):0);
    const directItems=f.items.map(renderItem).join('');
    const groupBlocks=(f.groups||[]).map(g=>`
      <div class="doc-subgroup">
        <div class="dsg-head">${IC[g.icon]||''}<span>${g.label}</span></div>
        ${g.items.map(renderItem).join('')}
      </div>`).join('');
    return `<div class="fam-card">
        <div class="fam-head">
          <span class="fam-code">${f.code}</span>
          <span class="fam-title">${f.title}</span>
          <span class="fam-count">${total}</span>
        </div>
        <div class="fam-items">${directItems}${groupBlocks}</div>
      </div>`;
  }).join('');
  panel.innerHTML=`<div class="chart docs-chart">
    ${topCard}
    <div class="fam-connector"></div>
    <div class="fam-grid">${cards}</div>
  </div>`;
  document.getElementById('orgDetail').classList.remove('show');
}

function titleCase(s){
  if(s===s.toUpperCase()){ s=s.toLowerCase(); }
  // Capitaliza a 1a letra de cada palavra (respeita / e -), mantém siglas conhecidas
  const KEEP={mgo:'MGO',mgm:'MGM',pop:'POP',top:'TOP',ceo:'CEO',coo:'COO',cco:'CCO',epi:'EPI',anac:'ANAC',decea:'DECEA',anatel:'ANATEL',rpa:'RPA',rpas:'RPAS',uas:'UAS',nr:'NR',sgq:'SGQ',xd4solutions:'XD4Solutions',ica:'ICA',cenipa:'CENIPA',ppra:'PPRA',pcmso:'PCMSO'};
  return s.replace(/[\p{L}][\p{L}0-9]*/gu, w=>{
    const low=w.toLowerCase();
    if(KEEP[low]) return KEEP[low];
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  });
}

/* ---------- SCROLLSPY + PROGRESS ---------- */
const spyEl=()=>document.getElementById('spy');
function toggleSpy(on){ const s=spyEl(); if(s) s.classList.toggle('show',on); }
function buildSpy(){
  const s=spyEl(); if(!s) return;
  const secs=[...viewDoc.querySelectorAll('h2.sec')];
  s.innerHTML=secs.map(h=>`<a data-t="${h.id}" onclick="scrollToSec('${h.id}')">${h.textContent}</a>`).join('');
}
content.addEventListener('scroll',()=>{
  const max=content.scrollHeight-content.clientHeight;
  document.getElementById('progFill').style.width=(max>0?content.scrollTop/max*100:0)+'%';
  const s=spyEl(); if(!s||!s.classList.contains('show'))return;
  const secs=[...viewDoc.querySelectorAll('h2.sec')]; let cur=secs[0];
  secs.forEach(h=>{ if(h.getBoundingClientRect().top<140) cur=h; });
  s.querySelectorAll('a').forEach(a=>a.classList.toggle('active',cur&&a.dataset.t===cur.id));
});

/* ---------- BUSCA NA ÁRVORE ---------- */
document.getElementById('treeSearch').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  document.querySelectorAll('#treeRoot .node').forEach(el=>{
    const n=BYID[el.dataset.id]; if(!n)return;
    const hay=(stripHTML(n.label)+' '+(n.code||'')+' '+(n.badge||'')).toLowerCase();
    const match=!q||hay.includes(q);
    el.style.display=match||hasMatchingChild(n,q)?'':'none';
    if(q&&(match||hasMatchingChild(n,q)))el.classList.add('open');
  });
});
function hasMatchingChild(n,q){ if(!q||!n.children)return false;
  return n.children.some(c=>{ const hay=(stripHTML(c.label)+' '+(c.code||'')+' '+(c.badge||'')).toLowerCase(); return hay.includes(q)||hasMatchingChild(c,q); }); }

/* ---------- COMMAND PALETTE (Ctrl+K) ---------- */
const cmdkOverlay=document.getElementById('cmdkOverlay');
const cmdkInput=document.getElementById('cmdkInput');
const cmdkResults=document.getElementById('cmdkResults');
let cmdkSel=0, cmdkList=[];
function searchable(){ return Object.values(BYID).filter(n=>n.type!=='group'); }
function openCmdk(){ cmdkOverlay.classList.add('show'); cmdkInput.value=''; renderCmdk(''); cmdkInput.focus(); }
function closeCmdk(){ cmdkOverlay.classList.remove('show'); }
window.openCmdk=openCmdk;
function renderCmdk(q){
  q=q.toLowerCase();
  cmdkList=searchable().filter(n=>{ const hay=(stripHTML(n.label)+' '+(n.code||'')+' '+(n.badge||'')).toLowerCase(); return !q||hay.includes(q); }).slice(0,8);
  cmdkSel=0;
  if(!cmdkList.length){ cmdkResults.innerHTML='<div class="cmdk-empty">Nada encontrado.</div>'; return; }
  cmdkResults.innerHTML=cmdkList.map((n,i)=>`<div class="cmdk-item ${i===0?'sel':''}" data-i="${i}" onclick="cmdkGo(${i})"><div class="ci">${IC[n.icon]||IC.file}</div><div class="cl">${stripHTML(n.label)}<small>${n.code||stName[n.status]||''}</small></div>${n.code?`<span class="ck">${n.code}</span>`:''}</div>`).join('');
}
function cmdkGo(i){ const n=cmdkList[i]; if(n){ closeCmdk(); selectNode(n.id); } }
window.cmdkGo=cmdkGo;
cmdkInput.addEventListener('input',e=>renderCmdk(e.target.value));
cmdkInput.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'){e.preventDefault();cmdkSel=Math.min(cmdkSel+1,cmdkList.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();cmdkSel=Math.max(cmdkSel-1,0);}
  else if(e.key==='Enter'){e.preventDefault();cmdkGo(cmdkSel);return;}
  else return;
  cmdkResults.querySelectorAll('.cmdk-item').forEach((el,i)=>el.classList.toggle('sel',i===cmdkSel));
});
cmdkOverlay.addEventListener('click',e=>{ if(e.target===cmdkOverlay) closeCmdk(); });
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openCmdk(); }
  else if(e.key==='/'&&!/INPUT|TEXTAREA/.test(document.activeElement.tagName)){ e.preventDefault(); openCmdk(); }
  else if(e.key==='Escape'){ closeCmdk(); }
});

});

document.getElementById('brandHome').addEventListener('click',()=>selectNode('home'));

function tick(){ const d=new Date(); const t=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  const dt=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('clock').innerHTML=`<b>${t}</b><span>${dt}</span>`; }
tick(); setInterval(tick,1000*30);

/* ---------- AUTH GATE ---------- */
(function(){
  const AG_PASSWORD = 'xd4solutions';
  const AG_SESSION_KEY = 'xd4_bluebook_authed';
  const gate = document.getElementById('authGate');
  const logoImg = document.getElementById('agLogoSym');
  if(logoImg) logoImg.src = XD4_SYMBOL;

  function openApp(){ gate.classList.add('hidden'); }

  let authed = false;
  try { authed = sessionStorage.getItem(AG_SESSION_KEY) === '1'; } catch(e){}
  if(authed){ openApp(); }

  const form = document.getElementById('agForm');
  const input = document.getElementById('agPass');
  const errorEl = document.getElementById('agError');
  const card = document.querySelector('.ag-card');
  const eyeBtn = document.getElementById('agEye');

  eyeBtn.addEventListener('click', ()=>{
    input.type = input.type === 'password' ? 'text' : 'password';
  });

  form.addEventListener('submit', e=>{
    e.preventDefault();
    const val = (input.value||'').trim().toLowerCase();
    if(val === AG_PASSWORD){
      errorEl.classList.remove('show');
      try { sessionStorage.setItem(AG_SESSION_KEY,'1'); } catch(e){}
      openApp();
    } else {
      errorEl.classList.add('show');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
      input.value=''; input.focus();
    }
  });
})();
</script>
