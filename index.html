entos pós-voo (seção 11).</p></li>\n</ul>"}, {"num": "9.5", "title": "Avaliação em Diversos Cenários", "html": "<p>Esta seção complementa os procedimentos gerais de operação (seção 9.2) com orientações técnicas específicas por tipologia de ativo, a serem observadas pelo Operador 1 durante o planejamento e a execução da missão.</p>"}, {"num": "9.5.1", "title": "Operação em Estruturas Metálicas", "html": "<p>Estruturas metálicas de grande massa (vasos de pressão, dutos, estruturas de aço, equipamentos industriais) impõem desafios específicos de propagação de sinal de rádio e de interferência eletromagnética.</p><ul>\n<li><p>Avaliar, na fase de planejamento, a espessura e a continuidade das chapas metálicas ao longo da rota de voo planejada, considerando-as como fator redutor do alcance efetivo do enlace de comunicação;</p></li>\n</ul><ul>\n<li><p>Considerar a possível interferência de campos eletromagnéticos gerados por equipamentos energizados nas proximidades (motores, transformadores, painéis elétricos) sobre o magnetômetro da aeronave, podendo gerar leituras espúrias de orientação;</p></li>\n</ul><ul>\n<li><p>Estabelecer, sempre que possível, pontos de referência intermediários (aberturas, juntas, flanges) que sirvam de marco de orientação para o piloto e de verificação de continuidade de sinal;</p></li>\n</ul><ul>\n<li><p>Avaliar a utilização de módulo de extensão de alcance (range extender) posicionado em ponto intermediário de acesso, quando a extensão da estrutura comprometer o enlace direto.</p></li>\n</ul>"}, {"num": "9.5.2", "title": "Operação em Silos", "html": "<p>A inspeção de silos (armazenamento de granéis sólidos, minérios, grãos ou material particulado) apresenta riscos característicos de geometria vertical, acúmulo de poeira e, em determinados materiais, potencial de atmosfera explosiva por poeira combustível.</p><ul>\n<li><p>Avaliar, previamente, a classificação do material armazenado quanto ao potencial de geração de atmosfera explosiva por poeira (ex.: poeiras combustíveis em silos de grãos ou determinados minérios), aplicando-se a restrição crítica do seção 4 quando aplicável;</p></li>\n</ul><ul>\n<li><p>Considerar a verticalidade do ambiente no planejamento da rota de voo, com atenção redobrada à autonomia necessária para o retorno em caso de operação próxima ao fundo do silo;</p></li>\n</ul><ul>\n<li><p>Avaliar a possibilidade de acúmulo de poeira sobre a gaiola, hélices e sensores durante o voo, com inspeção e limpeza pós-voo obrigatórias (seção 11.1);</p></li>\n</ul><ul>\n<li><p>Observar o risco de afundamento ou deslizamento de material particulado caso haja necessidade de aproximação à superfície do material armazenado, mantendo distância de segurança definida na avaliação de risco;</p></li>\n</ul><ul>\n<li><p>Confirmar a desenergização e o isolamento de sistemas de alimentação/descarga (roscas, esteiras, válvulas de fundo) antes do início da operação, conforme LOTO do Cliente.</p></li>\n</ul>"}, {"num": "9.5.3", "title": "Operação em Chaminés", "html": "<p>Chaminés industriais apresentam geometria predominantemente vertical e cilíndrica, podendo conter resíduos de fuligem, correntes de convecção térmica residual e revestimentos refratários degradados.</p><ul>\n<li><p>Confirmar o desligamento e o arrefecimento adequado do processo associado à chaminé antes do início da operação, respeitando os limites de temperatura ambiente da aeronave estabelecidos no seção 4;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de correntes de ar ascendentes residuais (tiragem térmica), que podem afetar a estabilidade de voo mesmo após o desligamento do processo;</p></li>\n</ul><ul>\n<li><p>Considerar a deposição de fuligem e particulados sobre lentes e sensores, podendo degradar a qualidade de imagem durante a missão, exigindo limpeza intermediária quando viável;</p></li>\n</ul><ul>\n<li><p>Planejar a rota de voo em padrão espiral ou em varredura vertical, adequado à geometria cilíndrica, com pontos de referência fixos para orientação do piloto;</p></li>\n</ul><ul>\n<li><p>Avaliar a integridade do revestimento refratário interno, que pode apresentar fragmentos soltos ou superfícies irregulares representando risco adicional de colisão.</p></li>\n</ul>"}, {"num": "9.5.4", "title": "Operação em Tanques", "html": "<p>A inspeção de tanques de armazenamento (NR-13) exige atenção especial à presença de produto residual, vapores e à necessidade de preparação prévia do equipamento pelo Cliente.</p><ul>\n<li><p>Exigir, como pré-requisito, a comprovação documental de esvaziamento, limpeza e teste de atmosfera (gas-free) do tanque, conforme procedimento de preparação para entrada do Cliente, ainda que não haja entrada humana, em razão do risco de vapores residuais afetarem a operação;</p></li>\n</ul><ul>\n<li><p>Aplicar a restrição crítica de zona Ex/ATEX do seção 4 sempre que houver histórico de armazenamento de produtos inflamáveis, mesmo após esvaziamento, até comprovação formal de desclassificação da área;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de borras, lodo ou produto residual no fundo do tanque, que pode comprometer a estabilidade caso a aeronave necessite de pouso de emergência nessa região;</p></li>\n</ul><ul>\n<li><p>Planejar a rota considerando a existência de chicanas, serpentinas de aquecimento, flutuadores e outros elementos internos típicos de tanques de armazenamento, que reduzem o espaço de manobra disponível;</p></li>\n</ul><ul>\n<li><p>Avaliar a necessidade de ventilação forçada prévia, fornecida pelo Cliente, para dissipação de vapores residuais antes da abertura da boca de visita utilizada para o lançamento.</p></li>\n</ul>"}, {"num": "9.5.5", "title": "Operação em Galerias", "html": "<p>Galerias técnicas (passagens para cabos, tubulações ou acesso de manutenção) caracterizam-se por extensão linear considerável, seção transversal reduzida e, frequentemente, presença de instalações elétricas ou hidráulicas ativas.</p><ul>\n<li><p>Avaliar a extensão total da galeria em relação à autonomia de voo disponível e ao alcance do enlace de comunicação, planejando pontos de retorno intermediários quando necessário;</p></li>\n</ul><ul>\n<li><p>Observar a presença de cabos, bandejas e tubulações suspensas que reduzem o espaço de manobra vertical e lateral disponível para a aeronave;</p></li>\n</ul><ul>\n<li><p>Confirmar o status de energização de instalações elétricas presentes na galeria junto ao Cliente, evitando aproximação além da distância de segurança estabelecida na avaliação de risco;</p></li>\n</ul><ul>\n<li><p>Considerar a possibilidade de acúmulo de gases em pontos baixos ou de ventilação deficiente ao longo da extensão da galeria, especialmente em trechos sem comunicação direta com o exterior.</p></li>\n</ul>"}, {"num": "9.5.6", "title": "Operação em Túneis", "html": "<p>Túneis apresentam desafios similares aos das galerias, em escala ampliada, com extensões que podem superar significativamente o alcance nominal do enlace de comunicação da aeronave em configuração padrão.</p><ul>\n<li><p>Avaliar, previamente, a necessidade de posicionamento de módulo(s) de extensão de alcance (range extender) ao longo do túnel, de forma a manter o enlace de comando e vídeo dentro de parâmetros confiáveis;</p></li>\n</ul><ul>\n<li><p>Planejar a missão em segmentos, com retorno e troca de bateria entre trechos, quando a extensão total exceder a autonomia disponível em um único voo;</p></li>\n</ul><ul>\n<li><p>Avaliar condições de ventilação e a possível presença de gases (especialmente em túneis associados a atividades de mineração ou rodoviárias com tráfego de veículos a combustão), aplicando-se a restrição crítica de zona Ex quando pertinente;</p></li>\n</ul><ul>\n<li><p>Estabelecer, no briefing operacional, marcos de distância e tempo estimado de voo para cada segmento, permitindo o monitoramento objetivo da progressão da missão pelo Operador 2.</p></li>\n</ul>"}, {"num": "9.5.7", "title": "Operação em Mineração", "html": "<p>As operações em instalações de mineração apresentam combinação de riscos típicos de espaço confinado, atmosfera com poeira mineral e, em mineração subterrânea de carvão, potencial de atmosfera explosiva por gás metano.</p><ul>\n<li><p>Aplicar a restrição crítica do seção 4 com rigor reforçado em minas subterrâneas com histórico ou potencial de liberação de gás metano ou outros gases inflamáveis, sendo vedada a operação sem comprovação documental e monitoramento contínuo de atmosfera fornecido pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Coordenar a operação com a equipe de segurança e ventilação da mina, respeitando os protocolos específicos de entrada e permanência em áreas subterrâneas (incluindo, quando exigido, uso de detectores pessoais de gás pela equipe de apoio em solo);</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de poeira mineral em suspensão, que pode degradar a qualidade de imagem e exigir limpeza frequente dos componentes ópticos e sensores;</p></li>\n</ul><ul>\n<li><p>Observar a estabilidade estrutural de escavações, silos de minério, chutes e demais instalações típicas, considerando possível instabilidade geotécnica como fator de risco adicional à permanência da equipe de apoio em solo;</p></li>\n</ul><ul>\n<li><p>Respeitar os procedimentos de comunicação e sinalização específicos da mina, incluindo eventuais restrições de uso de equipamentos eletrônicos em áreas classificadas.</p></li>\n</ul>"}, {"num": "9.5.8", "title": "Operação em Siderurgia", "html": "<p>Instalações siderúrgicas (altos-fornos, fornos de fusão, lingotamento, laminação) combinam temperaturas elevadas, presença de escória, atmosferas com particulados metálicos e proximidade de processos térmicos intensos, regulados, no Brasil, pela NR-14.</p><ul>\n<li><p>Confirmar, junto ao Cliente, o desligamento e o arrefecimento do equipamento ou processo a ser inspecionado até temperatura compatível com o limite operacional da aeronave (seção 4), sendo vedada a operação em ambientes com temperatura superior ao limite do fabricante;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de resíduos de escória, poeira metálica e óxidos em suspensão, que podem se depositar sobre a aeronave e degradar sensores e superfícies ópticas, exigindo inspeção e limpeza pós-voo minuciosa (seção 11.1);</p></li>\n</ul><ul>\n<li><p>Observar a possível presença de campos eletromagnéticos intensos associados a fornos elétricos a arco ou de indução, com potencial de interferência sobre o magnetômetro e o enlace de comunicação;</p></li>\n</ul><ul>\n<li><p>Considerar a estabilidade térmica residual de estruturas metálicas recentemente desligadas, que pode gerar correntes de convecção e dilatação estrutural durante a inspeção;</p></li>\n</ul><ul>\n<li><p>Respeitar rigorosamente o isolamento (LOTO) de sistemas de movimentação de carga, pontes rolantes e demais equipamentos típicos da área siderúrgica.</p></li>\n</ul>"}, {"num": "9.5.9", "title": "Operação em Óleo e Gás", "html": "<p>As operações em instalações de óleo e gás (refinarias, terminais, plataformas, unidades de processamento) apresentam o mais elevado potencial de presença de atmosferas classificadas como explosivas (zonas Ex/ATEX), exigindo rigor procedimental máximo.</p><div class=\"callout crit\"><div class=\"ci\">⚠</div><div><b>ATENÇÃO - SETOR DE ÓLEO E GÁS</b>O veículo Flyability Elios 2, em sua configuração padrão, NÃO possui certificação ATEX e não deve ser operada em zonas classificadas como explosivas durante operação normal da planta. A liberação para inspeção somente é admissível após procedimento formal de despressurização, purga, isolamento e teste de atmosfera (gas-free) conduzido e documentado pelo Cliente, com a área formalmente desclassificada para a janela temporal da inspeção.</div></div><ul>\n<li><p>Exigir, como pré-requisito absoluto, a Permissão de Trabalho específica para atividades em área classificada (Permissão para Trabalho a Quente/Frio, conforme aplicável) e o certificado de teste de atmosfera (gas-free) emitido pelo Cliente, com validade vigente durante toda a operação;</p></li>\n</ul><ul>\n<li><p>Manter monitoramento contínuo de atmosfera durante toda a operação, mediante detector de gases fornecido pelo Cliente ou pela XD4Solutions, interrompendo imediatamente a missão em caso de detecção de gás inflamável ou tóxico acima dos limites de alarme estabelecidos;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de líquidos inflamáveis residuais em vasos, tanques ou tubulações, mesmo após esvaziamento, mantendo a postura conservadora prevista no seção 4;</p></li>\n</ul><ul>\n<li><p>Coordenar a operação com a equipe de segurança de processo da instalação, respeitando procedimentos de parada, isolamento e permissão específicos de cada unidade;</p></li>\n</ul><ul>\n<li><p>Considerar, em unidades offshore, fatores adicionais de planejamento logístico (transporte de equipamento, espaço de armazenamento, condições de embarcação/plataforma), sem prejuízo da integral observância das limitações ambientais do seção 4.</p></li>\n</ul>"}]}, {"num": "10", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "sections": [{"num": "10.0", "title": "EMERGÊNCIAS E PLANO DE CONTENÇÃO", "html": ""}, {"num": "10.1", "title": "Objetivo", "html": "<p>Estabelecer procedimentos padronizados para prevenção, mitigação, resposta e recuperação de incidentes, anormalidades e emergências ocorridas durante operações com o drone Elios 2, incluindo missões de inspeção visual e termografia infravermelha.</p>"}, {"num": "10.2", "title": "Escopo", "html": "<p>Este plano aplica-se a todas as atividades realizadas com o Elios 2 em:</p><table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th colspan=\"2\">ATIVOS</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Espaços confinados;</td>\n<td>Galpões Industriais</td>\n</tr>\n<tr>\n<td>Galerias subterrâneas;</td>\n<td>Estruturas metálicas</td>\n</tr>\n<tr>\n<td>Chaminés;</td>\n<td>Barragens</td>\n</tr>\n<tr>\n<td>Dutos</td>\n<td>Ambientes potencialmente contaminados</td>\n</tr>\n<tr>\n<td>Silos</td>\n<td>Áreas classificadas (quando autorizadas e avaliadas previamente)</td>\n</tr>\n<tr>\n<td>Tanques</td>\n<td>Tubulações e Galerias</td>\n</tr>\n</tbody>\n</table>"}, {"num": "10.3", "title": "Classificação de Ocorrências", "html": "<p><strong>Nível 1 – Anormalidade Menor</strong></p><p>Missão pode prosseguir em casos de:</p><ul>\n<li><p>Perda momentânea de vídeo (&lt;5 s);</p></li>\n<li><p>Pequena instabilidade de iluminação;</p></li>\n<li><p>Pequena variação de estabilidade de voo;</p></li>\n</ul><p><strong>Nível 2 – Incidente Operacional</strong></p><p>Necessita interrupção temporária em caso de:</p><ul>\n<li><p>Colisão leve com estrutura;</p></li>\n<li><p>Saturação do sensor térmico</p></li>\n<li><p>Alerta de calibração de bússola/magnetômetro durante o voo</p></li>\n<li><p>Degradação da qualidade de imagem por poeira, fuligem ou umidade nas lentes</p></li>\n</ul><p><strong>Nível 3 – Emergência</strong></p><p>Interrupção imediata da missão em caso de:</p><ul>\n<li><p>Queda da aeronave;</p></li>\n<li><p>Bateria com defeito;</p></li>\n<li><p>Perda total de comunicação;</p></li>\n<li><p>Aprisionamento do drone;</p></li>\n<li><p>Vazamento de gás detectado;</p></li>\n<li><p>Ativo com grande concentração de particulado;</p></li>\n<li><p>Perda total da estabilidade;</p></li>\n</ul>"}, {"num": "10.4", "title": "Outras Ocorrências", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Condição Anormal</th>\n<th>Ação Corretiva</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Degradação momentânea da qualidade de imagem/vídeo</td>\n<td>Reduzir velocidade, reposicionar a aeronave e avaliar continuidade; se persistente, considerar retorno</td>\n</tr>\n<tr>\n<td>Vibração ou ruído incomum dos motores</td>\n<td>Pousar em local seguro mais próximo possível para inspeção visual; não prosseguir a missão sem avaliação</td>\n</tr>\n<tr>\n<td>Contato leve da gaiola de proteção com superfície (esperado pelo projeto da aeronave)</td>\n<td>Avaliar estabilidade após o contato; prosseguir somente se o comportamento de voo permanecer normal</td>\n</tr>\n<tr>\n<td>Alerta de calibração de sensor (IMU/magnetômetro) durante o voo</td>\n<td>Pousar em local seguro; recalibrar conforme procedimento do fabricante antes de retomar a missão</td>\n</tr>\n<tr>\n<td>Aumento anômalo de temperatura indicado pelo sistema</td>\n<td>Reduzir esforço de voo, pousar e permitir resfriamento; não recarregar bateria sem inspeção</td>\n</tr>\n<tr>\n<td>Comportamento inesperado do sistema de estabilização sem GPS</td>\n<td>Assumir maior margem de controle manual; reduzir velocidade; considerar abortamento se a degradação comprometer a segurança</td>\n</tr>\n</tbody>\n</table><p>Em qualquer condição anormal cuja evolução não seja satisfatoriamente controlada pela ação corretiva, o Operador 1 deve reclassificar a situação como emergência e aplicar os procedimentos da seção 10.5.3.</p>"}, {"num": "10.5", "title": "Procedimentos de Emergência", "html": "<p>Procedimentos de Emergência aplicam-se a condições que representam risco iminente à integridade da aeronave, da equipe ou de terceiros, exigindo ação imediata e priorização absoluta da segurança sobre a continuidade da missão ou a preservação do equipamento.</p>"}, {"num": "10.5.1", "title": "Filosofia de Resposta a Emergências", "html": "<p>A resposta a emergências segue a hierarquia de prioridades adotada pela XD4Solutions, inspirada em práticas consagradas de gestão de emergências em operações de voo: (1) preservar a segurança das pessoas presentes no local; (2) preservar a integridade da estrutura/ativo do Cliente; (3) preservar a aeronave e os dados coletados. Ações de memória (memory items) devem ser executadas sem consulta prévia a checklist, dada a criticidade temporal.</p>"}, {"num": "10.5.2", "title": "Memory Items – Ações Imediatas", "html": "<ul>\n<li><p>Declarar a emergência em voz alta (\"EMERGÊNCIA\" ou \"ABORTAR, ABORTAR, ABORTAR\"), assegurando que toda a equipe tome conhecimento;</p></li>\n</ul><ul>\n<li><p>Avaliar a viabilidade de pouso controlado imediato em superfície segura mais próxima;</p></li>\n</ul><ul>\n<li><p>Caso o pouso controlado não seja viável, priorizar o afastamento da aeronave de pessoas e de equipamentos críticos do Cliente, mesmo que isso resulte em dano à aeronave;</p></li>\n</ul><ul>\n<li><p>Comunicar imediatamente ao Operador 2 e, quando aplicável, à supervisão do Cliente, a natureza da emergência;</p></li>\n</ul><ul>\n<li><p>Após estabilização da situação, proceder à avaliação detalhada e ao registro da ocorrência (MGO – Registro de Ocorrências).</p></li>\n</ul>"}, {"num": "10.5.3", "title": "Critérios de Abortamento de Missão (Abort Criteria)", "html": "<p>A missão deve ser imediatamente abortada sempre que ocorrer qualquer uma das seguintes condições:</p><ul>\n<li><p>Perda de enlace de comando/vídeo não recuperada dentro do tempo esperado da função de retorno automático (seção 10.6);</p></li>\n</ul><ul>\n<li><p>Nível de bateria atingir o limiar mínimo de reserva sem possibilidade de retorno seguro confirmado (seção 10.8);</p></li>\n</ul><ul>\n<li><p>Identificação de falha de sensor crítico que comprometa a estabilidade ou a navegação segura (seção 10.9);</p></li>\n</ul><ul>\n<li><p>Colisão com dano estrutural aparente à aeronave (seção 10.10);</p></li>\n</ul><ul>\n<li><p>Ingresso não autorizado de pessoas na área de risco (MGO – Isolamento da Área e Controle de Acesso);</p></li>\n</ul><ul>\n<li><p>Identificação de condição ambiental não prevista na avaliação de risco (ex.: presença inesperada de gases, líquidos ou energização do ativo);</p></li>\n</ul><ul>\n<li><p>Qualquer outra condição que, no julgamento do Operador 1 ou do Operador 2, comprometa a segurança da operação.</p></li>\n</ul>"}, {"num": "10.6", "title": "Perda de Comunicação", "html": "<p>A perda de comunicação (enlace de comando e/ou vídeo) é um dos perigos mais relevantes em operações dentro de estruturas metálicas e ambientes confinados, devendo ser tratada conforme a sequência abaixo.</p>"}, {"num": "10.6.1", "title": "Resposta Imediata", "html": "<ul>\n<li><p>Comunicar \"PERDA DE SINAL\" ao Operador 2 imediatamente ao identificar a interrupção;</p></li>\n</ul><ul>\n<li><p>Permitir que a função automática de pouso por perda de sinal (Auto-Landing on Signal Lost) atue, pousando a aeronave no local em que se encontra, quando esta função estiver disponível e habilitada, dado que o Elios 2 não dispõe de retorno automático por trajetória mapeada;</p></li>\n</ul><ul>\n<li><p>Caso o enlace seja reestabelecido, avaliar a integridade do sistema antes de decidir pela continuidade ou pelo retorno definitivo da missão;</p></li>\n</ul><ul>\n<li><p>Caso o enlace não seja reestabelecido dentro do tempo de referência estabelecido no plano de missão, considerar a aeronave em situação de perda e iniciar o procedimento de localização e recuperação (seção 10.12).</p></li>\n</ul>"}, {"num": "10.6.2", "title": "Medidas Preventivas", "html": "<ul>\n<li><p>Avaliação prévia, na fase de planejamento, das características de atenuação de sinal do ambiente (espessura de paredes metálicas, geometria, presença de múltiplos compartimentos);</p></li>\n</ul><ul>\n<li><p>Uso de módulo de extensão de alcance (range extender) em ambientes de grande extensão linear, quando disponível e tecnicamente indicado;</p></li>\n</ul><ul>\n<li><p>Definição, no briefing, de pontos de referência ao longo da rota que sirvam de marco de segurança quanto ao alcance do sinal.</p></li>\n</ul>"}, {"num": "10.7", "title": "Falha de Iluminação", "html": "<p>O veículo Elios 2 é equipado com sistema de iluminação LED de alta eficiência, posicionado externamente à gaiola de proteção, projetado para fornecer iluminação homogênea e reduzir reflexos durante a inspeção em ambientes sem luz natural.</p>"}, {"num": "10.7.1", "title": "Resposta à Falha Parcial ou Total de Iluminação", "html": "<ul>\n<li><p>Identificar a falha mediante degradação da qualidade de imagem reportada pelo Operador 1 ou pelo Operador 2;</p></li>\n</ul><ul>\n<li><p>Avaliar se a iluminação remanescente é suficiente para a navegação segura de retorno;</p></li>\n</ul><ul>\n<li><p>Caso a iluminação remanescente seja insuficiente para a navegação segura, reduzir a velocidade de voo, ativar fontes de luz auxiliares de apoio em solo (quando aplicável e tecnicamente compatível com o ambiente) e iniciar o retorno imediato pela rota mais curta já mapeada;</p></li>\n</ul><ul>\n<li><p>Não prosseguir a inspeção com iluminação degradada; registrar a falha e submeter a aeronave à manutenção corretiva antes da próxima missão (seção 12).</p></li>\n</ul>"}, {"num": "10.8", "title": "Baixa Bateria", "html": "<p>A gestão da autonomia de bateria é um dos fatores mais críticos para a segurança da missão em ambientes confinados, onde a impossibilidade de pouso/recuperação manual imediata pode transformar a exaustão de bateria em perda da aeronave.</p>"}, {"num": "10.8.1", "title": "Limiares de Gestão de Bateria", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Limiar</th>\n<th>Nível de Carga (referência)</th>\n<th>Ação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Alerta de Planejamento</td>\n<td>50%</td>\n<td>Operador 2 comunica o status; Operador 1 avalia o tempo restante de inspeção útil</td>\n</tr>\n<tr>\n<td>Alerta de Retorno</td>\n<td>30%</td>\n<td>Iniciar o retorno ao ponto de lançamento, salvo inspeção pontual de curtíssima duração já em andamento</td>\n</tr>\n<tr>\n<td>Reserva Mínima Crítica</td>\n<td>Conforme limiar mínimo do fabricante / sistema de alerta embarcado</td>\n<td>Acionamento obrigatório do pouso automático por bateria crítica (Auto-Landing) ou pouso imediato em local seguro; vedada qualquer continuidade de inspeção</td>\n</tr>\n</tbody>\n</table><p>Os valores percentuais acima são referenciais e devem ser ajustados, no plano de missão, em função da distância e do tempo de retorno estimado para o ponto de lançamento, da carga útil instalada e da temperatura ambiente, fatores que influenciam o consumo energético da aeronave.</p>"}, {"num": "10.8.2", "title": "Resposta à Condição de Bateria Crítica", "html": "<ul>\n<li><p>Comunicar imediatamente \"BATERIA CRÍTICA\" ao Operador 2;</p></li>\n</ul><ul>\n<li><p>Interromper qualquer atividade de inspeção em curso e priorizar o retorno ou o pouso seguro imediato;</p></li>\n</ul><ul>\n<li><p>Caso a função de pouso automático por bateria crítica (Auto-Landing) seja acionada pelo sistema, monitorar sua execução, mantendo a possibilidade de retomada do controle manual a qualquer momento;</p></li>\n</ul><ul>\n<li><p>Caso o retorno ao ponto de lançamento não seja possível, pousar a aeronave no local mais seguro disponível e proceder à recuperação física, conforme seção 10.12.</p></li>\n</ul>"}, {"num": "10.9", "title": "Falha de Sensores", "html": "<p>A falha ou degradação de sensores de bordo (IMU, magnetômetro, barômetro, câmeras de imagem ou câmera de posicionamento) pode comprometer a estabilização, a navegação e/ou a qualidade dos dados coletados.</p>"}, {"num": "10.9.1", "title": "Classificação e Resposta", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Sensor Afetado</th>\n<th>Impacto Potencial</th>\n<th>Ação Recomendada</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>IMU / Magnetômetro</td>\n<td>Instabilidade de voo, deriva de atitude</td>\n<td>Pousar imediatamente; não prosseguir a missão; submeter a aeronave à recalibração/manutenção</td>\n</tr>\n<tr>\n<td>Câmera de posicionamento inferior</td>\n<td>Degradação da referência de estabilização em voo pairado</td>\n<td>Assumir controle manual com maior margem de segurança; reduzir velocidade; considerar abortamento</td>\n</tr>\n<tr>\n<td>Câmera principal/térmica</td>\n<td>Perda de dados de inspeção</td>\n<td>Avaliar se a missão deve continuar apenas para fins de navegação segura de retorno, sem valor de inspeção adicional</td>\n</tr>\n<tr>\n<td>Barômetro</td>\n<td>Leitura errática de altitude/variação vertical</td>\n<td>Assumir controle manual com maior atenção à altitude; pousar e submeter a aeronave à verificação antes de nova missão</td>\n</tr>\n<tr>\n<td>Sensor de bateria (gauge)</td>\n<td>Incerteza sobre autonomia real</td>\n<td>Adotar postura conservadora de retorno antecipado, tratando a leitura como não confiável</td>\n</tr>\n</tbody>\n</table><p>Qualquer falha de sensor identificada deve ser registrada no relatório de missão e comunicada à manutenção antes da liberação da aeronave para nova missão (seção 12).</p>"}, {"num": "10.10", "title": "Colisão", "html": "<p>O veículo Elios 2 foi projetado para tolerar contato físico com superfícies e estruturas, dispondo de gaiola de proteção e mecanismo de motores reversíveis capazes de recuperar a aeronave de uma inversão (flip) sem queda. Não obstante, toda colisão deve ser tratada como evento a ser avaliado, e não como ocorrência trivial.</p>"}, {"num": "10.10.1", "title": "Resposta Imediata à Colisão", "html": "<ul>\n<li><p>Avaliar, pela telemetria e pelo comportamento de voo, se a aeronave permanece estável e controlável após o contato;</p></li>\n</ul><ul>\n<li><p>Caso a aeronave permaneça estável, interromper a inspeção em curso e avaliar visualmente, pelas câmeras, eventuais danos aparentes antes de decidir pela continuidade;</p></li>\n</ul><ul>\n<li><p>Caso a aeronave apresente perda de estabilidade, ativar a função de recuperação de inversão (quando aplicável) e priorizar o pouso controlado imediato;</p></li>\n</ul><ul>\n<li><p>Caso não seja possível restabelecer o controle, permitir que a aeronave pouse/caia da forma mais segura possível, priorizando o afastamento de pessoas e de ativos críticos do Cliente;</p></li>\n</ul><ul>\n<li><p>Registrar o evento, com horário, local aproximado e circunstâncias, para fins de investigação (MGO – Investigação de Incidentes).</p></li>\n</ul>"}, {"num": "10.10.2", "title": "Avaliação Pós-Colisão", "html": "<p>Após qualquer colisão, ainda que sem perda de controle, a aeronave deve ser submetida a inspeção técnica detalhada antes de nova missão, verificando-se integridade estrutural da gaiola, hélices, motores e fixações, conforme a seção 12, sendo vedada a continuidade operacional sem essa verificação.</p>"}, {"num": "10.11", "title": "Saturação da Câmera Termográfica", "html": "<p><strong>Possíveis causas:</strong> A ocorrência de anomalias na imagem térmica pode estar relacionada à presença de equipamentos operando acima da faixa de medição do sensor, reflexos intensos provenientes de superfícies metálicas ou fontes de calor, bem como superfícies com alta emissividade ou condições que prejudiquem a interpretação correta da imagem térmica.</p><p><strong>Contenção:</strong> Alterar a paleta térmica e ajustar a faixa de temperatura (span e level) para melhorar a visualização das diferenças térmicas. Se necessário, aumentar a distância em relação ao alvo para reduzir a saturação da imagem. Caso as anomalias persistam e comprometam a confiabilidade dos dados, suspender o levantamento térmico e prosseguir apenas com a inspeção visual, quando operacionalmente seguro e aplicável.</p>"}, {"num": "10.12", "title": "Recuperação da Aeronave", "html": "<p>A recuperação da aeronave refere-se ao conjunto de ações para retirada física do equipamento de dentro do ambiente confinado, seja ao final de missão normal, seja em situação de pouso forçado, perda de sinal não recuperada ou queda.</p>"}, {"num": "10.12.1", "title": "Recuperação ao Final de Missão Normal", "html": "<p>Ao final da missão, com a aeronave pousada em local acessível, o Operador 2 procede à retirada manual do equipamento, com desenergização imediata dos motores, antes de qualquer manuseio.</p>"}, {"num": "10.12.2", "title": "Recuperação em Situação de Contingência", "html": "<ul>\n<li><p>Caso a aeronave permaneça dentro do ambiente confinado sem possibilidade de retorno por seus próprios meios, avaliar a viabilidade de recuperação por ferramenta de extensão (vara telescópica, gancho) a partir de abertura de acesso existente, sem necessidade de entrada humana no espaço confinado;</p></li>\n</ul><ul>\n<li><p>Caso a recuperação não seja possível sem entrada humana no espaço confinado, a operação de resgate do equipamento deve seguir, à risca, os procedimentos de entrada em espaço confinado do Cliente (NR-33 e PEC), sendo vedada qualquer entrada não planejada e não autorizada exclusivamente para a retirada do equipamento;</p></li>\n</ul><ul>\n<li><p>Em hipótese alguma a recuperação do equipamento deve ser priorizada sobre a segurança da equipe; a aeronave pode ser deixada no local até que existam condições seguras de retirada, mediante comunicação formal ao Cliente.</p></li>\n</ul>"}, {"num": "10.12.3", "title": "Registro", "html": "<p>Toda situação de recuperação em contingência deve ser registrada como ocorrência (MGO – Registro de Ocorrências), com descrição das circunstâncias, do método de recuperação empregado e do tempo decorrido até a retirada do equipamento.</p>"}]}, {"num": "11", "title": "PÓS-OPERAÇÃO", "sections": [{"num": "11.0", "title": "PÓS-OPERAÇÃO", "html": "<p>Os Procedimentos Pós-Voo abrangem as ações realizadas imediatamente após o pouso final da aeronave e o encerramento da fase de voo da missão, sendo etapa obrigatória antes da desmobilização da equipe.</p>"}, {"num": "11.1", "title": "Sequência Pós-Voo", "html": "<ul>\n<li><p>Desenergização da aeronave e remoção segura da bateria, observando-se o procedimento de manuseio do seção 12.3;</p></li>\n</ul><ul>\n<li><p>Inspeção visual pós-voo da aeronave, hélices, gaiola e sensores, identificando eventuais danos ou desgastes ocorridos durante a missão;</p></li>\n</ul><ul>\n<li><p>Limpeza de componentes ópticos e remoção de particulados (poeira, fuligem, resíduos) acumulados durante a operação;</p></li>\n</ul><ul>\n<li><p>Acondicionamento da aeronave, baterias e acessórios na maleta de transporte;</p></li>\n</ul><ul>\n<li><p>Restituição da área operacional às condições originais, incluindo remoção de sinalização e isolamento temporário, salvo quando a permanência for solicitada pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Comunicação formal de encerramento da missão à supervisão do Cliente, incluindo eventual entrega preliminar de status da inspeção.</p></li>\n</ul>"}, {"num": "11.2", "title": "Download dos Dados", "html": "<p>O download dos dados coletados durante a missão (vídeo, imagens e telemetria) deve seguir procedimento padronizado, garantindo a rastreabilidade e a integridade da informação desde a origem.</p><ul>\n<li><p>O download deve ser realizado, preferencialmente, ainda no local da missão ou no mesmo dia, evitando-se a permanência de dados exclusivamente na memória de bordo da aeronave por período prolongado;</p></li>\n</ul><ul>\n<li><p>A transferência deve ser realizada para dispositivo de armazenamento ou plataforma de gestão de dados homologada pela XD4Solutions, vedando-se o uso de dispositivos pessoais não autorizados;</p></li>\n</ul><ul>\n<li><p>Cada conjunto de dados deve ser identificado com, no mínimo, código da missão, data, local, ativo inspecionado e operador responsável, de forma a permitir correlação inequívoca com o Diário de Bordo (seção 13.1);</p></li>\n</ul><ul>\n<li><p>O Operador 1 é responsável pela confirmação do download completo antes da formatação ou reutilização do cartão de memória/armazenamento de bordo da aeronave.</p></li>\n</ul>"}]}, {"num": "12", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "sections": [{"num": "12.0", "title": "MANUTENÇÃO DE PRIMEIRO NÍVEL", "html": ""}, {"num": "12.1", "title": "Programa de Manutenção", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Periodicidade / Critério</th>\n<th>Ação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Hélices</td>\n<td>A cada 10 horas de voo acumuladas ou conforme dano identificado</td>\n<td>Substituição preventiva</td>\n</tr>\n<tr>\n<td>Inspeção estrutural da gaiola de proteção</td>\n<td>A cada missão (inspeção pré-voo) e revisão detalhada mensal</td>\n<td>Verificação de fissuras, deformações e fixações</td>\n</tr>\n<tr>\n<td>Calibração de IMU/magnetômetro</td>\n<td>Conforme indicação do sistema ou após transporte/impacto relevante</td>\n<td>Recalibração conforme procedimento do fabricante</td>\n</tr>\n<tr>\n<td>Atualização de firmware</td>\n<td>Conforme publicação de versão estável homologada pelo fabricante</td>\n<td>Atualização e voo de checagem em ambiente controlado</td>\n</tr>\n<tr>\n<td>Limpeza de sensores ópticos</td>\n<td>A cada missão</td>\n<td>Limpeza conforme procedimento do fabricante, com produtos não abrasivos</td>\n</tr>\n<tr>\n<td>Revisão geral programada</td>\n<td>Conforme recomendação do fabricante / horas totais de voo</td>\n<td>Encaminhamento ao centro de manutenção autorizado, quando aplicável</td>\n</tr>\n</tbody>\n</table>"}, {"num": "12.2", "title": "Manutenção Corretiva", "html": "<p>Qualquer não conformidade identificada em inspeção pré-voo, pós-voo ou durante a missão (seções 7.2, 11.1 e 10) deve gerar registro de manutenção corretiva, sendo vedada a liberação da aeronave para nova missão sem a devida resolução, registro da ação tomada e aprovação do Responsável Técnico de Manutenção (MGO – Responsabilidades). Reparos de nível avançado (depot-level) são restritos ao fabricante ou a centro de manutenção por ele autorizado, conforme exclusão estabelecida na seção 1.1.2.</p>"}, {"num": "12.3", "title": "Baterias – Especificações e Cuidados do Elios 2", "html": "<ul>\n<li><p>Utilizar exclusivamente carregadores balanceados homologados pelo fabricante, nunca excedendo os parâmetros de tensão e corrente especificados;</p></li>\n</ul><ul>\n<li><p>Respeitar a vida útil de referência de até 50 ciclos de carga (bateria padrão), monitorando a degradação de capacidade ao longo do tempo mediante o sistema inteligente de monitoramento de estado de carga (SOC) integrado à bateria.</p></li>\n</ul>"}]}, {"num": "13", "title": "REGISTROS OPERACIONAIS", "sections": [{"num": "13.0", "title": "REGISTROS OPERACIONAIS", "html": ""}, {"num": "13.1", "title": "Registro das Horas de Operação", "html": "<p>O registro sistemático das horas de operação da aeronave constitui base para a gestão de manutenção preventiva (seção 12), para o controle de vida útil de componentes e para a rastreabilidade exigida por auditorias de clientes industriais.</p><ul>\n<li><p>Cada missão deve ser registrada em Diário de Bordo eletrônico ou físico, contendo, no mínimo: data, local, ativo inspecionado, equipe envolvida, configuração de carga útil utilizada, horário de início e término do voo, tempo total de voo acumulado e principais observações do debriefing operacional (MGO);</p></li>\n</ul><ul>\n<li><p>O registro deve permitir o cálculo cumulativo de horas de voo por aeronave, por bateria e por hélice, de forma a alimentar automaticamente os critérios de manutenção preventiva do seção 12;</p></li>\n</ul><ul>\n<li><p>Discrepâncias entre o tempo de voo registrado pelo Diário de Bordo e o tempo registrado pela telemetria da aeronave devem ser investigadas e justificadas.</p></li>\n</ul>"}]}, {"num": "14", "title": "SUPLEMENTOS", "sections": [{"num": "14.0", "title": "SUPLEMENTOS", "html": "<p>Constituem suplementos técnicos deste POP a documentação do fabricante aplicável ao veículo Elios 2 e os guias operacionais específicos por tipologia de ativo inspecionado. Os formulários corporativos de uso transversal a todos os veículos (avaliação de risco, briefing, diário de bordo, registro e investigação de ocorrências, permissão de trabalho, termo de adesão e indicadores operacionais) constam do Manual Geral de Operações (MGO).</p>"}, {"num": "14.1", "title": "Documentação do Fabricante Flyability", "html": "<ul>\n<li><p><strong>Flyability Elios 2 - User Manual</strong> (versão vigente);</p></li>\n</ul><ul>\n<li><p><strong>Flyability Elios 2 - Technical Specifications</strong> (versão vigente);</p></li>\n</ul><ul>\n<li><p><strong>Flyability Inspector – User Manual</strong> (versão vigente)</p></li>\n</ul><ul>\n<li><p><strong>Flyability Elios 2 – Battery Best Practices</strong>, boletins de serviço, boletins de segurança e atualizações de firmware emitidos pelo fabricante;</p></li>\n</ul><ul>\n<li><p><strong>Ficha de Informações de Segurança (FISPQ/MSDS)</strong> das baterias utilizadas no veículo, quando disponibilizada pelo fabricante.</p></li>\n</ul><p>Em caso de divergência entre este Manual e a documentação técnica vigente do fabricante Flyability, prevalecerão as orientações do fabricante quanto à segurança operacional, utilização, manutenção e integridade do equipamento. A divergência deverá ser registrada como necessidade de atualização documental e tratada prioritariamente pelo Gestor de Operações para revisão deste Manual.</p>"}, {"num": "14.2", "title": "Formulários Específicos do Elios 2", "html": "<ul>\n<li><p>Suplemento C – Checklist Pré-Missão e Pré-Voo (ver seção 7.1);</p></li>\n<li><p>Suplemento G – Ficha de Controle de Manutenção da Aeronave;</p></li>\n<li><p>Suplemento H – Ficha de Controle de Baterias.</p></li>\n</ul><p><strong>FIM DO DOCUMENTO</strong></p><p><em>Este Manual de Procedimentos Operacionais Padrão é um documento vivo da XD4Solutions, sujeito a revisão contínua à luz da experiência operacional, de alterações regulatórias e de atualizações tecnológicas do veículo Flyability Elios 2.</em></p>"}]}];</script>
<script>const POP_ELIOS3_CONTENT = [{"num": "1", "title": "OBJETIVO", "sections": [{"num": "1.0", "title": "OBJETIVO", "html": "<p>O presente Manual tem por objetivo estabelecer, de forma padronizada, disciplinada e auditável, os Procedimentos Operacionais Padrão (POP) da <strong>XD4Solutions</strong> aplicáveis às operações de inspeção industrial realizadas com o <strong>Sistema de Aeronave Remotamente Pilotada (RPAS) Flyability Elios 3</strong>, utilizado para inspeções visuais e instrumentadas de ativos industriais em ambientes confinados, reduzindo a necessidade de exposição de pessoas a áreas de risco.</p><p>Constituem objetivos específicos deste Manual:</p><ul>\n<li><p>Padronizar o planejamento, a execução e o encerramento das operações de inspeção realizadas com o RPAS Flyability Elios 3, reduzindo a variabilidade operacional entre equipes e missões;</p></li>\n<li><p>Fornece uma base documental consistente e auditável para clientes dos setores de mineração, siderurgia, óleo e gás, energia, infraestrutura e demais segmentos industriais;</p></li>\n</ul>"}, {"num": "1.1", "title": "Escopo e Aplicabilidade", "html": "<p>Este Manual aplica-se a todas as operações de inspeção industrial realizadas pela <strong>XD4Solutions</strong> com o <strong>Sistema de Aeronave Remotamente Pilotada (RPAS) Flyability Elios 3</strong>, em instalações próprias ou de clientes contratantes, destinadas à inspeção de ambientes confinados, incluindo, entre outros, vasos de pressão, tanques, silos, chaminés, galerias técnicas, túneis, dutos, caldeiras e estruturas metálicas de grande porte.</p>"}, {"num": "1.1.1", "title": "Aplicabilidade", "html": "<p>As disposições deste Manual são de cumprimento obrigatório por:</p><ul>\n<li><p>Coordenador de Operações, Líder de Operações e Diretor de Operações envolvidos no planejamento, autorização, supervisão e encerramento das operações;</p></li>\n<li><p>Todo o pessoal operacional habilitado a atuar como Operador 1 (Piloto em Comando) ou Operador 2 (Observador/Apoio) nas operações com o Flyability Elios 3;</p></li>\n<li><p>Responsáveis pela inspeção, manutenção e liberação operacional dos equipamentos RPAS;</p></li>\n<li><p>Prestadores de serviço e empresas subcontratadas que atuem sob a responsabilidade técnica e contratual da XD4Solutions, mediante ciência e adesão aos procedimentos estabelecidos neste Manual.</p></li>\n</ul>"}, {"num": "1.1.2", "title": "Exclusões", "html": "<p>Este Manual não se aplica a:</p><ul>\n<li><p>Operações realizadas com outros modelos de RPAS ou aeronaves remotamente pilotadas que não o Flyability Elios 3, as quais deverão seguir seus respectivos procedimentos operacionais;</p></li>\n<li><p>Operações em atmosferas potencialmente explosivas (Ex/ATEX) sem despressurização, purga e teste de atmosfera previamente realizados e documentados, conforme as restrições estabelecidas pelo fabricante;</p></li>\n<li><p>Operações que utilizem acessórios, cargas úteis, componentes ou modificações não homologados pela Flyability;</p></li>\n<li><p>Atividades de manutenção corretiva de nível de fábrica (Depot Level Maintenance), restritas ao fabricante ou a centros de manutenção por ele autorizados.</p></li>\n</ul>"}]}, {"num": "2", "title": "CARACTERÍSTICAS DO VEÍCULO", "sections": [{"num": "2.0", "title": "CARACTERÍSTICAS DO VEÍCULO", "html": "<p>Este capítulo apresenta as características técnicas do RPAS Flyability Elios 3 e das cargas úteis homologadas para o veículo.</p>"}, {"num": "2.1", "title": "Veículo Aéreo", "html": "<ul>\n<li><p>Aeronave Flyability Elios 3, configuração quadrirrotor envolta por gaiola de proteção (cage) tolerante a colisão, com mecanismo de motores reversíveis que permite recuperação de inversão (flip) sem queda;</p></li>\n</ul><ul>\n<li><p>Massa aproximada: 2,35 kg em configuração padrão (bateria padrão, sem payload opcional); até aproximadamente 2,47 kg com o payload de mapeamento LiDAR instalado, incluindo bateria, carga útil e proteção. Os valores exatos devem ser confirmados na ficha técnica vigente do fabricante;</p></li>\n</ul><ul>\n<li><p>Dimensões aproximadas: 48 cm de largura (envelope esférico de operação em torno de 50 x 45 cm);</p></li>\n</ul><ul>\n<li><p>Grau de proteção: equivalente a IP44 para o veículo básico e payload de inspeção padrão (não certificado, conforme especificação do fabricante); payload LiDAR com grau de proteção IP68;</p></li>\n</ul><ul>\n<li><p>Sensores de bordo: unidade de medição inercial (IMU), magnetômetro, barômetro, três câmeras de visão computacional e sensor de distância por tempo de voo (ToF), além de sensor LiDAR quando instalado o payload correspondente;</p></li>\n</ul><ul>\n<li><p>Sistema de localização e mapeamento embarcado (FlyAware), baseado em algoritmo SLAM, que dispensa sinal de GPS e fornece referência posicional centimétrica em ambiente fechado;</p></li>\n</ul><ul>\n<li><p>Modos de voo disponíveis, conforme especificação do fabricante: ASSIST (modo estabilizado, recomendado para a generalidade das missões de inspeção), ATTI (modo de atitude) e SPORT (modo esportivo, de uso restrito a pilotos com proficiência avançada).</p></li>\n</ul>"}, {"num": "2.2", "title": "Cargas Úteis (Payloads) Homologadas", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Carga Útil</th>\n<th>Finalidade</th>\n<th>Observações Operacionais</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Payload básico de inspeção (câmera 4K + câmera térmica + sensor de distância)</td>\n<td>Inspeção visual de alta resolução e termografia complementar</td>\n<td>Configuração padrão; campo de visão amplo e iluminação LED periférica integrada</td>\n</tr>\n<tr>\n<td>Payload LiDAR de mapeamento</td>\n<td>Geração de nuvem de pontos 3D em tempo real para mapeamento e medição dimensional</td>\n<td>Reduz a autonomia de voo; ocupa a porta dedicada da baía modular</td>\n</tr>\n<tr>\n<td>Payload de radiação (RAD)</td>\n<td>Leitura de taxa de dose de radiação em tempo real durante o voo</td>\n<td>Aplicável a inspeções em instalações nucleares ou com fontes radioativas; requer protocolo específico</td>\n</tr>\n<tr>\n<td>Payload de ultrassom (UT)</td>\n<td>Medição de espessura de parede por ultrassom em superfícies metálicas</td>\n<td>Requer contato controlado da aeronave com a superfície; procedimento específico de aproximação</td>\n</tr>\n</tbody>\n</table>"}]}, {"num": "3", "title": "CONFIGURAÇÃO PERMITIDA", "sections": [{"num": "3.0", "title": "CONFIGURAÇÃO PERMITIDA", "html": "<p>Este capítulo define os parâmetros de payload, firmware e modo de voo permitidos para a operação do Elios 3. A verificação prática desses parâmetros antes de cada missão está descrita no Capítulo 8 (Configuração do Veículo).</p>"}, {"num": "3.1", "title": "Seleção de Carga Útil", "html": "<p>A seleção da carga útil deve ser definida na fase de planejamento da missão (MGO – Planejamento da Missão), em função do objetivo de inspeção contratado, observando-se que a instalação de payload na porta dedicada de LiDAR reduz a autonomia de voo disponível, devendo este fator ser considerado no cálculo de reserva operacional de bateria (seção 10.8).</p>"}, {"num": "3.2", "title": "Controle de Versão de Firmware e Software", "html": "<ul>\n<li><p>A aeronave, o controle remoto e o aplicativo de pilotagem devem operar com a versão de firmware/software estável mais recente homologada pela XD4Solutions, sendo vedado o uso de versões beta em missões operacionais comerciais ou industriais;</p></li>\n</ul><ul>\n<li><p>Toda atualização de firmware deve ser registrada no histórico de manutenção da aeronave (seção 12) e validada por voo de checagem em ambiente controlado antes de sua liberação para missão operacional;</p></li>\n</ul><ul>\n<li><p>Boletins de serviço e alertas de segurança emitidos pelo fabricante devem ser avaliados pelo responsável técnico pela manutenção da frota — função que pode ser exercida pelo Coordenador de Operações ou por operador habilitado, conforme a estrutura da XD4Solutions (MGO – Responsabilidades) — em até 5 (cinco) dias úteis de sua publicação, com aplicação imediata quando classificados como críticos para a segurança de voo.</p></li>\n</ul>"}, {"num": "3.3", "title": "Modos de Voo Permitidos", "html": "<p>O modo ASSIST deverá ser utilizado como configuração padrão em todas as operações com o RPAS Elios 3. A utilização dos modos ATTI ou SPORT é considerada excepcional e somente será permitida quando necessária para preservar a segurança operacional da missão ou mitigar riscos decorrentes das condições do ambiente de voo. Sempre que utilizados, os motivos deverão ser registrados no Relatório de Missão, sendo sua operação restrita a pilotos com treinamento e proficiência comprovados nesses modos de voo.</p>"}]}, {"num": "4", "title": "LIMITAÇÕES OPERACIONAIS", "sections": [{"num": "4.0", "title": "LIMITAÇÕES OPERACIONAIS", "html": "<p>As limitações operacionais estabelecidas neste capítulo são de observância mandatória e não podem ser flexibilizadas por conveniência comercial, prazo contratual ou solicitação do Cliente. A violação de qualquer limitação aqui descrita constitui não conformidade grave, sujeita a registro de ocorrência (MGO – Registro de Ocorrências).</p><div class=\"callout crit\"><div class=\"ci\">⚠</div><div><b>LIMITAÇÃO CRÍTICA DE SEGURANÇA - ATMOSFERAS EXPLOSIVAS</b>O RPAS Flyability Elios 3, em sua configuração padrão, não possui certificação para operação em atmosferas classificadas como explosivas (zonas Ex / ATEX). A operação em áreas potencialmente classificadas somente é permitida após despressurização, purga, isolamento e teste de atmosfera (gas-free) documentados pelo Cliente, comprovando a ausência de classificação de risco no momento da missão. É terminantemente proibida a operação em zonas Ex ativas.</div></div>"}, {"num": "4.1", "title": "Limites Ambientais", "html": "<table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Parâmetro</th>\n<th>Limite Operacional</th>\n<th>Observação</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Temperatura ambiente</td>\n<td>0°C a 40°C (conforme procedimento operacional estabelecido pela XD4Solutions para garantir a segurança, a integridade do equipamento e a confiabilidade das operações)</td>\n<td>Fora desta faixa, consultar o Responsável Técnico de Manutenção antes da missão</td>\n</tr>\n<tr>\n<td>Umidade / Água</td>\n<td>Resistente a respingos (equivalente a IP44 na configuração padrão)</td>\n<td>Vedada a imersão ou exposição a jatos de água; ambientes encharcados requerem avaliação específica</td>\n</tr>\n<tr>\n<td>Poeira em suspensão</td>\n<td>Tolerável conforme grau IP44/IP68 do<br/>\npayload instalado</td>\n<td>Limpeza e inspeção pós-voo obrigatórias em ambientes de alta concentração de particulados (seção 11.1)</td>\n</tr>\n<tr>\n<td>Atmosfera explosiva (ATEX/Ex)</td>\n<td>NÃO PERMITIDA sem comprovação documental de área desclassificada</td>\n<td>Ver caixa de alerta crítico acima</td>\n</tr>\n<tr>\n<td>Visibilidade / Iluminação ambiente</td>\n<td>Sem requisito mínimo - aeronave possui iluminação LED própria</td>\n<td>Avaliar reflexos e neblina/fumaça residual que prejudiquem a câmera</td>\n</tr>\n</tbody>\n</table>"}, {"num": "4.2", "title": "Limites de Desempenho da Aeronave", "html": "<ul>\n<li><p>Autonomia de voo de referência: aproximadamente 12 a 12,5 minutos em configuração básica com bateria padrão (até 17 minutos com bateria de alta capacidade, sujeito a firmware compatível); aproximadamente 9 minutos com payload de mapeamento LiDAR instalado; valores sempre confirmados conforme ficha técnica vigente do fabricante e condições reais de missão;</p></li>\n</ul><ul>\n<li><p>Reserva mínima obrigatória de bateria para acionamento do procedimento de retorno (RTH): conforme definido na seção 10.8, nunca inferior ao limiar mínimo estabelecido pelo fabricante;</p></li>\n</ul><ul>\n<li><p>Vida útil de hélices: até 10 horas de operação, com substituição preventiva conforme a seção 12;</p></li>\n</ul><ul>\n<li><p>Vida útil de bateria: até 50 ciclos de carga, com descarte/substituição conforme degradação identificada em inspeção (seção 12.3).</p></li>\n</ul>"}, {"num": "4.3", "title": "Limites de Enlace de Comunicação", "html": "<p>O alcance efetivo do enlace de comando e vídeo é fortemente influenciado pela presença de estruturas metálicas, espessura de paredes e geometria do ambiente confinado, não devendo ser assumido como constante entre diferentes locais de inspeção. A operação além do alcance confiável de sinal, sem uso de repetidor homologado, é proibida, e o Operador deve respeitar a função de retorno automático por perda de sinal de vídeo descrita na seção 10.6.</p>"}, {"num": "4.4", "title": "Restrições Operacionais Adicionais", "html": "<ul>\n<li><p>Vedada a operação fora dos critérios de habilitação e proficiência vigentes da equipe;</p></li>\n</ul><ul>\n<li><p>Vedada a operação sem briefing operacional documentado (MGO – Briefing Operacional) e checklist pré-missão concluído (seção 7.1);</p></li>\n</ul><ul>\n<li><p>Vedada a operação em desacordo com a Permissão de Trabalho (PT) e, quando aplicável, a Permissão de Entrada em Espaço Confinado (PET) emitidas pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Vedada a realização de contato físico deliberado com superfícies energizadas ou em movimento</p></li>\n</ul>"}, {"num": "4.5", "title": "Perigos Típicos das Operações em Ambiente Confinado", "html": "<ul>\n<li><p>Perda de enlace de comando/vídeo em ambiente metálico ou de geometria complexa;</p></li>\n</ul><ul>\n<li><p>Colisão com estrutura, resultando em dano ao equipamento ou queda de fragmentos;</p></li>\n</ul><ul>\n<li><p>Exaustão de bateria sem retorno tempestivo;</p></li>\n</ul><ul>\n<li><p>Atmosfera deficiente em oxigênio ou presença de gases tóxicos/inflamáveis no ambiente de apoio em solo;</p></li>\n</ul><ul>\n<li><p>Acesso não autorizado de terceiros à área de operação;</p></li>\n</ul><ul>\n<li><p>Interferência eletromagnética em ambientes industriais energizados;</p></li>\n</ul><ul>\n<li><p>Perda de referência espacial (desorientação) em ambientes labirínticos ou de baixa visibilidade;</p></li>\n</ul><ul>\n<li><p>Queda de objetos ou da própria aeronave sobre pessoas, processos ou equipamentos do Cliente.</p></li>\n</ul><p>A avaliação de risco específica de cada missão é formalizada no momento da Avaliação Pré-Missão (MGO – Planejamento da Missão) e revisitada no Briefing Operacional (MGO – Briefing Operacional), constituindo registro obrigatório do dossiê da missão.</p>"}]}, {"num": "5", "title": "EQUIPAMENTOS NECESSÁRIOS", "sections": [{"num": "5.0", "title": "EQUIPAMENTOS NECESSÁRIOS", "html": ""}, {"num": "5.1", "title": "Estação de Controle e Software", "html": "<ul>\n<li><p>Controle remoto dedicado e tablet/estação com aplicativo Cockpit do fabricante, exibindo vídeo em tempo real, telemetria e mapa 3D em construção;</p></li>\n</ul><ul>\n<li><p>Software de processamento e relatório de dados (Inspector)</p></li>\n</ul><ul>\n<li><p>Quando aplicável, módulo de extensão de alcance (range extender) para ambientes de grande extensão linear (túneis, galerias).</p></li>\n</ul>"}, {"num": "5.2", "title": "Equipamentos de Apoio", "html": "<ul>\n<li><p>Baterias LiPo de alta tensão, padrão e de alta capacidade, com sistema inteligente de monitoramento de estado de carga (SOC) e proteções integradas contra sobrecarga, sobrecorrente, sobretensão e temperatura inadequada;</p></li>\n</ul><ul>\n<li><p>Carregadores balanceados homologados pelo fabricante;</p></li>\n</ul><ul>\n<li><p>Maleta de transporte rígida, compatível com normas de transporte aéreo (IATA), para acondicionamento da aeronave, baterias e acessórios;</p></li>\n</ul><ul>\n<li><p>Equipamentos de Proteção Individual (EPI) aplicáveis à atividade de apoio em solo, conforme avaliação de risco do local (MGO – Planejamento da Missão);</p></li>\n</ul><ul>\n<li><p>Equipamentos de detecção de gases multiparâmetro (quando aplicável ao ambiente de mineração, óleo e gás ou espaço confinado classificado), fornecidos e calibrados conforme procedimento do Cliente ou da XD4Solutions;</p></li>\n</ul><ul>\n<li><p>Iluminação portátil auxiliar, fita de isolamento de área, sinalização e demais itens de apoio logístico descritos no checklist da seção 7.1;</p></li>\n</ul><ul>\n<li><p>Cabo de segurança/retenção (quando aplicável à configuração de operação tethered) e ferramenta de recuperação (vara telescópica, gancho), conforme seção 10.14.</p></li>\n</ul>"}]}, {"num": "6", "title": "REQUISITOS DA EQUIPE", "sections": [{"num": "6.0", "title": "REQUISITOS DA EQUIPE", "html": "<p>Este capítulo estabelece a composição mínima da equipe operacional e os requisitos de qualificação específicos para a operação do RPAS Elios 3. As atribuições gerais de cada função constam do Manual Geral de Operações (MGO).</p>"}, {"num": "6.1", "title": "Composição Mínima da Equipe", "html": "<p>Toda missão operacional conduzida sob este Manual deve contar, no mínimo, com a seguinte composição de equipe, vedada a operação unipessoal:</p><ul>\n<li><p>1 (um) Operador 1 - Piloto em Comando, devidamente habilitado e com proficiência atualizada no veículo Elios 3;</p></li>\n</ul><ul>\n<li><p>1 (um) Operador 2 - Observador/Apoio, responsável por funções de vigilância, logística e segunda verificação independente;</p></li>\n</ul><ul>\n<li><p>Quando exigido pela avaliação de risco específica do local (MGO – Planejamento da Missão), supervisor de segurança do trabalho e/ou vigia de espaço confinado, fornecidos pela XD4Solutions ou pelo Cliente, conforme acordado contratualmente.</p></li>\n</ul>"}, {"num": "6.2", "title": "Qualificação do Operador 1 (Piloto em Comando)", "html": "<p>O Operador 1 deverá possuir treinamento específico para operação do Elios 3, demonstrar proficiência operacional e estar formalmente autorizado pela XD4Solutions para exercer a função de Piloto em Comando.</p>"}, {"num": "6.3", "title": "Qualificação do Operador 2", "html": "<p><strong>O Operador 2 deverá possuir a mesma qualificação técnica exigida para o Operador 1, incluindo treinamento, proficiência e capacidade de operar integralmente o RPAS Elios 3. A diferença entre as funções está exclusivamente na atribuição exercida durante a missão, e não na capacidade técnica de operação da aeronave.</strong></p>"}]}, {"num": "7", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "sections": [{"num": "7.0", "title": "INSPEÇÃO PRÉ-OPERAÇÃO", "html": ""}, {"num": "7.1", "title": "Checklist Pré-Missão", "html": "<p>O Checklist Pré-Missão consolida, em sequência padronizada, a verificação de documentação, equipamentos e condições ambientais antes da liberação da equipe para a fase de inspeção pré-voo (seção 7.2). Seu uso é obrigatório e deve ser conduzido em voz alta, em verificação cruzada entre Operador 1 e Operador 2.</p><table>\n<colgroup>\n<col/>\n<col/>\n<col/>\n</colgroup>\n<thead>\n<tr>\n<th>Item</th>\n<th>Verificação</th>\n<th>Responsável</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>01</td>\n<td>Permissão de Trabalho (PT) válida e disponível</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>02</td>\n<td>Permissão de Entrada em Espaço Confinado (PEC), se aplicável</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>03</td>\n<td>Risk assessment da missão revisado e assinado</td>\n<td>Operador 1 / Operador 2</td>\n</tr>\n<tr>\n<td>04</td>\n<td>Briefing operacional realizado e registrado</td>\n<td>Operador 1</td>\n</tr>\n<tr>\n<td>05</td>\n<td>Teste de atmosfera (gas-free) realizado, se aplicável</td>\n<td>Operador 2 / Cliente</td>\n</tr>\n<tr>\n<td>06</td>\n<td>Isolamento/bloqueio (LOTO) de sistemas energizados confirmado</td>\n<td>Operador 2 / Cliente</td>\n</tr>\n<tr>\n<td>07</td>\n<td>Equipamentos de proteção individual (EPI) disponíveis e em uso</td>\n<td>Operador 1 / Operador 2</td>\n</tr>\n<tr>\n<td>08</td>\n<td>Área de operação isolada e sinalizada</td>\n<td>Operador 2</td>\n</tr>\n<tr>\n<td>09</td>\n<td>Equipamentos de comunicação testados e operacionais</td>\n<td>Operador 2</td>\n</tr>\n<tr>\n<td>10</td>\n<td>Aeronave, baterias e cargas úteis disponíveis e identificadas</td>\n<td>Operador 1</td>\n</tr>\n</tbody>\n</table><p>A conclusão satisfatória de todos os itens é pré-requisito para o início da Inspeção Pré-Voo descrita na seção 7.2. Qualquer item não conforme resulta em decisão No-Go até sua regularização.</p>"}, {"num": "7.2", "title": "Inspeção Pré-Voo", "html": "<p>A Inspeção Pré-Voo é a verificação física e funcional detalhada da aeronave, baterias, cargas úteis e estação de controle, conduzida pelo Operador 1 com verificação cruzada do Operador 2, imediatamente antes do lançamento.</p>"}, {"num": "7.2.1", "title": "Inspeção Física da Aeronave", "html": "<ul>\n<li><p>Integridade estrutural da gaiola de proteção (cage), sem deformações, fissuras ou elementos soltos;</p></li>\n</ul><ul>\n<li><p>Integridade e fixação das quatro hélices, sem trincas, lascas ou desgaste excessivo; verificação do tempo de uso acumulado em relação ao limite do seção 12;</p></li>\n</ul><ul>\n<li><p>Fixação correta da bateria no mecanismo de encaixe rápido (insert and lock), sem folgas;</p></li>\n</ul><ul>\n<li><p>Limpeza das lentes das câmeras (principal, térmica e de visão computacional) e dos sensores LiDAR/ToF, quando instalados;</p></li>\n</ul><ul>\n<li><p>Integridade dos arrays de iluminação LED periférica;</p></li>\n</ul><ul>\n<li><p>Ausência de sinais de dano por impacto, umidade ou contaminação de missão anterior não tratados em manutenção.</p></li>\n</ul>"}, {"num": "7.2.2", "title": "Verificação Funcional", "html": "<ul>\n<li><p>Inicialização da aeronave e verificação de autoteste de sistema (IMU, magnetômetro, barômetro, câmeras);</p></li>\n</ul><ul>\n<li><p>Verificação do nível de carga da bateria e correspondência com o planejamento de autonomia da missão (seções 3 e 10.8);</p></li>\n</ul><ul>\n<li><p>Verificação do enlace de comando e vídeo entre a aeronave e a estação de controle, incluindo qualidade de imagem e latência;</p></li>\n</ul><ul>\n<li><p>Teste de resposta dos motores e do sistema de estabilização em ambiente controlado (quando aplicável, breve voo estacionário de checagem antes do ingresso no ambiente confinado);</p></li>\n</ul><ul>\n<li><p>Verificação da calibração de bússola/magnetômetro quando indicado pelo sistema ou após transporte/troca de ambiente eletromagnético;</p></li>\n</ul><ul>\n<li><p>Confirmação da versão de firmware instalada, conforme seção 3.2.</p></li>\n</ul>"}, {"num": "7.2.3", "title": "Critério de Aceitação", "html": "<p>A aeronave somente é liberada para voo quando todos os itens de inspeção física e funcional forem aprovados, sem exceções. A identificação de qualquer não conformidade resulta na suspensão do lançamento até resolução ou substituição do componente afetado, com registro no histórico de manutenção (seção 12).</p>"}]}, {"num": "8", "title": "CONFIGURAÇÃO DO VEÍCULO", "sections": [{"num": "8.0", "title": "CONFIGURAÇÃO DO VEÍCULO", "html": "<p>Antes de cada missão, o Operador 1 deve confirmar, com verificação cruzada do Operador 2, que a aeronave está fisicamente configurada conforme os parâmetros definidos no Capítulo 3 (Configuração Permitida): payload correto instalado, versão de firmware homologada ativa e modo de voo padrão (ASSIST) selecionado.</p>"}, {"num": "8.1", "title": "Configuração de Gravação e Telemetria", "html": "<ul>\n<li><p>Gravação de vídeo de bordo habilitada em todas as missões, em resolução máxima homologada para o objetivo de inspeção;</p></li>\n</ul><ul>\n<li><p>Registro de telemetria de voo (trajetória, autonomia, eventos de sistema) habilitado e armazenado conforme MGO – Armazenamento das Informações;</p></li>\n</ul><ul>\n<li><p>Sincronização de relógio dos dispositivos de campo (controle, tablet) para garantir a correlação cronológica entre vídeo, telemetria e registros de ocorrência.</p></li>\n</ul>"}]}, {"num": "9", "title": "PROCEDIMENTO OPERACIONAL", "sections": [{"num": "9.0", "title": "PROCEDIMENTO OPERACIONAL", "html": "<p>Este capítulo descreve a sequência padronizada de execução da missão com o Elios 3 em condições nominais de operação, do lançamento ao encerramento da fase de voo.</p>"}, {"num": "9.1", "title": "Inicialização", "html": "<ul>\n<li><p>Confirmação verbal de \"PRONTO PARA LANÇAMENTO\" entre Operador 1 e Operador 2;</p></li>\n</ul><ul>\n<li><p>Decolagem em modo ASSIST, em área livre de obstáculos imediatos, com estabilização em voo pairado (hover) antes do deslocamento para o ponto de ingresso no ambiente confinado;</p></li>\n</ul><ul>\n<li><p>Verificação de resposta normal de comandos e estabilidade antes do ingresso na estrutura.</p></li>\n</ul><ul>\n<li><p>Remoção ou sinalização de obstáculos, materiais soltos ou substâncias que possam ser projetadas pelo fluxo de ar dos rotores;</p></li>\n</ul>"}, {"num": "9.2", "title": "Operação", "html": "<p>Este capítulo estabelece os princípios gerais aplicáveis a toda operação realizada dentro de espaços confinados, na acepção da NR-33, complementando as orientações específicas por tipologia de ativo descritas na seção 9.5.</p><p>O emprego do RPAS Elios 3 pela XD4Solutions tem por finalidade primária eliminar ou reduzir substancialmente a necessidade de entrada humana em espaço confinado para fins de inspeção visual e instrumentada, mitigando os riscos inerentes à exposição humana descritos na NR-33 (deficiência de oxigênio, atmosfera tóxica ou explosiva, isolamento e dificuldade de resgate).</p><ul>\n<li><p>Deslocamento até o ponto de interesse conforme rota planejada no briefing, observando-se distância segura de superfícies e obstáculos;</p></li>\n</ul><ul>\n<li><p>Execução do padrão de inspeção definido (varredura, aproximação pontual, sobrevoo de trajeto linear), conforme objetivo contratado;</p></li>\n</ul><ul>\n<li><p>Comunicação periódica de status entre Operador 1 e Operador 2, conforme a fraseologia padronizada (MGO);</p></li>\n</ul><ul>\n<li><p>Captação de imagens, vídeos e dados de sensores conforme escopo de inspeção, com anotação de pontos de interesse relevantes em tempo real.</p></li>\n</ul>"}, {"num": "9.3", "title": "Monitoramento", "html": "<ul>\n<li><p>Monitoramento contínuo, pelo Operador 1, dos parâmetros de autonomia de bateria, qualidade de enlace e integridade de sistemas;</p></li>\n</ul>"}, {"num": "9.3.1", "title": "Particularidades de Navegação em Ambiente Fechado", "html": "<ul>\n<li><p>Ausência de sinal de GPS: a navegação depende integralmente do sistema embarcado de localização e mapeamento por visão computacional e LiDAR (FlyAware/SLAM), cuja robustez é reduzida em ambientes com superfícies homogêneas, pouco texturizadas, ou com névoa/poeira densa, devendo o piloto compensar com pilotagem mais conservadora nessas condições;</p></li>\n</ul><ul>\n<li><p>Atenuação progressiva do enlace de comunicação à medida que a aeronave se afasta da abertura de acesso e se interpõem obstáculos metálicos;</p></li>\n</ul><ul>\n<li><p>Reverberação acústica e visual (reflexos) que podem dificultar a avaliação de distância pelo piloto, exigindo maior dependência dos sensores de distância da aeronave;</p></li>\n</ul><ul>\n<li><p>Possibilidade de turbulência induzida pelo próprio fluxo de ar dos rotores em espaços de seção reduzida (efeito de proximidade de parede).</p></li>\n</ul>"}, {"num": "9.3.2", "title": "Coordenação com o Vigia de Espaço Confinado", "html": "<p>Quando a atividade de apoio em solo exigir a presença de vigia de espaço confinado (watchperson) designado pelo Cliente, a equipe operacional do RPAS deve manter comunicação constante com este profissional, informando o andamento da missão e respeitando sua autoridade para interromper a atividade em caso de identificação de risco à integridade física de qualquer pessoa presente.</p>"}, {"num": "9.4", "title": "Encerramento", "html": "<ul>\n<li><p>Início do retorno ao ponto de lançamento com margem de bateria suficiente, conforme seção 10.8;</p></li>\n</ul><ul>\n<li><p>Comunicação \"RETORNANDO\" ao Operador 2;</p></li>\n</ul><ul>\n<li><p>Aterrissagem controlada em área livre e previamente identificada;</p></li>\n</ul><ul>\n<li><p>Comunicação \"MISSÃO CONCLUÍDA\" ao término da fase de voo, iniciando-se os procedimentos pós-voo (seção 11).</p></li>\n</ul>"}, {"num": "9.5", "title": "Avaliação em Diversos Cenários", "html": "<p>Esta seção complementa os procedimentos gerais de operação (seção 9.2) com orientações técnicas específicas por tipologia de ativo, a serem observadas pelo Operador 1 durante o planejamento e a execução da missão.</p>"}, {"num": "9.5.1", "title": "Operação em Estruturas Metálicas", "html": "<p>Estruturas metálicas de grande massa (vasos de pressão, dutos, estruturas de aço, equipamentos industriais) impõem desafios específicos de propagação de sinal de rádio e de interferência eletromagnética.</p><ul>\n<li><p>Avaliar, na fase de planejamento, a espessura e a continuidade das chapas metálicas ao longo da rota de voo planejada, considerando-as como fator redutor do alcance efetivo do enlace de comunicação;</p></li>\n</ul><ul>\n<li><p>Considerar a possível interferência de campos eletromagnéticos gerados por equipamentos energizados nas proximidades (motores, transformadores, painéis elétricos) sobre o magnetômetro da aeronave, podendo gerar leituras espúrias de orientação;</p></li>\n</ul><ul>\n<li><p>Estabelecer, sempre que possível, pontos de referência intermediários (aberturas, juntas, flanges) que sirvam de marco de orientação para o piloto e de verificação de continuidade de sinal;</p></li>\n</ul><ul>\n<li><p>Avaliar a utilização de módulo de extensão de alcance (range extender) posicionado em ponto intermediário de acesso, quando a extensão da estrutura comprometer o enlace direto.</p></li>\n</ul>"}, {"num": "9.5.2", "title": "Operação em Silos", "html": "<p>A inspeção de silos (armazenamento de granéis sólidos, minérios, grãos ou material particulado) apresenta riscos característicos de geometria vertical, acúmulo de poeira e, em determinados materiais, potencial de atmosfera explosiva por poeira combustível.</p><ul>\n<li><p>Avaliar, previamente, a classificação do material armazenado quanto ao potencial de geração de atmosfera explosiva por poeira (ex.: poeiras combustíveis em silos de grãos ou determinados minérios), aplicando-se a restrição crítica do seção 4 quando aplicável;</p></li>\n</ul><ul>\n<li><p>Considerar a verticalidade do ambiente no planejamento da rota de voo, com atenção redobrada à autonomia necessária para o retorno em caso de operação próxima ao fundo do silo;</p></li>\n</ul><ul>\n<li><p>Avaliar a possibilidade de acúmulo de poeira sobre a gaiola, hélices e sensores durante o voo, com inspeção e limpeza pós-voo obrigatórias (seção 11.1);</p></li>\n</ul><ul>\n<li><p>Observar o risco de afundamento ou deslizamento de material particulado caso haja necessidade de aproximação à superfície do material armazenado, mantendo distância de segurança definida na avaliação de risco;</p></li>\n</ul><ul>\n<li><p>Confirmar a desenergização e o isolamento de sistemas de alimentação/descarga (roscas, esteiras, válvulas de fundo) antes do início da operação, conforme LOTO do Cliente.</p></li>\n</ul>"}, {"num": "9.5.3", "title": "Operação em Chaminés", "html": "<p>Chaminés industriais apresentam geometria predominantemente vertical e cilíndrica, podendo conter resíduos de fuligem, correntes de convecção térmica residual e revestimentos refratários degradados.</p><ul>\n<li><p>Confirmar o desligamento e o arrefecimento adequado do processo associado à chaminé antes do início da operação, respeitando os limites de temperatura ambiente da aeronave estabelecidos no seção 4;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de correntes de ar ascendentes residuais (tiragem térmica), que podem afetar a estabilidade de voo mesmo após o desligamento do processo;</p></li>\n</ul><ul>\n<li><p>Considerar a deposição de fuligem e particulados sobre lentes e sensores, podendo degradar a qualidade de imagem durante a missão, exigindo limpeza intermediária quando viável;</p></li>\n</ul><ul>\n<li><p>Planejar a rota de voo em padrão espiral ou em varredura vertical, adequado à geometria cilíndrica, com pontos de referência fixos para orientação do piloto;</p></li>\n</ul><ul>\n<li><p>Avaliar a integridade do revestimento refratário interno, que pode apresentar fragmentos soltos ou superfícies irregulares representando risco adicional de colisão.</p></li>\n</ul>"}, {"num": "9.5.4", "title": "Operação em Tanques", "html": "<p>A inspeção de tanques de armazenamento (NR-13) exige atenção especial à presença de produto residual, vapores e à necessidade de preparação prévia do equipamento pelo Cliente.</p><ul>\n<li><p>Exigir, como pré-requisito, a comprovação documental de esvaziamento, limpeza e teste de atmosfera (gas-free) do tanque, conforme procedimento de preparação para entrada do Cliente, ainda que não haja entrada humana, em razão do risco de vapores residuais afetarem a operação;</p></li>\n</ul><ul>\n<li><p>Aplicar a restrição crítica de zona Ex/ATEX do seção 4 sempre que houver histórico de armazenamento de produtos inflamáveis, mesmo após esvaziamento, até comprovação formal de desclassificação da área;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de borras, lodo ou produto residual no fundo do tanque, que pode comprometer a estabilidade caso a aeronave necessite de pouso de emergência nessa região;</p></li>\n</ul><ul>\n<li><p>Planejar a rota considerando a existência de chicanas, serpentinas de aquecimento, flutuadores e outros elementos internos típicos de tanques de armazenamento, que reduzem o espaço de manobra disponível;</p></li>\n</ul><ul>\n<li><p>Avaliar a necessidade de ventilação forçada prévia, fornecida pelo Cliente, para dissipação de vapores residuais antes da abertura da boca de visita utilizada para o lançamento.</p></li>\n</ul>"}, {"num": "9.5.5", "title": "Operação em Galerias", "html": "<p>Galerias técnicas (passagens para cabos, tubulações ou acesso de manutenção) caracterizam-se por extensão linear considerável, seção transversal reduzida e, frequentemente, presença de instalações elétricas ou hidráulicas ativas.</p><ul>\n<li><p>Avaliar a extensão total da galeria em relação à autonomia de voo disponível e ao alcance do enlace de comunicação, planejando pontos de retorno intermediários quando necessário;</p></li>\n</ul><ul>\n<li><p>Observar a presença de cabos, bandejas e tubulações suspensas que reduzem o espaço de manobra vertical e lateral disponível para a aeronave;</p></li>\n</ul><ul>\n<li><p>Confirmar o status de energização de instalações elétricas presentes na galeria junto ao Cliente, evitando aproximação além da distância de segurança estabelecida na avaliação de risco;</p></li>\n</ul><ul>\n<li><p>Considerar a possibilidade de acúmulo de gases em pontos baixos ou de ventilação deficiente ao longo da extensão da galeria, especialmente em trechos sem comunicação direta com o exterior.</p></li>\n</ul>"}, {"num": "9.5.6", "title": "Operação em Túneis", "html": "<p>Túneis apresentam desafios similares aos das galerias, em escala ampliada, com extensões que podem superar significativamente o alcance nominal do enlace de comunicação da aeronave em configuração padrão.</p><ul>\n<li><p>Avaliar, previamente, a necessidade de posicionamento de módulo(s) de extensão de alcance (range extender) ao longo do túnel, de forma a manter o enlace de comando e vídeo dentro de parâmetros confiáveis;</p></li>\n</ul><ul>\n<li><p>Planejar a missão em segmentos, com retorno e troca de bateria entre trechos, quando a extensão total exceder a autonomia disponível em um único voo;</p></li>\n</ul><ul>\n<li><p>Avaliar condições de ventilação e a possível presença de gases (especialmente em túneis associados a atividades de mineração ou rodoviárias com tráfego de veículos a combustão), aplicando-se a restrição crítica de zona Ex quando pertinente;</p></li>\n</ul><ul>\n<li><p>Estabelecer, no briefing operacional, marcos de distância e tempo estimado de voo para cada segmento, permitindo o monitoramento objetivo da progressão da missão pelo Operador 2.</p></li>\n</ul>"}, {"num": "9.5.7", "title": "Operação em Mineração", "html": "<p>As operações em instalações de mineração apresentam combinação de riscos típicos de espaço confinado, atmosfera com poeira mineral e, em mineração subterrânea de carvão, potencial de atmosfera explosiva por gás metano.</p><ul>\n<li><p>Aplicar a restrição crítica do seção 4 com rigor reforçado em minas subterrâneas com histórico ou potencial de liberação de gás metano ou outros gases inflamáveis, sendo vedada a operação sem comprovação documental e monitoramento contínuo de atmosfera fornecido pelo Cliente;</p></li>\n</ul><ul>\n<li><p>Coordenar a operação com a equipe de segurança e ventilação da mina, respeitando os protocolos específicos de entrada e permanência em áreas subterrâneas (incluindo, quando exigido, uso de detectores pessoais de gás pela equipe de apoio em solo);</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de poeira mineral em suspensão, que pode degradar a qualidade de imagem e exigir limpeza frequente dos componentes ópticos e sensores;</p></li>\n</ul><ul>\n<li><p>Observar a estabilidade estrutural de escavações, silos de minério, chutes e demais instalações típicas, considerando possível instabilidade geotécnica como fator de risco adicional à permanência da equipe de apoio em solo;</p></li>\n</ul><ul>\n<li><p>Respeitar os procedimentos de comunicação e sinalização específicos da mina, incluindo eventuais restrições de uso de equipamentos eletrônicos em áreas classificadas.</p></li>\n</ul>"}, {"num": "9.5.8", "title": "Operação em Siderurgia", "html": "<p>Instalações siderúrgicas (altos-fornos, fornos de fusão, lingotamento, laminação) combinam temperaturas elevadas, presença de escória, atmosferas com particulados metálicos e proximidade de processos térmicos intensos, regulados, no Brasil, pela NR-14.</p><ul>\n<li><p>Confirmar, junto ao Cliente, o desligamento e o arrefecimento do equipamento ou processo a ser inspecionado até temperatura compatível com o limite operacional da aeronave (seção 4), sendo vedada a operação em ambientes com temperatura superior ao limite do fabricante;</p></li>\n</ul><ul>\n<li><p>Avaliar a presença de resíduos de escória, poeira metálica e óxidos em suspensão, que podem se depositar sobre a aeronave e degradar sensores e superfícies ópticas, exigindo inspeção e limpeza pós-voo minuciosa (seção 11.1);</p></li>\n</ul><ul>\n<li><p>Observar a possível presença de campos eletromagnéticos intensos associados a fornos elétricos a arco ou de indução, com potencial de interferência sobre o magnetômetro e o enlace de comunicação;</p></li>\n</ul><ul>\n<li><p>Considerar a estabilidade térmica residual de estruturas metálicas recentemente desligadas, que pode gerar correntes de convecção e dilatação estrutural durante a inspeção;</p></li>\n</ul><ul>\n<li><p>Respeitar rigorosamente o isolamento (LOTO) de sistemas de movimentação de carga, pontes rolantes e demais equipamentos típicos da área siderúrgica.</p></li>\n</ul>"}, {"num": "9.5.9", "title": "Operação em Óleo e Gás", "html": "<p>As operações em instalações de óleo e gás (refinarias, terminais, plataformas, unidades de processamento) apresentam o mais elevado potencial de presença de atmosferas classificadas como explosivas (zonas Ex/ATEX), exigindo rigor procedimental máximo.</p><div class=\"callout crit\"><div class=\"ci\">⚠</div><div><b>ATENÇÃO - SETOR DE ÓLEO E GÁS</b>O veículo Flyability Elios 3, em sua configuração padrão, NÃO possui certificação ATEX e não deve ser operada em zonas classificadas como explosivas durante operação normal da planta. A liberação para inspeção somente é admissível após procedimento formal de despressurização, purga, isolamento e teste de atmosfera (gas-free) conduzido e documentado pelo Cliente, com a área formalmente desclassificada para a janela temporal da inspeção.</div></div><ul>\n<li><p>Exigir, como pré-requisito absoluto, a
