<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XD4 Blue Book — Sistema de Gestão Operacional</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0B2545;--blue:#134074;--accent:#3A6EA5;--xd4:#2BA9E0;
  --sky:#EEF3F9;--sky-line:#DCE6F1;--paper:#FFFFFF;
  --ink:#1A2432;--ink-2:#5A6B7F;--ink-3:#8A99AB;--line:#E4EAF1;
  --ok:#1E7B4F;--ok-bg:#E7F4EC;--warn:#B5820A;--warn-bg:#FBF3DE;
  --crit:#B42318;--crit-bg:#FBEAE8;--draft:#8A99AB;--draft-bg:#F0F2F5;
  --shadow:0 4px 14px rgba(11,37,69,.06);--shadow-lg:0 14px 34px rgba(11,37,69,.1);
}
[data-theme="dark"]{
  --navy:#0A1A30;--blue:#3A6EA5;--accent:#5B9BD5;--xd4:#2BA9E0;
  --sky:#0E1622;--sky-line:#1C2838;--paper:#131C2A;
  --ink:#E6EDF5;--ink-2:#9FB0C4;--ink-3:#6B7C90;--line:#22303F;
  --ok:#3FB98A;--ok-bg:#12291F;--warn:#E3B341;--warn-bg:#2A230E;
  --crit:#F27C6E;--crit-bg:#2A1512;--draft:#6B7C90;--draft-bg:#1A222E;
  --shadow:0 4px 14px rgba(0,0,0,.4);--shadow-lg:0 14px 34px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--sky);color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--sky-line);border-radius:99px}
svg{display:block}

/* ===== BANNER ===== */
.banner{background:var(--navy);color:#fff;padding:0 20px;height:62px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;border-bottom:3px solid var(--xd4)}
.logo-chip{background:#fff;border-radius:10px;height:42px;width:42px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:5px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.logo-chip img{width:100%;height:100%;object-fit:contain;display:block}
.home-logo{width:auto;height:96px;object-fit:contain;margin:8px auto 18px;display:block}
.brand{display:flex;flex-direction:column;line-height:1.1;cursor:pointer}
.brand .t1{font-weight:700;font-size:16px;letter-spacing:.2px}
.brand .t2{font-weight:400;font-size:10px;color:#9FB4CE;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.banner-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9FB4CE;text-align:right;line-height:1.3}
.clock b{color:#fff;display:block;font-weight:600}
.icon-btn{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#9FB4CE;transition:.15s}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.icon-btn svg{width:18px;height:18px}
.kbd{font-family:'IBM Plex Mono',monospace;font-size:11px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:2px 6px;color:#cfe0f2}

/* ===== LAYOUT ===== */
.layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 62px)}

/* ===== TREE ===== */
.tree{background:var(--paper);border-right:1px solid var(--line);overflow-y:auto;padding:8px 0 40px;transition:background .3s}
.tree-search{margin:14px;display:flex;align-items:center;gap:8px;height:38px;padding:0 12px;background:var(--sky);border:1px solid var(--sky-line);border-radius:8px;color:var(--ink-3)}
.tree-search input{background:none;border:none;outline:none;flex:1;font-size:13px;color:var(--ink)}
.tree-search svg{width:15px;height:15px;flex-shrink:0}
.tree-title{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);padding:12px 18px 6px;display:flex;align-items:center;gap:7px}
.node-row{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .1s;font-size:13.5px}
.node-row:hover{background:var(--sky)}
.node-row.active{background:var(--sky);border-left-color:var(--xd4)}
.caret{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s;color:var(--ink-3)}
.node.open>.node-row>.caret{transform:rotate(90deg)}
.caret.leaf{visibility:hidden}
.node-ic{width:25px;height:25px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--sky);color:var(--accent);border:1px solid var(--sky-line)}
.node-ic svg{width:13px;height:13px}
.node-lbl{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-lbl b{font-weight:600}
.node-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);flex-shrink:0}
.node-st{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.st-ok{background:var(--ok)}.st-warn{background:var(--warn)}.st-draft{background:var(--draft)}.st-crit{background:var(--crit)}
.children{display:none;padding-left:18px;border-left:1px dashed var(--sky-line);margin-left:27px}
.node.open>.children{display:block}
.node.root>.node-row{font-weight:600}
.node.root>.node-row .node-ic{background:var(--navy);color:#fff;border-color:var(--navy)}
.node.pinned>.node-row .node-lbl::after{content:"★";color:var(--xd4);font-size:10px;margin-left:6px}

/* ===== READER / CONTENT ===== */
.content{overflow-y:auto;scroll-behavior:smooth;position:relative}
.progress-bar{position:sticky;top:0;height:3px;background:transparent;z-index:20}
.progress-bar .fill{height:100%;width:0;background:var(--xd4);transition:width .1s}
.view{display:none}.view.active{display:block}

/* HOME */
.home{max-width:1060px;margin:0 auto;padding:24px 28px 80px}
.home-hero{text-align:center;padding:26px 0 22px}
.home-hero .badge-top{display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--paper);border:1px solid var(--sky-line);padding:5px 13px;border-radius:99px;margin-bottom:16px}
.home-hero .badge-top svg{width:14px;height:14px;flex-shrink:0}
.home-hero h1{font-size:29px;color:var(--ink);font-weight:600;letter-spacing:-.01em}
.home-hero .navy-txt{color:var(--xd4)}
.home-hero p{color:var(--ink-2);margin-top:8px;font-size:15px;max-width:580px;margin-inline:auto}
.home-search{max-width:540px;margin:22px auto 0;display:flex;align-items:center;gap:10px;height:48px;padding:0 16px;background:var(--paper);border:1px solid var(--sky-line);border-radius:12px;box-shadow:var(--shadow)}
.home-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(58,110,165,.12)}
.home-search input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--ink);background:none}
.home-search svg{width:18px;height:18px;color:var(--ink-3)}

.home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:28px 0}
.hstat{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.hstat .num{font-size:30px;font-weight:600;color:var(--ink);line-height:1;font-family:'IBM Plex Mono',monospace}
.hstat .lbl{font-size:11.5px;color:var(--ink-3);margin-top:7px;text-transform:uppercase;letter-spacing:.05em}
.hstat .num.ok{color:var(--ok)}.hstat .num.warn{color:var(--warn)}

.dash-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;margin-bottom:32px}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel h3::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.health{display:flex;align-items:center;gap:24px}
.donut{width:130px;height:130px;flex-shrink:0}
.health-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.hl-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
.hl-row .d{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.hl-row .v{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--ink)}
.hl-row .lbl{color:var(--ink-2)}

.feed{display:flex;flex-direction:column;gap:2px}
.feed-row{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.feed-row:first-child{border-top:none}
.feed-ic{width:30px;height:30px;border-radius:8px;background:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:13px}
.feed-tx{flex:1;font-size:13.5px}
.feed-tx small{display:block;color:var(--ink-3);font-size:11.5px;margin-top:1px;font-family:'IBM Plex Mono',monospace}

.home-sec-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);margin:6px 4px 16px;display:flex;align-items:center;gap:9px}
.home-sec-label::before{content:"";width:16px;height:2px;background:var(--accent);border-radius:2px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:32px}
.cat-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:24px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.cat-card::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:var(--accent);opacity:.05;transition:transform .3s}
.cat-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.cat-card:hover::after{transform:scale(1.4)}
.cat-ic{width:54px;height:54px;border-radius:13px;background:linear-gradient(135deg,var(--xd4),var(--blue));color:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:15px}
.cat-ic svg{width:28px;height:28px}
.cat-card h2{font-size:18px;color:var(--ink);font-weight:600}
.cat-card .desc{color:var(--ink-2);font-size:13.5px;margin-top:5px}
.cat-card .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;padding:4px 11px;color:var(--ink-2)}
.chip .d{width:6px;height:6px;border-radius:99px}

/* DOC READER */
.doc{max-width:840px;margin:0 auto;padding:32px 56px 140px;position:relative}
.crumbs{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-3);margin-bottom:20px;flex-wrap:wrap}
.crumbs a{cursor:pointer}.crumbs a:hover{color:var(--accent)}
.crumbs .sep{opacity:.5}
.cover{text-align:center;padding:14px 0 26px;border-bottom:2px solid var(--sky-line);margin-bottom:26px}
.cover .doc-ic{width:64px;height:64px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff}
.cover .doc-ic svg{width:32px;height:32px}
.cover h1{font-size:24px;color:var(--ink);font-weight:600}
.cover .sub{color:var(--xd4);font-weight:600;margin-top:5px;letter-spacing:.4px;font-size:14px}
.cover .tag{color:var(--ink-3);font-size:13px;margin-top:12px;font-style:italic;max-width:600px;margin-inline:auto}
.ctrl{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:28px}
.ctrl .c{padding:12px 15px;border-right:1px solid var(--line);border-top:1px solid var(--line)}
.ctrl .c:nth-child(-n+4){border-top:none}.ctrl .c:nth-child(4n){border-right:none}
.ctrl .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600}
.ctrl .v{font-size:13.5px;font-weight:500;margin-top:3px}
.ctrl .v.mono{font-family:'IBM Plex Mono',monospace;font-size:12.5px}
.copy-code{cursor:pointer;border-bottom:1px dashed var(--ink-3)}
.copy-code:hover{color:var(--accent);border-color:var(--accent)}

.chapindex{background:linear-gradient(180deg,var(--sky),var(--paper));border:1px solid var(--sky-line);border-radius:12px;padding:20px 22px 14px;margin-bottom:30px}
.chapindex h4{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--accent);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chapindex h4::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.chapindex .cols{display:grid;grid-template-columns:1fr 1fr;gap:1px 34px;min-width:0}
.chapindex a{display:flex;align-items:baseline;text-decoration:none;color:var(--ink-2);font-size:13px;padding:6px 4px;border-radius:6px;transition:.12s;cursor:pointer;min-width:0}
.chapindex a:hover{background:var(--sky);color:var(--ink)}
.chapindex a .n{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-weight:600;font-size:12px;min-width:32px;flex-shrink:0}
.chapindex a .tt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex-shrink:1}
.chapindex a .dots{flex:1;min-width:8px;border-bottom:1px dotted var(--sky-line);margin:0 8px;transform:translateY(-3px)}

h2.sec{font-size:19px;font-weight:600;color:var(--ink);margin:34px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--sky-line);display:flex;gap:12px;align-items:baseline;scroll-margin-top:20px}
h2.sec .sn{font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:16px}
h3.sub{font-size:15.5px;font-weight:600;color:var(--blue);margin:22px 0 8px;display:flex;gap:10px;scroll-margin-top:20px}
h3.sub .sn{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-size:14px}
.doc p{margin:9px 0;color:var(--ink)}
.doc ul{margin:10px 0 10px 4px;list-style:none}
.doc li{padding:5px 0 5px 22px;position:relative;color:var(--ink)}
.doc li::before{content:"•";position:absolute;left:5px;color:var(--accent);font-weight:700}
.callout{border-radius:8px;padding:14px 16px;margin:18px 0;display:flex;gap:12px;font-size:14px;line-height:1.55}
.callout .ci{flex-shrink:0;margin-top:1px;font-size:16px}
.callout b{display:block;text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;margin-bottom:3px}
.callout.crit{background:var(--crit-bg);border:1px solid rgba(180,35,24,.25);color:var(--ink)}.callout.crit b{color:var(--crit)}
.callout.warn{background:var(--warn-bg);border:1px solid rgba(181,130,10,.25);color:var(--ink)}.callout.warn b{color:var(--warn)}
.callout.note{background:var(--sky);border:1px solid var(--sky-line);color:var(--ink-2)}.callout.note b{color:var(--blue)}
.doc table{width:100%;border-collapse:collapse;margin:18px 0;font-size:13.5px;border:1px solid var(--sky-line);border-radius:8px;overflow:hidden}
.doc table thead th{background:var(--navy);color:#fff;text-align:left;padding:10px 12px;font-weight:600;font-size:12.5px}
.doc table tbody td{padding:9px 12px;border-top:1px solid var(--sky-line);color:var(--ink);vertical-align:top}
.doc table tbody tr:nth-child(even){background:var(--sky)}
.doc table th[colspan]{text-align:center}
.doc-foot{margin-top:46px;padding-top:20px;border-top:2px solid var(--sky-line);text-align:center;color:var(--ink-3);font-size:13px;font-style:italic}

/* scrollspy TOC */
.spy{position:fixed;top:100px;right:24px;width:200px;max-height:70vh;overflow-y:auto;font-size:12px;display:none;padding-left:14px;border-left:1px solid var(--line)}
.spy.show{display:block}
.spy a{display:block;padding:4px 0;color:var(--ink-3);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.1s}
.spy a:hover{color:var(--accent)}
.spy a.active{color:var(--xd4);font-weight:600}
@media(max-width:1400px){.spy{display:none!important}}

/* PLACEHOLDER DOC */
.ph{max-width:760px;margin:0 auto;padding:48px 40px}
.ph-head{text-align:center;margin-bottom:32px}
.ph-ic{width:76px;height:76px;border-radius:18px;margin:0 auto 18px;background:var(--sky);border:1px solid var(--sky-line);display:flex;align-items:center;justify-content:center;color:var(--accent)}
.ph-ic svg{width:36px;height:36px}
.ph-head h1{font-size:23px;color:var(--ink);font-weight:600}
.ph-head .code{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-size:13px;margin-top:6px}
.ph-status{display:inline-flex;align-items:center;gap:7px;margin-top:14px;height:28px;padding:0 14px;border-radius:99px;font-size:12.5px;font-weight:500;background:var(--sky);color:var(--accent);border:1px solid var(--sky-line)}
.ph-status .d{width:7px;height:7px;border-radius:99px;background:var(--accent)}
.ph-note{background:var(--sky);border:1px dashed var(--sky-line);border-radius:12px;padding:20px 24px;color:var(--ink-2);font-size:14px;text-align:center;margin-bottom:28px}
.ph-skel h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);font-weight:600;margin-bottom:14px}
.ph-skel-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;color:var(--ink-3);background:var(--paper)}
.ph-skel-row .n{font-family:'IBM Plex Mono',monospace;color:var(--ink-3);font-weight:600;font-size:12.5px;flex-shrink:0}
.ph-skel-row .bar{flex:1;height:8px;border-radius:99px;background:var(--sky-line);opacity:.6}

/* VEHICLE PROFILE */
.vp{max-width:860px;margin:0 auto;padding:32px 44px 100px}
.vp-hero{display:flex;gap:24px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:26px;box-shadow:var(--shadow);margin-bottom:24px}
.vp-img{width:140px;height:140px;border-radius:16px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;overflow:hidden}
.vp-img svg{width:60px;height:60px}
.vp-img img{width:100%;height:100%;object-fit:cover;border-radius:16px}
.vp-info{flex:1}
.vp-info .cls{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent)}
.vp-info h1{font-size:26px;color:var(--ink);font-weight:600;margin:4px 0 6px}
.vp-info .maker{color:var(--ink-2);font-size:14px}
.vp-ready{display:inline-flex;align-items:center;gap:7px;margin-top:12px;height:28px;padding:0 14px;border-radius:99px;font-size:12.5px;font-weight:500}
.vp-ready .d{width:7px;height:7px;border-radius:99px}
.vp-ready.ok{background:var(--ok-bg);color:var(--ok)}.vp-ready.ok .d{background:var(--ok)}
.vp-ready.warn{background:var(--warn-bg);color:var(--warn)}.vp-ready.warn .d{background:var(--warn)}
.vp-specs{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.spec{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:var(--shadow)}
.spec .k{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:600}
.spec .v{font-size:17px;font-weight:600;color:var(--ink);margin-top:4px;font-family:'IBM Plex Mono',monospace}
.spec .v small{font-size:11px;color:var(--ink-3);font-weight:400}
.vp-docs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.vp-doc{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow)}
.vp-doc:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.vp-doc .di{width:40px;height:40px;border-radius:10px;background:var(--sky);display:flex;align-items:center;justify-content:center;color:var(--accent);margin-bottom:12px}
.vp-doc .di svg{width:20px;height:20px}
.vp-doc h4{font-size:14px;color:var(--ink);font-weight:600}
.vp-doc .st{font-size:12px;color:var(--ink-3);margin-top:3px;display:flex;align-items:center;gap:6px}
.vp-doc .st .d{width:7px;height:7px;border-radius:99px}
.vp-maint h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.vp-maint h3::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.maint-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--paper);font-size:13.5px}
.maint-row .date{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-3);flex-shrink:0;width:80px}
.maint-row .desc{flex:1;color:var(--ink)}
.maint-row .badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.maint-row .badge.ok{background:var(--ok-bg);color:var(--ok)}
.maint-row .badge.warn{background:var(--warn-bg);color:var(--warn)}

.backbtn{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:13.5px;font-weight:500;cursor:pointer;margin-bottom:18px}
.backbtn:hover{text-decoration:underline}

/* COMMAND PALETTE */
.cmdk-overlay{position:fixed;inset:0;background:rgba(11,37,69,.4);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:14vh}
.cmdk-overlay.show{display:flex}
.cmdk{width:min(600px,92vw);background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
.cmdk-input{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.cmdk-input svg{width:18px;height:18px;color:var(--ink-3)}
.cmdk-input input{flex:1;border:none;outline:none;background:none;font-size:16px;font-family:inherit;color:var(--ink)}
.cmdk-results{max-height:52vh;overflow-y:auto;padding:8px}
.cmdk-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;cursor:pointer}
.cmdk-item.sel,.cmdk-item:hover{background:var(--sky)}
.cmdk-item .ci{width:30px;height:30px;border-radius:7px;background:var(--sky);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.cmdk-item.sel .ci{background:var(--paper)}
.cmdk-item .ci svg{width:15px;height:15px}
.cmdk-item .cl{flex:1;font-size:14px;color:var(--ink)}
.cmdk-item .cl small{display:block;font-size:11.5px;color:var(--ink-3)}
.cmdk-item .ck{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-3)}
.cmdk-empty{padding:30px;text-align:center;color:var(--ink-3);font-size:14px}

/* ===== ORGANOGRAMA ===== */
.org{max-width:1080px;margin:0 auto;padding:30px 40px 100px}
.org-head{margin-bottom:26px}
.org-head h1{font-size:24px;color:var(--ink);font-weight:600;display:flex;align-items:center;gap:12px}
.org-head h1 svg{width:26px;height:26px;flex-shrink:0}
.org-tab svg{width:15px;height:15px;flex-shrink:0}
.oc-count svg,.od-link svg{width:14px;height:14px}
.org-head p{color:var(--ink-2);font-size:14px;margin-top:6px;max-width:680px}
.org-tabs{display:flex;gap:8px;margin:22px 0 30px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:6px;width:fit-content;box-shadow:var(--shadow)}
.org-tab{padding:9px 18px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.org-tab.active{background:var(--navy);color:#fff}
.org-tab:not(.active):hover{background:var(--sky)}
.org-panel{display:none}
.org-panel.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* chart: piramidal com linhas */
.chart{display:flex;flex-direction:column;align-items:center;overflow-x:auto;padding:10px 0 20px}
.tier{display:flex;justify-content:center;gap:26px;position:relative;flex-wrap:nowrap}
.tier + .tier{margin-top:44px}
/* connector vertical descendo de um tier para o próximo */
.tier::before{content:"";position:absolute;top:-44px;left:50%;width:2px;height:22px;background:var(--sky-line)}
.tier:first-child::before{display:none}
/* barra horizontal que une irmãos */
.tier.multi::after{content:"";position:absolute;top:-22px;left:var(--barL,25%);right:var(--barR,25%);height:2px;background:var(--sky-line)}
/* cada nó tem um "poste" subindo até a barra */
.onode{position:relative;display:flex;flex-direction:column;align-items:center}
.onode.hasup::before{content:"";position:absolute;top:-22px;left:50%;width:2px;height:22px;background:var(--sky-line)}

.ocard{width:190px;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:16px 15px;text-align:center;cursor:pointer;transition:.16s;box-shadow:var(--shadow);position:relative}
.ocard:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.ocard.lvl0{background:linear-gradient(135deg,var(--navy),var(--blue));border-color:var(--navy)}
.ocard.lvl0 .oc-role,.ocard.lvl0 .oc-name{color:#fff}
.ocard.lvl0 .oc-ic{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.25)}
.ocard.lvl0 .oc-tag{background:rgba(255,255,255,.15);color:#dbe9f7;border-color:transparent}
.oc-ic{width:46px;height:46px;border-radius:12px;background:var(--sky);border:1px solid var(--sky-line);display:flex;align-items:center;justify-content:center;margin:0 auto 11px;color:var(--accent)}
.oc-ic svg{width:22px;height:22px}
.oc-role{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.25}
.oc-name{font-size:12px;color:var(--ink-3);margin-top:3px}
.oc-tag{display:inline-block;margin-top:9px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent);background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;padding:3px 10px}
.oc-count{position:absolute;top:-8px;right:-8px;min-width:22px;height:22px;padding:0 6px;border-radius:99px;background:var(--xd4);color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace}
.oc-flag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;color:var(--navy);background:var(--warn);border-radius:99px;padding:3px 10px;white-space:nowrap}

/* painel de detalhe do cargo */
.org-detail{margin-top:28px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:0;overflow:hidden;box-shadow:var(--shadow);display:none}
.org-detail.show{display:block;animation:fade .2s}
.od-head{display:flex;align-items:center;gap:16px;padding:22px 26px;background:linear-gradient(120deg,var(--sky),transparent);border-bottom:1px solid var(--line)}
.od-ic{width:52px;height:52px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.od-ic svg{width:26px;height:26px}
.od-head h3{font-size:19px;color:var(--ink);font-weight:600}
.od-head .sub{font-size:13px;color:var(--ink-3);margin-top:2px}
.od-body{padding:22px 26px}
.od-body h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.od-body h4::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.od-body ul{list-style:none;margin:0 0 4px}
.od-body li{padding:7px 0 7px 24px;position:relative;font-size:14px;color:var(--ink);border-top:1px solid var(--line)}
.od-body li:first-child{border-top:none}
.od-body li::before{content:"";position:absolute;left:5px;top:14px;width:8px;height:8px;border-radius:99px;background:var(--accent)}
.od-close{margin-left:auto;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);flex-shrink:0}
.od-close:hover{background:var(--sky);color:var(--ink)}
.od-link{display:inline-flex;align-items:center;gap:7px;margin-top:16px;font-size:13px;font-weight:500;color:var(--accent);cursor:pointer}
.od-link:hover{text-decoration:underline}

.org-hint{text-align:center;color:var(--ink-3);font-size:13px;margin-top:8px;font-style:italic}

/* famílias documentais (modo docs) — grid responsivo, não corta lateral */
.docs-chart{align-items:stretch}
.fam-connector{width:2px;height:26px;background:var(--sky-line);margin:0 auto}
.fam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;align-items:start;width:100%;position:relative}
/* barra horizontal ligando o topo às famílias */
.fam-grid::before{content:"";position:absolute;top:-13px;left:12%;right:12%;height:2px;background:var(--sky-line)}
.fam-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);position:relative}
.fam-card::before{content:"";position:absolute;top:-13px;left:50%;width:2px;height:13px;background:var(--sky-line)}
.fam-head{display:flex;align-items:center;gap:9px;padding:13px 15px;background:linear-gradient(120deg,var(--sky),transparent);border-bottom:1px solid var(--line)}
.fam-code{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#fff;background:var(--navy);border-radius:6px;padding:3px 9px;flex-shrink:0;min-width:30px;text-align:center}
.fam-title{font-size:13.5px;font-weight:600;color:var(--ink);flex:1;line-height:1.2}
.fam-count{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);background:var(--sky);border:1px solid var(--sky-line);border-radius:99px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0}
.fam-items{padding:6px}
.doc-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:12.5px;transition:.12s}
.doc-item + .doc-item{border-top:1px solid var(--line)}
.doc-item.link{cursor:pointer}
.doc-item.link:hover{background:var(--sky)}
.di-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0;background:var(--accent)}
.di-label{flex:1;color:var(--ink);line-height:1.3}
.di-code{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);flex-shrink:0}
.doc-item.link .di-label::after{content:"↗";font-size:10px;color:var(--accent);margin-left:5px}
/* subgrupo (veículos aéreos / terrestres dentro de uma família) */
.doc-subgroup{margin:8px 4px 2px;border:1px solid var(--sky-line);border-radius:10px;overflow:hidden;background:var(--sky)}
.doc-subgroup + .doc-subgroup{margin-top:10px}
.dsg-head{display:flex;align-items:center;gap:8px;padding:9px 12px;font-size:12px;font-weight:600;color:var(--blue);background:var(--paper);border-bottom:1px solid var(--sky-line)}
.dsg-head svg{width:15px;height:15px;flex-shrink:0;color:var(--accent)}
.doc-subgroup .doc-item{background:transparent}
.doc-subgroup .doc-item.link:hover{background:var(--paper)}


@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .tree{position:fixed;top:62px;bottom:0;left:0;width:300px;z-index:35;transform:translateX(-100%);transition:transform .25s;box-shadow:var(--shadow-lg)}
  .tree.open{transform:translateX(0)}
  .mob-tree-btn{display:flex}
  .doc{padding:26px 20px 100px}.ph,.vp{padding:26px 18px 80px}
  .home{padding:18px 16px 70px}
  .ctrl,.home-stats{grid-template-columns:1fr 1fr}
  .dash-grid,.cat-grid,.vp-docs{grid-template-columns:1fr}
  .vp-specs{grid-template-columns:1fr 1fr}
  .chapindex .cols{grid-template-columns:1fr}
  .vp-hero{flex-direction:column;text-align:center}
  .org{padding:22px 14px 70px}
  .ocard{width:150px;padding:13px 11px}
  .tier{gap:14px}.tier + .tier{margin-top:38px}
  .fam-grid{grid-template-columns:1fr;gap:14px}
  .fam-grid::before{display:none}
  .fam-card::before{display:none}
  .fam-connector{display:none}
}
/* ===== AUTH GATE ===== */
#authGate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:40px 20px}
.ag-bg{position:fixed;inset:0;background-image:url('https://images.unsplash.com/photo-1636887584784-954392022b75?auto=format&fit=crop&w=1920&q=80');background-position:center 30%;background-size:cover;background-repeat:no-repeat;filter:saturate(.85) brightness(.75)}
.ag-scrim{position:fixed;inset:0;background:linear-gradient(180deg,rgba(6,14,28,.88) 0%,rgba(8,20,38,.86) 40%,rgba(11,37,69,.94) 100%)}
.ag-content{position:relative;z-index:1;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;text-align:center;color:#fff;padding:20px 0 10px}
.ag-brand{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.ag-logo{width:34px;height:34px;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:4px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.ag-logo img{width:100%;height:100%;object-fit:contain}
.ag-brand-t{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.08em;color:#B9C8DC;text-transform:uppercase}
.ag-brand-t b{color:#fff;font-weight:600}
.ag-title{font-size:34px;font-weight:700;letter-spacing:-.01em;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.ag-subtitle{font-size:14.5px;color:#AFC0D6;margin-bottom:34px}
.ag-card{width:100%;max-width:380px;background:rgba(19,32,54,.55);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:26px 26px 22px;box-shadow:0 20px 60px rgba(0,0,0,.35);margin-bottom:22px}
.ag-label{display:block;text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:#9FB4CE;margin-bottom:8px}
.ag-inputrow{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:12px 14px;transition:.15s}
.ag-inputrow:focus-within{border-color:var(--xd4);background:rgba(255,255,255,.12)}
.ag-inputrow svg{width:18px;height:18px;color:#9FB4CE;flex-shrink:0}
.ag-inputrow input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px;font-family:inherit;min-width:0}
.ag-inputrow input::placeholder{color:#7488A3}
.ag-eye{color:#9FB4CE;flex-shrink:0;display:flex;padding:2px}
.ag-eye svg{width:18px;height:18px}
.ag-eye:hover{color:#fff}
.ag-error{display:none;text-align:left;color:#F27C6E;font-size:12.5px;margin-top:9px}
.ag-error.show{display:block}
.ag-card.shake{animation:agShake .4s}
@keyframes agShake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
.ag-submit{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--xd4),var(--blue));color:#fff;border:none;border-radius:10px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;transition:.15s;box-shadow:0 8px 20px rgba(43,169,224,.3)}
.ag-submit:hover{filter:brightness(1.08);transform:translateY(-1px)}
.ag-submit:active{transform:translateY(0)}
.ag-footer{font-size:12px;color:#7C90AB;max-width:420px;margin-top:6px}
#authGate.hidden{display:none}
@media(max-width:560px){
  .ag-title{font-size:25px}
}
</style>
</head>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>

<!-- Command palette -->
<div class="cmdk-overlay" id="cmdkOverlay">
  <div class="cmdk">
    <div class="cmdk-input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

<script>const MGO_CONTENT = [{"num": "1", "title": "PREFÁCIO", "sections": [{"num": "1.0", "title": "PREFÁCIO", "html": ""}, {"num": "1.1", "title": "Título do Manual", "html": "<p>Manual Geral de Operações (MGO).</p>"}, {"num": "1.2", "title": "Finalidade", "html": "<p>Este Manual Geral de Operações (MGO) estabelece a estrutura organizacional, os procedimentos gerais, as responsabilidades, os princípios de gestão operacional, de gerenciamento de riscos e de segurança aplicáveis às atividades desenvolvidas pela XD4Solutions com sistemas robóticos destinados à inspeção industrial, independentemente do fabricante, modelo, tecnologia ou categoria do equipamento empregado.</p><p>As disposições deste Manual aplicam-se a todas as operações conduzidas pela empresa com sistemas robóticos de inspeção, incluindo plataformas aéreas (RPAS), robôs terrestres e demais tecnologias incorporadas ao portfólio operacional, devendo ser observadas por todos os colaboradores envolvidos no planejamento, coordenação, execução, supervisão e apoio às operações.</p><p>Em conformidade com o escopo da certificação ISO 9001 da XD4Solutions, emitida pela Bureau Veritas, este Manual contempla, de forma geral, as seguintes atividades operacionais:</p><p>Prestação de serviços de inspeção industrial, monitoramento, levantamento de dados e mapeamento utilizando sistemas robóticos remotamente operados, aéreos ou terrestres;</p><p>Treinamento, capacitação e formação de operadores para a utilização desses sistemas em aplicações de inspeção industrial e atividades correlatas.</p><p>Este Manual constitui o documento normativo de mais alto nível da operação da XD4Solutions, estabelecendo as diretrizes corporativas, a filosofia operacional e os requisitos gerais aplicáveis a todas as operações.</p><p>Os procedimentos técnicos específicos, limitações operacionais, configurações, checklists, inspeções, critérios de emprego e demais particularidades de cada plataforma são definidos em seus respectivos Procedimentos Operacionais Padrão (POP) e Manuais Operacionais, os quais complementam este MGO e devem ser utilizados de forma integrada durante o planejamento, execução e encerramento das missões.</p><p>Na hipótese de conflito entre este Manual e um Procedimento Operacional Padrão (POP), prevalecerão as diretrizes estabelecidas neste MGO quanto às políticas, responsabilidades e gestão operacional, cabendo aos POP disciplinar exclusivamente os procedimentos técnicos específicos de cada plataforma.</p>"}, {"num": "1.3", "title": "Fundamento Legal", "html": "<p>Este Manual Geral de Operações estabelece o arcabouço corporativo de gestão operacional aplicável a todas as plataformas robóticas da XD4Solutions. Sua fundamentação legal varia conforme a natureza do equipamento operado:</p><p>Para sistemas aéreos remotamente pilotados (RPAS), aplicam-se o Código Brasileiro de Aeronáutica (Lei nº 7.565/1986), o regulamento da Agência Nacional de Aviação Civil (ANAC) aplicável a aeronaves não tripuladas, a Instrução do Comando da Aeronáutica (ICA 100-40) e as demais legislações aeronáuticas pertinentes;</p><p>Para robôs terrestres e demais equipamentos não aéreos, aplicam-se as Normas Regulamentadoras de segurança e saúde no trabalho pertinentes (com destaque para a NR-12, relativa a máquinas e equipamentos) e a legislação setorial aplicável ao ambiente de operação, não se sujeitando à regulamentação aeronáutica.</p><p>Este Manual é mantido permanentemente atualizado em relação a ambas as frentes regulatórias.</p>"}, {"num": "1.4", "title": "Obrigatoriedade de Cumprimento", "html": "<p>As disposições deste Manual visam garantir a legalidade, a segurança e a padronização da condução das operações da XD4Solutions, com qualquer equipamento.</p><p>O cumprimento destas instruções é mandatório para todos os colaboradores envolvidos nas atividades operacionais da empresa. A XD4Solutions compromete-se a cumprir, divulgar e fazer cumprir as disposições deste Manual e da legislação aplicável.</p><p>Os procedimentos de operação normal de cada equipamento constam do respectivo POP ou Manual Operacional do fabricante.</p><p>Em caso de discrepância entre este Manual e as instruções do fabricante quanto a procedimentos operacionais ou de manutenção, prevalecem os procedimentos do fabricante, salvo quando os procedimentos da XD4Solutions forem mais restritivos e indicarem padrão de segurança mais elevado.</p><p>Toda pessoa que opere sob a autoridade deste Manual e identifique divergência entre os procedimentos da empresa e os do fabricante deve comunicar o fato ao Diretor de Operações.</p>"}, {"num": "1.5", "title": "Distribuição", "html": "<p>Este Manual é disponibilizado, como arquivo eletrônico controlado, no Sistema de Gestão da Qualidade (SGQ) da XD4Solutions. A impressão do documento é permitida, mas a torna cópia não controlada.</p><p>Sempre que uma atualização deste Manual for aprovada, o Diretor de Operações disponibiliza a nova versão eletrônica no SGQ e comunica todos os colaboradores, para que tomem ciência da atualização.</p><p>É proibida a reprodução total ou parcial do conteúdo deste Manual sem autorização expressa da XD4Solutions.</p>"}, {"num": "1.6", "title": "Procedimento de Revisão", "html": "<p>A elaboração inicial e as revisões deste MGO são de responsabilidade do Diretor de Operações, com o apoio do Setor de qualidade.</p><p>Solicitações de alteração, motivadas pela experiência operacional ou pela identificação de erros e deficiências no Manual, devem ser submetidas ao Diretor de Operações, a quem cabe analisar a proposta antes de oficializá-la, de modo a assegurar a ausência de conflito com qualquer outro regulamento em vigor.</p><p>As atualizações deste Manual são realizadas por meio de Memorandos Operacionais (XX-XX-XXX) e de revisões definitivas:</p><p>Os Memorandos Operacionais são emitidos quando a urgência da disseminação da informação justificar a adoção de ações prioritárias, antes da publicação de uma revisão definitiva;</p><p>Os Memorandos são numerados sequencialmente e divulgados em formato eletrônico a todas as áreas afetadas;</p><p>Cada Memorando tem validade de dois anos a partir de sua publicação, ou até a publicação de nova revisão definitiva do MGO, o que ocorrer primeiro;</p><p>Memorandos não incorporados a uma revisão definitiva dentro desse prazo perdem efeito automaticamente;</p><p>Memorandos vigentes no momento da publicação de uma revisão definitiva são incorporados a essa revisão.</p><p>A incorporação de uma nova categoria de equipamento à frota da XD4Solutions (Capítulo 3.0) não exige, por si só, a revisão definitiva deste MGO, bastando a atualização da lista de plataformas e POPs do Capítulo 12.0 e, quando aplicável, Memorando Operacional informando a novidade. A revisão definitiva do MGO é reservada a alterações na estrutura organizacional, na filosofia operacional ou nos princípios gerais de gestão de risco e segurança aqui estabelecidos.</p>"}, {"num": "1.7", "title": "Abreviaturas, Acrônimos e Definições", "html": "<p>As abreviaturas, os acrônimos e as definições de uso geral deste Manual relativas a sistemas aéreos são os constantes da ICA 100-40 (DECEA) e do regulamento da ANAC aplicável a aeronaves não tripuladas, sendo desnecessária sua repetição neste documento. As definições relativas a robôs terrestres e demais equipamentos seguem a terminologia do respectivo POP ou manual do fabricante.</p><p>Todos os sistemas aéreos remotamente pilotados (RPAS) operados pela XD4Solutions são cadastrados no Sistema de Aeronaves Não Tripuladas (SISANT/ANAC), classificados, sob o regulamento vigente até a transição de que trata a nota da Seção 1.3, como Classe 3 (peso máximo de decolagem entre 250 g e 25 kg), autorizados a operar em VLOS (Visual Line of Sight) até 400 ft AGL, e possuem as certificações obrigatórias exigidas pela ANATEL. Esta classificação não se aplica a robôs terrestres ou a outros equipamentos não aéreos.</p><p>Para referência rápida, a tabela a seguir lista as siglas de uso frequente neste Manual cujo significado não decorre diretamente das normas citadas acima:</p>"}]}, {"num": "2", "title": "FILOSOFIA OPERACIONAL DA XD4SOLUTIONS", "sections": [{"num": "2.0", "title": "FILOSOFIA OPERACIONAL DA XD4SOLUTIONS", "html": "<p>A XD4Solutions é uma empresa de inspeção industrial robótica. Sua atividade não se define por um equipamento específico, mas pela aplicação disciplinada de sistemas remotamente operados — aéreos, terrestres ou de outra natureza — à inspeção de ativos industriais, reduzindo a exposição humana a ambientes de risco e elevando a qualidade técnica dos dados coletados.</p><p>Essa disciplina operacional é inspirada em práticas consagradas pela aviação, que a XD4Solutions adota como princípio corporativo transversal a toda a sua frota, independentemente da plataforma utilizada em cada missão:</p><p>Uso sistemático de checklists em todas as fases da operação, da preparação ao encerramento;</p><p>Realização de briefings antes e debriefings após cada missão, como instrumento de alinhamento de equipe e de aprendizado contínuo;</p><p>Tomada de decisão Go/No-Go fundamentada em critérios objetivos, e não em pressão comercial ou de prazo;</p><p>Cadeia de comando clara, com autoridade final do operador em comando do equipamento sobre as decisões de segurança da missão;</p><p>Comunicação padronizada e cultura de assertividade entre os membros da equipe (speak up culture), independentemente de hierarquia.</p><p>Esses princípios são deliberadamente formulados de modo agnóstico em relação ao equipamento: aplicam-se da mesma forma a uma missão com um sistema aéreo remotamente pilotado, com um robô terrestre ou com qualquer outra plataforma que venha a integrar a frota da XD4Solutions. As particularidades técnicas de cada equipamento — limites de desempenho, modos de operação, procedimentos de emergência específicos — são tratadas no POP correspondente (Capítulo 3.0 e Capítulo 12.0), nunca neste Manual.</p><p>A cultura de segurança da XD4Solutions assenta-se sobre três pilares: (i) a prevalência da segurança das pessoas sobre a integridade do equipamento e sobre a conveniência comercial; (ii) o reporte não punitivo de ocorrências e quase acidentes, como instrumento de aprendizado organizacional; e (iii) a melhoria contínua dos processos, com base em indicadores objetivos de desempenho operacional.</p><p>Este Manual foi concebido para crescer com a empresa: a incorporação de novas tecnologias de inspeção robótica não exige a reformulação de sua estrutura, apenas a criação do POP correspondente e a atualização da lista de plataformas do Capítulo 3.0.</p>"}]}, {"num": "3", "title": "CLASSIFICAÇÃO DAS PLATAFORMAS E SISTEMAS OPERACIONAIS", "sections": [{"num": "3.0", "title": "CLASSIFICAÇÃO DAS PLATAFORMAS E SISTEMAS OPERACIONAIS", "html": "<p>Este capítulo classifica, em caráter geral, os tipos de equipamento atualmente operados pela XD4Solutions e estabelece o princípio de relacionamento entre este MGO e a documentação técnica específica de cada plataforma.</p>"}, {"num": "3.1", "title": "Sistemas Aéreos Remotamente Pilotados (RPAS)", "html": "<p>Compreendem as aeronaves remotamente pilotadas utilizadas em inspeção industrial e mapeamento aéreo, exemplificadas, sem caráter exaustivo, pela plataforma Flyability Elios 3 (uso indoor/ambiente confinado) e por plataformas DJI (uso outdoor). Estão sujeitos à regulamentação da ANAC, do DECEA e da ANATEL, conforme detalhado no Capítulo 1.3, e a seu próprio POP.</p>"}, {"num": "3.2", "title": "Robôs Terrestres de Inspeção", "html": "<p>Compreendem plataformas robóticas terrestres, com ou sem capacidade de locomoção autônoma assistida, utilizadas em inspeção de ativos industriais não aéreos, exemplificadas, sem caráter exaustivo, pelo robô quadrúpede Unitree GO2. Não estão sujeitos à regulamentação aeronáutica, aplicando-se a NR-12 e demais normas de segurança do trabalho pertinentes ao ambiente de operação, além do POP próprio de cada plataforma.</p>"}, {"num": "3.3", "title": "Equipamentos Auxiliares", "html": "<p>Compreendem sensores, cargas úteis intercambiáveis, estações de controle, dispositivos de comunicação e demais equipamentos de apoio à operação dos sistemas dos itens 3.1 e 3.2, cujas especificações constam do POP da plataforma à qual se acoplam.</p>"}, {"num": "3.4", "title": "Incorporação de Novas Tecnologias", "html": "<p>A XD4Solutions prevê a incorporação contínua de novas plataformas robóticas à sua frota. A inclusão de um novo equipamento — aéreo, terrestre ou de outra natureza — observa o seguinte fluxo:</p><p>Elaboração de POP ou Manual Operacional específico para o novo equipamento, sob responsabilidade do Diretor de Operações e do Técnico de Manutenção, contemplando suas particularidades técnicas, limites de desempenho e procedimentos de emergência;</p><p>Elaboração de avaliação de risco específica da nova plataforma, complementar à metodologia geral do Capítulo 7.0;</p><p>Verificação, pelo Diretor de Operações, da regulamentação aplicável ao novo equipamento (aeronáutica, de segurança do trabalho, setorial ou outra), atualizando-se, se for o caso, a fundamentação legal deste Manual (Seção 1.3);</p><p>Atualização da lista de plataformas e POPs vigentes (Capítulo 12.0);</p><p>Treinamento e habilitação da equipe designada para operar o novo equipamento, conforme Capítulo 4.0.</p><p>Este MGO permanece válido e aplicável a qualquer novo equipamento incorporado à frota, sem necessidade de revisão definitiva, exceto quando a nova tecnologia exigir alteração dos princípios gerais de organização, risco ou segurança aqui estabelecidos.</p>"}, {"num": "3.5", "title": "Relação entre o MGO e os POPs Específicos", "html": "<p>Este Manual estabelece diretrizes gerais de gestão operacional e de segurança, comuns a toda a frota da XD4Solutions. Ele não descreve procedimentos técnicos detalhados de operação de qualquer equipamento específico. Sempre que este Manual fizer referência a uma ação técnica cujo detalhamento dependa da plataforma utilizada, aplica-se o seguinte princípio:</p><p>Em caso de conflito entre este Manual e o POP de uma plataforma específica quanto a aspectos técnicos do equipamento, prevalece o POP; em caso de conflito quanto a princípios gerais de gestão operacional, responsabilidade ou segurança corporativa, prevalece este Manual.</p>"}]}, {"num": "4", "title": "ESTRUTURA E ORGANIZAÇÃO", "sections": [{"num": "4.0", "title": "ESTRUTURA E ORGANIZAÇÃO", "html": ""}, {"num": "4.1", "title": "Organograma Geral da Empresa", "html": "<p>O organograma completo da XD4Solutions encontra-se disponível na documentação interna do Sistema de Gestão da Qualidade (SGQ). Para fins deste Manual Geral de Operações, aplica-se a estrutura hierárquica operacional composta por Diretor de Operações, Coordenador de Operações, Líder de Operações, Operador 1, Operador 2 e Técnico de Manutenção, comum a todas as plataformas operadas pela empresa, atuais e futuras.4.1.1 Equivalência de Termos</p><p>Quando o equipamento operado for um sistema aéreo remotamente pilotado (RPAS), aplica-se a seguinte correspondência entre as funções previstas na legislação da ANAC/DECEA e a terminologia adotada pela XD4Solutions. Para robôs terrestres e demais equipamentos, não sujeitos à regulamentação aeronáutica, utiliza-se diretamente a terminologia XD4Solutions, sem necessidade de equivalência:</p>"}, {"num": "4.2", "title": "Requisitos e Responsabilidades", "html": "<p>As competências exigidas para cada função são definidas no documento &quot;Descrição de Cargos&quot; do Sistema de Gestão da Qualidade, com base em educação, treinamento e experiência apropriados, incluindo a habilitação específica na(s) plataforma(s) que o colaborador estiver autorizado a operar.</p>"}, {"num": "4.2.1", "title": "Diretor Executivo (CEO)", "html": "<p>O CEO responde pela segurança e pela conformidade corporativa da XD4Solutions. Compete ao CEO:</p><p>Fornecer os recursos necessários — financiamento e recursos humanos — para que as operações e a manutenção, com qualquer equipamento da frota, atendam às obrigações, metas e objetivos da empresa;</p><p>Garantir que toda operação realizada em nome da XD4Solutions, com qualquer plataforma, seja conduzida sob o controle e a autoridade do Diretor de Operações.</p>"}, {"num": "4.2.2", "title": "Diretor de Operações", "html": "<p>O Diretor de Operações é a máxima autoridade operacional da XD4Solutions, respondendo por todas as questões que envolvam a área operacional da empresa, com qualquer equipamento, e pela conformidade das operações com as normas e leis vigentes, aeronáuticas ou não. Dirige e supervisiona a atuação do Coordenador de Operações e do Líder de Operações, e responde pelo treinamento dos clientes que adquiram equipamentos comercializados pela XD4Solutions.</p><p>Compete ainda ao Diretor de Operações:</p><p>Assegurar que as operações sejam realizadas em conformidade com as normas e leis vigentes aplicáveis a cada tipo de plataforma (Seção 1.3);</p><p>Atuar como elo entre a XD4Solutions e os órgãos reguladores pertinentes a cada plataforma (ANAC, DECEA e ANATEL para sistemas aéreos; demais órgãos competentes para outros equipamentos);</p><p>Monitorar a aplicação das políticas, dos processos e dos procedimentos organizacionais;</p><p>Aprovar este Manual e suas revisões, os POPs específicos de cada plataforma (Capítulo 12.0) e as Ordens de Serviço processadas pelo Coordenador de Operações;</p><p>Dirigir os processos operacionais da XD4Solutions;</p><p>Autorizar as operações especiais e os voos ou missões sujeitas a autorizações adicionais (Seções 5.3.1 e 5.3.2), quando não solucionáveis no nível do Coordenador de Operações;</p><p>Conduzir ou supervisionar a investigação de acidentes e ocorrências de maior gravidade (Seção 11.7);</p><p>Liderar o processo de incorporação de novas plataformas à frota (Seção 3.4).</p>"}, {"num": "4.2.3", "title": "Coordenador de Operações", "html": "<p>O Coordenador de Operações responde pela administração rotineira das atividades operacionais da XD4Solutions, com qualquer equipamento, servindo de ponto focal operacional para autorizações adicionais durante a missão e de interlocutor de rotina com clientes e órgãos reguladores. Compete ao Coordenador de Operações:</p><p>Manter atualizado o registro do Quadro de Operadores e das plataformas que cada um está habilitado a operar;</p><p>Manter biblioteca de referência completa e atualizada de documentos operacionais, regulatórios e dos POPs vigentes (Capítulo 12.0);</p><p>Desenvolver e atualizar checklists e procedimentos operacionais gerais, em articulação com os POPs de cada plataforma;</p><p>Coordenar as etapas principais dos serviços prestados e gerenciar a equipe técnico-operacional;</p><p>Organizar treinamentos e cursos para operadores, incluindo a habilitação em novas plataformas;</p><p>Agendar e monitorar os serviços contratados pelos clientes, processando as respectivas Ordens de Serviço para aprovação do Diretor de Operações;</p><p>Elaborar a escala dos times de inspeção (Seção 6.1) e designar os tripulantes de cada missão e o equipamento a ser utilizado, em conjunto com o Líder de Operações (Seção 5.2);</p><p>Gerenciar a experiência recente dos operadores por tipo de plataforma e as necessidades de treinamento de reciclagem (Seção 5.2.1);</p><p>Servir de ponto focal para a obtenção de autorizações adicionais durante a missão (Seção 5.3.1);</p><p>Determinar a necessidade de uso de rádio aeronáutico nas operações com sistemas aéreos (Seção 9.6);</p><p>Assegurar o cumprimento das instruções do transportador quanto ao transporte de artigos perigosos (Seção 10.7);</p><p>Receber os reportes de acidente, incidente e ocorrência anormal, e notificar a ANAC e/ou o CENIPA quando exigido e aplicável ao tipo de equipamento (Seção 11.7).</p>"}, {"num": "4.2.4", "title": "Líder de Operações", "html": "<p>O Líder de Operações é o responsável, em campo, pela condução do Time de Inspeção em cada missão, com qualquer equipamento, respondendo pela disciplina operacional da equipe e servindo de elo entre o Time de Inspeção e o Coordenador de Operações. Compete ao Líder de Operações:</p><p>Liderar o Time de Inspeção durante a missão, mantendo a disciplina operacional da equipe;</p><p>Conduzir ou validar, junto ao responsável pela segurança da estrutura do cliente, o briefing inicial e a revisão da avaliação de risco da missão (Seção 7.1);</p><p>Confirmar, junto ao Operador 1, a decisão de início, continuidade ou suspensão da missão;</p><p>Zelar pelo cumprimento, pela equipe, dos limites de jornada de trabalho e das medidas de gerenciamento de fadiga (Capítulo 6.0);</p><p>Servir de ponto de contato local com o cliente durante a execução da missão;</p><p>Reportar ao Coordenador de Operações o andamento da missão e qualquer ocorrência identificada em campo.</p><p>Em missões conduzidas pela tripulação mínima (Seção 4.3), a função de Líder de Operações pode ser acumulada pelo Operador 1, desde que este possua a qualificação exigida para tal.</p>"}, {"num": "4.2.5", "title": "Oficial de Segurança", "html": "<p>Deve ter sido aprovado em curso de segurança operacional reconhecido pela ANAC e ter pelo menos um ano de experiência em segurança operacional ou prevenção de acidentes. É o responsável por gerenciar as atividades de segurança operacional de toda a frota da XD4Solutions e por supervisionar as atividades de segurança do trabalho, conforme a legislação em vigor.</p><p>Compete ao Oficial de Segurança:</p><p>Participar da elaboração e da implementação da política de saúde e segurança do trabalho;</p><p>Identificar variáveis de controle de doenças, acidentes, qualidade de vida e meio ambiente;</p><p>Desenvolver ações educativas em saúde e segurança do trabalho;</p><p>Gerenciar a documentação de segurança do trabalho, incluindo PPRA e PCMSO;</p><p>Acompanhar, apoiar e aplicar treinamentos de segurança, comuns a toda a frota e específicos de cada plataforma;</p><p>Gerenciar a guarda e a distribuição de equipamentos de proteção;</p><p>Atuar junto às demais áreas da empresa para eliminar ou reduzir os riscos de acidentes, com qualquer equipamento.</p>"}, {"num": "4.2.6", "title": "Operador 1", "html": "<p>O Operador 1 é o tripulante habilitado que conduz a operação do equipamento, respondendo pelas responsabilidades essenciais da missão e pelo manuseio direto dos comandos da plataforma utilizada.</p><p>O Operador 1 tem autonomia plena para tomar qualquer decisão em favor da segurança da operação, sem que disso decorra consequência disciplinar, desde que sua ação seja motivada exclusivamente pela segurança da missão.</p><p>Sua autoridade e responsabilidade iniciam-se ao receber o equipamento com intenção de uso operacional e encerram-se ao término da missão, quando entrega o equipamento e os registros da operação à empresa ou a outra parte por ela determinada.</p><p>O Operador 1 é diretamente responsável pela condução segura do equipamento e pelas consequências dela advindas, detendo a autoridade final sobre sua operação.</p><p>Além das previstas na legislação vigente aplicável ao tipo de equipamento, são responsabilidades do Operador 1:</p><p>Não operar sem estar apto fisicamente, psicologicamente e legalmente para tal;</p><p>Cumprir as normas operacionais deste Manual, o pop da plataforma designada e o manual do fabricante do equipamento;</p><p>Planejar as missões, observando todos os aspectos de segurança e eficiência da operação;</p><p>Verificar se o equipamento está configurado de acordo com os requisitos da missão;</p><p>Verificar se o equipamento apresenta as condições técnicas necessárias à missão programada, conforme o POP aplicável;</p><p>Verificar as condições ambientais do local da missão relevantes ao tipo de equipamento utilizado;</p><p>Tomar conhecimento dos NOTAM de sua área, quando aplicável a sistemas aéreos;</p><p>Comunicar à empresa, de imediato, qualquer problema que afete as condições técnicas do equipamento ou que possa comprometer a qualidade das operações;</p><p>Contatar o Coordenador de Operações quando o material de apoio do equipamento estiver desatualizado;</p><p>Zelar pela correta escrituração do Diário de Operação e Manutenção, em especial quanto ao relato de discrepâncias (Capítulo 8.0);</p><p>Adotar as providências necessárias à solução de problemas surgidos durante a missão, de modo a atingir as metas do cliente e da XD4Solutions;</p><p>Manter válidas as habilitações e qualificações necessárias ao exercício da função na(s) plataforma(s) designada(s), informando a empresa com antecedência suficiente quanto a vencimentos;</p><p>Deter domínio técnico do equipamento de inspeção, conforme o POP aplicável, e das normas em vigor;</p><p>Conferir o material, o equipamento (checklist) e a documentação a serem utilizados na operação;</p><p>Elaborar a Avaliação de Risco (Risk Assessment) do local antes do início das operações;</p><p>Executar a atividade de inspeção em conformidade com as normas de Saúde, Segurança e Meio Ambiente;</p><p>Após o término da missão, limpar e inspecionar o equipamento quanto a avarias, acondicionando-o conforme especificado em seu POP;</p><p>Colaborar com o setor de Marketing, fornecendo informações, vídeos e imagens de operações e treinamentos para a criação de conteúdo institucional;</p><p>Processar os dados brutos coletados em campo, conforme estabelecido na Ordem de Serviço, nos softwares específicos e dentro dos prazos previstos;</p><p>Garantir que todos os detalhes da missão sejam registrados no Diário de Operação e Manutenção do equipamento;</p><p>Utilizar os checklists e cumprir os procedimentos operacionais aprovados.</p><p>A transferência da função de Operador 1 entre membros habilitados da equipe, quando aplicável, deve ser efetuada de forma inequívoca e conforme os procedimentos estabelecidos no briefing inicial de cada operação.</p>"}, {"num": "4.2.7", "title": "Operador 2", "html": "<p>O Operador 2 assiste o Operador 1 durante a missão, exercendo suas atividades sob a orientação e a responsabilidade deste. São suas obrigações:</p><p>Não operar sem estar apto fisicamente, psicologicamente e legalmente para tal;</p><p>Cumprir as normas operacionais deste Manual, o POP da plataforma designada e o manual do fabricante do equipamento;</p><p>Operar as câmeras, os sensores, a iluminação e os dispositivos auxiliares do equipamento;</p><p>Participar, junto ao Operador 1, da inspeção pré-missão e da conferência dos checklists;</p><p>Registrar com precisão os dados obtidos nas inspeções;</p><p>Acompanhar as rotas planejadas, orientando o Operador 1 quanto ao melhor posicionamento para obtenção das imagens necessárias;</p><p>Auxiliar o Operador 1 durante a missão, em especial na verificação dos parâmetros de autonomia e da intensidade dos sinais de telemetria, vídeo e controle, alertando-o de imediato sobre qualquer anomalia;</p><p>Manter válidas as habilitações e qualificações necessárias ao exercício da função, informando a empresa com antecedência suficiente quanto a vencimentos;</p><p>Reportar ao Operador 1, de imediato, qualquer problema que afete as condições técnicas do equipamento;</p><p>Assegurar-se de possuir todas as informações relevantes sobre o tipo de equipamento e a missão a ser realizada;</p><p>Executar as atribuições que lhe forem conferidas pelo Operador 1;</p><p>Deter domínio técnico do equipamento de inspeção, conforme o POP aplicável, e das normas em vigor;</p><p>Apoiar o Operador 1 na elaboração do Plano de Inspeção;</p><p>Acompanhar a conferência do material, do equipamento (checklist) e da documentação a serem utilizados na operação;</p><p>Auxiliar o Operador 1 no cumprimento da Avaliação de Risco;</p><p>Auxiliar na execução da inspeção, em conformidade com as normas de Saúde, Segurança e Meio Ambiente;</p><p>Auxiliar na limpeza e na inspeção do equipamento quanto a avarias, acondicionando-o conforme o POP aplicável;</p><p>Processar os dados brutos coletados em campo, conforme estabelecido na Ordem de Serviço;</p><p>Colaborar com o setor de Marketing, fornecendo conteúdo institucional;</p><p>Quando aplicável, auxiliar na elaboração do laudo técnico da inspeção, com base nos dados coletados durante a missão.</p>"}, {"num": "4.2.8", "title": "Técnico de Manutenção", "html": "<p>O Técnico de Manutenção é a função encarregada da condição técnica e da operacionalidade continuada dos equipamentos da frota, aéreos, terrestres ou de outra natureza. Compete ao Técnico de Manutenção:</p><p>Avaliar boletins de serviço e alertas de segurança emitidos pelos fabricantes de cada plataforma, aplicando-os no menor prazo possível quando classificados como críticos para a segurança da operação;</p><p>Aprovar a liberação do equipamento para nova missão após manutenção corretiva, verificando a resolução de toda discrepância registrada no Diário de Operação e Manutenção (Seção 8.2);</p><p>Manter o histórico de manutenção, as atualizações de firmware/software e o controle de vida útil de componentes críticos de cada plataforma, conforme respectivo POP;</p><p>Avaliar a necessidade de recalibração de sensores após impacto, transporte ou indicação do sistema;</p><p>Executar ou supervisionar os serviços de manutenção de pequena monta (Seção 8.5.2), encaminhando à oficina da empresa ou ao fabricante os serviços que exijam desmontagem com ferramentas específicas;</p><p>Participar da elaboração do POP de manutenção de cada nova plataforma incorporada à frota (Seção 3.4);</p><p>Comunicar ao Coordenador de Operações qualquer não conformidade técnica que impeça a liberação do equipamento.</p>"}, {"num": "4.2.9", "title": "Explorador (vide ICA 100-40 - Aplicável a Sistemas Aéreos)", "html": "<p>Pessoa física ou jurídica, proprietária ou não, que utiliza a aeronave de forma legítima, direta ou indireta, com ou sem fins lucrativos. Este conceito é específico da regulamentação aeronáutica, aplicando-se apenas aos sistemas aéreos (RPAS) da frota.</p><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b>Nota 1: no contexto de Aeronaves Remotamente Pilotadas, a exploração da aeronave inclui todo o Sistema de Aeronaves Remotamente Pilotadas;</div></div><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b>Nota 2: em algumas regulamentações, o termo &quot;Explorador&quot; é equivalente a &quot;Operador&quot;, assim como &quot;exploração&quot; equivale a &quot;operação&quot;;</div></div><div class=\"callout note\"><div class=\"ci\">ℹ</div><div><b>Nota</b>Nota 3: em contratações de empresas terceirizadas, o Explorador torna-se corresponsável pela operação e pelos resultados dela advindos.</div></div><p>O art. 268, § 1º, da Lei nº 7.565/1986 estabelece que prevalece a responsabilidade do Explorador quando a aeronave é pilotada por seus prepostos, ainda que estes exorbitem de suas atribuições.</p><p>O Explorador UAS (XD4Solutions) é responsável pelo gerenciamento de pessoal (programa de treinamento, composição de equipe, procedimentos de transferência de pilotagem, controle de fadiga), pela manutenção (programa de manutenção, registros, aeronavegabilidade continuada, modificações e reparos), pela documentação (manuais, certificados, licenças, registros, diário de bordo), pelos contratos com provedores de serviços e pela proteção e salvaguarda da operação, no que se refere especificamente aos sistemas aéreos de sua frota.</p>"}]}, {"num": "5", "title": "CONTROLE OPERACIONAL", "sections": [{"num": "5.0", "title": "CONTROLE OPERACIONAL", "html": ""}, {"num": "5.1", "title": "Designação da Operação", "html": "<p>Conforme o escopo da certificação ISO 9001 (Bureau Veritas, 2018), a XD4Solutions está certificada para conduzir serviços de inspeção industrial e de mapeamento com sistemas robóticos remotamente operados, aéreos ou terrestres, além de treinamento e formação de operadores para sua utilização em atividades de inspeção industrial.</p><p>Os sistemas aéreos (RPAS) operados pela XD4Solutions são cadastrados no SISANT e sujeitos às condições regulatórias descritas no Capítulo 1.3 e no Capítulo 3.1. Robôs terrestres e demais equipamentos não aéreos não estão sujeitos a esse cadastro, observando-se, em seu lugar, as exigências de segurança do trabalho e as eventuais autorizações de acesso exigidas pelo cliente.</p><p>O equipamento não pode operar a menos de 30 m de pessoas não envolvidas e não anuentes com a operação, salvo quando o POP da plataforma estabelecer parâmetro distinto tecnicamente justificado, ou quando houver barreira mecânica suficientemente forte para isolar e proteger essas pessoas na eventualidade de um acidente.</p><p>A anuência referida no parágrafo anterior deve ser dada expressamente, por documento (Anexo FO-OPE-006 - Ordem de Serviço) ou presenciada por testemunhas.</p>"}, {"num": "5.2", "title": "Designação do Time de Inspeção (Operadores)", "html": "<p>São responsáveis pela designação de tripulantes na XD4Solutions:</p><p>O Coordenador de Operações, em conjunto com o Líder de Operações (ou seus substitutos eventuais);</p><p>O Diretor de Operações.</p><p>Para assumir uma missão e operar um equipamento, o Operador 1 ou o Operador 2 deve atender a todas as qualificações e treinamentos legais e contratuais exigidos para a plataforma designada, observados os seguintes critérios:</p><p>A empresa é responsável por disponibilizar as ferramentas necessárias ao cumprimento do requisito; ou</p><p>O operador é o único responsável pelo cumprimento do requisito.</p><p>Em qualquer dos casos, o operador deve comprometer-se a obter as qualificações exigidas sem afetar as atividades operacionais da empresa. Quando a XD4Solutions for responsável por disponibilizar os recursos, o planejamento é informado, sempre que possível, com um mês de antecedência. O operador deve verificar o planejamento e notificar a área de operações caso identifique erro ou impossibilidade de cumprir alguma data estabelecida. Para as qualificações sob responsabilidade do operador, este deve acompanhar prazos e vencimentos, tomando com antecedência as medidas necessárias à renovação.</p>"}, {"num": "5.2.1", "title": "Garantia de Experiência Recente no Equipamento e na Operação", "html": "<p>A experiência recente é gerenciada pelo Coordenador de Operações e considerada na designação do time de inspeção e do equipamento para cada missão.</p><p>Operadores de sistemas aéreos (RPAS) que trabalhem sob a autoridade da empresa devem portar Certidão de Cadastro de Aeronave Não Tripulada válida, emitida pela ANAC para o tipo e a classificação da plataforma a ser operada em nome da empresa. Para robôs terrestres e demais equipamentos, aplica-se o controle de habilitação interna definido no respectivo POP. Os operadores são responsáveis pela manutenção dos certificados e licenças necessários à operação das plataformas por eles operadas.</p><p>Para comprovação de experiência recente, os operadores devem registrar suas missões no Diário de Operação e Manutenção do equipamento (Capítulo 8.0).</p><p>O operador que estiver entre 90 (noventa) e 120 (cento e vinte) dias sem operar determinada plataforma deve realizar treinamento de reciclagem de 1 (um) dia nessa plataforma, com etapas teórica e prática, conforme cronograma específico;</p><p>O operador que estiver há mais de 120 (cento e vinte) dias sem operar determinada plataforma deve realizar treinamento de reciclagem de 3 (três) dias, sendo um dia de teoria e dois de treinamento prático, conforme cronograma específico.</p><p>O Coordenador de Operações é responsável por garantir que os operadores e demais pessoas que atuem sob a autoridade da empresa possuam as competências necessárias à condução das operações comerciais da XD4Solutions, na(s) plataforma(s) designada(s).</p>"}, {"num": "5.2.2", "title": "Garantia de Liberação do Equipamento após Manutenção", "html": "<p>O operador não deve aceitar o equipamento para missão quando este apresentar discrepância não solucionada. É responsabilidade do Operador 1 verificar se todos os reportes de discrepância do equipamento foram resolvidos pelo Técnico de Manutenção.</p>"}, {"num": "5.2.3", "title": "Garantia de Autorização do Equipamento para Operações", "html": "<p>Compete ao Diretor de Operações garantir que nenhum equipamento da frota XD4Solutions realize operações até estar regularizado perante os órgãos competentes, conforme a natureza da plataforma:</p><p>Sistemas aéreos (RPAS): regularização perante ANAC, ANATEL, DECEA e Ministério da Defesa, conforme a aplicabilidade de cada situação;</p><p>Robôs terrestres e demais equipamentos: regularização perante as exigências de segurança do trabalho e do cliente aplicáveis ao ambiente de operação.</p><p>As operações no interior de edificações ou construções fechadas, mesmo que parcialmente — incluindo ginásios, estádios e arenas a céu aberto, até o limite vertical de sua estrutura lateral — são de total responsabilidade do proprietário da estrutura ou do locatário do imóvel, qualquer que seja o equipamento utilizado.</p><p>No caso específico de sistemas aéreos projetados para voo em espaços confinados, não há restrição para a operação fora do alcance visual do operador, uma vez que essa operação não ocorre em espaço aéreo sob responsabilidade do DECEA, mas apenas em áreas fechadas e/ou dentro dos parâmetros do &quot;Princípio da Sombra&quot; (vide ICA 100-40). Robôs terrestres, por não operarem em espaço aéreo, não estão sujeitos a essa limitação, aplicando-se em seu lugar as exigências de linha de visada ou de monitoramento remoto definidas no respectivo POP.</p>"}, {"num": "5.3", "title": "Controle Avançado de Operações", "html": "<p>O Time de Inspeção, em especial o Operador 1, é responsável pelas decisões relativas à operação. O Operador 1 detém autoridade e controle operacional do equipamento a partir de seu acionamento; consequentemente, qualquer controle adicional sobre a operação deve ser exercido antes de seu início.</p><p>Nas operações rotineiras, os detalhes da operação normal de cada plataforma constam do respectivo POP publicado pela empresa. A experiência prática, entretanto, demonstra que isso pode, em certos casos, não ser suficiente: quando as condições informadas pelo cliente antes da contratação divergirem significativamente das encontradas no momento da operação, o Time de Inspeção deve reportar-se ao Coordenador de Operações, antes do início da missão, para solicitar orientação adicional e autorização para prosseguir.</p>"}, {"num": "5.3.1", "title": "Autorizações Adicionais", "html": "<p>O Coordenador de Operações é o ponto focal para obtenção de autorizações adicionais. Em sua ausência, deve ser consultado, em primeiro lugar, o Diretor de Operações e, na impossibilidade deste, o Oficial de Segurança ou o Diretor Executivo.</p><p>Antes de aprovar mudanças no planejamento da missão, o responsável deve:</p><p>Obter todos os detalhes das alterações necessárias à operação;</p><p>Considerar os riscos adicionais associados à missão;</p><p>Considerar as consequências comerciais que podem advir da decisão;</p><p>Considerar alternativas para a missão em casos de risco elevado;</p><p>Considerar se a preparação e as precauções tomadas são suficientes;</p><p>Considerar se a equipe é suficientemente experiente para a tarefa, na plataforma designada.</p><p>O responsável deve autorizar a mudança apenas se estiver convencido, após considerar os pontos acima, de que a missão pode ser realizada com segurança e, uma vez dada a autorização, deve certificar-se de que a equipe está ciente dos riscos adicionais.</p>"}, {"num": "5.3.2", "title": "Operações Especiais", "html": "<p>As operações especializadas a seguir, próprias de sistemas aéreos (RPAS), podem ser realizadas mediante autorização da ANAC/DECEA:</p><p>Operações em áreas proibidas ou restritas pelo DECEA, sujeitas à aprovação da autoridade controladora da área. Não são realizadas operações dentro de um raio de 3 NM de qualquer aeródromo, incluindo helipontos ou áreas de pouso listadas no ROTAER;</p><p>Operações noturnas, permitidas apenas mediante autorização da ANAC/DECEA, com voo de reconhecimento prévio realizado durante o dia e acompanhamento de observador visual;</p><p>Operações acima de 120 m AGL, permitidas apenas mediante autorização da ANAC/DECEA, com acompanhamento de observador visual e monitoramento de tráfego aéreo por escuta de rádio aeronáutica;</p><p>Operação offshore, realizada apenas por operadores que cumpram os requisitos de formação e certificação exigidos pelo contratante.</p><p>As operações em áreas confinadas, ou dentro de áreas privativas sob o &quot;Princípio da Sombra&quot;, não estão sujeitas às limitações acima. Para robôs terrestres e demais equipamentos não aéreos, operações especiais (por exemplo, em áreas classificadas, em altura ou em espaço confinado) seguem as exigências específicas de segurança do trabalho e do cliente, definidas no POP da plataforma.</p><p>Em todos os casos, a autorização do Diretor de Operações está condicionada ao cumprimento de todas as medidas de segurança pré-determinadas. O pessoal envolvido na operação deve portar cópias de todas as permissões, isenções e aprovações detidas pela empresa.</p>"}, {"num": "5.4", "title": "Composição do Time de Inspeção", "html": "<p>Para integrar o time de operadores da XD4Solutions, o colaborador deve manter válidas as certificações exigidas conforme o tipo de equipamento e de ambiente a ser inspecionado:</p><p>Obrigatórios: Atestado de Saúde Ocupacional (ASO), licença apropriada à função exercida e certificado de habilitação técnica na plataforma a ser operada;</p><p>Quando aplicável: cursos de NR-33, NR-35 e NR-20, HUET e CBSP.</p><p>As funções de Operador 1, Operador 2 e Técnico de Manutenção somente podem ser exercidas mediante contrato de trabalho assinado.</p><p>A tripulação mínima para operação de qualquer equipamento na XD4Solutions é composta por 1 (um) operador habilitado na plataforma designada. A presença de um segundo membro no time de inspeção justifica-se quando a complexidade da missão exigir divisão de tarefas, para permitir maior controle e consciência situacional; a escolha desse segundo membro deve fundamentar-se no conhecimento necessário para a interpretação dos dados coletados e/ou a elaboração do laudo de inspeção.</p><p>Em locais que exijam nível adicional de segurança, pode ser instituído um terceiro membro de equipe, com as seguintes responsabilidades:</p><p>Operador 1: responsável pelo controle direto da operação do equipamento;</p><p>Operador de Câmera/Sensores: responsável pelo controle dos sensores embarcados e da iluminação, pelas demais tarefas de coleta de dados e pela coordenação com o inspetor externo ou monitor de segurança;</p><p>Monitor de Segurança: responsável por monitorar qualquer risco de segurança que possa surgir, com poder de interromper a operação em caso de risco percebido ou real; pode ser um profissional do quadro do cliente.</p>"}, {"num": "5.4.1", "title": "Critérios para a Função de Operador 1", "html": "<p>Um Operador 1 somente é designado para cumprir determinada Ordem de Serviço após o Coordenador de Operações atestar que possui treinamento suficiente na plataforma e no tipo de estrutura a ser inspecionada. Os requisitos específicos de cada local de inspeção indicado pelo cliente devem ser considerados na elaboração do programa continuado de instrução dos operadores.</p>"}, {"num": "5.4.2", "title": "Critérios para Operador 2", "html": "<p>O profissional designado como Operador 2 é escolhido em função de sua experiência relevante para a avaliação das estruturas inspecionadas. Os requisitos específicos de cada cliente constam de procedimentos operacionais próprios, conforme o respectivo contrato.</p>"}, {"num": "5.4.3", "title": "Critérios para Instrutor", "html": "<p>Para ser designado Instrutor de uma plataforma da empresa, o operador deve atender aos seguintes critérios:</p><p>Possuir conhecimento comprovado da missão considerada;</p><p>Manter o ASO em dia;</p><p>Ter demonstr
